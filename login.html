<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Sign In — BrightKey</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <style>
    body { background: var(--bg-base); display: flex; flex-direction: column; min-height: 100vh; }
    .auth-wrap {
      flex: 1;
      display: grid;
      place-items: center;
      padding: var(--space-xl);
    }
    .auth-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }
    .auth-logo {
      display: block;
      font-size: 1.3rem;
      font-weight: 800;
      color: #111827;
      letter-spacing: -0.04em;
      margin-bottom: 2rem;
      /* override for dark bg */
      color: var(--text-primary);
    }
    .auth-logo span { color: var(--blue); }
    .auth-title { font-size: 1.4rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.4rem; }
    .auth-sub   { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 2rem; }
    .auth-footer { margin-top: 1.5rem; text-align: center; font-size: 0.82rem; color: var(--text-muted); }
    .auth-footer a { color: var(--blue-light); }
    .auth-footer a:hover { color: var(--cyan-light); }
    .auth-divider {
      display: flex; align-items: center; gap: var(--space-md);
      margin: 1.25rem 0;
      font-size: 0.75rem; color: var(--text-muted);
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <a href="index.html" class="auth-logo">Bright<span>Key</span></a>

      <h1 class="auth-title">Employee Sign In</h1>
      <p class="auth-sub">Access your BrightKey workspace</p>

      <div id="auth-alert" class="alert alert--hidden" role="alert" style="margin-bottom:1.25rem;"></div>

      <form id="login-form" novalidate>
        <div class="form-group" style="margin-bottom:1rem;">
          <label class="form-label" for="email">Email address</label>
          <input type="email" id="email" class="form-input" placeholder="you@company.com"
            required autocomplete="email" />
          <span class="form-error" aria-live="polite"></span>
        </div>

        <div class="form-group" style="margin-bottom:1.5rem;">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <label class="form-label" for="password">Password</label>
            <a href="forgot-password.html" style="font-size:0.75rem; color:var(--text-muted);">Forgot password?</a>
          </div>
          <input type="password" id="password" class="form-input" placeholder="••••••••"
            required autocomplete="current-password" />
          <span class="form-error" aria-live="polite"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-lg" id="submit-btn" style="width:100%;">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Request access</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/auth.js"></script>
  <script>
    'use strict';

    // Redirect if already logged in
    BKAuth.redirectIfAuth('dashboard.html');

    const form    = document.getElementById('login-form');
    const btn     = document.getElementById('submit-btn');
    const alertEl = document.getElementById('auth-alert');

    function showAlert(type, msg) {
      alertEl.className = `alert alert-${type}`;
      alertEl.textContent = msg;
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert('error', 'Please fill in all fields.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      alertEl.className = 'alert alert--hidden';

      try {
        await BKAuth.signIn(email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        showAlert('error', err.message || 'Invalid email or password.');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
