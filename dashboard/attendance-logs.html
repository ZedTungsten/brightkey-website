<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Attendance Logs — BrightKey ERP</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg?v=2" />

  <style>
    /* ── Layout ── */
    .top-bar { flex-shrink: 0; background: var(--bg-surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; gap: 1rem; height: 56px; }
    .top-bar-title { font-size: 1rem; font-weight: 800; color: var(--text-primary); letter-spacing: -0.03em; }
    .content-area { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 56px); }
    .main-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    
    .scroll-area { flex: 1; overflow: auto; padding: 2rem; display: flex; flex-direction: column; }
    .att-container { max-width: 1200px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 2rem; }

    /* ── Tab Layout ── */
    .tabs-nav {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg-surface);
      padding: 0 1.5rem;
    }
    .tab-btn {
      padding: 0.9rem 1rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .tab-btn.active {
      color: var(--cyan-light);
      border-bottom-color: var(--cyan);
    }
    .tab-btn:hover:not(.active) {
      color: var(--text-secondary);
    }

    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    /* ── Month Selector ── */
    .month-selector {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .month-btn {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text-primary);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.15s;
    }
    .month-btn:hover {
      border-color: var(--border-hover);
      background: var(--bg-elevated);
    }
    .month-title-display {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text-primary);
      min-width: 150px;
      text-align: center;
    }

    /* ── Week Block ── */
    .week-block {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: 1.5rem;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .week-header {
      background: var(--bg-elevated);
      padding: 0.75rem 1.25rem;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .week-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    .week-table th {
      padding: 0.6rem 1.25rem;
      text-align: left;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    .week-table td {
      padding: 0.75rem 1.25rem;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .week-table tr:last-child td {
      border-bottom: none;
    }
    .week-table tr:hover td {
      background: var(--bg-elevated);
    }

    /* ── Dropdown style ── */
    .form-select {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }
    .form-select:focus {
      border-color: var(--cyan);
    }
  </style>
</head>
<body>

  <div class="dash-layout">
    <!-- Sidebar -->
    <aside class="dash-sidebar" id="dash-sidebar"></aside>

    <!-- Main -->
    <div class="dash-main">
      <!-- Top Bar -->
      <div class="top-bar">
        <span class="top-bar-title">Employee Attendance Logs</span>
        <div style="flex:1;"></div>
        <div style="display: flex; align-items: center; gap: 0.5rem;">
          <span style="font-size: 0.72rem; font-weight: 700; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.05em;">Employee:</span>
          <select id="employee-select" class="form-select" style="width: 220px; height: 32px; padding: 0 0.5rem; font-size: 0.82rem; font-weight: 600;" onchange="AttendanceLogsApp.onEmployeeChange()">
            <option value="">Select Employee...</option>
          </select>
          <button id="btn-edit-mode" class="btn btn-outline btn-sm" style="height: 32px; padding: 0 1rem; font-size: 0.82rem; font-weight: 600; display: none;" onclick="AttendanceLogsApp.toggleEditMode()">Edit</button>
        </div>
      </div>

      <div class="content-area">
        <main class="main-panel">
          <!-- Tabs Navigation -->
          <div class="tabs-nav">
            <button class="tab-btn active" id="tab-btn-logs">Logs</button>
          </div>

          <div class="scroll-area">
            <div class="att-container">

              <!-- ── Logs Tab Content ── -->
              <div class="tab-content active" id="tab-content-logs">
                <!-- Month Selector -->
                <div class="month-selector">
                  <button class="month-btn" onclick="AttendanceLogsApp.changeMonth(-1)">&lt;</button>
                  <span class="month-title-display" id="month-display">Loading…</span>
                  <button class="month-btn" onclick="AttendanceLogsApp.changeMonth(1)">&gt;</button>
                </div>

                <!-- Dynamic Week Lists -->
                <div id="logs-container">
                  <div style="text-align:center; padding:3rem; color:var(--text-muted);">Select an employee to view shift logs.</div>
                </div>
              </div>

            </div>
          </div>
        </main>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/main.js"></script>
  <script>
    'use strict';

    function esc(s) {
      return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    const AttendanceLogsApp = {
      currentUser: null,
      companyId: null,
      employees: [],
      employee: null,
      
      // Date Month Selector State
      selectedYear: new Date().getFullYear(),
      selectedMonth: new Date().getMonth(), // 0-11
      
      MONTH_NAMES: [
        'January', 'February', 'March', 'April', 'May', 'June',
        'July', 'August', 'September', 'October', 'November', 'December'
      ],

      async init() {
        if (!window.BKAuth) return;
        
        // Strictly gate to HR role
        const authInfo = await window.BKAuth.checkRoleGate(['HR'], '../admin.html');
        if (!authInfo) return;

        this.currentUser = authInfo.user;
        this.companyId = await this.getCompanyId(authInfo.tenantId);
        
        if (this.companyId) {
          await this.loadEmployeesList();
        }
      },

      async getCompanyId(tenantId) {
        try {
          const sb = window.BKAuth.sb;
          const { data } = await sb.from('companies').select('id').eq('tenant_id', tenantId).limit(1).maybeSingle();
          return data?.id || null;
        } catch (err) {
          console.error(err);
          return null;
        }
      },

      editMode: false,

      async loadEmployeesList() {
        try {
          const sb = window.BKAuth.sb;
          const { data, error } = await sb.from('employees')
            .select('id, first_name, last_name, shift_time_1, shift_time_2')
            .order('first_name', { ascending: true });

          if (error) throw error;
          this.employees = data || [];

          const select = document.getElementById('employee-select');
          select.innerHTML = '<option value="">Select Employee...</option>' + 
            this.employees.map(emp => `<option value="${emp.id}">${esc(emp.first_name)} ${esc(emp.last_name)}</option>`).join('');

          // Auto-select the first employee if exists
          if (this.employees.length > 0) {
            select.value = this.employees[0].id;
            this.employee = this.employees[0];
            const btn = document.getElementById('btn-edit-mode');
            if (btn) btn.style.display = 'inline-flex';
            await this.loadLogs();
          }
        } catch (err) {
          console.error(err);
        }
      },

      async onEmployeeChange() {
        const select = document.getElementById('employee-select');
        const empId = select.value;
        this.employee = this.employees.find(emp => emp.id === empId) || null;

        // Reset edit mode on employee change
        this.editMode = false;
        const btn = document.getElementById('btn-edit-mode');
        if (btn) {
          btn.textContent = 'Edit';
          btn.classList.remove('btn-cyan');
          btn.classList.add('btn-outline');
          if (this.employee) {
            btn.style.display = 'inline-flex';
          } else {
            btn.style.display = 'none';
          }
        }

        await this.loadLogs();
      },

      toggleEditMode() {
        if (!this.employee) return;
        this.editMode = !this.editMode;
        const btn = document.getElementById('btn-edit-mode');
        if (btn) {
          if (this.editMode) {
            btn.textContent = 'Exit Edit';
            btn.classList.remove('btn-outline');
            btn.classList.add('btn-cyan');
          } else {
            btn.textContent = 'Edit';
            btn.classList.remove('btn-cyan');
            btn.classList.add('btn-outline');
          }
        }
        this.loadLogs();
      },

      changeMonth(dir) {
        this.selectedMonth += dir;
        if (this.selectedMonth < 0) {
          this.selectedMonth = 11;
          this.selectedYear--;
        } else if (this.selectedMonth > 11) {
          this.selectedMonth = 0;
          this.selectedYear++;
        }
        this.loadLogs();
      },

      async loadLogs() {
        const container = document.getElementById('logs-container');
        document.getElementById('month-display').textContent = `${this.MONTH_NAMES[this.selectedMonth]} ${this.selectedYear}`;
        
        if (!this.employee) {
          container.innerHTML = '<div style="text-align:center; padding:3rem; color:var(--text-muted);">Select an employee to view shift logs.</div>';
          return;
        }

        container.innerHTML = '<div style="text-align:center; padding:3rem; color:var(--text-muted);"><div class="bk-spinner" style="margin: 0 auto 1rem;"></div>Loading shift logs…</div>';

        let logs = [];
        try {
          const sb = window.BKAuth.sb;
          const startOfMonth = new Date(this.selectedYear, this.selectedMonth, 1).toISOString();
          const endOfMonth = new Date(this.selectedYear, this.selectedMonth + 1, 1).toISOString();

          const { data, error } = await sb.from('attendance_logs')
            .select('*')
            .eq('employee_id', this.employee.id)
            .gte('created_at', startOfMonth)
            .lt('created_at', endOfMonth)
            .order('created_at', { ascending: true });

          if (error) throw error;
          logs = data || [];
        } catch (err) {
          console.error(err);
        }

        try {
          // Parse and group by Date Key (YYYY-MM-DD)
          const dayGroups = {};
          logs.forEach(log => {
            const dObj = new Date(log.created_at);
            const yr = dObj.getFullYear();
            const mo = String(dObj.getMonth() + 1).padStart(2, '0');
            const dy = String(dObj.getDate()).padStart(2, '0');
            const dateKey = `${yr}-${mo}-${dy}`;
            if (!dayGroups[dateKey]) {
              dayGroups[dateKey] = [];
            }
            dayGroups[dateKey].push(log);
          });

          // Reconstruct Date rows
          const listRows = [];
          
          // Determine the range of days to display
          const now = new Date();
          let maxDay = new Date(this.selectedYear, this.selectedMonth + 1, 0).getDate();
          if (this.selectedYear === now.getFullYear() && this.selectedMonth === now.getMonth()) {
            maxDay = now.getDate();
          } else if (this.selectedYear > now.getFullYear() || (this.selectedYear === now.getFullYear() && this.selectedMonth > now.getMonth())) {
            // Future months: don't show any rows
            maxDay = 0;
          }

          // Parse shifts
          // Default shift is 09:00 AM to 06:00 PM
          let shiftStartHour = 9;
          let shiftStartMin = 0;
          let shiftEndHour = 18;
          let shiftEndMin = 0;

          if (this.employee.shift_time_1) {
            const match = this.employee.shift_time_1.match(/(\d+):(\d+)\s*(AM|PM)/i);
            if (match) {
              let h = parseInt(match[1], 10);
              const m = parseInt(match[2], 10);
              const ampm = match[3].toUpperCase();
              if (ampm === 'PM' && h < 12) h += 12;
              if (ampm === 'AM' && h === 12) h = 0;
              shiftStartHour = h;
              shiftStartMin = m;
            }
          }
          if (this.employee.shift_time_2) {
            const match = this.employee.shift_time_2.match(/(\d+):(\d+)\s*(AM|PM)/i);
            if (match) {
              let h = parseInt(match[1], 10);
              const m = parseInt(match[2], 10);
              const ampm = match[3].toUpperCase();
              if (ampm === 'PM' && h < 12) h += 12;
              if (ampm === 'AM' && h === 12) h = 0;
              shiftEndHour = h;
              shiftEndMin = m;
            }
          }

          const weeks = [];
          let currentWeekDays = [];
          let currentWeekNum = 1;

          for (let d = 1; d <= maxDay; d++) {
            const currentDateObj = new Date(this.selectedYear, this.selectedMonth, d);
            
            // A new week starts on Sunday (getDay() === 0).
            // If it's Sunday and we are past the first day of the month,
            // we push the current week and start a new one.
            if (currentDateObj.getDay() === 0 && d > 1) {
              weeks.push({ weekNum: currentWeekNum, days: currentWeekDays });
              currentWeekDays = [];
              currentWeekNum++;
            }

            const yr = currentDateObj.getFullYear();
            const mo = String(currentDateObj.getMonth() + 1).padStart(2, '0');
            const dy = String(currentDateObj.getDate()).padStart(2, '0');
            const dateKey = `${yr}-${mo}-${dy}`;
            const dayLogs = dayGroups[dateKey] || [];

            let timeInStr = '—';
            let timeOutStr = '—';
            let lateStr = '—';
            let earlyOutStr = '—';
            let timeInVal = '';
            let timeOutVal = '';
            let timeInLogId = '';
            let timeOutLogId = '';

            // Find first available log of the day
            const availableLogs = dayLogs.filter(l => l.status === 'available');
            if (availableLogs.length > 0) {
              const checkInTime = new Date(availableLogs[0].created_at);
              timeInStr = checkInTime.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
              
              const h = String(checkInTime.getHours()).padStart(2, '0');
              const m = String(checkInTime.getMinutes()).padStart(2, '0');
              timeInVal = `${h}:${m}`;
              timeInLogId = availableLogs[0].id;
              
              // Calculate Late
              const shiftStart = new Date(checkInTime);
              shiftStart.setHours(shiftStartHour, shiftStartMin, 0, 0);
              if (checkInTime > shiftStart) {
                const diffMs = checkInTime - shiftStart;
                const diffMins = Math.floor(diffMs / 60000);
                if (diffMins > 0) {
                  lateStr = `${diffMins} min`;
                }
              }
            }

            // Find last offline log of the day
            const offlineLogs = dayLogs.filter(l => l.status === 'offline');
            if (offlineLogs.length > 0) {
              const checkOutTime = new Date(offlineLogs[offlineLogs.length - 1].created_at);
              timeOutStr = checkOutTime.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

              const h = String(checkOutTime.getHours()).padStart(2, '0');
              const m = String(checkOutTime.getMinutes()).padStart(2, '0');
              timeOutVal = `${h}:${m}`;
              timeOutLogId = offlineLogs[offlineLogs.length - 1].id;

              // Calculate Early Out
              const shiftEnd = new Date(checkOutTime);
              shiftEnd.setHours(shiftEndHour, shiftEndMin, 0, 0);
              if (checkOutTime < shiftEnd) {
                const diffMs = shiftEnd - checkOutTime;
                const diffMins = Math.floor(diffMs / 60000);
                if (diffMins > 0) {
                  earlyOutStr = `${diffMins} min`;
                }
              }
            }

            // Calculate Total Hours
            let totalHoursStr = '—';
            if (availableLogs.length > 0 && offlineLogs.length > 0) {
              const checkInTime = new Date(availableLogs[0].created_at);
              const checkOutTime = new Date(offlineLogs[offlineLogs.length - 1].created_at);
              if (checkOutTime >= checkInTime) {
                const diffMs = checkOutTime - checkInTime;
                const totalMins = Math.floor(diffMs / 60000);
                const hrs = Math.floor(totalMins / 60);
                const mins = totalMins % 60;
                totalHoursStr = `${hrs}h ${mins}m`;
              }
            }

            currentWeekDays.push({
              dayNum: d,
              dateKey: dateKey,
              dateFriendly: currentDateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }),
              timeIn: timeInStr,
              timeOut: timeOutStr,
              timeInVal: timeInVal,
              timeOutVal: timeOutVal,
              timeInLogId: timeInLogId,
              timeOutLogId: timeOutLogId,
              late: lateStr,
              earlyOut: earlyOutStr,
              totalHours: totalHoursStr
            });
          }

          if (currentWeekDays.length > 0) {
            weeks.push({ weekNum: currentWeekNum, days: currentWeekDays });
          }

          // Filter out weeks with no logged days
          const filteredWeeks = weeks.filter(w => w.days.length > 0);

          // Reverse weeks to show the latest week first
          filteredWeeks.reverse();

          const totalDays = filteredWeeks.reduce((sum, w) => sum + w.days.length, 0);
          if (totalDays === 0) {
            container.innerHTML = '<div style="text-align:center; padding:3rem; color:var(--text-muted);">No logs recorded for this month.</div>';
            return;
          }

          container.innerHTML = '';
          filteredWeeks.forEach(w => {
            const weekHtml = `
              <div class="week-block">
                <div class="week-header">Week ${w.weekNum}</div>
                <table class="week-table">
                  <thead>
                    <tr>
                      <th>Date</th>
                      <th>Time In</th>
                      <th>Time Out</th>
                      <th>Late</th>
                      <th>Early Out</th>
                      <th>Total Hours</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${w.days.slice().reverse().map(r => `
                      <tr>
                        <td><strong>${r.dateFriendly}</strong></td>
                        <td>
                          ${this.editMode ? `
                            <input type="time" class="form-input" style="width: 110px; height: 28px; padding: 0 0.5rem; font-size: 0.82rem; font-weight: 600;"
                              value="${r.timeInVal}"
                              onchange="AttendanceLogsApp.saveRowTime('${r.dateKey}', 'available', this.value, '${r.timeInLogId}')" />
                          ` : `<span style="font-weight:600; color:var(--text-primary);">${r.timeIn}</span>`}
                        </td>
                        <td>
                          ${this.editMode ? `
                            <input type="time" class="form-input" style="width: 110px; height: 28px; padding: 0 0.5rem; font-size: 0.82rem; font-weight: 600;"
                              value="${r.timeOutVal}"
                              onchange="AttendanceLogsApp.saveRowTime('${r.dateKey}', 'offline', this.value, '${r.timeOutLogId}')" />
                          ` : `<span style="font-weight:600; color:var(--text-primary);">${r.timeOut}</span>`}
                        </td>
                        <td><span style="color:${r.late !== '—' ? 'var(--warning)' : 'var(--text-secondary)'}; font-weight:600;">${r.late}</span></td>
                        <td><span style="color:${r.earlyOut !== '—' ? 'var(--danger)' : 'var(--text-secondary)'}; font-weight:600;">${r.earlyOut}</span></td>
                        <td><span style="font-weight:600; color:var(--text-primary);">${r.totalHours}</span></td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            `;
            container.insertAdjacentHTML('beforeend', weekHtml);
          });

        } catch (err) {
          console.error(err);
          container.innerHTML = `<div style="text-align:center; padding:3rem; color:var(--danger);">Failed to load logs: ${err.message}</div>`;
        }
      },

      async saveRowTime(dateKey, status, newTimeVal, existingLogId) {
        if (!this.employee || !this.companyId) return;
        try {
          const sb = window.BKAuth.sb;
          
          if (!newTimeVal) {
            if (existingLogId && existingLogId !== 'undefined' && existingLogId !== '') {
              const { error } = await sb.from('attendance_logs')
                .delete()
                .eq('id', existingLogId);
              if (error) throw error;
              Toast.success('Log cleared successfully.');
            }
          } else {
            const [hours, mins] = newTimeVal.split(':').map(Number);
            const [yr, mo, dy] = dateKey.split('-').map(Number);
            const targetDate = new Date(yr, mo - 1, dy, hours, mins, 0);
            const newTimestampStr = targetDate.toISOString();

            if (existingLogId && existingLogId !== 'undefined' && existingLogId !== '') {
              const { error } = await sb.from('attendance_logs')
                .update({ created_at: newTimestampStr })
                .eq('id', existingLogId);
              if (error) throw error;
            } else {
              const { error } = await sb.from('attendance_logs')
                .insert([{
                  company_id: this.companyId,
                  employee_id: this.employee.id,
                  status: status,
                  created_at: newTimestampStr
                }]);
              if (error) throw error;
            }
            Toast.success('Attendance updated successfully.');
          }
          await this.loadLogs();
        } catch (err) {
          console.error(err);
          Toast.error('Failed to update attendance: ' + err.message);
        }
      }
    };

    // Boot
    document.addEventListener('DOMContentLoaded', () => {
      AttendanceLogsApp.init();
    });
  </script>
</body>
</html>
