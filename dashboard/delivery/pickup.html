<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pickup Deliveries — BrightKey ERP</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg?v=2" />

  <style>
    /* ── Layout ── */
    .top-bar { flex-shrink: 0; background: var(--bg-surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; gap: 1rem; height: 56px; }
    .top-bar-title { font-size: 1rem; font-weight: 800; color: var(--text-primary); letter-spacing: -0.03em; }
    .content-area { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 56px); }
    .main-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    
    .scroll-area { flex: 1; overflow: auto; padding: 2rem; display: flex; flex-direction: column; }
    .delivery-container { max-width: 1200px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 2rem; }

    /* ── Tabs Navigation ── */
    .drawer-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg-surface);
    }
    .tab-btn {
      padding: 0.9rem 1.25rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .tab-btn.active {
      color: var(--cyan-light);
      border-bottom-color: var(--cyan);
    }
    .tab-btn:hover:not(.active) {
      color: var(--text-secondary);
    }

    .tab-content {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    /* ── Panels & Tables ── */
    .panel {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .panel-header {
      padding: 1rem 1.25rem;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    .table-responsive {
      width: 100%;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    thead th {
      background: var(--bg-elevated);
      color: var(--text-secondary);
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.75rem 1.25rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    tbody tr:last-child {
      border-bottom: none;
    }
    tbody tr:hover {
      background: var(--bg-elevated);
    }
    tbody td {
      padding: 0.85rem 1.25rem;
      color: var(--text-secondary);
      vertical-align: middle;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 1rem;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--cyan); color: #fff; border-color: var(--cyan); }
    .btn-primary:hover { background: var(--cyan-light); border-color: var(--cyan-light); }
    .btn-outline { background: var(--bg-surface); color: var(--text-secondary); border-color: var(--border); }
    .btn-outline:hover { border-color: var(--cyan); color: var(--cyan-light); }

    /* ── Form Inputs ── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .form-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-input {
      padding: 0.55rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
      background: var(--bg-base);
      color: var(--text-primary);
      outline: none;
      transition: border 0.15s;
    }
    .form-input:focus {
      border-color: var(--cyan);
    }

    /* ── Modal Overlay ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open {
      display: flex;
    }
    .modal-content {
      width: 100%;
      max-width: 500px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
      box-shadow: 0 12px 48px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .modal-title {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text-primary);
    }
  </style>
</head>
<body>

  <div class="dash-layout">
    <!-- Sidebar -->
    <aside class="dash-sidebar" id="dash-sidebar"></aside>

    <!-- Main -->
    <div class="dash-main">
      <!-- Top Bar -->
      <div class="top-bar">
        <span class="top-bar-title">Logistics Delivery</span>
      </div>

      <div class="content-area">
        <main class="main-panel">
          <!-- Tabs Navigation -->
          <div class="drawer-tabs">
            <a class="tab-btn" href="/dashboard/delivery/book">Book</a>
            <a class="tab-btn active" href="/dashboard/delivery/pickup">Pickup</a>
            <a class="tab-btn" href="/dashboard/delivery/done">Done</a>
          </div>

          <div class="scroll-area">
            <div class="delivery-container">

              <!-- Pickup Tab Content -->
              <div class="tab-content" id="tab-content-pickup">
                <div class="panel">
                  <div class="panel-header">Booked Deliveries Awaiting Pickup</div>
                  <div class="table-responsive">
                    <table>
                      <thead>
                        <tr>
                          <th>Delivery Info</th>
                          <th>Ref Order</th>
                          <th>Full Name</th>
                          <th>City</th>
                          <th>SKU</th>
                          <th>Qty</th>
                          <th>Base Fee</th>
                          <th>Tip 1</th>
                          <th>Tip 2</th>
                          <th>Toll</th>
                          <th>Action</th>
                        </tr>
                      </thead>
                      <tbody id="pickup-list">
                        <tr>
                          <td colspan="11">
                            <div style="text-align:center; padding:3rem; color:var(--text-muted);">
                              <div class="bk-spinner" style="margin:0 auto 1rem;"></div>
                              Loading pickup queue…
                            </div>
                          </td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                  <div id="pickup-pagination" style="display:flex; justify-content:space-between; align-items:center; padding:0.75rem 1.25rem; border-top:1px solid var(--border); background:var(--bg-surface); font-size:0.8rem; color:var(--text-muted);"></div>
                </div>
              </div>

            </div>
          </div>
        </main>
      </div>
    </div>
  </div>

  <!-- Picked Up Modal -->
  <div id="pickup-modal" class="modal-overlay">
    <div class="modal-content" style="max-width: 550px;">
      <h3 class="modal-title">Confirm Delivery Pickup</h3>
      
      <!-- Order details card -->
      <div style="font-size: 0.82rem; color: var(--text-secondary); line-height: 1.5; background: var(--bg-elevated); padding: 0.75rem; border-radius: 6px; border: 1px solid var(--border);">
        <div><strong>Order No:</strong> <span id="pmodal-order-no" style="color: var(--text-primary);"></span></div>
        <div><strong>Name:</strong> <span id="pmodal-customer-name" style="color: var(--text-primary);"></span></div>
        <div><strong>City:</strong> <span id="pmodal-customer-city" style="color: var(--text-primary);"></span></div>
      </div>

      <!-- Fees editing area -->
      <div class="form-group">
        <label class="form-label" style="margin-bottom: 0.25rem;">Confirm / Edit Delivery Fees</label>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; background: var(--bg-elevated); padding: 1rem; border-radius: 8px; border: 1px solid var(--border);">
          <!-- Base Fee -->
          <div class="form-group" id="fee-group-base">
            <label class="form-label" style="font-size: 0.7rem; color: var(--text-muted);">Base Fee (₱)</label>
            <div class="fee-display-container" id="fee-disp-base" style="display:flex; align-items:center; gap:0.5rem;">
              <span class="fee-val" style="font-size:0.9rem; font-weight:600; color:var(--text-primary);">₱0.00</span>
              <button type="button" class="btn btn-outline" style="padding: 0.25rem 0.4rem; font-size:0.7rem; display:inline-flex;" onclick="editFeeField('base')">
                <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"/></svg>
              </button>
            </div>
            <input type="number" id="p-base-fee" class="form-input" style="display:none;" placeholder="0.00" step="0.01" min="0" />
          </div>

          <!-- Tip 1 -->
          <div class="form-group" id="fee-group-tip-1">
            <label class="form-label" style="font-size: 0.7rem; color: var(--text-muted);">Tip 1 (₱)</label>
            <div class="fee-display-container" id="fee-disp-tip-1" style="display:flex; align-items:center; gap:0.5rem;">
              <span class="fee-val" style="font-size:0.9rem; font-weight:600; color:var(--text-primary);">₱0.00</span>
              <button type="button" class="btn btn-outline" style="padding: 0.25rem 0.4rem; font-size:0.7rem; display:inline-flex;" onclick="editFeeField('tip-1')">
                <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"/></svg>
              </button>
            </div>
            <input type="number" id="p-tip-1" class="form-input" style="display:none;" placeholder="0.00" step="0.01" min="0" />
          </div>

          <!-- Tip 2 -->
          <div class="form-group" id="fee-group-tip-2">
            <label class="form-label" style="font-size: 0.7rem; color: var(--text-muted);">Tip 2 (₱)</label>
            <div class="fee-display-container" id="fee-disp-tip-2" style="display:flex; align-items:center; gap:0.5rem;">
              <span class="fee-val" style="font-size:0.9rem; font-weight:600; color:var(--text-primary);">₱0.00</span>
              <button type="button" class="btn btn-outline" style="padding: 0.25rem 0.4rem; font-size:0.7rem; display:inline-flex;" onclick="editFeeField('tip-2')">
                <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"/></svg>
              </button>
            </div>
            <input type="number" id="p-tip-2" class="form-input" style="display:none;" placeholder="0.00" step="0.01" min="0" />
          </div>

          <!-- Toll -->
          <div class="form-group" id="fee-group-toll">
            <label class="form-label" style="font-size: 0.7rem; color: var(--text-muted);">Toll (₱)</label>
            <div class="fee-display-container" id="fee-disp-toll" style="display:flex; align-items:center; gap:0.5rem;">
              <span class="fee-val" style="font-size:0.9rem; font-weight:600; color:var(--text-primary);">₱0.00</span>
              <button type="button" class="btn btn-outline" style="padding: 0.25rem 0.4rem; font-size:0.7rem; display:inline-flex;" onclick="editFeeField('toll')">
                <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"/></svg>
              </button>
            </div>
            <input type="number" id="p-toll" class="form-input" style="display:none;" placeholder="0.00" step="0.01" min="0" />
          </div>
        </div>
      </div>

      <!-- Multiple Upload Pickup Photos -->
      <div class="form-group">
        <label class="form-label">Upload Pictures (Rider, Handover, Plate Number)</label>
        <div id="pickup-upload-container" style="width:100%; min-height:120px; background:var(--bg-elevated); border:2px dashed var(--border); border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; overflow:hidden; position:relative; cursor:pointer; padding: 1rem;" onclick="document.getElementById('pickup-file-input').click()">
          <div id="pickup-upload-placeholder" style="display:flex; flex-direction:column; align-items:center; gap:0.5rem; color:var(--text-muted); text-align:center;">
            <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="1.5" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span style="font-size:0.78rem; font-weight:600;">Drag & drop photos or click to select multiple</span>
          </div>
          <div id="pickup-thumbs-grid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.5rem; width: 100%; margin-top: 0.5rem; display: none;" onclick="event.stopPropagation()"></div>
          <input type="file" id="pickup-file-input" accept="image/*" multiple style="display:none;" onchange="handlePickupFilesSelect(event)" onclick="event.stopPropagation()" />
        </div>
      </div>

      <!-- Actions -->
      <div style="display: flex; justify-content: flex-end; gap: 0.75rem; border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 0.25rem;">
        <button type="button" class="btn btn-outline" onclick="closePickupModal()">Cancel</button>
        <button type="button" id="btn-confirm-pickup" class="btn btn-primary" onclick="confirmPickup()" disabled>Confirm Pickup</button>
      </div>
    </div>
  </div>

  <!-- Lightbox Modal -->
  <div id="lightbox-modal" class="modal-overlay" onclick="closeLightbox()" style="background: rgba(0,0,0,0.85); cursor: zoom-out;">
    <div style="position: relative; max-width: 90vw; max-height: 90vh;">
      <img id="lightbox-img" src="" style="max-width: 100%; max-height: 90vh; border-radius: 8px; box-shadow: 0 12px 48px rgba(0,0,0,0.5); object-fit: contain; cursor: default;" onclick="event.stopPropagation()" />
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>
  <script src="../../js/main.js"></script>

  <script>
    'use strict';

    function esc(s) {
      return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    const DeliveryApp = {
      currentUser: null,
      companyId: null,
      activeTransactions: [],
      deliveryBookings: [],
      selectedBooking: null,
      pickupPhotosBlobs: [],
      currentPagePickup: 1,
      itemsPerPage: 10,

      async init() {
        if (!window.BKAuth) return;

        const authInfo = await window.BKAuth.checkRoleGate(['owner', 'admin', 'warehouse', 'logistics'], '../../admin.html');
        if (!authInfo) return;

        this.currentUser = authInfo.user;
        this.companyId = await this.getCompanyId(authInfo.tenantId);

        if (this.companyId) {
          await this.loadData();
        }
      },

      async getCompanyId(tenantId) {
        try {
          const sb = window.BKAuth.sb;
          const { data } = await sb.from('companies').select('id').eq('tenant_id', tenantId).limit(1).maybeSingle();
          return data?.id || null;
        } catch (err) {
          console.error(err);
          return null;
        }
      },

      async loadData() {
        try {
          const sb = window.BKAuth.sb;
          
          const { data: txs, error: txErr } = await sb.from('inventory_transactions')
            .select('*')
            .eq('type', 'customer_order');
          if (txErr) throw txErr;
          this.activeTransactions = txs || [];

          const { data: dbData, error: dbErr } = await sb.from('delivery_bookings')
            .select('*')
            .order('created_at', { ascending: false });
          if (dbErr) throw dbErr;
          this.deliveryBookings = dbData || [];

          this.renderPickupQueue();
        } catch (err) {
          console.error(err);
          Toast.error('Failed to load logistics queue: ' + err.message);
        }
      },

      renderPickupQueue() {
        const tbody = document.getElementById('pickup-list');
        if (!tbody) return;
        tbody.innerHTML = '';

        const pickupQueue = this.deliveryBookings.filter(db => db.status === 'booked');

        if (pickupQueue.length === 0) {
          tbody.innerHTML = `<tr><td colspan="11" style="text-align:center; padding:3rem; color:var(--text-muted);">No orders awaiting pickup.</td></tr>`;
          this.renderPagination(0, this.currentPagePickup, 'pickup-pagination');
          return;
        }

        const totalItems = pickupQueue.length;

        const maxPage = Math.ceil(totalItems / this.itemsPerPage) || 1;
        if (this.currentPagePickup > maxPage) {
          this.currentPagePickup = maxPage;
        }

        const startIdx = (this.currentPagePickup - 1) * this.itemsPerPage;
        const endIdx = startIdx + this.itemsPerPage;
        const paginatedPickup = pickupQueue.slice(startIdx, endIdx);

        paginatedPickup.forEach(db => {
          const items = this.activeTransactions.filter(t => t.reference_id === db.reference_id && t.status === 'dispatched');
          const skusHtml = items.map(t => `<code>${t.sku}</code>`).join('<br/>') || '—';
          const qtysHtml = items.map(t => `<strong>${t.quantity}</strong>`).join('<br/>') || '—';

          let photoHtml = '—';
          if (db.delivery_photo_url) {
            photoHtml = `<img src="${db.delivery_photo_url}" alt="Delivery Proof" style="width:80px; height:50px; object-fit:cover; border-radius:6px; border:1px solid var(--border); cursor:pointer;" onclick="maximizePhoto('${esc(db.delivery_photo_url)}')" />`;
          }

          const baseFeeText = db.base_fee ? `₱${(db.base_fee / 100).toFixed(2)}` : '—';
          const tip1Text = db.tip_1 ? `₱${(db.tip_1 / 100).toFixed(2)}` : '—';
          const tip2Text = db.tip_2 ? `₱${(db.tip_2 / 100).toFixed(2)}` : '—';
          const tollText = db.toll ? `₱${(db.toll / 100).toFixed(2)}` : '—';

          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${photoHtml}</td>
            <td><strong>${esc(db.reference_id)}</strong></td>
            <td>${esc(db.customer_name || 'N/A')}</td>
            <td>${esc(db.customer_city || 'N/A')}</td>
            <td>${skusHtml}</td>
            <td>${qtysHtml}</td>
            <td>${baseFeeText}</td>
            <td>${tip1Text}</td>
            <td>${tip2Text}</td>
            <td>${tollText}</td>
            <td>
              <button class="btn btn-cyan btn-sm" onclick="DeliveryApp.openPickupModal('${db.id}')">
                Picked Up
              </button>
            </td>
          `;
          tbody.appendChild(tr);
        });

        this.renderPagination(totalItems, this.currentPagePickup, 'pickup-pagination');
      },

      renderPagination(totalItems, currentPage, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;

        if (totalItems <= 10) {
          container.style.display = 'none';
          return;
        }
        container.style.display = 'flex';

        const totalPages = Math.ceil(totalItems / this.itemsPerPage) || 1;
        const start = (currentPage - 1) * this.itemsPerPage + 1;
        const end = Math.min(currentPage * this.itemsPerPage, totalItems);

        container.innerHTML = `
          <span>Showing <strong>${start}</strong> to <strong>${end}</strong> of <strong>${totalItems}</strong> entries</span>
          <div style="display:flex; gap:0.5rem; align-items:center;">
            <button class="btn btn-outline btn-sm" style="padding:0.25rem 0.5rem; font-size:0.75rem;" ${currentPage === 1 ? 'disabled' : ''} onclick="DeliveryApp.changePage(${currentPage - 1})">Previous</button>
            <span style="font-weight:600; color:var(--text-primary); font-size:0.75rem; padding:0 0.25rem;">Page ${currentPage} of ${totalPages}</span>
            <button class="btn btn-outline btn-sm" style="padding:0.25rem 0.5rem; font-size:0.75rem;" ${currentPage === totalPages ? 'disabled' : ''} onclick="DeliveryApp.changePage(${currentPage + 1})">Next</button>
          </div>
        `;
      },

      changePage(newPage) {
        this.currentPagePickup = newPage;
        this.renderPickupQueue();
      },

      openPickupModal(bookingId) {
        const booking = this.deliveryBookings.find(b => b.id === bookingId);
        if (!booking) return;

        this.selectedBooking = booking;
        this.pickupPhotosBlobs = [];

        document.getElementById('pmodal-order-no').textContent = booking.reference_id;
        document.getElementById('pmodal-customer-name').textContent = booking.customer_name || 'N/A';
        document.getElementById('pmodal-customer-city').textContent = booking.customer_city || 'N/A';

        this.setupFeeFields(booking);
        renderPickupThumbnails();

        document.getElementById('pickup-modal').classList.add('open');
      },

      setupFeeFields(booking) {
        const fields = ['base', 'tip-1', 'tip-2', 'toll'];
        const dbKeyMap = {
          'base': 'base_fee',
          'tip-1': 'tip_1',
          'tip-2': 'tip_2',
          'toll': 'toll'
        };
        const inputIdMap = {
          'base': 'p-base-fee',
          'tip-1': 'p-tip-1',
          'tip-2': 'p-tip-2',
          'toll': 'p-toll'
        };

        fields.forEach(field => {
          const dbValueCentavos = booking[dbKeyMap[field]] || 0;
          const dispVal = document.querySelector(`#fee-disp-${field} .fee-val`);
          const dispContainer = document.getElementById(`fee-disp-${field}`);
          const inputEl = document.getElementById(inputIdMap[field]);

          inputEl.value = dbValueCentavos > 0 ? (dbValueCentavos / 100).toFixed(2) : '';

          if (dbValueCentavos > 0) {
            dispVal.textContent = '₱' + (dbValueCentavos / 100).toFixed(2);
            dispContainer.style.display = 'flex';
            inputEl.style.display = 'none';
          } else {
            dispContainer.style.display = 'none';
            inputEl.style.display = 'block';
          }
        });
      }
    };

    window.editFeeField = function(field) {
      const inputIdMap = {
        'base': 'p-base-fee',
        'tip-1': 'p-tip-1',
        'tip-2': 'p-tip-2',
        'toll': 'p-toll'
      };
      document.getElementById(`fee-disp-${field}`).style.display = 'none';
      const inputEl = document.getElementById(inputIdMap[field]);
      inputEl.style.display = 'block';
      inputEl.focus();
    };

    window.closePickupModal = function() {
      document.getElementById('pickup-modal').classList.remove('open');
    };

    window.maximizePhoto = function(src) {
      if (!src) return;
      const modal = document.getElementById('lightbox-modal');
      const img = document.getElementById('lightbox-img');
      img.src = src;
      modal.classList.add('open');
    };

    window.closeLightbox = function() {
      const modal = document.getElementById('lightbox-modal');
      modal.classList.remove('open');
    };

    window.handlePickupFilesSelect = function(e) {
      const files = Array.from(e.target.files);
      if (files.length === 0) return;
      
      const currentCount = DeliveryApp.pickupPhotosBlobs.length;
      if (currentCount >= 5) {
        Toast.error('Maximum 5 images allowed.');
        e.target.value = '';
        return;
      }
      
      const remainingCount = 5 - currentCount;
      if (files.length > remainingCount) {
        Toast.error(`Only up to 5 images can be uploaded. Loading the first ${remainingCount} selected image(s).`);
      }
      
      const filesToLoad = files.slice(0, remainingCount);
      let loaded = 0;
      filesToLoad.forEach(file => {
        const reader = new FileReader();
        reader.onload = function(evt) {
          DeliveryApp.pickupPhotosBlobs.push({
            file: file,
            dataUrl: evt.target.result
          });
          loaded++;
          if (loaded === filesToLoad.length) {
            renderPickupThumbnails();
          }
        };
        reader.readAsDataURL(file);
      });
      e.target.value = '';
    };

    function renderPickupThumbnails() {
      const grid = document.getElementById('pickup-thumbs-grid');
      const placeholder = document.getElementById('pickup-upload-placeholder');
      if (DeliveryApp.pickupPhotosBlobs.length === 0) {
        grid.style.display = 'none';
        grid.innerHTML = '';
        placeholder.style.display = 'flex';
        document.getElementById('btn-confirm-pickup').disabled = true;
        return;
      }

      placeholder.style.display = 'none';
      grid.style.display = 'grid';
      grid.innerHTML = '';

      DeliveryApp.pickupPhotosBlobs.forEach((item, index) => {
        const thumbDiv = document.createElement('div');
        thumbDiv.style.cssText = 'position:relative; aspect-ratio:1; border-radius:6px; overflow:hidden; border:1px solid var(--border);';
        
        const img = document.createElement('img');
        img.src = item.dataUrl;
        img.style.cssText = 'width:100%; height:100%; object-fit:cover;';
        
        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.style.cssText = 'position:absolute; top:2px; right:2px; background:rgba(0,0,0,0.6); color:#fff; border:none; border-radius:50%; width:16px; height:16px; font-size:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:bold;';
        removeBtn.innerHTML = '×';
        removeBtn.onclick = function(evt) {
          evt.stopPropagation();
          DeliveryApp.pickupPhotosBlobs.splice(index, 1);
          renderPickupThumbnails();
        };

        thumbDiv.appendChild(img);
        thumbDiv.appendChild(removeBtn);
        grid.appendChild(thumbDiv);
      });

      if (DeliveryApp.pickupPhotosBlobs.length < 5) {
        const addMoreDiv = document.createElement('div');
        addMoreDiv.style.cssText = 'aspect-ratio:1; border-radius:6px; border:1px dashed var(--cyan); display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,180,216,0.05); color:var(--cyan-light); cursor:pointer; transition:all 0.15s; font-size:0.7rem; font-weight:600; text-align:center; padding: 0.25rem;';
        addMoreDiv.innerHTML = `
          <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none" style="margin-bottom:2px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          + Add more
        `;
        addMoreDiv.onclick = function(evt) {
          evt.stopPropagation();
          document.getElementById('pickup-file-input').click();
        };
        addMoreDiv.onmouseover = function() {
          addMoreDiv.style.background = 'rgba(0,180,216,0.1)';
        };
        addMoreDiv.onmouseout = function() {
          addMoreDiv.style.background = 'rgba(0,180,216,0.05)';
        };
        grid.appendChild(addMoreDiv);
      }

      document.getElementById('btn-confirm-pickup').disabled = false;
    }

    window.confirmPickup = async function() {
      const btn = document.getElementById('btn-confirm-pickup');
      if (btn.disabled || !DeliveryApp.selectedBooking || DeliveryApp.pickupPhotosBlobs.length === 0) return;

      btn.disabled = true;
      const originalText = btn.textContent;
      btn.innerHTML = `<span class="bk-spinner" style="width:12px; height:12px; border-width:2px; display:inline-block; vertical-align:middle; margin-right:6px;"></span>Saving...`;

      try {
        const baseFeeVal = parseFloat(document.getElementById('p-base-fee').value) || 0;
        const tip1Val = parseFloat(document.getElementById('p-tip-1').value) || 0;
        const tip2Val = parseFloat(document.getElementById('p-tip-2').value) || 0;
        const tollVal = parseFloat(document.getElementById('p-toll').value) || 0;

        const uploadPromises = DeliveryApp.pickupPhotosBlobs.map(async (item, index) => {
          const base64 = item.dataUrl.split(';base64,').pop();
          const fileName = `pickup_${DeliveryApp.selectedBooking.reference_id}_index_${index}_${Date.now()}.jpg`;
          
          const uploadRes = await fetch('/api/upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              fileBase64: base64,
              fileName: fileName,
              category: 'installations',
              refId: DeliveryApp.selectedBooking.reference_id,
              type: 'proof',
              companyId: DeliveryApp.companyId || 'general'
            })
          });

          if (!uploadRes.ok) throw new Error(`Pickup photo ${index + 1} upload failed`);
          const resJson = await uploadRes.json();
          return resJson.url;
        });

        const uploadedUrls = await Promise.all(uploadPromises);

        const sb = window.BKAuth.sb;

        const { error: updErr } = await sb.from('delivery_bookings')
          .update({
            status: 'picked_up',
            pickup_photos: uploadedUrls,
            picked_up_at: new Date().toISOString(),
            base_fee: Math.round(baseFeeVal * 100),
            tip_1: Math.round(tip1Val * 100),
            tip_2: Math.round(tip2Val * 100),
            toll: Math.round(tollVal * 100)
          })
          .eq('id', DeliveryApp.selectedBooking.id);

        if (updErr) throw updErr;

        Toast.success('Delivery picked up successfully.');
        closePickupModal();
        await DeliveryApp.loadData();
      } catch (err) {
        console.error(err);
        Toast.error('Failed to confirm pickup: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    };

    window.DeliveryApp = DeliveryApp;

    document.addEventListener('DOMContentLoaded', () => {
      DeliveryApp.init();
    });
  </script>
</body>
</html>
