<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expenses (OPEX) — BrightKey Finance</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg?v=2" />
  <style>
    /* ── Month Navigation ── */
    .month-nav-container {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.5rem 1rem;
    }
    .month-nav-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-primary);
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
    }
    .month-nav-btn:hover {
      background: var(--bg-base);
      border-color: var(--text-secondary);
    }
    .month-display-label {
      font-size: 0.9rem;
      font-weight: 700;
      min-width: 120px;
      text-align: center;
    }

    /* ── Excel-style Table ── */
    .excel-container {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      margin-top: 1.5rem;
    }
    .excel-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10pt;
      color: var(--text-primary);
      font-family: Arial, sans-serif;
    }
    .excel-table th, .excel-table td {
      border: 1px solid var(--border);
      padding: 0.6rem 0.85rem;
      text-align: right;
    }
    .excel-table th {
      background: var(--bg-base, #fafafa);
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-size: 10pt;
      letter-spacing: 0.05em;
    }
    .excel-table th:first-child, .excel-table td:first-child {
      text-align: left;
      font-weight: 600;
      background: var(--bg-base, #fafafa);
    }
    .excel-table tr.total-row td {
      font-weight: 700 !important;
      background: var(--bg-base, #fafafa) !important;
      border-top: 2px solid var(--text-primary) !important;
      border-bottom: 2px double var(--text-primary) !important;
    }

    /* ── Tab Container Bar ── */
    .drawer-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      background: var(--bg-surface);
      margin-bottom: 1.5rem;
    }
    .tab-btn {
      padding: 0.9rem 1.25rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.15s;
      text-decoration: none;
    }
    .tab-btn.active {
      color: var(--cyan-light);
      border-bottom-color: var(--cyan);
    }
    .tab-btn:hover:not(.active) {
      color: var(--text-secondary);
    }

    .shimmer-row td {
      background: linear-gradient(90deg, var(--bg-surface) 25%, var(--bg-base) 50%, var(--bg-surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body class="bg-base text-primary">
  <div class="dash-layout">
    <!-- Sidebar -->
    <aside class="dash-sidebar" id="dash-sidebar"></aside>

    <!-- Main Content Area -->
    <main class="dash-main">
      <header class="dash-topbar" style="border-bottom: none; height: auto; min-height: 60px; display: flex; flex-direction: column; align-items: stretch; justify-content: space-between; padding-top: 1rem;">
        <div style="display: flex; align-items: center; gap: 0.75rem; padding-left: 2rem; margin-bottom: 0.75rem;">
          <h1 style="font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em;">Expenses</h1>
        </div>
        <!-- Tabs Component connected directly to header -->
        <div class="drawer-tabs" style="margin-bottom: 0; padding-left: 2rem; border-top: 1px solid var(--border);">
          <a href="/dashboard/expenses/cogs" class="tab-btn">COGS</a>
          <a href="/dashboard/expenses/opex" class="tab-btn active">OPEX</a>
        </div>
      </header>

      <div style="padding: 2rem; max-width: 1200px; width: 100%; margin: 0 auto; box-sizing: border-box;">
        <!-- Top controls row -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
          <!-- Month Switcher -->
          <div class="month-nav-container">
            <button onclick="OpexApp.changeMonth(-1)" class="month-nav-btn" aria-label="Previous month">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <span class="month-display-label" id="month-label">---</span>
            <button onclick="OpexApp.changeMonth(1)" class="month-nav-btn" aria-label="Next month">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>

          <button onclick="OpexApp.loadData()" class="btn btn-outline btn-sm" style="display: flex; align-items: center; gap: 0.4rem;">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
            Refresh
          </button>
        </div>

        <!-- OPEX Report Sections -->
        <div id="opex-sections-container" style="display: flex; flex-direction: column; gap: 2rem;">
          <div style="background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1.5rem; box-shadow: var(--shadow-sm); text-align: center; color: var(--text-muted);">
            Loading OPEX categories...
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Supabase SDK, Auth & Sidebar -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>
  <script src="../../js/main.js"></script>

  <script>
    (function() {
      'use strict';

      window.OpexApp = {
        companyId: null,
        tenantId: null,
        currentDate: new Date(),

        async init() {
          if (!window.BKAuth) return;
          const authInfo = await window.BKAuth.checkRoleGate(['Finance'], '../../admin.html');
          if (!authInfo) return;

          this.tenantId = authInfo.tenantId;
          const sb = window.BKAuth.sb;

          // Fetch company ID
          const { data: co } = await sb.from('companies').select('id').eq('tenant_id', this.tenantId).limit(1).maybeSingle();
          this.companyId = co?.id || null;

          if (!this.companyId) {
            console.error('Company not resolved.');
            return;
          }

          this.updateMonthLabel();
          await this.loadData();
        },

        changeMonth(dir) {
          this.currentDate.setMonth(this.currentDate.getMonth() + dir);
          this.updateMonthLabel();
          this.loadData();
        },

        updateMonthLabel() {
          const labelEl = document.getElementById('month-label');
          if (labelEl) {
            labelEl.textContent = this.currentDate.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
          }
        },

        async loadData() {
          const container = document.getElementById('opex-sections-container');
          if (container) {
            container.innerHTML = `
              <div style="background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1.5rem; box-shadow: var(--shadow-sm); text-align: center; color: var(--text-muted);">
                Fetching OPEX data...
              </div>
            `;
          }

          const sb = window.BKAuth.sb;
          const year = this.currentDate.getFullYear();
          const month = this.currentDate.getMonth() + 1;
          const lastDay = new Date(year, month, 0).getDate();

          const startDate = `${year}-${String(month).padStart(2, '0')}-01`;
          const endDate = `${year}-${String(month).padStart(2, '0')}-${String(lastDay).padStart(2, '0')}`;

          try {
            const [accountsRes, journalRes] = await Promise.all([
              sb.from('journal_accounts')
                .select('name, category')
                .eq('company_id', this.companyId),
              sb.from('general_journal')
                .select('account, debit, date')
                .eq('company_id', this.companyId)
                .gte('date', startDate)
                .lte('date', endDate)
            ]);

            if (accountsRes.error) throw accountsRes.error;
            if (journalRes.error) throw journalRes.error;

            const accounts = accountsRes.data || [];
            const journalEntries = journalRes.data || [];

            // Map account name to category
            const accountCategoryMap = {};
            accounts.forEach(a => {
              accountCategoryMap[a.name] = a.category;
            });

            // Group by categories
            const categories = {
              'OPEX - Admin': {},
              'OPEX - Marketing & Sales': {},
              'OPEX - Operations Support': {}
            };

            journalEntries.forEach(entry => {
              const cat = accountCategoryMap[entry.account];
              if (cat && categories[cat] !== undefined) {
                const debitVal = parseFloat(entry.debit || 0);
                if (debitVal > 0) {
                  categories[cat][entry.account] = (categories[cat][entry.account] || 0) + debitVal;
                }
              }
            });

            let html = '';
            const formatCurrency = (val) => {
              return '₱' + val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            };
            const escapeHtml = (str) => {
              if (!str) return '';
              return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
            };

            for (const [catName, accountsMap] of Object.entries(categories)) {
              const accountsList = Object.entries(accountsMap).map(([name, debit]) => ({ name, debit }));
              // Sort alphabetically by account name
              accountsList.sort((a, b) => a.name.localeCompare(b.name));

              let rowsHtml = '';
              let totalDebit = 0;

              if (accountsList.length > 0) {
                accountsList.forEach(item => {
                  totalDebit += item.debit;
                  rowsHtml += `
                    <tr>
                      <td style="text-align: left; font-weight: 500;">${escapeHtml(item.name)}</td>
                      <td style="text-align: right; font-weight: 500;">${formatCurrency(item.debit)}</td>
                    </tr>
                  `;
                });
              } else {
                rowsHtml = `
                  <tr>
                    <td colspan="2" style="text-align: center; color: var(--text-muted); font-style: italic; padding: 1.5rem;">No expenses recorded for this month.</td>
                  </tr>
                `;
              }

              html += `
                <div style="background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1.5rem; box-shadow: var(--shadow-sm);">
                  <div style="border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; margin-bottom: 1.25rem;">
                    <h2 style="font-size: 1.1rem; font-weight: 800; color: var(--text-primary); margin: 0;">${escapeHtml(catName)}</h2>
                  </div>
                  
                  <div class="excel-container" style="margin-top: 0; max-height: 400px; overflow-y: auto;">
                    <table class="excel-table">
                      <thead>
                        <tr>
                          <th style="text-align: left;">Account</th>
                          <th style="width: 200px; text-align: right;">Debit</th>
                        </tr>
                      </thead>
                      <tbody>
                        ${rowsHtml}
                        <tr class="total-row">
                          <td style="text-align: left;">Total</td>
                          <td style="text-align: right;">${formatCurrency(totalDebit)}</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              `;
            }

            if (container) {
              container.innerHTML = html;
            }

          } catch (err) {
            console.error('Error loading OPEX data:', err);
            if (container) {
              container.innerHTML = `
                <div style="background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1.5rem; box-shadow: var(--shadow-sm); text-align: center; color: var(--danger);">
                  Failed to load data: ${escapeHtml(err.message)}
                </div>
              `;
            }
          }
        }
      };

      document.addEventListener('DOMContentLoaded', () => {
        OpexApp.init();
      });
    })();
  </script>
</body>
</html>
