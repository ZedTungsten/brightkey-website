<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expenses (OPEX) — BrightKey Finance</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg?v=2" />
  <style>
    /* ── Month Navigation ── */
    .month-nav-container {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.5rem 1rem;
    }
    .month-nav-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-primary);
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
    }
    .month-nav-btn:hover {
      background: var(--bg-base);
      border-color: var(--text-secondary);
    }
    .month-display-label {
      font-size: 0.9rem;
      font-weight: 700;
      min-width: 120px;
      text-align: center;
    }

    /* ── Excel-style Table ── */
    .excel-container {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      margin-top: 1.5rem;
    }
    .excel-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10pt;
      color: var(--text-primary);
      font-family: Arial, sans-serif;
    }
    .excel-table th, .excel-table td {
      border: 1px solid var(--border);
      padding: 0.6rem 0.85rem;
      text-align: right;
    }
    .excel-table th {
      background: var(--bg-base, #fafafa);
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-size: 10pt;
      letter-spacing: 0.05em;
    }
    .excel-table th:first-child, .excel-table td:first-child {
      text-align: left;
      font-weight: 600;
      background: var(--bg-base, #fafafa);
    }
    .excel-table tr.total-row td {
      font-weight: 700 !important;
      background: var(--bg-base, #fafafa) !important;
      border-top: 2px solid var(--text-primary) !important;
      border-bottom: 2px double var(--text-primary) !important;
    }

    /* ── Tab Container Bar ── */
    .drawer-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      background: var(--bg-surface);
      margin-bottom: 1.5rem;
    }
    .tab-btn {
      padding: 0.9rem 1.25rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.15s;
      text-decoration: none;
    }
    .tab-btn.active {
      color: var(--cyan-light);
      border-bottom-color: var(--cyan);
    }
    .tab-btn:hover:not(.active) {
      color: var(--text-secondary);
    }

    .shimmer-row td {
      background: linear-gradient(90deg, var(--bg-surface) 25%, var(--bg-base) 50%, var(--bg-surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body class="bg-base text-primary">
  <div class="dash-layout">
    <!-- Sidebar -->
    <aside class="dash-sidebar" id="dash-sidebar"></aside>

    <!-- Main Content Area -->
    <main class="dash-main">
      <header class="dash-topbar" style="border-bottom: none; height: auto; min-height: 60px; display: flex; flex-direction: column; align-items: stretch; justify-content: space-between; padding-top: 1rem;">
        <div style="display: flex; align-items: center; gap: 0.75rem; padding-left: 2rem; margin-bottom: 0.75rem;">
          <h1 style="font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em;">Expenses</h1>
        </div>
        <!-- Tabs Component connected directly to header -->
        <div class="drawer-tabs" style="margin-bottom: 0; padding-left: 2rem; border-top: 1px solid var(--border);">
          <a href="/dashboard/expenses/cogs" class="tab-btn">COGS</a>
          <a href="/dashboard/expenses/opex" class="tab-btn active">OPEX</a>
        </div>
      </header>

      <div style="padding: 2rem; max-width: 1200px; width: 100%; margin: 0 auto; box-sizing: border-box;">
        <!-- Top controls row -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
          <!-- Month Switcher -->
          <div class="month-nav-container">
            <button onclick="OpexApp.changeMonth(-1)" class="month-nav-btn" aria-label="Previous month">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <span class="month-display-label" id="month-label">---</span>
            <button onclick="OpexApp.changeMonth(1)" class="month-nav-btn" aria-label="Next month">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>

          <button onclick="OpexApp.loadData()" class="btn btn-outline btn-sm" style="display: flex; align-items: center; gap: 0.4rem;">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
            Refresh
          </button>
        </div>

        <!-- Salaries Section -->
        <div style="background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1.5rem; box-shadow: var(--shadow-sm);">
          <div style="border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; margin-bottom: 1.25rem;">
            <h2 style="font-size: 1.1rem; font-weight: 800; color: var(--text-primary); margin: 0;">Operations</h2>
            <span style="font-size: 0.78rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.25rem; display: block;">Salaries, Payouts, and Adjustments</span>
          </div>
          
          <div class="excel-container">
            <table class="excel-table">
              <thead>
                <tr>
                  <th style="text-align: left;">Employee</th>
                  <th style="width: 140px; text-align: right;">Salary</th>
                  <th style="width: 140px; text-align: right;">Special Payout</th>
                  <th style="width: 140px; text-align: right;">Adjustment</th>
                  <th style="width: 140px; text-align: right;">Installation</th>
                  <th style="width: 140px; text-align: right;">Commission</th>
                  <th style="width: 140px; text-align: right;">Total Cost</th>
                </tr>
              </thead>
              <tbody id="salaries-table-body">
                <tr class="shimmer-row">
                  <td style="text-align: left;">Loading...</td>
                  <td></td><td></td><td></td><td></td><td></td><td></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Supabase SDK, Auth & Sidebar -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>
  <script src="../../js/main.js"></script>

  <script>
    (function() {
      'use strict';

      window.OpexApp = {
        companyId: null,
        tenantId: null,
        currentDate: new Date(),
        employees: [],
        specialSchedules: [],
        adjustments: [],
        commissionAssignments: [],
        bookings: [],
        payoutSettings: {
          installations_before_crediting: 15,
          lead_credit: 1.0,
          assist_credit: 0.5,
          lead_rate: 1000,
          assist_rate: 500,
          extra_services: [
            { sku: 'BASEPLATE-M', rate: 700 },
            { sku: 'BASEPLATE-S', rate: 700 }
          ]
        },

        async init() {
          if (!window.BKAuth) return;
          const authInfo = await window.BKAuth.checkRoleGate(['Finance'], '../../admin.html');
          if (!authInfo) return;

          this.tenantId = authInfo.tenantId;
          const sb = window.BKAuth.sb;

          // Fetch company ID
          const { data: co } = await sb.from('companies').select('id').eq('tenant_id', this.tenantId).limit(1).maybeSingle();
          this.companyId = co?.id || null;

          if (!this.companyId) {
            console.error('Company not resolved.');
            return;
          }

          this.updateMonthLabel();
          await this.loadData();
        },

        changeMonth(dir) {
          this.currentDate.setMonth(this.currentDate.getMonth() + dir);
          this.updateMonthLabel();
          this.loadData();
        },

        updateMonthLabel() {
          const labelEl = document.getElementById('month-label');
          if (labelEl) {
            labelEl.textContent = this.currentDate.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
          }
        },

        async loadData() {
          const tbody = document.getElementById('salaries-table-body');
          if (tbody) {
            tbody.innerHTML = `
              <tr class="shimmer-row">
                <td style="text-align: left;">Fetching OPEX data...</td>
                <td></td><td></td><td></td><td></td><td></td><td></td>
              </tr>
            `;
          }

          const sb = window.BKAuth.sb;
          const year = this.currentDate.getFullYear();
          const month = this.currentDate.getMonth() + 1;
          const lastDay = new Date(year, month, 0).getDate();

          const startDate = `${year}-${String(month).padStart(2, '0')}-01`;
          const endDate = `${year}-${String(month).padStart(2, '0')}-${String(lastDay).padStart(2, '0')}`;

          try {
            // Fetch everything needed in parallel
            const [empRes, configRes, payoutSetRes, adjRes, commRes, bookingsRes] = await Promise.all([
              sb.from('employees')
                .select('id, first_name, last_name, salary, employment_status')
                .eq('company_id', this.companyId)
                .neq('employment_status', 'Terminated'),
              sb.from('global_settings')
                .select('value')
                .eq('key', 'salary_tracker_config')
                .eq('company_id', this.companyId)
                .maybeSingle(),
              sb.from('global_settings')
                .select('value')
                .eq('key', 'installer_payout_settings')
                .eq('company_id', this.companyId)
                .maybeSingle(),
              sb.from('employee_adjustments')
                .select('employee_id, amount, date')
                .eq('company_id', this.companyId)
                .gte('date', startDate)
                .lte('date', endDate),
              sb.from('commission_assignments')
                .select('employee_id, booking_id, product_index, amount')
                .eq('company_id', this.companyId),
              sb.from('installation_bookings')
                .select('id, status, scheduled_date, doors, products, product_skus, installers, installer_id, installer_name')
                .eq('company_id', this.companyId)
                .gte('scheduled_date', startDate)
                .lte('scheduled_date', endDate)
            ]);

            if (empRes.error) throw empRes.error;
            this.employees = empRes.data || [];
            this.specialSchedules = configRes.data?.value?.specialSchedules || [];
            if (payoutSetRes.data?.value) {
              this.payoutSettings = { ...this.payoutSettings, ...payoutSetRes.data.value };
            }
            this.adjustments = adjRes.data || [];
            this.commissionAssignments = commRes.data || [];
            this.bookings = bookingsRes.data || [];

            this.renderStatement();

          } catch (err) {
            console.error('Error loading OPEX data:', err);
            if (tbody) {
              tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: var(--danger);">Failed to load data: ${err.message}</td></tr>`;
            }
          }
        },

        getAssignedDoorsForBookingAndEmployee(b, empId) {
          let doorsArr = [];
          if (b.doors) {
            if (typeof b.doors === 'string') {
              try { doorsArr = JSON.parse(b.doors); } catch(_) {}
            } else if (Array.isArray(b.doors)) {
              doorsArr = b.doors;
            }
          }

          let bInsts = [];
          if (b.installers) {
            if (typeof b.installers === 'string') {
              try { bInsts = JSON.parse(b.installers); } catch(_) {}
            } else if (Array.isArray(b.installers)) {
              bInsts = b.installers;
            }
          }

          const isBookingLevelInstaller = bInsts.some(inst => inst && inst.id === empId) || 
                                          (b.installer_id && b.installer_id.split(' | ').includes(empId));

          const bookingHasDoorLevelInstallers = doorsArr.some(d => d && Array.isArray(d.installers) && d.installers.some(inst => inst && (inst.id || inst.name)));

          const assignedDoors = [];

          if (doorsArr.length === 0) {
            if (isBookingLevelInstaller) {
              let roles = [];
              const matchedBInsts = bInsts.filter(inst => inst && inst.id === empId);
              if (matchedBInsts.length > 0) {
                matchedBInsts.forEach(inst => {
                  const r = inst.role || 'lead';
                  if (!roles.includes(r)) roles.push(r);
                });
              } else if (b.installer_id) {
                const ids = b.installer_id.split(' | ');
                const myIdIdx = ids.indexOf(empId);
                if (myIdIdx !== -1) {
                  roles.push(myIdIdx === 0 ? 'lead' : 'assist');
                }
              }
              if (roles.length === 0) roles.push('lead');
              
              let productsArr = [];
              if (b.products) {
                if (typeof b.products === 'string') {
                  try { productsArr = JSON.parse(b.products); } catch(_) {}
                } else if (Array.isArray(b.products)) {
                  productsArr = b.products;
                }
              }
              const skus = (b.product_skus || '').split(' | ').filter(Boolean);
              const activeSkus = productsArr.length > 0 
                ? productsArr.filter(p => !p.cancelled && p.sku !== 'ADD-ON LABOR').map(p => p.sku)
                : skus;

              assignedDoors.push({
                completed: b.status === 'done' || b.status === 'completed' || b.status === 'finished',
                roles: roles,
                skus: activeSkus
              });
            }
            return assignedDoors;
          }

          let productsArr = [];
          if (b.products) {
            if (typeof b.products === 'string') {
              try { productsArr = JSON.parse(b.products); } catch(_) {}
            } else if (Array.isArray(b.products)) {
              productsArr = b.products;
            }
          }
          const skus = (b.product_skus || '').split(' | ');
          const anyDoorHasAttachedProducts = doorsArr.some(d => d && Array.isArray(d.products) && d.products.length > 0);
          const isSingleDoorGrouping = (doorsArr.length === 1 && productsArr.length > 0);
          const skuOccurrenceCount = new Map();

          doorsArr.forEach((door, index) => {
            let isAssignedToThisDoor = false;
            let roles = [];

            if (door && Array.isArray(door.installers)) {
              const matchedInsts = door.installers.filter(inst => inst && inst.id === empId);
              if (matchedInsts.length > 0) {
                isAssignedToThisDoor = true;
                matchedInsts.forEach(inst => {
                  const r = inst.role || 'lead';
                  if (!roles.includes(r)) roles.push(r);
                });
              }
            } else if (bookingHasDoorLevelInstallers) {
              isAssignedToThisDoor = false;
            } else {
              isAssignedToThisDoor = isBookingLevelInstaller;
              const matchedBInsts = bInsts.filter(inst => inst && inst.id === empId);
              if (matchedBInsts.length > 0) {
                matchedBInsts.forEach(inst => {
                  const r = inst.role || 'lead';
                  if (!roles.includes(r)) roles.push(r);
                });
              } else if (b.installer_id) {
                const ids = b.installer_id.split(' | ');
                const myIdIdx = ids.indexOf(empId);
                if (myIdIdx !== -1) {
                  roles.push(myIdIdx === 0 ? 'lead' : 'assist');
                }
              }
            }

            if (isAssignedToThisDoor) {
              const doorSkus = [];
              if (anyDoorHasAttachedProducts && door) {
                const attachedSkus = door.products || [];
                attachedSkus.forEach(sku => {
                  const matchingProds = productsArr.filter(p => p.sku === sku);
                  const occurrenceIndex = skuOccurrenceCount.get(sku) || 0;
                  const matchedProd = matchingProds[occurrenceIndex];
                  if (matchedProd && !matchedProd.cancelled) {
                    doorSkus.push(matchedProd.sku);
                  }
                  skuOccurrenceCount.set(sku, occurrenceIndex + 1);
                });
              } else if (isSingleDoorGrouping) {
                productsArr.forEach(p => {
                  if (p.sku !== 'ADD-ON LABOR' && !p.cancelled) {
                    doorSkus.push(p.sku);
                  }
                });
              } else {
                if (productsArr[index] && !productsArr[index].cancelled) {
                  doorSkus.push(productsArr[index].sku);
                } else if (skus[index]) {
                  doorSkus.push(skus[index]);
                }
              }

              assignedDoors.push({
                completed: !!door.completed,
                roles: roles,
                skus: doorSkus
              });
            } else {
              if (anyDoorHasAttachedProducts && door) {
                const attachedSkus = door.products || [];
                attachedSkus.forEach(sku => {
                  const occurrenceIndex = skuOccurrenceCount.get(sku) || 0;
                  skuOccurrenceCount.set(sku, occurrenceIndex + 1);
                });
              }
            }
          });

          return assignedDoors;
        },

        renderStatement() {
          const tbody = document.getElementById('salaries-table-body');
          tbody.innerHTML = '';

          const formatPHP = (val) => {
            if (val === null || val === undefined || val === '' || Number(val) === 0) return '—';
            const prefix = Number(val) < 0 ? '-' : '';
            return `${prefix}₱${Math.abs(Number(val)).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
          };

          if (this.employees.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: var(--text-muted); padding: 2rem;">No active employees found.</td></tr>`;
            return;
          }

          // Sort employees alphabetically by name
          const sortedEmps = [...this.employees].sort((a, b) => {
            const nameA = `${a.first_name || ''} ${a.last_name || ''}`.trim().toLowerCase();
            const nameB = `${b.first_name || ''} ${b.last_name || ''}`.trim().toLowerCase();
            return nameA.localeCompare(nameB);
          });

          // Payout config variables for installations
          const thresholdVal = this.payoutSettings.installations_before_crediting || 15;
          const leadWeight = this.payoutSettings.lead_credit !== undefined ? this.payoutSettings.lead_credit : 1.0;
          const assistWeight = this.payoutSettings.assist_credit !== undefined ? this.payoutSettings.assist_credit : 0.5;
          const leadRateVal = this.payoutSettings.lead_rate || 1000;
          const assistRateVal = this.payoutSettings.assist_rate || 500;

          const extraServicesList = (this.payoutSettings.extra_services || []).map(es => {
            let sku = es.sku || es.name || '';
            if (sku === 'Welding Baseplate Metal') sku = 'BASEPLATE-M';
            if (sku === 'Welding Baseplate Stainless') sku = 'BASEPLATE-S';
            return { sku, rate: es.rate };
          });

          let grandTotalSalaries = 0;
          let grandTotalSpecials = 0;
          let grandTotalAdjustments = 0;
          let grandTotalInstallations = 0;
          let grandTotalCommissions = 0;
          let grandTotalCost = 0;

          const rowsHtml = sortedEmps.map(emp => {
            const baseSalary = Number(emp.salary) || 0;
            
            // 1. Special Payout
            const specialPayout = this.specialSchedules
              .filter(s => s.employeeId === emp.id)
              .reduce((sum, s) => sum + (Number(s.value) || 0), 0);

            // 2. Adjustment
            const adjustmentVal = this.adjustments
              .filter(a => a.employee_id === emp.id)
              .reduce((sum, a) => sum + (Number(a.amount) || 0), 0);

            // 3. Installation
            let leadCount = 0;
            let assistCount = 0;
            let serviceEarnings = 0;

            this.bookings.forEach(b => {
              const assignedDoors = this.getAssignedDoorsForBookingAndEmployee(b, emp.id);
              assignedDoors.forEach(d => {
                if (!d.completed) return;

                if (d.roles.includes('lead')) {
                  leadCount++;
                } else if (d.roles.includes('assist')) {
                  assistCount++;
                }

                if (d.roles.includes('service')) {
                  d.skus.forEach(sku => {
                    const matchedService = extraServicesList.find(es => es.sku === sku);
                    if (matchedService) {
                      serviceEarnings += matchedService.rate;
                    }
                  });
                }
              });
            });

            const totalCredit = (leadCount * leadWeight) + (assistCount * assistWeight);
            let thresholdEarnings = 0;
            if (totalCredit > thresholdVal) {
              const extraCredit = totalCredit - thresholdVal;
              thresholdEarnings = extraCredit * leadRateVal;
            }
            const installationPayout = thresholdEarnings + serviceEarnings;

            // 4. Commission
            const employeeCommAssignments = this.commissionAssignments.filter(a => a.employee_id === emp.id);
            let commissionPayout = 0;

            employeeCommAssignments.forEach(a => {
              const b = this.bookings.find(x => x.id === a.booking_id);
              if (!b || b.status === 'cancelled') return;

              let doors = [];
              if (b.doors) {
                if (typeof b.doors === 'string') {
                  try { doors = JSON.parse(b.doors); } catch(_) {}
                } else if (Array.isArray(b.doors)) {
                  doors = b.doors;
                }
              }

              const door = doors[a.product_index];
              const isDone = (door && door.completed) || ['done', 'completed', 'finished'].includes(b.status);
              if (!isDone) return;

              commissionPayout += (Number(a.amount) || 0) / 100;
            });

            const totalCost = baseSalary + specialPayout + adjustmentVal + installationPayout + commissionPayout;

            grandTotalSalaries += baseSalary;
            grandTotalSpecials += specialPayout;
            grandTotalAdjustments += adjustmentVal;
            grandTotalInstallations += installationPayout;
            grandTotalCommissions += commissionPayout;
            grandTotalCost += totalCost;

            const fullName = `${emp.first_name || ''} ${emp.last_name || ''}`.trim();

            return `
              <tr>
                <td>${fullName}</td>
                <td>${formatPHP(baseSalary)}</td>
                <td>${formatPHP(specialPayout)}</td>
                <td style="color:${adjustmentVal < 0 ? 'var(--danger)' : 'var(--text-primary)'};">${formatPHP(adjustmentVal)}</td>
                <td>${formatPHP(installationPayout)}</td>
                <td>${formatPHP(commissionPayout)}</td>
                <td>${formatPHP(totalCost)}</td>
              </tr>
            `;
          }).join('');

          // Append Total Row
          const totalRowHtml = `
            <tr class="total-row">
              <td>TOTAL</td>
              <td>${formatPHP(grandTotalSalaries)}</td>
              <td>${formatPHP(grandTotalSpecials)}</td>
              <td style="color:${grandTotalAdjustments < 0 ? 'var(--danger)' : 'var(--text-primary)'};">${formatPHP(grandTotalAdjustments)}</td>
              <td>${formatPHP(grandTotalInstallations)}</td>
              <td>${formatPHP(grandTotalCommissions)}</td>
              <td>${formatPHP(grandTotalCost)}</td>
            </tr>
          `;

          tbody.innerHTML = rowsHtml + totalRowHtml;
        }
      };

      document.addEventListener('DOMContentLoaded', () => {
        OpexApp.init();
      });
    })();
  </script>
</body>
</html>
