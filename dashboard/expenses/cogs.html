<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expenses (COGS) — BrightKey Finance</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg?v=2" />
  <style>
    /* ── Month Navigation ── */
    .month-nav-container {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.5rem 1rem;
    }
    .month-nav-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-primary);
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
    }
    .month-nav-btn:hover {
      background: var(--bg-base);
      border-color: var(--text-secondary);
    }
    .month-display-label {
      font-size: 0.9rem;
      font-weight: 700;
      min-width: 120px;
      text-align: center;
    }

    /* ── Metric Callouts ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      box-shadow: var(--shadow-sm);
    }
    .stat-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .stat-value {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-top: 0.35rem;
    }

    /* ── Excel-style Table ── */
    .excel-container {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      margin-top: 0;
    }
    .excel-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10pt;
      color: var(--text-primary);
      font-family: 'commissioner', sans-serif;
    }
    .excel-table th, .excel-table td {
      border: 1px solid var(--border);
      padding: 0.35rem 0.6rem;
    }
    .excel-table th {
      background: var(--bg-base, #fafafa);
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-size: 10pt;
      letter-spacing: 0.05em;
      text-align: left; /* Header row, left aligned */
    }
    .excel-table td {
      text-align: left; /* Texts, left aligned */
    }
    .excel-table td.num-col {
      text-align: right; /* Numbers, right aligned */
    }
    .excel-table th:first-child, .excel-table td:first-child {
      text-align: left;
      font-weight: 600;
      background: var(--bg-base, #fafafa);
    }
    .excel-table tr.total-row td {
      font-weight: 700 !important;
      background: var(--bg-base, #fafafa) !important;
      border-top: 2px solid var(--text-primary) !important;
      border-bottom: 2px double var(--text-primary) !important;
    }

    /* ── Tab Container Bar ── */
    .drawer-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      background: var(--bg-surface);
      margin-bottom: 1.5rem;
    }
    .tab-btn {
      padding: 0.9rem 1.25rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.15s;
      text-decoration: none;
    }
    .tab-btn.active {
      color: var(--cyan-light);
      border-bottom-color: var(--cyan);
    }
    .tab-btn:hover:not(.active) {
      color: var(--text-secondary);
    }

    .shimmer-row td {
      background: linear-gradient(90deg, var(--bg-surface) 25%, var(--bg-base) 50%, var(--bg-surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body class="bg-base text-primary">
  <div class="dash-layout">
    <!-- Sidebar -->
    <aside class="dash-sidebar" id="dash-sidebar"></aside>

    <!-- Main Content Area -->
    <main class="dash-main">
      <header class="dash-topbar" style="border-bottom: none; height: auto; min-height: 60px; display: flex; flex-direction: column; align-items: stretch; justify-content: space-between; padding-top: 1rem;">
        <div style="display: flex; align-items: center; gap: 0.75rem; padding-left: 2rem; margin-bottom: 0.75rem;">
          <h1 style="font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em;">Expenses</h1>
        </div>
        <!-- Tabs Component connected directly to header -->
        <div class="drawer-tabs" style="margin-bottom: 0; padding-left: 2rem; border-top: 1px solid var(--border);">
          <a href="/dashboard/expenses/cogs" class="tab-btn active">COGS</a>
          <a href="/dashboard/expenses/opex" class="tab-btn">OPEX</a>
        </div>
      </header>

      <div style="padding: 1.5rem 2rem; max-width: 1200px; width: 100%; margin: 0 auto; box-sizing: border-box;">
        <!-- Top controls row -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
          <!-- Month Switcher -->
          <div class="month-nav-container">
            <button onclick="ExpensesApp.changeMonth(-1)" class="month-nav-btn" aria-label="Previous month">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <span class="month-display-label" id="month-label">---</span>
            <button onclick="ExpensesApp.changeMonth(1)" class="month-nav-btn" aria-label="Next month">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>

          <button onclick="ExpensesApp.loadData()" class="btn btn-outline btn-sm" style="display: flex; align-items: center; gap: 0.4rem;">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
            Refresh
          </button>
        </div>

        <!-- COGS Total Card -->
        <div id="cogs-total-card" style="background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1rem 1.5rem; box-shadow: var(--shadow-sm); margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between;">
          <div>
            <span style="font-size: 0.78rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; display: block;">Total COGS for this month</span>
            <span style="font-size: 1.5rem; font-weight: 800; color: var(--cyan-light); margin-top: 0.15rem; display: block;" id="stat-total-cogs">₱0.00</span>
          </div>
        </div>

        <!-- Supplier Cost Section -->
        <div style="background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1rem; box-shadow: var(--shadow-sm);">
          <h2 style="font-size: 0.88rem; font-weight: 700; color: var(--text-primary); margin: 0 0 0.75rem 0;">Supplier Cost</h2>
          
          <div class="excel-container">
            <table class="excel-table">
              <thead>
                <tr>
                  <th>SKU</th>
                  <th>Product Name</th>
                  <th>Sold</th>
                  <th>Dealer Price</th>
                  <th>Total Cost</th>
                </tr>
              </thead>
              <tbody id="cogs-table-body">
                <tr class="shimmer-row">
                  <td>Loading...</td>
                  <td></td><td></td><td></td><td></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Dynamic COGS Journal Sections Container (similar to OPEX) -->
        <div id="cogs-sections-container" style="display: flex; flex-direction: column; gap: 1.5rem; margin-top: 1.5rem;">
          <div style="background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1rem; box-shadow: var(--shadow-sm); text-align: center; color: var(--text-muted); font-style: italic;">
            Loading general ledger categories...
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Supabase SDK, Auth & Sidebar -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>
  <script src="../../js/main.js"></script>

  <script>
    (function() {
      'use strict';

      window.ExpensesApp = {
        companyId: null,
        tenantId: null,
        currentDate: new Date(),
        products: [],
        bookings: [],
        costHistory: [],

        async init() {
          if (!window.BKAuth) return;
          const authInfo = await window.BKAuth.checkRoleGate(['Finance'], '../../admin.html');
          if (!authInfo) return;

          this.tenantId = authInfo.tenantId;
          const sb = window.BKAuth.sb;

          // Fetch company ID
          const { data: co } = await sb.from('companies').select('id').eq('tenant_id', this.tenantId).limit(1).maybeSingle();
          this.companyId = co?.id || null;

          if (!this.companyId) {
            console.error('Company not resolved.');
            return;
          }

          this.updateMonthLabel();
          await this.loadData();
        },

        changeMonth(dir) {
          this.currentDate.setMonth(this.currentDate.getMonth() + dir);
          this.updateMonthLabel();
          this.loadData();
        },

        updateMonthLabel() {
          const labelEl = document.getElementById('month-label');
          if (labelEl) {
            labelEl.textContent = this.currentDate.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
          }
        },

        async loadData() {
          const tbody = document.getElementById('cogs-table-body');
          if (tbody) {
            tbody.innerHTML = `
              <tr class="shimmer-row">
                <td style="text-align: left;">Fetching COGS data...</td>
                <td></td><td></td><td></td><td></td>
              </tr>
            `;
          }

          const sb = window.BKAuth.sb;
          const year = this.currentDate.getFullYear();
          const month = this.currentDate.getMonth() + 1;
          const lastDay = new Date(year, month, 0).getDate();

          const startDate = `${year}-${String(month).padStart(2, '0')}-01`;
          const endDate = `${year}-${String(month).padStart(2, '0')}-${String(lastDay).padStart(2, '0')}`;

          try {
            const [productsRes, bookingsRes, accountsRes, journalRes, dispatchedTxRes, deliveryRes] = await Promise.all([
              sb.from('products').select('sku, title, dealer_price, count_inventory, category'),
              sb.from('installation_bookings')
                .select('scheduled_date, order_no, status, product_skus, product_qtys')
                .eq('company_id', this.companyId)
                .neq('status', 'cancelled')
                .gte('scheduled_date', startDate)
                .lte('scheduled_date', endDate),
              sb.from('journal_accounts')
                .select('name, category')
                .eq('company_id', this.companyId),
              sb.from('general_journal')
                .select('account, debit, date')
                .eq('company_id', this.companyId)
                .gte('date', startDate)
                .lte('date', endDate),
              sb.from('inventory_transactions')
                .select('reference_id, customer_name, timestamp_dispatched')
                .eq('type', 'customer_order')
                .not('timestamp_dispatched', 'is', null)
                .gte('timestamp_dispatched', startDate + 'T00:00:00')
                .lte('timestamp_dispatched', endDate + 'T23:59:59'),
              sb.from('delivery_bookings')
                .select('reference_id, customer_name, base_fee, tip_1, tip_2, toll')
            ]);

            this.products = productsRes.data || [];
            this.bookings = bookingsRes.data || [];
            this.costHistory = [];
            this.journalAccounts = accountsRes.data || [];
            this.journalEntries = journalRes.data || [];

            // Build shipping list: unique reference_ids dispatched this month (per inventory_transactions),
            // merged with fee amounts from delivery_bookings by reference_id.
            const dispatchedTxs = dispatchedTxRes.data || [];
            const deliveryFeeMap = {};
            (deliveryRes.data || []).forEach(db => {
              deliveryFeeMap[db.reference_id] = db;
            });
            const seenRefIds = new Set();
            this.deliveryBookings = [];
            dispatchedTxs.forEach(tx => {
              if (!tx.reference_id || seenRefIds.has(tx.reference_id)) return;
              seenRefIds.add(tx.reference_id);
              const fees = deliveryFeeMap[tx.reference_id] || {};
              this.deliveryBookings.push({
                reference_id: tx.reference_id,
                customer_name: fees.customer_name || tx.customer_name || '',
                base_fee: fees.base_fee || 0,
                tip_1: fees.tip_1 || 0,
                tip_2: fees.tip_2 || 0,
                toll: fees.toll || 0
              });
            });

            try {
              const { data: histData, error: histErr } = await sb.from('product_cost_history')
                .select('sku, cost, start_date, end_date')
                .eq('company_id', this.companyId);
              if (!histErr && histData) {
                this.costHistory = histData;
              }
            } catch (historyErr) {
              console.warn('Failed to load product_cost_history, falling back to current catalog cost:', historyErr);
            }

            const supplierCostTotal = this.renderStatement() || 0;
            const journalCogsTotal = this.renderCogsJournalReports(this.journalAccounts, this.journalEntries) || 0;

            const finalGrandTotal = supplierCostTotal + journalCogsTotal;
            document.getElementById('stat-total-cogs').textContent = '₱' + finalGrandTotal.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

          } catch (err) {
            console.error('Error loading COGS data:', err);
            if (tbody) {
              tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--danger);">Failed to load data: ${err.message}</td></tr>`;
            }
          }
        },

        renderStatement() {
          const productMap = {};
          this.products.forEach(p => {
            if (p.sku) productMap[p.sku.toLowerCase()] = p;
          });

          const cogsAggregation = {};

          this.bookings.forEach(b => {
            // Only count bookings where order_no starts with ORD-
            if (!b.order_no || !b.order_no.startsWith('ORD-')) return;

            let skusArr = [];
            let qtysArr = [];
            if (b.product_skus) {
              skusArr = b.product_skus.split(' | ').filter(Boolean);
            }
            if (b.product_qtys) {
              qtysArr = b.product_qtys.split(' | ').map(Number);
            }

            skusArr.forEach((sku, idx) => {
              const qty = qtysArr[idx] || 0;
              const skuLower = sku.toLowerCase();
              
              const prodDetails = productMap[skuLower] || {
                title: sku,
                dealer_price: 0,
                count_inventory: false
              };

              if (prodDetails.count_inventory !== true) return;

              // Match historical price using the booking's scheduled_date
              let itemCost = prodDetails.dealer_price || 0;
              if (this.costHistory && this.costHistory.length > 0) {
                const bookingDate = b.scheduled_date ? new Date(b.scheduled_date) : null;
                if (bookingDate) {
                  const hist = this.costHistory.find(h => 
                    h.sku && h.sku.toLowerCase() === skuLower &&
                    new Date(h.start_date) <= bookingDate &&
                    (!h.end_date || new Date(h.end_date) >= bookingDate)
                  );
                  if (hist) {
                    itemCost = hist.cost || 0;
                  }
                }
              }

              if (!cogsAggregation[skuLower]) {
                cogsAggregation[skuLower] = {
                  sku: sku,
                  name: prodDetails.title || sku,
                  sold: 0,
                  totalCost: 0,
                  countInventory: true,
                  category: prodDetails.category || 'Uncategorized'
                };
              }
              cogsAggregation[skuLower].sold += qty;
              cogsAggregation[skuLower].totalCost += qty * itemCost;
            });
          });

          // Sort aggregated SKUs alphabetically
          const sortedSkus = Object.keys(cogsAggregation).sort().map(k => cogsAggregation[k]);

          let totalSold = 0;
          let totalCountedSold = 0;
          let grandTotalCogsCentavos = 0;
          const categoryStats = {};
          const tbody = document.getElementById('cogs-table-body');
          tbody.innerHTML = '';

          const formatPHP = (cents) => {
            const val = cents / 100;
            return `₱${val.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
          };

          if (sortedSkus.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted); padding: 2rem;">No supplier costs recorded for this month.</td></tr>`;
            document.getElementById('stat-total-sold').textContent = '0';
            document.getElementById('stat-total-cogs').textContent = '₱0.00';
            const catGrid = document.getElementById('category-cards-grid');
            if (catGrid) catGrid.style.display = 'none';
            return;
          }

          const rowsHtml = sortedSkus.map(item => {
            const totalCost = item.totalCost;
            grandTotalCogsCentavos += totalCost;

            totalSold += item.sold;
            if (item.countInventory) {
              totalCountedSold += item.sold;
            }

            const catKey = item.category || 'Uncategorized';
            if (!categoryStats[catKey]) {
              categoryStats[catKey] = { sold: 0, cost: 0 };
            }
            categoryStats[catKey].sold += item.sold;
            categoryStats[catKey].cost += totalCost;

            const avgPrice = item.sold > 0 ? (totalCost / item.sold) : 0;

            return `
              <tr>
                <td>${item.sku}</td>
                <td>${item.name}</td>
                <td class="num-col">${item.sold}</td>
                <td class="num-col">${formatPHP(avgPrice)}</td>
                <td class="num-col">${formatPHP(totalCost)}</td>
              </tr>
            `;
          }).join('');

          // Append Total Row
          const totalRowHtml = `
            <tr class="total-row">
              <td colspan="2">TOTAL</td>
              <td class="num-col">${totalSold}</td>
              <td class="num-col"></td>
              <td class="num-col">${formatPHP(grandTotalCogsCentavos)}</td>
            </tr>
          `;

          tbody.innerHTML = rowsHtml + totalRowHtml;



          return grandTotalCogsCentavos / 100;
        },

        renderCogsJournalReports(accounts, journalEntries) {
          const container = document.getElementById('cogs-sections-container');
          if (!container) return 0;

          const formatCurrency = (val) => {
            return '₱' + val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
          };
          const escapeHtml = (str) => {
            if (!str) return '';
            return str
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
              .replace(/"/g, '&quot;')
              .replace(/'/g, '&#039;');
          };

          // 1. Process COGS category from general journal
          const accountCategoryMap = {};
          accounts.forEach(a => {
            accountCategoryMap[a.name] = a.category;
          });

          const cogsAccountsMap = {};
          journalEntries.forEach(entry => {
            const cat = accountCategoryMap[entry.account];
            if (cat === 'COGS') {
              const debitVal = parseFloat(entry.debit || 0);
              if (debitVal > 0) {
                cogsAccountsMap[entry.account] = (cogsAccountsMap[entry.account] || 0) + debitVal;
              }
            }
          });

          const cogsAccountsList = Object.entries(cogsAccountsMap).map(([name, debit]) => ({ name, debit }));
          cogsAccountsList.sort((a, b) => a.name.localeCompare(b.name));

          let cogsRowsHtml = '';
          let cogsTotal = 0;

          if (cogsAccountsList.length > 0) {
            cogsAccountsList.forEach(item => {
              cogsTotal += item.debit;
              cogsRowsHtml += `
                <tr>
                  <td style="text-align: left; font-weight: 500;">${escapeHtml(item.name)}</td>
                  <td style="text-align: right; font-weight: 500;">${formatCurrency(item.debit)}</td>
                </tr>
              `;
            });
          } else {
            cogsRowsHtml = `
              <tr>
                <td colspan="2" style="text-align: center; color: var(--text-muted); font-style: italic; padding: 1.5rem;">No expenses recorded for this category in this month.</td>
              </tr>
            `;
          }

          let html = `
            <div style="background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1rem; box-shadow: var(--shadow-sm);">
              <div style="border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 0.75rem;">
                <h2 style="font-size: 0.88rem; font-weight: 700; color: var(--text-primary); margin: 0;">COGS</h2>
              </div>
              
              <div class="excel-container" style="margin-top: 0; max-height: 400px; overflow-y: auto;">
                <table class="excel-table">
                  <thead>
                    <tr>
                      <th style="text-align: left;">Account</th>
                      <th style="width: 200px; text-align: right;">Debit</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${cogsRowsHtml}
                  </tbody>
                  <tfoot>
                    <tr class="total-row" style="position: sticky; bottom: 0; background: var(--bg-surface);">
                      <td style="text-align: left;">Total</td>
                      <td style="text-align: right;">${formatCurrency(cogsTotal)}</td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            </div>
          `;

          // 2. Process Shipping category from delivery_bookings
          let shippingRowsHtml = '';
          let baseSum = 0;
          let tip1Sum = 0;
          let tip2Sum = 0;
          let tollSum = 0;
          let shippingTotalCentavos = 0;

          if (this.deliveryBookings && this.deliveryBookings.length > 0) {
            this.deliveryBookings.forEach(db => {
              const base = db.base_fee || 0;
              const tip1 = db.tip_1 || 0;
              const tip2 = db.tip_2 || 0;
              const toll = db.toll || 0;
              const rowTotal = base + tip1 + tip2 + toll;

              baseSum += base;
              tip1Sum += tip1;
              tip2Sum += tip2;
              tollSum += toll;
              shippingTotalCentavos += rowTotal;

              shippingRowsHtml += `
                <tr>
                  <td style="text-align: left; font-weight: 500;">${escapeHtml(db.reference_id)}</td>
                  <td style="text-align: left;">${escapeHtml(db.customer_name || '—')}</td>
                  <td style="text-align: right;">${formatCurrency(base / 100)}</td>
                  <td style="text-align: right;">${formatCurrency(tip1 / 100)}</td>
                  <td style="text-align: right;">${formatCurrency(tip2 / 100)}</td>
                  <td style="text-align: right;">${formatCurrency(toll / 100)}</td>
                  <td style="text-align: right; font-weight: 600;">${formatCurrency(rowTotal / 100)}</td>
                </tr>
              `;
            });
          } else {
            shippingRowsHtml = `
              <tr>
                <td colspan="7" style="text-align: center; color: var(--text-muted); font-style: italic; padding: 1.5rem;">No completed deliveries recorded for this month.</td>
              </tr>
            `;
          }

          const grandShippingTotal = baseSum + tip1Sum + tip2Sum + tollSum;

          html += `
            <div style="background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1rem; box-shadow: var(--shadow-sm);">
              <div style="border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 0.75rem;">
                <h2 style="font-size: 0.88rem; font-weight: 700; color: var(--text-primary); margin: 0;">Shipping</h2>
              </div>
              
              <div class="excel-container" style="margin-top: 0; max-height: 400px; overflow-y: auto;">
                <table class="excel-table">
                  <thead>
                    <tr>
                      <th style="text-align: left;">Ref Order</th>
                      <th style="text-align: left;">Customer Name</th>
                      <th style="text-align: right;">Base</th>
                      <th style="text-align: right;">Tip 1</th>
                      <th style="text-align: right;">Tip 2</th>
                      <th style="text-align: right;">Toll</th>
                      <th style="text-align: right;">Total</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${shippingRowsHtml}
                  </tbody>
                  <tfoot>
                    <tr class="total-row" style="position: sticky; bottom: 0; background: var(--bg-surface);">
                      <td style="text-align: left;">Total</td>
                      <td></td>
                      <td style="text-align: right;">${formatCurrency(baseSum / 100)}</td>
                      <td style="text-align: right;">${formatCurrency(tip1Sum / 100)}</td>
                      <td style="text-align: right;">${formatCurrency(tip2Sum / 100)}</td>
                      <td style="text-align: right;">${formatCurrency(tollSum / 100)}</td>
                      <td style="text-align: right; font-weight: 700;">${formatCurrency(grandShippingTotal / 100)}</td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            </div>
          `;

          container.innerHTML = html;
          return cogsTotal + (grandShippingTotal / 100);
        }
      };

      document.addEventListener('DOMContentLoaded', () => {
        ExpensesApp.init();
      });
    })();
  </script>
</body>
</html>
