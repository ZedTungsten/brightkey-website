<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profit Allocation — Brightkey Finance</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/dashboard/payout-tracker/shared.css" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=2" />
  <style>
    .int-wrap { max-width: 1000px; margin: 0 auto; padding: 2rem 2rem 5rem; }

    .drawer-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      background: var(--bg-surface);
    }
    .tab-btn {
      padding: 0.9rem 1.25rem;
      font-size: 0.82rem; font-weight: 600;
      color: var(--text-muted);
      border: none; background: none; cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap; transition: all 0.15s;
      font-family: var(--font-sans);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      line-height: 1;
    }
    .tab-btn.active { color: var(--cyan-light); border-bottom-color: var(--cyan); }
    .tab-btn:hover:not(.active) { color: var(--text-secondary); }

    /* ── Date Navigator ── */
    .month-nav-btn {
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-primary);
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
    }
    .month-nav-btn:hover {
      background: var(--bg-elevated);
      border-color: var(--cyan);
    }

    /* ── Excel-style Table ── */
    .excel-container {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-top: 1.5rem;
      box-shadow: var(--shadow-sm);
    }
    .excel-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 9.5pt;
      color: var(--text-primary);
      font-family: var(--font-sans), Arial, sans-serif;
    }
    .excel-table th, .excel-table td {
      border: 1px solid var(--border);
      padding: 0.5rem 1.1rem;
      text-align: right;
    }
    .excel-table th {
      background: var(--bg-elevated, #fafafa);
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-size: 8.5pt;
      letter-spacing: 0.05em;
      text-align: right;
    }
    .excel-table td {
      background: var(--bg-surface);
    }
    .excel-table th:first-child, .excel-table td:first-child {
      text-align: left;
    }
    .excel-table .text-left {
      text-align: left;
    }
    .excel-table .text-center {
      text-align: center;
    }
    .row-total td {
      font-weight: 700 !important;
      border-top: 1.5px solid var(--border) !important;
      border-bottom: 2px double var(--text-primary) !important;
      background: var(--bg-elevated) !important;
    }
    .row-total td:first-child {
      text-align: left;
    }

    /* ── Allocated state coloring ── */
    tr.allocated-row td {
      background-color: rgba(6, 182, 212, 0.06) !important;
    }
  </style>
</head>
<body>

  <div class="dash-layout">
    <aside class="dash-sidebar" id="dash-sidebar"></aside>

    <div class="dash-main">
      <div class="top-bar">
        <div class="top-bar-title">Statements</div>
      </div>

      <!-- Tab bar -->
      <nav class="drawer-tabs">
        <a href="/dashboard/statements/profit-and-loss" class="tab-btn">Profit & Loss</a>
        <a href="/dashboard/statements/cashflow" class="tab-btn">Cashflow</a>
        <a href="/dashboard/statements/balance-sheet" class="tab-btn">Balance Sheet</a>
        <a href="/dashboard/statements/profit-allocation" class="tab-btn active">Profit Allocation</a>
      </nav>

      <!-- Subtab bar -->
      <div class="drawer-tabs" style="background: var(--bg-surface); padding-left: 2rem; border-bottom: 1px solid var(--border);">
        <a href="/dashboard/statements/profit-allocation" class="tab-btn active" style="font-size: 0.78rem; padding: 0.6rem 1rem;">Allocations</a>
        <a href="/dashboard/statements/profit-allocation/settings" class="tab-btn" style="font-size: 0.78rem; padding: 0.6rem 1rem;">Settings</a>
      </div>

      <main style="overflow-y: auto; flex: 1; min-width: 0; width: 100%;">
        <div class="int-wrap">
          
          <!-- Month/Year Navigator & Net Profit Summary -->
          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1rem 1.5rem; box-shadow: var(--shadow-sm);">
            <div style="display: flex; align-items: center; gap: 0.75rem;">
              <button onclick="ProfitAllocationApp.changeMonth(-1)" class="month-nav-btn" aria-label="Previous month">&lt;</button>
              <span id="month-display" style="font-size: 0.88rem; font-weight: 700; color: var(--text-primary); min-width: 120px; text-align: center;"></span>
              <button onclick="ProfitAllocationApp.changeMonth(1)" class="month-nav-btn" aria-label="Next month">&gt;</button>
            </div>
            
            <div style="display: flex; align-items: center; gap: 1.5rem;">
              <div style="text-align: right;">
                <span style="font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700;">Net Profit</span>
                <span id="net-profit-display" style="font-size: 1.25rem; font-weight: 800; color: var(--cyan-light); display: block; margin-top: 0.1rem;">₱0.00</span>
              </div>
              <button onclick="ProfitAllocationApp.loadData()" class="btn btn-outline btn-sm" style="display: flex; align-items: center; gap: 0.4rem;">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                Refresh
              </button>
            </div>
          </div>

          <!-- Main Table Container -->
          <div class="excel-container">
            <table class="excel-table">
              <thead>
                <tr>
                  <th style="text-align: left;">Allocation Category</th>
                  <th style="width: 150px; text-align: right;">Percentage</th>
                  <th style="width: 250px; text-align: right;">Allocated Amount</th>
                  <th style="width: 120px; text-align: center;">Allocated</th>
                </tr>
              </thead>
              <tbody id="allocation-table-body">
                <tr>
                  <td colspan="4" class="text-center" style="padding: 2.5rem; color: var(--text-muted); font-style: italic;">Loading allocations...</td>
                </tr>
              </tbody>
            </table>
          </div>

        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/main.js"></script>

  <script>
    'use strict';

    const getSb = () => window.BKAuth.sb;
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    const escapeHtml = (str) => {
      if (!str) return '';
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    };

    window.ProfitAllocationApp = {
      tenantId: null,
      companyId: null,
      currentDate: new Date(),
      months: [], // 6 months rolling list ending at selected date (latest first)
      products: [],
      bookings: [],
      employees: [],
      payslipRecords: [],
      dispatchedTxs: [],
      deliveryFeeMap: {},
      payoutSettings: {},
      trackerConfig: {},
      commissionAssignments: [],
      adjustmentsList: [],
      reimbursementsList: [],
      journalAccounts: [],
      generalJournal: [],
      softwareSubscriptions: [],
      softwareBilling: [],
      specialPayoutState: {},
      equitySettings: [], // Versioned equity settings

      async init() {
        try {
          const authInfo = await window.BKAuth.checkRoleGate(
            ['owner', 'admin', 'hr', 'finance'],
            '../../admin.html'
          );
          if (!authInfo) return;
          this.tenantId = authInfo.tenantId;

          const { data: co } = await getSb().from('companies').select('id').eq('tenant_id', this.tenantId).limit(1).maybeSingle();
          this.companyId = co?.id || null;
          if (!this.companyId) return;

          this.updateMonthDisplay();
          await this.loadData();
        } catch (e) {
          console.error(e);
        }
      },

      updateMonthDisplay() {
        const el = document.getElementById('month-display');
        if (el) el.textContent = `${MONTHS[this.currentDate.getMonth()]} ${this.currentDate.getFullYear()}`;
      },

      changeMonth(diff) {
        this.currentDate.setMonth(this.currentDate.getMonth() + diff);
        this.updateMonthDisplay();
        this.loadData();
      },

      buildMonthsList() {
        this.months = [];
        const base = new Date(this.currentDate.getFullYear(), this.currentDate.getMonth(), 1);
        for (let i = 0; i < 6; i++) {
          const d = new Date(base.getFullYear(), base.getMonth() - i, 1);
          const label = d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
          const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
          this.months.push({
            key,
            label,
            year: d.getFullYear(),
            month: d.getMonth() + 1,
            start: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-01`,
            end: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate()}`
          });
        }
      },

      async loadData() {
        const tbody = document.getElementById('allocation-table-body');
        if (tbody) {
          tbody.innerHTML = '<tr><td colspan="4" class="text-center" style="padding: 2.5rem; color: var(--text-muted); font-style: italic;">Loading profit allocation data...</td></tr>';
        }

        this.buildMonthsList();
        const currentMonthKey = this.months[0].key;

        try {
          // Fetch only the locked statement for the current month, employees, equity settings, and saved checks
          const [lockedRes, employeesRes, equitySettingsRes, checksRes] = await Promise.all([
            getSb()
              .from('locked_profit_loss_statements')
              .select('statement_data')
              .eq('company_id', this.companyId)
              .eq('month', currentMonthKey)
              .maybeSingle(),
            getSb().from('employees').select('id, first_name, last_name, salary, employment_status').eq('company_id', this.companyId),
            getSb().from('global_settings').select('value').eq('key', 'equity_settings').eq('company_id', this.companyId).maybeSingle(),
            getSb().from('global_settings').select('value').eq('key', `profit_allocation_checks_${currentMonthKey}`).eq('company_id', this.companyId).maybeSingle()
          ]);

          this.savedChecks = checksRes.data?.value || {};

          this.employees = employeesRes.data || [];
          this.equitySettings = equitySettingsRes.data?.value || [];

          const lockedData = lockedRes.data;

          if (!lockedData || !lockedData.statement_data) {
            // Month is not locked, display warning
            document.getElementById('net-profit-display').textContent = '—';
            if (tbody) {
              tbody.innerHTML = `
                <tr>
                  <td colspan="4" class="text-center" style="padding: 3rem 1.5rem;">
                    <div style="background: rgba(239, 68, 68, 0.05); border-radius: var(--radius-md); padding: 1.5rem; display: flex; flex-direction: column; align-items: center; gap: 0.75rem; max-width: 450px; margin: 0 auto; box-sizing: border-box;">
                      <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="var(--danger)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                      <span style="font-weight: 700; color: var(--text-primary); font-size: 0.95rem;">Month Not Locked</span>
                      <span style="color: var(--text-muted); font-size: 0.82rem; line-height: 1.4; text-align: center;">This month must be locked in the <a href="/dashboard/statements/profit-and-loss" style="color: var(--cyan); text-decoration: underline; font-weight: 600;">Profit & Loss Statement</a> first before allocations can be computed.</span>
                    </div>
                  </td>
                </tr>
              `;
            }
            return;
          }

          // Month is locked, compute from saved statement_data
          const mv = lockedData.statement_data;

          const getRevenue = (x) => x.revenueBooking || 0;
          const getCogs = (x) => {
            const otherCogsSum = Object.values(x.otherCogs || {}).reduce((a, b) => a + b, 0);
            return (x.supplierCost || 0) + (x.installations || 0) + (x.commissions || 0) + (x.shipping || 0) + (x.gasAllowance || 0) + (x.packagingSupplies || 0) + otherCogsSum;
          };
          const getOpex = (x) => {
            return (x.salaries || 0) + (x.adjustments || 0) + (x.softwareApps || 0) + (x.admin?.total || 0) + (x.marketingSales?.total || 0) + (x.operationsSupport?.total || 0);
          };

          const netProfitCents = getRevenue(mv) - getCogs(mv) - getOpex(mv);
          const netProfit = netProfitCents / 100;

          document.getElementById('net-profit-display').textContent = this.formatCurrency(netProfit);

          // 3. Resolve Active Point-In-Time Allocation Configuration
          const config = this.resolveActiveSettings(this.months[0].start);

          // 4. Render Table
          this.renderAllocationTable(netProfit, config);

        } catch (e) {
          console.error(e);
          if (tbody) {
            tbody.innerHTML = `<tr><td colspan="4" class="text-center" style="color: var(--danger);">Failed to load allocations: ${e.message}</td></tr>`;
          }
        }
      },

      resolveActiveSettings(targetDateStr) {
        if (!Array.isArray(this.equitySettings) || this.equitySettings.length === 0) {
          return { retained_earnings_pct: 100, capital_buffer_pct: 0, distribution_pct: 0, loan_payment_pct: 0, distributions: {} };
        }
        
        const targetDate = new Date(targetDateStr);
        const match = this.equitySettings.find(ver => new Date(ver.effective_date) <= targetDate);
        
        return match || this.equitySettings[this.equitySettings.length - 1];
      },

      renderAllocationTable(netProfit, config) {
        const tbody = document.getElementById('allocation-table-body');
        if (!tbody) return;

        const retainedPct = config.retained_earnings_pct ?? 100;
        const bufferPct = config.capital_buffer_pct ?? 0;
        const distPct = config.distribution_pct ?? 0;
        const loanPct = config.loan_payment_pct ?? 0;

        const retainedAmt = netProfit * (retainedPct / 100);
        const bufferAmt = netProfit * (bufferPct / 100);
        const distAmt = netProfit * (distPct / 100);
        const loanAmt = netProfit * (loanPct / 100);

        let html = '';

        const getRowHtml = (id, label, pct, amt, isSubitem = false, parentId = null) => {
          const indentStyle = isSubitem ? 'padding-left: 2.5rem; color: var(--text-secondary); font-size: 0.8rem;' : 'font-weight: 600; padding-left: 1.25rem;';
          const rowClass = isSubitem ? 'sub-allocation-row' : 'main-allocation-row';
          const pctText = isSubitem ? `${pct.toFixed(2)}% of Dist` : `${pct.toFixed(2)}%`;
          const parentAttr = isSubitem && parentId ? `data-parent="row-${parentId}"` : '';
          
          return `
            <tr class="${rowClass}" id="row-${id}">
              <td style="${indentStyle}">${escapeHtml(label)}</td>
              <td style="text-align: right; ${isSubitem ? 'color: var(--text-secondary); font-size: 0.8rem;' : 'font-weight: 500;'}">${pctText}</td>
              <td style="text-align: right; ${isSubitem ? 'color: var(--text-secondary); font-size: 0.8rem;' : 'font-weight: 600;'}">${this.formatCurrency(amt)}</td>
              <td style="text-align: center;">
                <input type="checkbox" ${parentAttr} data-row="row-${id}" onchange="ProfitAllocationApp.toggleRowAllocation(this, 'row-${id}')" style="cursor: pointer; width: 16px; height: 16px;" />
              </td>
            </tr>
          `;
        };

        html += getRowHtml('retained', 'Retained Earnings', retainedPct, retainedAmt);
        html += getRowHtml('buffer', 'Capital Buffer', bufferPct, bufferAmt);
        html += getRowHtml('distribution', 'Distribution', distPct, distAmt);

        if (distPct > 0 && config.distributions && Object.keys(config.distributions).length > 0) {
          Object.entries(config.distributions).forEach(([empId, sharePct]) => {
            const emp = this.employees.find(e => e.id === empId);
            const fullName = emp ? `${emp.first_name} ${emp.last_name}` : 'Unknown Employee';
            const empAmt = distAmt * (sharePct / 100);
            html += getRowHtml(`emp-${empId}`, `— ${fullName}`, sharePct, empAmt, true, 'distribution');
          });
        }

        html += getRowHtml('loan', 'Loan Payment', loanPct, loanAmt);

        html += `
          <tr class="row-total">
            <td style="font-weight: 700; padding-left: 1.25rem;">TOTAL</td>
            <td style="text-align: right; font-weight: 700;">100.00%</td>
            <td style="text-align: right; font-weight: 700;">${this.formatCurrency(netProfit)}</td>
            <td></td>
          </tr>
        `;

        tbody.innerHTML = html;
        this.restoreChecks();
      },

      toggleRowAllocation(checkbox, rowId) {
        const row = document.getElementById(rowId);
        if (!row) return;
        if (checkbox.checked) {
          row.classList.add('allocated-row');
        } else {
          row.classList.remove('allocated-row');
        }

        // If this is a subitem, check if all siblings are checked → auto-check parent
        const parentRowId = checkbox.dataset.parent;
        if (parentRowId) {
          const allSiblings = document.querySelectorAll(`input[type="checkbox"][data-parent="${parentRowId}"]`);
          const allChecked = allSiblings.length > 0 && Array.from(allSiblings).every(cb => cb.checked);
          const parentRow = document.getElementById(parentRowId);
          const parentCheckbox = parentRow ? parentRow.querySelector('input[type="checkbox"]') : null;
          if (parentCheckbox) {
            parentCheckbox.checked = allChecked;
            if (allChecked) {
              parentRow.classList.add('allocated-row');
            } else {
              parentRow.classList.remove('allocated-row');
            }
          }
        }

        this.saveChecks().catch(console.error);
      },

      storageKey() {
        const monthKey = this.months[0]?.key || 'unknown';
        return `profit_allocation_checks_${monthKey}`;
      },

      async saveChecks() {
        const state = {};
        document.querySelectorAll('#allocation-table-body input[type="checkbox"][data-row]').forEach(cb => {
          state[cb.dataset.row] = cb.checked;
        });
        // Update local cache so restoreChecks is instant on next render within the same session
        this.savedChecks = state;
        // Persist to Supabase so all devices stay in sync
        await getSb().from('global_settings').upsert({
          company_id: this.companyId,
          key: this.storageKey(),
          value: state
        }, { onConflict: 'company_id,key' });
      },

      restoreChecks() {
        const state = this.savedChecks || {};
        if (!Object.keys(state).length) return;

        Object.entries(state).forEach(([rowId, checked]) => {
          const row = document.getElementById(rowId);
          const cb = row ? row.querySelector('input[type="checkbox"]') : null;
          if (!cb) return;
          cb.checked = checked;
          if (checked) {
            row.classList.add('allocated-row');
          } else {
            row.classList.remove('allocated-row');
          }
        });

        // Re-evaluate parent auto-check after restoring
        document.querySelectorAll('#allocation-table-body input[type="checkbox"][data-parent]').forEach(cb => {
          const parentRowId = cb.dataset.parent;
          const allSiblings = document.querySelectorAll(`input[type="checkbox"][data-parent="${parentRowId}"]`);
          const allChecked = allSiblings.length > 0 && Array.from(allSiblings).every(s => s.checked);
          const parentRow = document.getElementById(parentRowId);
          const parentCheckbox = parentRow ? parentRow.querySelector('input[type="checkbox"]') : null;
          if (parentCheckbox) {
            parentCheckbox.checked = allChecked;
            if (allChecked) parentRow.classList.add('allocated-row');
            else parentRow.classList.remove('allocated-row');
          }
        });
      },

      formatCurrency(val) {
        if (val === null || val === undefined) return '—';
        const prefix = val < 0 ? '(' : '';
        const suffix = val < 0 ? ')' : '';
        return `${prefix}₱${Math.abs(val).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}${suffix}`;
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      ProfitAllocationApp.init();
    });
  </script>
</body>
</html>
