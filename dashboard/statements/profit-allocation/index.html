<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profit Allocation — BrightKey Finance</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=2" />
  <style>
    .int-wrap { max-width: 1200px; margin: 0 auto; padding: 2rem 2rem 5rem; }

    .drawer-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      background: var(--bg-surface);
    }
    .tab-btn {
      padding: 0.9rem 1.25rem;
      font-size: 0.82rem; font-weight: 600;
      color: var(--text-muted);
      border: none; background: none; cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap; transition: all 0.15s;
      font-family: var(--font-sans);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      line-height: 1;
    }
    .tab-btn.active { color: var(--cyan-light); border-bottom-color: var(--cyan); }
    .tab-btn:hover:not(.active) { color: var(--text-secondary); }

    /* ── Info state block ── */
    .info-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 6rem 2rem;
      border: 1px dashed var(--border);
      border-radius: var(--radius-md);
      background: var(--bg-elevated);
      color: var(--text-muted);
      text-align: center;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>

  <div class="dash-layout">
    <aside class="dash-sidebar" id="dash-sidebar"></aside>

    <div class="dash-main">
      <div class="top-bar">
        <div class="top-bar-title">Statements</div>
      </div>

      <!-- Tab bar -->
      <nav class="drawer-tabs">
        <a href="/dashboard/statements/profit-and-loss" class="tab-btn">Profit & Loss</a>
        <a href="/dashboard/statements/cashflow" class="tab-btn">Cashflow</a>
        <a href="/dashboard/statements/balance-sheet" class="tab-btn">Balance Sheet</a>
        <a href="/dashboard/statements/profit-allocation" class="tab-btn active">Profit Allocation</a>
      </nav>

      <!-- Subtab bar -->
      <div class="drawer-tabs" style="background: var(--bg-surface); padding-left: 2rem; border-bottom: 1px solid var(--border);">
        <a href="/dashboard/statements/profit-allocation" class="tab-btn active" style="font-size: 0.78rem; padding: 0.6rem 1rem;">Allocations</a>
        <a href="/dashboard/statements/profit-allocation/settings" class="tab-btn" style="font-size: 0.78rem; padding: 0.6rem 1rem;">Settings</a>
      </div>

      <main style="overflow-y: auto; flex: 1; min-width: 0; width: 100%;">
        <div class="int-wrap">
          <div class="info-state">
            <div style="font-size: 1.1rem; font-weight: 600; color: var(--text-secondary);">Allocations Summary</div>
            <div>This view is under development.</div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/auth.js" defer></script>
  <script src="/js/sidebar.js" defer></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      window.BKAuth.checkRoleGate(
        ['owner', 'admin', 'hr', 'finance'],
        '../../admin.html'
      );
    });
  </script>
</body>
</html>
