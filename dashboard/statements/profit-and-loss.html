<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profit & Loss — BrightKey Statements</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg?v=2" />
  <style>
    /* ── Excel-style Table ── */
    .excel-container {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      margin-top: 1.5rem;
    }
    .excel-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10pt;
      color: var(--text-primary);
      font-family: Arial, sans-serif;
    }
    .excel-table th, .excel-table td {
      border: 1px solid var(--border);
      padding: 0.6rem 0.85rem;
      text-align: right;
    }
    .excel-table th {
      background: var(--bg-base, #fafafa);
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-size: 10pt;
      letter-spacing: 0.05em;
    }
    .excel-table th:first-child, .excel-table td:first-child {
      text-align: left;
      font-weight: 600;
      background: var(--bg-base, #fafafa);
      width: 280px;
    }
    
    /* ── Hierarchy ── */
    .row-net-profit td {
      font-weight: 800 !important;
      background: var(--cyan-dim, #ecfeff) !important;
      color: var(--cyan, #0891b2) !important;
      font-size: 0.88rem;
      border-top: 2px solid var(--cyan) !important;
      border-bottom: 2px double var(--cyan) !important;
    }
    .row-gross-profit td {
      font-weight: 700 !important;
      background: var(--bg-base) !important;
      font-size: 0.84rem;
      border-top: 1px solid var(--text-primary) !important;
      border-bottom: 1px solid var(--text-primary) !important;
    }
    .row-group-header td {
      font-weight: 700 !important;
      text-transform: uppercase;
      font-size: 0.78rem;
      background: var(--bg-base) !important;
      text-align: left;
    }
    .row-subgroup-header td {
      font-weight: 600 !important;
      font-style: italic;
      text-align: left;
      background: var(--bg-surface) !important;
    }
    .indent-1 {
      padding-left: 1.5rem !important;
    }
    .indent-2 {
      padding-left: 2.5rem !important;
    }

    /* ── Tab Container Bar ── */
    .drawer-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      background: var(--bg-surface);
      margin-bottom: 1.5rem;
    }
    .tab-btn {
      padding: 0.9rem 1.25rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.15s;
      text-decoration: none;
    }
    .tab-btn.active {
      color: var(--cyan-light);
      border-bottom-color: var(--cyan);
    }
    .tab-btn:hover:not(.active) {
      color: var(--text-secondary);
    }

    .shimmer-row td {
      background: linear-gradient(90deg, var(--bg-surface) 25%, var(--bg-base) 50%, var(--bg-surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body class="bg-base text-primary">
  <div class="dash-layout">
    <!-- Sidebar -->
    <aside class="dash-sidebar" id="dash-sidebar"></aside>

    <!-- Main Content Area -->
    <main class="dash-main">
      <header class="dash-topbar" style="border-bottom: none; height: auto; min-height: 60px; display: flex; flex-direction: column; align-items: stretch; justify-content: space-between; padding-top: 1rem;">
        <div style="display: flex; align-items: center; gap: 0.75rem; padding-left: 2rem; margin-bottom: 0.75rem;">
          <h1 style="font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em;">Financial Statements</h1>
        </div>
        <!-- Tabs Component connected directly to header -->
        <div class="drawer-tabs" style="margin-bottom: 0; padding-left: 2rem; border-top: 1px solid var(--border);">
          <a href="/dashboard/statements/profit-and-loss" class="tab-btn active">Profit & Loss</a>
          <a href="/dashboard/statements/cashflow" class="tab-btn">Cashflow</a>
          <a href="/dashboard/statements/balance-sheet" class="tab-btn">Balance Sheet</a>
        </div>
      </header>

      <div style="padding: 2rem; max-width: 1200px; width: 100%; margin: 0 auto; box-sizing: border-box;">

        <div style="background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1.5rem; box-shadow: var(--shadow-sm);">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <div>
              <h2 style="font-size: 1rem; font-weight: 700; color: var(--text-primary); margin: 0;">Profit & Loss Statement</h2>
              <p style="font-size: 0.78rem; color: var(--text-muted); margin: 0.25rem 0 0 0;">Last 6 months, calculated chronologically</p>
            </div>
            <button onclick="PLApp.loadData()" class="btn btn-outline btn-sm" style="display: flex; align-items: center; gap: 0.4rem;">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
              Refresh
            </button>
          </div>

          <div class="excel-container">
            <table class="excel-table" id="pl-table">
              <thead>
                <tr id="table-header-row">
                  <th>Line Item</th>
                  <!-- Dynamic Month Headers -->
                </tr>
              </thead>
              <tbody id="table-body">
                <!-- Loading State Shimmer -->
                <tr class="shimmer-row">
                  <td>Loading P&L Data...</td>
                  <td></td><td></td><td></td><td></td><td></td><td></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Supabase SDK, Auth & Sidebar -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>
  <script src="../../js/main.js"></script>

  <script>
    (function() {
      'use strict';

      window.PLApp = {
        companyId: null,
        tenantId: null,
        months: [],
        products: [],
        bookings: [],
        employees: [],
        adjustments: [],
        deliveries: [],
        payoutSettings: null,

        resolvePlanForMonth(s, targetMonthStr) {
          const subBills = this.softwareBilling.filter(b => b.subscription_id === s.id);
          const exactBill = subBills.find(b => b.billing_month === targetMonthStr);
          if (exactBill) return { mode: exactBill.mode, cost_centavos: exactBill.cost_centavos };

          if (s.mode === 'pay_as_you_go') {
            const subStartMonth = (s.subscribed_date || '').slice(0, 7);
            if (subStartMonth === targetMonthStr) return { mode: 'pay_as_you_go', cost_centavos: s.cost_centavos };
            return { mode: 'pay_as_you_go', cost_centavos: 0 };
          }

          const pastBills = subBills.filter(b => b.billing_month <= targetMonthStr);
          if (pastBills.length > 0) {
            pastBills.sort((a, b) => b.billing_month.localeCompare(a.billing_month));
            const latestBill = pastBills[0];
            if (latestBill.mode === 'pay_as_you_go') return { mode: 'pay_as_you_go', cost_centavos: 0 };
            return { mode: latestBill.mode, cost_centavos: latestBill.cost_centavos };
          }
          return { mode: s.mode, cost_centavos: s.cost_centavos };
        },

        getAssignedDoorsForEmployee(b, empId) {
          let doorsArr = [];
          if (b.doors) {
            if (typeof b.doors === 'string') {
              try { doorsArr = JSON.parse(b.doors); } catch(_) {}
            } else if (Array.isArray(b.doors)) {
              doorsArr = b.doors;
            }
          }

          let bInsts = [];
          if (b.installers) {
            if (typeof b.installers === 'string') {
              try { bInsts = JSON.parse(b.installers); } catch(_) {}
            } else if (Array.isArray(b.installers)) {
              bInsts = b.installers;
            }
          }

          const isBookingLevelInstaller = bInsts.some(inst => inst && inst.id === empId) || 
                                          (b.installer_id && b.installer_id.split(' | ').includes(empId));

          const bookingHasDoorLevelInstallers = doorsArr.some(d => d && Array.isArray(d.installers) && d.installers.some(inst => inst && (inst.id || inst.name)));

          const assignedDoors = [];

          if (doorsArr.length === 0) {
            if (isBookingLevelInstaller) {
              let roles = [];
              const matchedBInsts = bInsts.filter(inst => inst && inst.id === empId);
              if (matchedBInsts.length > 0) {
                matchedBInsts.forEach(inst => {
                  const r = inst.role || 'lead';
                  if (!roles.includes(r)) roles.push(r);
                });
              } else if (b.installer_id) {
                const ids = b.installer_id.split(' | ');
                const myIdIdx = ids.indexOf(empId);
                if (myIdIdx !== -1) {
                  roles.push(myIdIdx === 0 ? 'lead' : 'assist');
                }
              }
              if (roles.length === 0) roles.push('lead');
              
              let productsArr = [];
              if (b.products) {
                if (typeof b.products === 'string') {
                  try { productsArr = JSON.parse(b.products); } catch(_) {}
                } else if (Array.isArray(b.products)) {
                  productsArr = b.products;
                }
              }
              const skus = (b.product_skus || '').split(' | ').filter(Boolean);
              const activeSkus = productsArr.length > 0 
                ? productsArr.filter(p => !p.cancelled && p.sku !== 'ADD-ON LABOR').map(p => p.sku)
                : skus;

              assignedDoors.push({
                completed: b.status === 'done' || b.status === 'completed' || b.status === 'finished',
                roles: roles,
                skus: activeSkus,
                completed_at: b.updated_at || b.created_at || b.scheduled_date,
                scheduled_date: b.scheduled_date
              });
            }
            return assignedDoors;
          }

          let productsArr = [];
          if (b.products) {
            if (typeof b.products === 'string') {
              try { productsArr = JSON.parse(b.products); } catch(_) {}
            } else if (Array.isArray(b.products)) {
              productsArr = b.products;
            }
          }
          const skus = (b.product_skus || '').split(' | ');
          const anyDoorHasAttachedProducts = doorsArr.some(d => d && Array.isArray(d.products) && d.products.length > 0);
          const isSingleDoorGrouping = (doorsArr.length === 1 && productsArr.length > 0);
          const skuOccurrenceCount = new Map();

          doorsArr.forEach((door, index) => {
            let isAssignedToThisDoor = false;
            let roles = [];

            if (door && Array.isArray(door.installers)) {
              const matchedInsts = door.installers.filter(inst => inst && inst.id === empId);
              if (matchedInsts.length > 0) {
                isAssignedToThisDoor = true;
                matchedInsts.forEach(inst => {
                  const r = inst.role || 'lead';
                  if (!roles.includes(r)) roles.push(r);
                });
              }
            } else if (bookingHasDoorLevelInstallers) {
              isAssignedToThisDoor = false;
            } else {
              isAssignedToThisDoor = isBookingLevelInstaller;
              const matchedBInsts = bInsts.filter(inst => inst && inst.id === empId);
              if (matchedBInsts.length > 0) {
                matchedBInsts.forEach(inst => {
                  const r = inst.role || 'lead';
                  if (!roles.includes(r)) roles.push(r);
                });
              } else if (b.installer_id) {
                const ids = b.installer_id.split(' | ');
                const myIdIdx = ids.indexOf(empId);
                if (myIdIdx !== -1) {
                  roles.push(myIdIdx === 0 ? 'lead' : 'assist');
                }
              }
            }

            if (isAssignedToThisDoor) {
              const doorSkus = [];
              if (anyDoorHasAttachedProducts && door) {
                const attachedSkus = door.products || [];
                attachedSkus.forEach(sku => {
                  const matchingProds = productsArr.filter(p => p.sku === sku);
                  const occurrenceIndex = skuOccurrenceCount.get(sku) || 0;
                  const matchedProd = matchingProds[occurrenceIndex];
                  if (matchedProd && !matchedProd.cancelled) {
                    doorSkus.push(matchedProd.sku);
                  }
                  skuOccurrenceCount.set(sku, occurrenceIndex + 1);
                });
              } else if (isSingleDoorGrouping) {
                productsArr.forEach(p => {
                  if (p.sku !== 'ADD-ON LABOR' && !p.cancelled) {
                    doorSkus.push(p.sku);
                  }
                });
              } else {
                if (productsArr[index] && !productsArr[index].cancelled) {
                  doorSkus.push(productsArr[index].sku);
                } else if (skus[index]) {
                  doorSkus.push(skus[index]);
                }
              }

              assignedDoors.push({
                completed: !!door.completed,
                roles: roles,
                skus: doorSkus,
                completed_at: door.completed_at || b.updated_at || b.created_at || b.scheduled_date,
                scheduled_date: b.scheduled_date
              });
            } else {
              if (anyDoorHasAttachedProducts && door) {
                const attachedSkus = door.products || [];
                attachedSkus.forEach(sku => {
                  const occurrenceIndex = skuOccurrenceCount.get(sku) || 0;
                  skuOccurrenceCount.set(sku, occurrenceIndex + 1);
                });
              }
            }
          });

          return assignedDoors;
        },

        calculateMonthlyReport() {
          const monthlyValues = {};
          this.months.forEach(m => {
            monthlyValues[m.key] = {
              revenueBooking: 0,
              supplierCost: 0,
              installations: 0,
              commissions: 0,
              shipping: 0,
              gasAllowance: 0,
              packagingSupplies: 0,
              otherCogs: {},
              
              salaries: 0,
              adjustments: 0,
              softwareApps: 0,
              admin: { total: 0, details: {} },
              marketingSales: { total: 0, details: {} },
              operationsSupport: { total: 0, details: {} }
            };
          });

          const dealerPriceMap = {};
          this.products.forEach(p => {
            if (p.sku) dealerPriceMap[p.sku.toLowerCase()] = p.dealer_price || 0;
          });

          const thresholdVal = this.payoutSettings.installations_before_crediting || 15;
          const leadWeight = this.payoutSettings.lead_credit !== undefined ? this.payoutSettings.lead_credit : 1.0;
          const assistWeight = this.payoutSettings.assist_credit !== undefined ? this.payoutSettings.assist_credit : 0.5;
          const leadRateVal = this.payoutSettings.lead_rate || 1000;
          const extraServicesList = (this.payoutSettings.extra_services || []).map(es => {
            let sku = es.sku || es.name || '';
            if (sku === 'Welding Baseplate Metal') sku = 'BASEPLATE-M';
            if (sku === 'Welding Baseplate Stainless') sku = 'BASEPLATE-S';
            return { sku, rate: es.rate };
          });

          // 1. Process Bookings for Revenue & Supplier Cost
          this.bookings.forEach(b => {
            if (!b.scheduled_date) return;
            const bDate = new Date(b.scheduled_date);
            const mKey = `${bDate.getFullYear()}-${String(bDate.getMonth() + 1).padStart(2, '0')}`;
            if (!monthlyValues[mKey]) return;

            if (b.order_no && b.order_no.startsWith('ORD-')) {
              const grandTotal = parseInt(b.grand_total) || 0;
              const balanceDue = parseInt(b.balance_due) || 0;
              let depositCentavos = parseInt(b.deposit_amount) || 0;
              if (b.deduction_labels && b.deduction_values) {
                const dLabels = b.deduction_labels.split('|').map(s => s.trim().toLowerCase());
                const dValues = b.deduction_values.split('|').map(s => s.trim());
                dLabels.forEach((label, idx) => {
                  if (label.includes('deposit')) {
                    depositCentavos += Math.round((parseFloat(dValues[idx]) || 0) * 100);
                  }
                });
              }
              const absDepositCentavos = Math.abs(depositCentavos);
              const orderGrandTotal = grandTotal > 0 ? grandTotal : (balanceDue + absDepositCentavos);
              monthlyValues[mKey].revenueBooking += (orderGrandTotal + absDepositCentavos);
            }

            let skusArr = [];
            let qtysArr = [];
            if (b.product_skus) skusArr = b.product_skus.split(' | ').filter(Boolean);
            if (b.product_qtys) qtysArr = b.product_qtys.split(' | ').map(Number);
            skusArr.forEach((sku, idx) => {
              const qty = qtysArr[idx] || 0;
              const dPrice = dealerPriceMap[sku.toLowerCase()] || 0;
              monthlyValues[mKey].supplierCost += (qty * dPrice);
            });
          });

          // 2. Installations
          this.months.forEach(m => {
            const mKey = m.key;
            const monthBookings = this.bookings.filter(b => {
              if (!b.scheduled_date) return false;
              const d = new Date(b.scheduled_date);
              return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}` === mKey;
            });

            this.employees.forEach(emp => {
              let leadCount = 0;
              let assistCount = 0;
              let serviceEarnings = 0;

              monthBookings.forEach(b => {
                const assignedDoors = this.getAssignedDoorsForEmployee(b, emp.id);
                assignedDoors.forEach(d => {
                  if (!d.completed) return;
                  if (d.roles.includes('lead')) {
                    leadCount++;
                  } else if (d.roles.includes('assist')) {
                    assistCount++;
                  }
                  if (d.roles.includes('service')) {
                    d.skus.forEach(sku => {
                      const matchedService = extraServicesList.find(es => es.sku === sku);
                      if (matchedService) {
                        serviceEarnings += matchedService.rate;
                      }
                    });
                  }
                });
              });

              const totalCredit = (leadCount * leadWeight) + (assistCount * assistWeight);
              let thresholdEarnings = 0;
              if (totalCredit > thresholdVal) {
                const extraCredit = totalCredit - thresholdVal;
                thresholdEarnings = extraCredit * leadRateVal;
              }

              monthlyValues[mKey].installations += ((thresholdEarnings + serviceEarnings) * 100);
            });
          });

          // 3. Salaries, Specials, Commissions, Adjustments (Matching OPEX logic per employee)
          this.months.forEach(m => {
            const mKey = m.key;
            const monthBookings = this.bookings.filter(b => {
              if (!b.scheduled_date) return false;
              const d = new Date(b.scheduled_date);
              return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}` === mKey;
            });

            this.employees.forEach(emp => {
              const record = this.payslipRecords.find(r => r.employee_id === emp.id && r.payout_month === mKey);

              let baseSalary = 0;
              let specialPayout = 0;
              let adjustmentVal = 0;

              // Resolve adjustments for this employee in the month
              const empAdjs = this.adjustmentsList.filter(a => a.employee_id === emp.id && a.date && a.date.slice(0, 7) === mKey);
              adjustmentVal = empAdjs.reduce((sum, a) => sum + Math.round((Number(a.amount) || 0) * 100), 0);

              if (record) {
                baseSalary = Math.round((Number(record.basic_paid || record.salary) || 0) * 100);
                specialPayout = Math.round((Number(record.special_payouts) || 0) * 100);
              } else {
                baseSalary = emp.employment_status === 'Active' ? Math.round((Number(emp.salary || emp.monthly_salary) || 0) * 100) : 0;

                // Resolve checked special payouts for this employee in the month
                const specialSchedules = this.trackerConfig.specialSchedules || [];
                specialPayout = specialSchedules
                  .filter(s => s.employeeId === emp.id)
                  .reduce((sum, s) => {
                    const isPaid = this.specialPayoutState?.[mKey]?.[`${emp.id}_${s.day}`] || false;
                    return sum + (isPaid ? Math.round((Number(s.value) || 0) * 100) : 0);
                  }, 0);
              }

              monthlyValues[mKey].salaries += (baseSalary + specialPayout);
              monthlyValues[mKey].adjustments += adjustmentVal;

              // Resolve commissions for this employee in the month matching COGS page logic exactly
              let commissionPayoutCents = 0;
              const employeeCommAssignments = this.commissionAssignments.filter(a => a.employee_id === emp.id);
              employeeCommAssignments.forEach(a => {
                const b = this.bookings.find(x => x.id === a.booking_id);
                if (!b || b.status === 'cancelled') return;
                if (!b.scheduled_date) return;
                const bDate = new Date(b.scheduled_date);
                const bookingMonthKey = `${bDate.getFullYear()}-${String(bDate.getMonth() + 1).padStart(2, '0')}`;
                if (bookingMonthKey !== mKey) return;

                let doors = [];
                if (b.doors) {
                  if (typeof b.doors === 'string') {
                    try { doors = JSON.parse(b.doors); } catch(_) {}
                  } else if (Array.isArray(b.doors)) {
                    doors = b.doors;
                  }
                }

                const door = doors[a.product_index];
                const isDone = (door && door.completed) || ['done', 'completed', 'finished'].includes(b.status);
                if (!isDone) return;

                commissionPayoutCents += (Number(a.amount) || 0);
              });
              monthlyValues[mKey].commissions += commissionPayoutCents;
            });
          });

          // 4. Shipping (Matching COGS logic 1-to-1 per month)
          this.months.forEach(m => {
            const mKey = m.key;
            const seenRefIds = new Set();
            let baseSum = 0;
            let tip1Sum = 0;
            let tip2Sum = 0;
            let tollSum = 0;

            this.dispatchedTxs.forEach(tx => {
              if (!tx.timestamp_dispatched) return;
              const txMonthKey = tx.timestamp_dispatched.slice(0, 7);
              if (txMonthKey !== mKey) return;

              if (!tx.reference_id || seenRefIds.has(tx.reference_id)) return;
              seenRefIds.add(tx.reference_id);

              const fees = this.deliveryFeeMap[tx.reference_id] || {};
              const base = fees.base_fee || 0;
              const tip1 = fees.tip_1 || 0;
              const tip2 = fees.tip_2 || 0;
              const toll = fees.toll || 0;

              baseSum += base;
              tip1Sum += tip1;
              tip2Sum += tip2;
              tollSum += toll;
            });

            monthlyValues[mKey].shipping = baseSum + tip1Sum + tip2Sum + tollSum;
          });

          // 5. General Ledger Mapping
          const accountCategoryMap = {};
          this.journalAccounts.forEach(a => {
            accountCategoryMap[a.name] = a.category;
          });

          this.generalJournal.forEach(entry => {
            if (!entry.date) return;
            const mKey = entry.date.slice(0, 7);
            if (!monthlyValues[mKey]) return;

            const category = accountCategoryMap[entry.account];
            const debitVal = Math.round((parseFloat(entry.debit) || 0) * 100);
            if (debitVal <= 0) return;

            if (category === 'COGS') {
              if (entry.account.toLowerCase() === 'gas allowance') {
                monthlyValues[mKey].gasAllowance += debitVal;
              } else if (entry.account.toLowerCase() === 'packaging supplies') {
                monthlyValues[mKey].packagingSupplies += debitVal;
              } else {
                monthlyValues[mKey].otherCogs[entry.account] = (monthlyValues[mKey].otherCogs[entry.account] || 0) + debitVal;
              }
            } else if (category === 'OPEX - Admin') {
              monthlyValues[mKey].admin.total += debitVal;
              monthlyValues[mKey].admin.details[entry.account] = (monthlyValues[mKey].admin.details[entry.account] || 0) + debitVal;
            } else if (category === 'OPEX - Marketing & Sales') {
              monthlyValues[mKey].marketingSales.total += debitVal;
              monthlyValues[mKey].marketingSales.details[entry.account] = (monthlyValues[mKey].marketingSales.details[entry.account] || 0) + debitVal;
            } else if (category === 'OPEX - Operations Support') {
              monthlyValues[mKey].operationsSupport.total += debitVal;
              monthlyValues[mKey].operationsSupport.details[entry.account] = (monthlyValues[mKey].operationsSupport.details[entry.account] || 0) + debitVal;
            }
          });

          // 6. Software & Apps Subscriptions
          this.months.forEach(m => {
            const mKey = m.key;
            const currentMonthDateStr = `${mKey}-01`;
            const currentMonthLastDayStr = `${mKey}-${new Date(m.year, m.month, 0).getDate()}`;

            const activeInMonthSubs = this.softwareSubscriptions.filter(s => {
              const subDate = s.subscribed_date || '1970-01-01';
              const unsubDate = s.unsubscribed_date;
              const isSubscribed = subDate <= currentMonthLastDayStr;
              const isNotUnsubscribed = !unsubDate || unsubDate >= currentMonthDateStr;
              return isSubscribed && isNotUnsubscribed;
            });

            activeInMonthSubs.forEach(s => {
              const plan = this.resolvePlanForMonth(s, currentMonthDateStr);
              const mode = plan.mode;
              const costCentavos = plan.cost_centavos;

              if (mode === 'unsubscribed') return;

              let resolvedCostCentavos = 0;
              if (mode === 'pay_as_you_go' || mode === 'monthly') {
                resolvedCostCentavos = costCentavos;
              } else if (mode === 'annual') {
                resolvedCostCentavos = Math.round(costCentavos / 12);
              }
              monthlyValues[mKey].softwareApps += resolvedCostCentavos;
            });
          });

          return monthlyValues;
        },

        async init() {
          if (!window.BKAuth) return;
          const authInfo = await window.BKAuth.checkRoleGate(['Finance'], '../../admin.html');
          if (!authInfo) return;

          this.tenantId = authInfo.tenantId;
          const sb = window.BKAuth.sb;

          // Fetch company ID
          const { data: co } = await sb.from('companies').select('id').eq('tenant_id', this.tenantId).limit(1).maybeSingle();
          this.companyId = co?.id || null;

          if (!this.companyId) {
            console.error('Company not resolved.');
            return;
          }

          // Build last 6 months (latest first)
          const now = new Date();
          this.months = [];
          for (let i = 0; i < 6; i++) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const label = d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
            const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            this.months.push({
              key,
              label,
              year: d.getFullYear(),
              month: d.getMonth() + 1,
              start: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-01`,
              end: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate()}`
            });
          }

          await this.loadData();
        },

        async loadData() {
          const tbody = document.getElementById('table-body');
          if (tbody) {
            tbody.innerHTML = `
              <tr class="shimmer-row">
                <td style="text-align: left;">Fetching statements data...</td>
                <td></td><td></td><td></td><td></td><td></td><td></td>
              </tr>
            `;
          }

          const sb = window.BKAuth.sb;
          const startRange = this.months[5].start;
          const endRange = this.months[0].end;

          try {
            const [
              productsRes,
              bookingsRes,
              employeesRes,
              payslipRecordsRes,
              deliveriesRes,
              payoutSettingsRes,
              trackerConfigRes,
              commissionsRes,
              adjustmentsRes,
              reimbursementsRes,
              journalAccountsRes,
              generalJournalRes,
              softwareSubscriptionsRes,
              softwareBillingRes,
              specialPayoutStateRes,
              dispatchedTxRes,
              deliveryRes
            ] = await Promise.all([
              sb.from('products').select('sku, dealer_price, sale_price'),
              sb.from('installation_bookings')
                .select('id, created_at, scheduled_date, order_no, grand_total, deposit_amount, balance_due, deduction_labels, deduction_values, status, product_skus, product_qtys, doors, installers, installer_id, products')
                .eq('company_id', this.companyId)
                .neq('status', 'cancelled')
                .gte('scheduled_date', startRange)
                .lte('scheduled_date', endRange),
              sb.from('employees')
                .select('id, email, first_name, last_name, salary, employment_status')
                .eq('company_id', this.companyId),
              sb.from('payslip_records')
                .select('employee_id, payout_month, salary, basic_paid, commissions, special_payouts, total_payout, adjustments, adjustments_list')
                .eq('company_id', this.companyId)
                .gte('payout_month', this.months[5].key)
                .lte('payout_month', this.months[0].key),
              sb.from('delivery_bookings')
                .select('created_at, reference_id, actual_distance_km, base_price, customer_tips, base_fee, tip_1, tip_2, toll')
                .eq('company_id', this.companyId)
                .neq('status', 'cancelled')
                .gte('created_at', startRange + ' 00:00:00')
                .lte('created_at', endRange + ' 23:59:59'),
              sb.from('global_settings').select('value').eq('key', 'installer_payout_settings').eq('company_id', this.companyId).maybeSingle(),
              sb.from('global_settings').select('value').eq('key', 'salary_tracker_config').eq('company_id', this.companyId).maybeSingle(),
              sb.from('commission_assignments').select('amount, booking_id, employee_id, product_index').eq('company_id', this.companyId),
              sb.from('employee_adjustments').select('employee_id, amount, date').eq('company_id', this.companyId).gte('date', startRange).lte('date', endRange),
              sb.from('employee_reimbursements').select('employee_id, amount, date').eq('company_id', this.companyId).gte('date', startRange).lte('date', endRange),
              sb.from('journal_accounts').select('name, category').eq('company_id', this.companyId),
              sb.from('general_journal').select('account, debit, date').eq('company_id', this.companyId).gte('date', startRange).lte('date', endRange),
              sb.from('software_subscriptions').select('id, name, mode, cost_centavos, status, subscribed_date, unsubscribed_date').eq('company_id', this.companyId),
              sb.from('software_subscription_billing').select('subscription_id, billing_month, cost_centavos, mode').eq('company_id', this.companyId),
              sb.from('global_settings').select('value').eq('key', 'special_payout_state').eq('company_id', this.companyId).maybeSingle(),
              sb.from('inventory_transactions')
                .select('reference_id, customer_name, timestamp_dispatched')
                .not('timestamp_dispatched', 'is', null)
                .gte('timestamp_dispatched', startRange + 'T00:00:00')
                .lte('timestamp_dispatched', endRange + 'T23:59:59'),
              sb.from('delivery_bookings')
                .select('reference_id, customer_name, base_fee, tip_1, tip_2, toll')
            ]);

            this.products = productsRes.data || [];
            this.bookings = bookingsRes.data || [];
            this.employees = employeesRes.data || [];
            this.payslipRecords = payslipRecordsRes.data || [];
            
            // Save raw shipping list data to align with cogs.html per-month deduplication
            this.dispatchedTxs = dispatchedTxRes?.data || [];
            this.deliveryFeeMap = {};
            (deliveryRes?.data || []).forEach(db => {
              this.deliveryFeeMap[db.reference_id] = db;
            });

            this.payoutSettings = payoutSettingsRes.data?.value || {
              installations_before_crediting: 15,
              lead_credit: 1.0,
              assist_credit: 0.5,
              lead_rate: 1000,
              extra_services: []
            };
            this.trackerConfig = trackerConfigRes.data?.value || {};
            this.commissionAssignments = commissionsRes.data || [];
            this.adjustmentsList = adjustmentsRes.data || [];
            this.reimbursementsList = reimbursementsRes.data || [];
            this.journalAccounts = journalAccountsRes.data || [];
            this.generalJournal = generalJournalRes.data || [];
            this.softwareSubscriptions = softwareSubscriptionsRes.data || [];
            this.softwareBilling = softwareBillingRes.data || [];
            this.specialPayoutState = specialPayoutStateRes.data?.value || {};

            this.renderStatement();

          } catch (err) {
            console.error('Error loading P&L data:', err);
            if (tbody) {
              tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: var(--danger);">Failed to load data: ${err.message}</td></tr>`;
            }
          }
        },

        renderStatement() {
          const headerRow = document.getElementById('table-header-row');
          headerRow.innerHTML = '<th>Line Item</th>' + this.months.map(m => `<th>${m.label}</th>`).join('');

          // 1. Calculate Monthly Values locally
          const monthlyValues = this.calculateMonthlyReport();

          // 3. Render Table
          const formatPHP = (cents) => {
            if (cents === 0) return '—';
            const prefix = cents < 0 ? '-' : '';
            const val = Math.abs(cents) / 100;
            return `${prefix}₱${val.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
          };

          const tbody = document.getElementById('table-body');
          tbody.innerHTML = '';

          // Sub-item list builder helper
          const rowHtml = (title, getterFn, className = '', indent = 0) => {
            const cells = this.months.map(m => {
              const cents = getterFn(monthlyValues[m.key]) || 0;
              return `<td>${formatPHP(cents)}</td>`;
            }).join('');
            return `<tr class="${className}">
              <td class="indent-${indent}">${title}</td>
              ${cells}
            </tr>`;
          };

          // Net Profit Row
          const renderNetProfitRow = () => {
            const cells = this.months.map(m => {
              const mv = monthlyValues[m.key];
              const otherCogsSum = Object.values(mv.otherCogs).reduce((a, b) => a + b, 0);
              const rev = mv.revenueBooking;
              const cogs = mv.supplierCost + mv.installations + mv.commissions + mv.shipping + mv.gasAllowance + mv.packagingSupplies + otherCogsSum;
              const gp = rev - cogs;
              const opex = mv.salaries + mv.adjustments + mv.softwareApps + mv.admin.total + mv.marketingSales.total + mv.operationsSupport.total;
              const np = gp - opex;
              return `<td>${formatPHP(np)}</td>`;
            }).join('');
            return `<tr class="row-net-profit">
              <td>Net Profit</td>
              ${cells}
            </tr>`;
          };

          // Gross Profit Row
          const renderGrossProfitRow = () => {
            const cells = this.months.map(m => {
              const mv = monthlyValues[m.key];
              const otherCogsSum = Object.values(mv.otherCogs).reduce((a, b) => a + b, 0);
              const rev = mv.revenueBooking;
              const cogs = mv.supplierCost + mv.installations + mv.commissions + mv.shipping + mv.gasAllowance + mv.packagingSupplies + otherCogsSum;
              const gp = rev - cogs;
              return `<td>${formatPHP(gp)}</td>`;
            }).join('');
            return `<tr class="row-gross-profit">
              <td>Gross Profit</td>
              ${cells}
            </tr>`;
          };

          let html = '';

          // Net Profit & Gross Profit first
          html += renderNetProfitRow();
          html += renderGrossProfitRow();

          // Revenue Header
          html += `<tr class="row-group-header"><td>Revenue</td>${this.months.map(() => '<td></td>').join('')}</tr>`;
          html += rowHtml('Booking', (mv) => mv.revenueBooking, '', 1);

          // COGS Header
          html += `<tr class="row-group-header"><td>COGS</td>${this.months.map(() => '<td></td>').join('')}</tr>`;
          html += rowHtml('Supplier Cost', (mv) => mv.supplierCost, '', 1);
          html += rowHtml('Installations', (mv) => mv.installations, '', 1);
          html += rowHtml('Commissions', (mv) => mv.commissions, '', 1);
          html += rowHtml('Shipping', (mv) => mv.shipping, '', 1);
          html += rowHtml('Gas Allowance', (mv) => mv.gasAllowance, '', 1);
          html += rowHtml('Packaging Supplies', (mv) => mv.packagingSupplies, '', 1);

          // Additional future dynamic COGS items
          const allOtherCogsKeys = new Set();
          this.months.forEach(m => {
            Object.keys(monthlyValues[m.key].otherCogs).forEach(k => allOtherCogsKeys.add(k));
          });
          const sortedOtherCogs = [...allOtherCogsKeys].sort();
          sortedOtherCogs.forEach(item => {
            html += rowHtml(item, (mv) => mv.otherCogs[item] || 0, '', 1);
          });

          // OPEX Header
          html += `<tr class="row-group-header"><td>OPEX</td>${this.months.map(() => '<td></td>').join('')}</tr>`;
          html += rowHtml('Salaries', (mv) => mv.salaries, '', 1);
          html += rowHtml('Adjustments', (mv) => mv.adjustments, '', 1);
          html += rowHtml('Software & Apps', (mv) => mv.softwareApps, '', 1);

          // Admin Sub-section
          html += `<tr class="row-subgroup-header"><td class="indent-1">Admin</td>${this.months.map(() => '<td></td>').join('')}</tr>`;
          const allAdminKeys = new Set();
          this.months.forEach(m => {
            Object.keys(monthlyValues[m.key].admin.details).forEach(k => allAdminKeys.add(k));
          });
          const sortedAdmin = [...allAdminKeys].sort();
          sortedAdmin.forEach(item => {
            html += rowHtml(item, (mv) => mv.admin.details[item] || 0, '', 2);
          });

          // Marketing & Sales Sub-section
          html += `<tr class="row-subgroup-header"><td class="indent-1">Marketing &amp; Sales</td>${this.months.map(() => '<td></td>').join('')}</tr>`;
          const allMarketingKeys = new Set();
          this.months.forEach(m => {
            Object.keys(monthlyValues[m.key].marketingSales.details).forEach(k => allMarketingKeys.add(k));
          });
          const sortedMarketing = [...allMarketingKeys].sort();
          sortedMarketing.forEach(item => {
            html += rowHtml(item, (mv) => mv.marketingSales.details[item] || 0, '', 2);
          });

          // Operations & Support Sub-section
          html += `<tr class="row-subgroup-header"><td class="indent-1">Operations &amp; Support</td>${this.months.map(() => '<td></td>').join('')}</tr>`;
          const allOpsKeys = new Set();
          this.months.forEach(m => {
            Object.keys(monthlyValues[m.key].operationsSupport.details).forEach(k => allOpsKeys.add(k));
          });
          const sortedOps = [...allOpsKeys].sort();
          sortedOps.forEach(item => {
            html += rowHtml(item, (mv) => mv.operationsSupport.details[item] || 0, '', 2);
          });

          tbody.innerHTML = html;
        }
      };

      document.addEventListener('DOMContentLoaded', () => {
        PLApp.init();
      });
    })();
  </script>
</body>
</html>
