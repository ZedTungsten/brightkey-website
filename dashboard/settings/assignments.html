<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assignments Settings — BrightKey Admin</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg?v=2" />

  <link rel="stylesheet" href="shared.css">
  <style>
    /* Custom multiselect styling */
    .custom-multiselect {
      position: relative;
      display: inline-block;
      width: 100%;
      max-width: 320px;
    }
    .multiselect-btn {
      width: 100%;
      background: var(--bg-surface);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      font-size: 0.82rem;
      text-align: left;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      outline: none;
      box-shadow: var(--shadow-sm);
    }
    .multiselect-btn::after {
      content: "";
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 4px solid var(--text-muted);
      margin-left: 0.5rem;
    }
    .multiselect-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-top: 4px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 10;
      box-shadow: var(--shadow-lg);
      padding: 0.35rem 0;
    }
    .multiselect-dropdown.open {
      display: block;
    }
    .multiselect-option {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.4rem 0.75rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .multiselect-option:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    .multiselect-option input[type="checkbox"] {
      cursor: pointer;
      margin: 0;
    }
    .table-scroll, .card-table {
      overflow: visible !important;
    }
  </style>
</head>
<body>

  <div class="toast-container" id="toast-container"></div>

  <div class="dash-layout">
    <!-- Sidebar -->
    <aside class="dash-sidebar" id="dash-sidebar"></aside>

    <!-- Main Content -->
    <div class="dash-main">
      <!-- Top Bar -->
      <div class="top-bar">
        <span class="top-bar-title">Company Settings</span>
        <div style="flex:1;"></div>
        <span id="topbar-date" style="font-size: 0.85rem; font-weight: 500; color: var(--text-secondary);"></span>
      </div>

      <div class="content-area" style="height: calc(100vh - 56px); overflow: hidden;">
        <main class="main-panel">
          <!-- Tab navigation -->
          <div class="tabs-nav">
            <a class="tab-btn" href="/dashboard/settings/company">Company</a>
            <a class="tab-btn" href="/dashboard/settings/access">Access</a>
            <a class="tab-btn active" href="/dashboard/settings/assignments">Assignments</a>
            <a class="tab-btn" href="/dashboard/settings/logistics">Logistics</a>
            <a class="tab-btn" href="/dashboard/settings/sales">Sales</a>
            <a class="tab-btn" href="/dashboard/settings/hr">HR</a>
            <a class="tab-btn" href="/dashboard/settings/booking">Booking</a>
            <a class="tab-btn" href="/dashboard/settings/installers">Installers</a>
          </div>

          <div class="scroll-area">
            <!-- Assignments Content -->
            <div class="tab-panel active">
              <div class="panel-header">
                <div class="panel-title">Assignments</div>
              </div>

              <div class="table-scroll">
                <div class="card-table">
                  <table class="assign-table">
                    <thead>
                      <tr>
                        <th style="width: 220px;">Assignment Name</th>
                        <th>Visibility</th>
                        <th style="width: 60px;"></th>
                      </tr>
                    </thead>
                    <tbody id="assignments-tbody">
                      <tr><td colspan="3" class="empty-state">Loading assignments...</td></tr>
                    </tbody>
                  </table>
                  <div style="padding: 0.85rem 1.25rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; background: var(--bg-surface);">
                    <button class="btn btn-primary" onclick="addAssignment()">+ Add Assignment</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>
  <script src="../../js/main.js"></script>
  <script src="shared.js"></script>
  <script>
    'use strict';

    let assignments = [];
    const VISIBILITY_OPTIONS = [
      { key: 'booking.door_specifications', label: 'Booking › Door Specifications' },
      { key: 'sales.commissions', label: 'Sales › Commissions' },
      { key: 'warehouse.member', label: 'Warehouse Member' }
    ];
    const showToast = (msg, isError) => SettingsPage.showToast(msg, isError);

    window.initSettingsPage = async function() {
      await loadAssignments();
    };

    async function loadAssignments() {
      const tbody = document.getElementById('assignments-tbody');
      if (!tbody) return;
      tbody.innerHTML = '<tr><td colspan="3" class="empty-state">Loading assignments…</td></tr>';
      try {
        const { data, error } = await sb.from('employee_assignments').select('*').eq('company_id', currentCompanyId).order('created_at', { ascending: true });
        if (error) throw error;
        assignments = (data || []).map(r => ({ id: r.id, name: r.name, visibility: Array.isArray(r.visibility) ? r.visibility : [] }));
        renderAssignments();
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="3" class="empty-state" style="color:var(--danger);">Failed to load: ${e.message}</td></tr>`;
      }
    }

    function renderAssignments() {
      const tbody = document.getElementById('assignments-tbody');
      if (!tbody) return;
      if (assignments.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" class="empty-state">No assignments yet. Click "+ Add Assignment" to create one.</td></tr>';
        return;
      }
      tbody.innerHTML = assignments.map((a, idx) => {
        const selectedLabels = VISIBILITY_OPTIONS
          .filter(opt => a.visibility.includes(opt.key))
          .map(opt => opt.label.split(' › ').pop())
          .join(', ') || 'Select Visibility';
          
        const optionsHtml = VISIBILITY_OPTIONS.map(opt => {
          const isChecked = a.visibility.includes(opt.key);
          return `
            <div class="multiselect-option" onclick="event.stopPropagation(); window.toggleOptionCheckbox(this)">
              <input type="checkbox" value="${opt.key}" ${isChecked ? 'checked' : ''} onchange="toggleVisibility(${idx}, '${opt.key}', this.checked)" onclick="event.stopPropagation()" />
              <span>${escapeHtml(opt.label)}</span>
            </div>
          `;
        }).join('');

        return `
          <tr>
            <td><input type="text" class="form-input" value="${escapeHtml(a.name)}" oninput="assignments[${idx}].name = this.value" onblur="autosaveAssignment(${idx})" onchange="autosaveAssignment(${idx})" placeholder="e.g. Installer" style="max-width: 200px;" /></td>
            <td>
              <div class="custom-multiselect" id="vis-select-${idx}">
                <button type="button" class="multiselect-btn" onclick="toggleDropdown(${idx}, event)">
                  ${escapeHtml(selectedLabels)}
                </button>
                <div class="multiselect-dropdown" id="vis-dropdown-${idx}">
                  ${optionsHtml}
                </div>
              </div>
            </td>
            <td><button class="btn btn-danger btn-sm" onclick="deleteAssignment(${idx}, '${a.id || ''}')" title="Delete assignment" style="padding: 0.35rem 0.55rem;"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button></td>
          </tr>
        `;
      }).join('');
    }

    window.toggleOptionCheckbox = function(optionDiv) {
      const chk = optionDiv.querySelector('input[type="checkbox"]');
      if (chk) {
        chk.checked = !chk.checked;
        chk.dispatchEvent(new Event('change'));
      }
    };

    window.toggleDropdown = function(idx, event) {
      event.stopPropagation();
      const dropdown = document.getElementById(`vis-dropdown-${idx}`);
      const isOpen = dropdown.classList.contains('open');
      
      document.querySelectorAll('.multiselect-dropdown').forEach(d => d.classList.remove('open'));
      
      if (!isOpen) {
        dropdown.classList.add('open');
      }
    };

    window.addEventListener('click', () => {
      document.querySelectorAll('.multiselect-dropdown').forEach(d => d.classList.remove('open'));
    });

    window.addAssignment = function() {
      assignments.push({ id: null, name: '', visibility: [] });
      renderAssignments();
      const inputs = document.querySelectorAll('#assignments-tbody input[type="text"]');
      if (inputs.length) inputs[inputs.length - 1].focus();
    };

    window.toggleVisibility = function(idx, key, checked) {
      const vis = assignments[idx].visibility;
      if (checked && !vis.includes(key)) vis.push(key);
      if (!checked) assignments[idx].visibility = vis.filter(v => v !== key);
      
      const btn = document.querySelector(`#vis-select-${idx} .multiselect-btn`);
      if (btn) {
        const selectedLabels = VISIBILITY_OPTIONS
          .filter(opt => vis.includes(opt.key))
          .map(opt => opt.label.split(' › ').pop())
          .join(', ') || 'Select Visibility';
        btn.textContent = selectedLabels;
      }

      autosaveAssignment(idx);
    };

    window.deleteAssignment = async function(idx, id) {
      if (id) {
        try {
          const { error } = await sb.from('employee_assignments').delete().eq('id', id);
          if (error) throw error;
        } catch (e) {
          showToast('Delete failed: ' + e.message, true);
          return;
        }
      }
      assignments.splice(idx, 1);
      renderAssignments();
      showToast('Assignment removed.');
    };

    window.autosaveAssignment = async function(idx) {
      const a = assignments[idx];
      if (!a) return;
      const nameTrimmed = (a.name || '').trim();
      
      if (!a.id && !nameTrimmed) return; // don't save a blank unsaved row yet
      
      if (!nameTrimmed) {
        showToast('Assignment name cannot be empty.', true);
        return;
      }
      
      try {
        if (a.id) {
          const { error } = await sb.from('employee_assignments')
            .update({ name: nameTrimmed, visibility: a.visibility })
            .eq('id', a.id);
          if (error) throw error;
        } else {
          const { data, error } = await sb.from('employee_assignments')
            .insert([{ company_id: currentCompanyId, name: nameTrimmed, visibility: a.visibility }])
            .select()
            .single();
          if (error) throw error;
          a.id = data.id;
        }
        showToast('Autosaved.');
      } catch (e) {
        showToast('Autosave failed: ' + e.message, true);
      }
    };

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
