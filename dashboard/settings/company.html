<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company Settings — BrightKey Admin</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg?v=2" />

  <link rel="stylesheet" href="shared.css">
</head>
<body>

  <div class="toast-container" id="toast-container"></div>

  <div class="dash-layout">
    <!-- Sidebar -->
    <aside class="dash-sidebar" id="dash-sidebar"></aside>

    <!-- Main Content -->
    <div class="dash-main">
      <!-- Top Bar -->
      <div class="top-bar">
        <span class="top-bar-title">Company Settings</span>
        <div style="flex:1;"></div>
        <span id="topbar-date" style="font-size: 0.85rem; font-weight: 500; color: var(--text-secondary);"></span>
      </div>

      <div class="content-area" style="height: calc(100vh - 56px); overflow: hidden;">
        <main class="main-panel">
          <!-- Tab navigation -->
          <div class="tabs-nav">
            <a class="tab-btn active" href="/dashboard/settings/company">Company</a>
            <a class="tab-btn" href="/dashboard/settings/access">Access</a>
            <a class="tab-btn" href="/dashboard/settings/assignments">Assignments</a>
            <a class="tab-btn" href="/dashboard/settings/logistics">Logistics</a>
            <a class="tab-btn" href="/dashboard/settings/sales">Sales</a>
            <a class="tab-btn" href="/dashboard/settings/hr">HR</a>
            <a class="tab-btn" href="/dashboard/settings/booking">Booking</a>
            <a class="tab-btn" href="/dashboard/settings/installers">Installers</a>
          </div>

          <div class="scroll-area">
            <!-- Company Content -->
            <div class="tab-panel active">
              <div class="panel-header">
                <div class="panel-title">Company Configuration</div>
                <button class="btn btn-primary" onclick="saveCompanySettings()">Save Company Settings</button>
              </div>

              <!-- Company Skeleton Loader -->
              <div id="company-skeleton" class="table-scroll">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; align-items: start; margin-bottom: 1.5rem;">
                  <!-- Left Column: Company Information Skeleton -->
                  <div class="wh-card" style="padding: 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px;">
                    <div class="skeleton" style="height: 18px; width: 140px; margin-bottom: 0.5rem;"></div>
                    <div style="display: flex; flex-direction: column; gap: 0.4rem;">
                      <div class="skeleton" style="height: 12px; width: 80px;"></div>
                      <div class="skeleton" style="height: 38px; width: 100%;"></div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Company Actual Content -->
              <div id="company-content" class="table-scroll" style="display: none;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; align-items: start; margin-bottom: 1.5rem;">
                  <!-- Left Column -->
                  <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <!-- Company Information -->
                    <div class="wh-card" style="padding: 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px;">
                      <h3 style="font-size: 0.95rem; font-weight: 700; color: var(--text-primary); border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 0.5rem;">Company Information</h3>
                      
                      <div class="form-group">
                        <label class="form-label" for="company-name">Company Name</label>
                        <input type="text" id="company-name" class="form-input" placeholder="e.g. BrightKey Solutions" />
                      </div>
                      
                      <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                          <label class="form-label" for="company-address-line1">Address Line 1</label>
                          <input type="text" id="company-address-line1" class="form-input" placeholder="e.g. 123 Business Road, Suite 100" />
                        </div>
                        <div class="form-group">
                          <label class="form-label" for="company-address-line2">Address Line 2</label>
                          <input type="text" id="company-address-line2" class="form-input" placeholder="e.g. Quezon City, Metro Manila" />
                        </div>
                      </div>
                      
                      <div class="form-group">
                        <label class="form-label" for="company-email">Email</label>
                        <input type="email" id="company-email" class="form-input" placeholder="e.g. contact@company.com" />
                      </div>
   
                      <div class="form-group">
                        <label class="form-label" for="company-phone">Phone Number</label>
                        <input type="text" id="company-phone" class="form-input" placeholder="e.g. +63 917 123 4567" />
                      </div>

                      <div class="form-group">
                        <label class="form-label" for="company-website">Website</label>
                        <input type="text" id="company-website" class="form-input" placeholder="e.g. https://brightkeysolutions.com" />
                      </div>
                    </div>

                    <!-- Social Links -->
                    <div class="wh-card" style="padding: 1.5rem; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px;">
                      <h3 style="font-size: 0.95rem; font-weight: 700; color: var(--text-primary); border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 1rem;">Social Profile Links</h3>
                      
                      <div id="social-links-list" style="display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1rem;">
                        <!-- Dynamic list elements go here -->
                      </div>

                      <div style="display: flex; gap: 0.5rem; align-items: center; border-top: 1px solid var(--border); padding-top: 1rem;">
                        <select id="social-platform-select" class="form-select" style="flex: 1; padding: 0.55rem 0.75rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-surface); color: var(--text-primary);">
                          <option value="Facebook">Facebook</option>
                          <option value="Messenger">Messenger</option>
                          <option value="Instagram">Instagram</option>
                          <option value="X">X (Twitter)</option>
                          <option value="LinkedIn">LinkedIn</option>
                          <option value="Tiktok">Tiktok</option>
                          <option value="YouTube">YouTube</option>
                          <option value="Pinterest">Pinterest</option>
                          <option value="Amazon">Amazon</option>
                          <option value="Medium">Medium</option>
                        </select>
                        <button class="btn btn-outline" onclick="addSocialLinkRow()" type="button">+ Add Social</button>
                      </div>
                    </div>
                  </div>

                  <!-- Right Column -->
                  <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <!-- Brand Logos -->
                    <div class="wh-card" style="padding: 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px;">
                      <h3 style="font-size: 0.95rem; font-weight: 700; color: var(--text-primary); border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 0.5rem;">Brand Logos</h3>
                      
                      <div style="display:flex; flex-direction: column; gap: 1.5rem;">
                        <div class="form-group">
                          <label class="form-label" for="company-logo-light-file">Light Logo</label>
                          <input type="file" id="company-logo-light-file" class="form-input" accept="image/*" onchange="handleLogoUpload(event, 'light')" />
                          <div id="company-logo-light-preview" style="margin-top: 0.75rem; display: none;">
                            <span style="font-size: 0.65rem; color: var(--text-muted); display: block; margin-bottom: 0.4rem;">Light Logo Preview:</span>
                            <div style="background: #000000; border: 1px dashed var(--border); padding: 8px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center;">
                              <img id="company-logo-light-img" src="" alt="Light Logo" style="max-height: 48px; object-fit: contain;" />
                            </div>
                          </div>
                        </div>
                        
                        <div class="form-group">
                          <label class="form-label" for="company-logo-dark-file">Dark Logo</label>
                          <input type="file" id="company-logo-dark-file" class="form-input" accept="image/*" onchange="handleLogoUpload(event, 'dark')" />
                          <div id="company-logo-dark-preview" style="margin-top: 0.75rem; display: none;">
                            <span style="font-size: 0.65rem; color: var(--text-muted); display: block; margin-bottom: 0.4rem;">Dark Logo Preview:</span>
                            <div style="background: #ffffff; border: 1px dashed var(--border); padding: 8px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center;">
                              <img id="company-logo-dark-img" src="" alt="Dark Logo" style="max-height: 48px; object-fit: contain;" />
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>
  <script src="../../js/main.js"></script>
  <script src="shared.js"></script>
  <script>
    'use strict';

    window.companyLogoLight = '';
    window.companyLogoDark = '';

    window.initSettingsPage = async function() {
      await loadCompanySettings();
    };

    window.handleLogoUpload = function(event, theme) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const base64Url = e.target.result;
        if (theme === 'light') {
          window.companyLogoLight = base64Url;
          const imgEl = document.getElementById('company-logo-light-img');
          const prevEl = document.getElementById('company-logo-light-preview');
          if (imgEl) imgEl.src = base64Url;
          if (prevEl) prevEl.style.display = 'block';
        } else {
          window.companyLogoDark = base64Url;
          const imgEl = document.getElementById('company-logo-dark-img');
          const prevEl = document.getElementById('company-logo-dark-preview');
          if (imgEl) imgEl.src = base64Url;
          if (prevEl) prevEl.style.display = 'block';
        }
      };
      reader.readAsDataURL(file);
    };

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    window.addSocialLinkRow = function(platform = '', url = '') {
      const list = document.getElementById('social-links-list');
      const selectedPlatform = platform || document.getElementById('social-platform-select').value;
      
      const rowId = 'social-row-' + Date.now() + Math.random().toString(36).substr(2, 5);

      const row = document.createElement('div');
      row.className = 'social-link-row';
      row.id = rowId;
      row.setAttribute('data-platform', selectedPlatform);
      row.style.display = 'flex';
      row.style.alignItems = 'center';
      row.style.gap = '0.5rem';

      row.innerHTML = `
        <div style="width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: var(--bg-base); border: 1px solid var(--border); border-radius: 6px;" title="${selectedPlatform}">
          ${window.SocialIcons[selectedPlatform] || ''}
        </div>
        <span style="font-size: 0.78rem; font-weight: 600; width: 80px; color: var(--text-secondary); text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">${selectedPlatform}</span>
        <input type="text" class="form-input social-url-input" style="flex: 1; padding: 0.45rem 0.6rem; font-size: 0.8rem;" placeholder="Profile URL, e.g. https://${selectedPlatform.toLowerCase()}.com/username" value="${esc(url)}" />
        <button class="btn btn-outline" style="padding: 0.45rem; color: var(--danger); border-color: var(--border);" onclick="document.getElementById('${rowId}').remove()" type="button">&times;</button>
      `;
      list.appendChild(row);
    };

    window.saveCompanySettings = async function() {
      const name = document.getElementById('company-name')?.value || '';
      const address1 = document.getElementById('company-address-line1')?.value || '';
      const address2 = document.getElementById('company-address-line2')?.value || '';
      const email = document.getElementById('company-email')?.value || '';
      const phone = document.getElementById('company-phone')?.value || '';
      const website = document.getElementById('company-website')?.value || '';
      
      const socialLinks = [];
      const rows = document.querySelectorAll('.social-link-row');
      rows.forEach(r => {
        const platform = r.getAttribute('data-platform');
        const url = r.querySelector('.social-url-input')?.value.trim() || '';
        if (url) {
          socialLinks.push({ platform, url });
        }
      });

      try {
        const { error } = await sb.from('global_settings').upsert({
          key: 'company_profile_config',
          company_id: currentCompanyId,
          value: {
            companyName: name,
            companyAddressLine1: address1,
            companyAddressLine2: address2,
            email: email,
            phone: phone,
            website: website,
            socialLinks: socialLinks,
            logoLight: window.companyLogoLight || '',
            logoDark: window.companyLogoDark || ''
          }
        });
        if (error) throw error;
        SettingsPage.showToast('Company profile settings saved successfully.');
      } catch (err) {
        console.error(err);
        SettingsPage.showToast('Failed to save company settings.', true);
      }
    };

    async function loadCompanySettings() {
      try {
        const { data, error } = await sb
          .from('global_settings')
          .select('value')
          .eq('key', 'company_profile_config')
          .eq('company_id', currentCompanyId)
          .maybeSingle();

        if (error) throw error;
        
        const config = data?.value || {};
        const nameEl = document.getElementById('company-name');
        if (nameEl) nameEl.value = config.companyName || '';
        const address1El = document.getElementById('company-address-line1');
        if (address1El) address1El.value = config.companyAddressLine1 || '';
        const address2El = document.getElementById('company-address-line2');
        if (address2El) address2El.value = config.companyAddressLine2 || '';
        const emailEl = document.getElementById('company-email');
        if (emailEl) emailEl.value = config.email || '';
        const phoneEl = document.getElementById('company-phone');
        if (phoneEl) phoneEl.value = config.phone || '';
        const websiteEl = document.getElementById('company-website');
        if (websiteEl) websiteEl.value = config.website || '';

        // Clear and populate social links
        const list = document.getElementById('social-links-list');
        if (list) {
          list.innerHTML = '';
          const savedLinks = config.socialLinks || [];
          savedLinks.forEach(item => {
            window.addSocialLinkRow(item.platform, item.url);
          });
        }

        window.companyLogoLight = config.logoLight || '';
        window.companyLogoDark = config.logoDark || '';

        const logoLightImg = document.getElementById('company-logo-light-img');
        const logoLightPrev = document.getElementById('company-logo-light-preview');
        if (window.companyLogoLight) {
          if (logoLightImg) logoLightImg.src = window.companyLogoLight;
          if (logoLightPrev) logoLightPrev.style.display = 'block';
        } else {
          if (logoLightPrev) logoLightPrev.style.display = 'none';
        }

        const logoDarkImg = document.getElementById('company-logo-dark-img');
        const logoDarkPrev = document.getElementById('company-logo-dark-preview');
        if (window.companyLogoDark) {
          if (logoDarkImg) logoDarkImg.src = window.companyLogoDark;
          if (logoDarkPrev) logoDarkPrev.style.display = 'block';
        } else {
          if (logoDarkPrev) logoDarkPrev.style.display = 'none';
        }
      } catch (err) {
        console.error('Error loading company settings:', err);
      } finally {
        const skeleton = document.getElementById('company-skeleton');
        const content = document.getElementById('company-content');
        if (skeleton) skeleton.style.display = 'none';
        if (content) content.style.display = 'block';
      }
    }
  </script>
</body>
</html>
