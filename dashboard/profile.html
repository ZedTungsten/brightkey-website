<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — BrightKey</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg?v=2" />

  <style>
    :root {
      --bg-base: #FAFAFA;
      --bg-surface: #FFFFFF;
      --bg-elevated: #F4F4F5;
      --bg-card: #FFFFFF;
      --border: #E4E4E7;
      --border-hover: #D4D4D8;
      --text-primary: #09090B;
      --text-secondary: #52525B;
      --text-muted: #A1A1AA;
      --cyan: #06B6D4;
      --cyan-light: #0891B2;
      --cyan-dim: rgba(6,182,212,0.10);
      --cyan-border: rgba(6,182,212,0.22);
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F59E0B;
      --font: 'Commissioner', system-ui, -apple-system, sans-serif;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.10);
      --ease: cubic-bezier(0.16,1,0.3,1);
    }

    body {
      font-family: var(--font);
      background: var(--bg-base);
      color: var(--text-secondary);
      min-height: 100vh;
    }

    .dash-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 100vh;
      transition: grid-template-columns 0.3s var(--ease);
    }
    .dash-layout.sidebar-minimized {
      grid-template-columns: 64px 1fr;
    }

    .dash-main {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-y: auto;
    }

    /* ── Cover Banner ── */
    .profile-cover-banner {
      height: 260px;
      position: relative;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #0891B2; /* Fallback cyan */
      display: flex;
      align-items: flex-end;
      padding: 2rem;
      transition: background-image 0.3s var(--ease);
    }

    .cover-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.5) 100%);
      z-index: 1;
    }

    .cover-actions-wrapper {
      position: absolute;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 5;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .btn-cover-action {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #09090B;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.2s var(--ease);
    }
    .btn-cover-action:hover {
      background: #ffffff;
      transform: translateY(-1px);
    }

    /* Round color theme picker buttons */
    .theme-circle {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.4);
      transition: transform 0.15s, border-color 0.15s;
    }
    .theme-circle:hover {
      transform: scale(1.15);
    }
    .theme-circle.active {
      border-color: var(--cyan);
      box-shadow: 0 0 0 1px #fff;
    }
    .theme-circle-white {
      background-color: #ffffff;
    }
    .theme-circle-black {
      background-color: #09090b;
    }

    .cover-info-overlay {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      width: 100%;
      align-items: flex-end;
    }

    .cover-text {
      color: #ffffff;
      font-family: var(--font);
    }
    .cover-text.text-black {
      color: #09090B !important;
    }
    .cover-text.text-black .cover-datetime {
      opacity: 0.75;
    }
    
    .cover-greeting {
      font-size: 1.65rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }
    
    .cover-datetime {
      font-size: 0.95rem;
      font-weight: 500;
      opacity: 0.9;
      margin-top: 0.25rem;
    }

    .cover-datetime-wrapper {
      text-align: right;
      color: #ffffff;
    }
    .cover-text.text-black + .cover-datetime-wrapper {
      color: #09090B !important;
    }

    /* ── Columns Grid ── */
    .profile-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 2rem;
      padding: 0 2rem 3rem 2rem;
      margin-top: -50px; /* Overlaps with banner */
      position: relative;
      z-index: 10;
    }

    @media (max-width: 992px) {
      .profile-grid {
        grid-template-columns: 1fr;
        margin-top: -40px;
      }
    }

    /* ── Left Profile Card ── */
    .profile-card-left {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      height: fit-content;
    }

    .avatar-wrapper {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 1.25rem;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--bg-surface);
      box-shadow: var(--shadow-sm);
      background: var(--bg-elevated);
      display: grid;
      place-items: center;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--cyan);
    }

    .btn-avatar-upload {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--cyan);
      border: 3px solid var(--bg-surface);
      color: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: all 0.15s;
    }
    .btn-avatar-upload:hover {
      background: var(--cyan-light);
      transform: scale(1.08);
    }
    .btn-avatar-upload svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.5;
    }

    .profile-name {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    
    .profile-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0.25rem;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 1.5rem 0;
    }

    /* Status section */
    .status-section {
      width: 100%;
      text-align: left;
    }
    .status-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      display: block;
    }
    .status-display-wrapper {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.25rem 0;
      gap: 0.75rem;
    }
    .status-display-text {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.5;
      word-break: break-word;
      flex: 1;
      font-style: italic;
    }
    .status-edit-trigger-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
    }
    .status-edit-trigger-btn:hover {
      color: var(--cyan);
    }
    
    .status-edit-box {
      display: none;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.25rem 0;
    }
    .status-textarea {
      flex: 1;
      height: 40px;
      padding: 0.4rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 0.82rem;
      resize: none;
      outline: none;
      background: var(--bg-surface);
    }
    .status-textarea:focus {
      border-color: var(--cyan);
    }
    .status-edit-actions {
      display: flex;
      gap: 0.25rem;
    }
    .status-btn-action {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      transition: background 0.15s;
    }
    .status-btn-action-confirm {
      color: var(--success);
    }
    .status-btn-action-confirm:hover {
      background: rgba(16, 185, 129, 0.08);
    }
    .status-btn-action-cancel {
      color: var(--danger);
    }
    .status-btn-action-cancel:hover {
      background: rgba(239, 68, 68, 0.08);
    }
    
    /* Text Color Preference toggler */
    .preference-toggle-section {
      width: 100%;
      text-align: left;
      margin-top: 1.25rem;
    }

    /* ── Right Details Card ── */
    .profile-card-right {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .tabs-header {
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      gap: 1.5rem;
    }
    .profile-tab {
      padding: 1rem 0;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .profile-tab.active {
      color: var(--cyan-light);
      border-bottom-color: var(--cyan);
    }

    .tab-content {
      padding: 2rem 2.25rem;
      flex: 1;
    }

    /* Grid Form */
    .details-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem 1.5rem;
    }
    @media (max-width: 576px) {
      .details-form-grid {
        grid-template-columns: 1fr;
      }
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .form-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }
    .form-input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-elevated);
      color: var(--text-secondary);
      font-family: var(--font);
      font-size: 0.875rem;
      outline: none;
      transition: all 0.15s;
    }
    .form-input:disabled {
      cursor: not-allowed;
      opacity: 1; /* prevent browser default opacity drop */
      color: #71717a !important; /* unified distinct disabled gray */
      -webkit-text-fill-color: #71717a !important; /* safari support */
    }
    .form-input:focus:not(:disabled) {
      border-color: var(--cyan);
      background: var(--bg-surface);
    }

    /* Banners */
    .info-banner {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1.25rem;
      border-radius: var(--radius-sm);
      font-size: 0.82rem;
      margin-bottom: 1.5rem;
      line-height: 1.4;
      border: 1px solid transparent;
    }
    .info-banner-warning {
      background: rgba(245, 158, 11, 0.08);
      border-color: rgba(245, 158, 11, 0.2);
      color: #D97706;
    }
    .info-banner-success {
      background: rgba(16, 185, 129, 0.08);
      border-color: rgba(16, 185, 129, 0.2);
      color: #059669;
    }
    .info-banner-danger {
      background: rgba(239, 68, 68, 0.08);
      border-color: rgba(239, 68, 68, 0.2);
      color: #DC2626;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.65rem 1.25rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .btn-primary {
      background: var(--cyan);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--cyan-light);
    }
    .btn-outline {
      border-color: var(--border);
      background: transparent;
      color: var(--text-secondary);
    }
    .btn-outline:hover {
      border-color: var(--border-hover);
      color: var(--text-primary);
    }
    .btn-sm {
      padding: 0.4rem 0.85rem;
      font-size: 0.78rem;
    }
    .btn-group-right {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      margin-top: 2rem;
    }

    /* Modal dialog */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(9, 9, 11, 0.4);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open {
      display: flex;
    }
    .modal-box {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      width: 420px;
      max-width: 90%;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
  </style>
</head>
<body>

  <div class="dash-layout">
    <!-- Sidebar -->
    <aside class="dash-sidebar" id="dash-sidebar"></aside>

    <!-- Main Content -->
    <div class="dash-main">
      
      <!-- Cover Banner -->
      <div class="profile-cover-banner" id="cover-banner">
        <div class="cover-overlay" style="position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.4) 100%); z-index: 1;"></div>
        
        <!-- Top Left Info Header Block -->
        <div style="position: absolute; top: 1.5rem; left: 2rem; z-index: 5; display: flex; flex-direction: column; align-items: flex-start; gap: 0.75rem;">
          <div class="cover-text" id="cover-text-elements" style="text-align: left;">
            <div class="cover-greeting" id="cover-greeting" style="font-size: 1.6rem; font-weight: 800; margin: 0; letter-spacing: -0.03em; line-height: 1.2;">Welcome back!</div>
          </div>
          
          <!-- Edit Cover Photo Action Button -->
          <div class="cover-actions-wrapper" style="position: static; display: flex; gap: 0.75rem; align-items: center;">
            <label class="btn-cover-action" title="Upload Cover Photo" style="margin: 0;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              <span>Change Cover</span>
              <input type="file" accept="image/*" style="display:none;" id="cover-upload-input" onchange="App.uploadCoverPhoto(this)" />
            </label>
          </div>
        </div>

        <!-- Top Right Datetime and Theme Dots (simulation of home dashboard layout) -->
        <div style="position: absolute; top: 1.5rem; right: 1.5rem; z-index: 5; display: flex; flex-direction: column; align-items: flex-end; gap: 0.4rem; font-family: var(--font);">
          <div class="cover-datetime-wrapper" style="text-align: right;">
            <div id="cover-current-date" style="font-size: 0.95rem; font-weight: 700;"></div>
            <div id="cover-current-time" style="font-size: 1.25rem; font-weight: 800; margin-top: 0.1rem; letter-spacing: -0.02em;"></div>
          </div>
          <!-- Tiny round color theme togglers below datetime -->
          <div style="display: flex; gap: 0.4rem; align-items: center;">
            <div class="theme-circle theme-circle-white" id="btn-text-white" onclick="App.setTextColorPreference('white')" title="White text"></div>
            <div class="theme-circle theme-circle-black" id="btn-text-black" onclick="App.setTextColorPreference('black')" title="Black text"></div>
          </div>
        </div>
      </div>

      <!-- Main Profile Grid -->
      <div class="profile-grid">
        
        <!-- Left Sidebar Card -->
        <div class="profile-card-left">
          <div class="avatar-wrapper">
            <div class="avatar-img" id="avatar-container">?</div>
            <label class="btn-avatar-upload" title="Upload Profile Picture">
              <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              <input type="file" accept="image/*" style="display:none;" onchange="App.uploadAvatar(this)" />
            </label>
          </div>

          <div class="profile-name" id="display-fullname">Loading…</div>
          <div class="profile-title" id="display-title">—</div>

          <div class="divider"></div>

          <!-- Status Section -->
          <div class="status-section">
            <span class="status-label">What's on your mind?</span>
            
            <!-- Read-only display mode -->
            <div class="status-display-wrapper" id="status-display-wrapper">
              <span class="status-display-text" id="status-display-box">"Click here to write status message…"</span>
              <button class="status-edit-trigger-btn" onclick="App.editStatus()" title="Edit Status">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
              </button>
            </div>
            
            <!-- Inline Edit mode -->
            <div class="status-edit-box" id="status-edit-box">
              <textarea class="status-textarea" id="status-textarea" maxlength="150" placeholder="What are you up to? (150 chars max)"></textarea>
              <div class="status-edit-actions">
                <!-- Check mark confirm -->
                <button class="status-btn-action status-btn-action-confirm" onclick="App.saveStatus()" title="Confirm changes">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </button>
                <!-- X mark cancel -->
                <button class="status-btn-action status-btn-action-cancel" onclick="App.cancelStatus()" title="Cancel">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Right Form Card -->
        <div class="profile-card-right">
          <div class="tabs-header">
            <button class="profile-tab active" id="tab-btn-settings" onclick="App.switchTab('settings')">Account Settings</button>
            <button class="profile-tab" id="tab-btn-employment" onclick="App.switchTab('employment')">Employment Details</button>
          </div>

          <div class="tab-content" id="tab-content-settings">
            
            <!-- Pending Update Info Banner -->
            <div id="request-banner" class="info-banner" style="display:none;"></div>

            <form id="profile-form" onsubmit="App.submitUpdateRequest(event)">
              <div class="details-form-grid">
                
                <div class="form-group">
                  <label class="form-label" for="inp-firstname">First Name</label>
                  <input type="text" id="inp-firstname" class="form-input" disabled required />
                </div>
                
                <div class="form-group">
                  <label class="form-label" for="inp-lastname">Last Name</label>
                  <input type="text" id="inp-lastname" class="form-input" disabled required />
                </div>
                
                <div class="form-group">
                  <label class="form-label" for="inp-email">Email Address</label>
                  <input type="email" id="inp-email" class="form-input" disabled required />
                </div>
                
                <div class="form-group">
                  <label class="form-label" for="inp-contact">Contact Number</label>
                  <input type="text" id="inp-contact" class="form-input" disabled required />
                </div>

                <div class="form-group">
                  <label class="form-label" for="inp-dob">Date of Birth</label>
                  <input type="date" id="inp-dob" class="form-input" disabled required />
                </div>

                <div class="form-group">
                  <label class="form-label" for="inp-address">Home Address</label>
                  <input type="text" id="inp-address" class="form-input" disabled required />
                </div>

                <div class="form-group">
                  <label class="form-label" for="inp-emergency-num">Emergency Contact Number</label>
                  <input type="text" id="inp-emergency-num" class="form-input" disabled required />
                </div>

                <div class="form-group">
                  <label class="form-label" for="inp-tin">TIN Number</label>
                  <input type="text" id="inp-tin" class="form-input" disabled />
                </div>

                <div class="form-group">
                  <label class="form-label" for="inp-sss">SSS Number</label>
                  <input type="text" id="inp-sss" class="form-input" disabled />
                </div>

                <div class="form-group">
                  <label class="form-label" for="inp-philhealth">PhilHealth Number</label>
                  <input type="text" id="inp-philhealth" class="form-input" disabled />
                </div>

                <div class="form-group">
                  <label class="form-label" for="inp-pagibig">HDMF Pag-IBIG</label>
                  <input type="text" id="inp-pagibig" class="form-input" disabled />
                </div>
                
              </div>

              <div class="btn-group-right">
                <button type="button" class="btn btn-outline" id="btn-edit" onclick="App.enableEditMode()">Edit Directory Info</button>
                <button type="button" class="btn btn-outline" id="btn-cancel" onclick="App.disableEditMode()" style="display:none;">Cancel</button>
                <button type="submit" class="btn btn-primary" id="btn-submit" style="display:none;">Request to Update</button>
              </div>
            </form>
          </div>

          <div class="tab-content" id="tab-content-employment" style="display: none;">
            <div class="details-form-grid">
              
              <div class="form-group">
                <label class="form-label">Department - Title/Position</label>
                <input type="text" id="emp-dept-position" class="form-input" disabled />
              </div>
              
              <div class="form-group">
                <label class="form-label">Reporting To</label>
                <input type="text" id="emp-reporting-to" class="form-input" disabled />
              </div>
              
              <div class="form-group">
                <label class="form-label">Salary</label>
                <input type="text" id="emp-salary" class="form-input" disabled />
              </div>
              
              <div class="form-group">
                <label class="form-label">Date Hired</label>
                <input type="text" id="emp-date-hired" class="form-input" disabled />
              </div>

              <div class="form-group">
                <label class="form-label">Shift Days / Time Range</label>
                <input type="text" id="emp-shift" class="form-input" disabled />
              </div>

              <div class="form-group">
                <label class="form-label">Work Email</label>
                <input type="text" id="emp-work-email" class="form-input" disabled />
              </div>

              <div class="form-group" style="grid-column: span 2;">
                <label class="form-label">Job Description</label>
                <textarea id="emp-job-desc" class="form-input" style="height: 100px; resize: vertical;" disabled></textarea>
              </div>

              <div class="form-group" style="grid-column: span 2;" id="emp-id-link-group">
                <label class="form-label">ID Link</label>
                <div id="emp-id-link-container" style="padding: 0.5rem 0;">-</div>
              </div>

            </div>
          </div>
        </div>

      </div>

    </div>
  </div>

  <div id="toast-container" aria-live="polite" style="position:fixed; bottom:20px; right:20px; display:flex; flex-direction:column; gap:0.5rem; z-index:9999;"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script>
    'use strict';

    function showToast(msg, isError = false) {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const el = document.createElement('div');
      el.className = `toast toast-${isError ? 'error' : 'success'}`;
      el.textContent = msg;
      container.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    function formatDateTime() {
      const dateEl = document.getElementById('cover-current-date');
      const timeEl = document.getElementById('cover-current-time');
      if (!dateEl || !timeEl) return;
      const d = new Date();
      const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const dayName = days[d.getDay()];
      const monthName = months[d.getMonth()];
      const dayNum = String(d.getDate()).padStart(2, '0');
      const year = d.getFullYear();
      
      dateEl.textContent = `${dayName} ${monthName} ${dayNum}, ${year}`;
      
      let hours = d.getHours();
      const minutes = String(d.getMinutes()).padStart(2, '0');
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12;
      hours = hours ? hours : 12;
      const hoursStr = String(hours).padStart(2, '0');
      
      timeEl.textContent = `${hoursStr}:${minutes} ${ampm}`;
    }

    const App = {
      sb: null,
      currentUser: null,
      tenantId: null,
      companyId: null,
      employeeData: null,
      activeTab: 'settings',
      editMode: false,

      async init() {
        formatDateTime();
        setInterval(formatDateTime, 1000);

        const authInfo = await BKAuth.requireAuth('../admin.html');
        if (!authInfo) return;

        this.sb = BKAuth.sb;
        this.currentUser = authInfo;

        const roleInfo = await BKAuth.getUserRole();
        if (roleInfo) {
          this.tenantId = roleInfo.tenantId;
          const { data: co } = await this.sb.from('companies').select('id').eq('tenant_id', this.tenantId).limit(1).maybeSingle();
          this.companyId = co?.id;
        }

        await this.loadProfile();
        await this.loadPendingRequestBanner();
      },

      async loadProfile() {
        try {
          const { data: emp, error } = await this.sb
            .from('employees')
            .select('*')
            .eq('id', this.currentUser.id)
            .maybeSingle();

          if (error || !emp) {
            console.error('Error fetching profile:', error);
            showToast('Failed to load profile details.', true);
            return;
          }

          this.employeeData = emp;

          // Render profile visual aesthetics
          const name = `${emp.first_name || ''} ${emp.last_name || ''}`.trim() || this.currentUser.email.split('@')[0];
          document.getElementById('display-fullname').textContent = name;
          document.getElementById('cover-greeting').textContent = `Welcome back, ${emp.first_name || name}!`;
          document.getElementById('display-title').textContent = emp.title || 'Employee';

          const initials = name.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase() || '?';
          const avatarContainer = document.getElementById('avatar-container');
          if (emp.picture_link) {
            avatarContainer.innerHTML = `<img src="${emp.picture_link}" alt="${name}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;" />`;
          } else {
            avatarContainer.textContent = initials;
          }

          if (emp.cover_photo_link) {
            document.getElementById('cover-banner').style.backgroundImage = `url('${emp.cover_photo_link}')`;
          }

          const txtColor = emp.cover_text_color || 'white';
          this.updateTextColorUI(txtColor);

          const statusDisplay = document.getElementById('status-display-box');
          if (emp.status_text) {
            statusDisplay.textContent = `"${emp.status_text}"`;
            statusDisplay.style.fontStyle = 'normal';
          } else {
            statusDisplay.textContent = '"Click here to write status message…"';
            statusDisplay.style.fontStyle = 'italic';
          }

          // Populate form inputs
          document.getElementById('inp-firstname').value = emp.first_name || '';
          document.getElementById('inp-lastname').value = emp.last_name || '';
          document.getElementById('inp-email').value = emp.email || '';
          document.getElementById('inp-contact').value = emp.contact_number || '';
          document.getElementById('inp-dob').value = emp.date_of_birth || '';
          document.getElementById('inp-address').value = emp.address || '';
          document.getElementById('inp-emergency-num').value = emp.emergency_contact_number || '';
          document.getElementById('inp-tin').value = emp.tin || '';
          document.getElementById('inp-sss').value = emp.sss || '';
          document.getElementById('inp-philhealth').value = emp.philhealth || '';
          document.getElementById('inp-pagibig').value = emp.pagibig || '';

          // Populate employment form inputs
          const dept = emp.department || '';
          const pos = emp.position || '';
          document.getElementById('emp-dept-position').value = (dept && pos) ? `${dept} - ${pos}` : (dept || pos || 'N/A');
          document.getElementById('emp-reporting-to').value = emp.reporting_to || 'N/A';
          document.getElementById('emp-salary').value = emp.salary != null ? `₱ ${parseFloat(emp.salary).toLocaleString('en-PH', { minimumFractionDigits: 2 })}` : 'N/A';
          
          let dateHiredStr = 'N/A';
          if (emp.date_hired) {
            const date = new Date(emp.date_hired);
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            dateHiredStr = `${months[date.getMonth()]} ${date.getDate()}, ${date.getFullYear()}`;
          }
          document.getElementById('emp-date-hired').value = dateHiredStr;

          let shiftStr = 'Not Scheduled';
          if (emp.shift_days) {
            const time1 = emp.shift_time_1 ? ` (${emp.shift_time_1})` : '';
            const time2 = emp.shift_time_2 ? ` / (${emp.shift_time_2})` : '';
            shiftStr = `${emp.shift_days}${time1}${time2}`;
          }
          document.getElementById('emp-shift').value = shiftStr;
          document.getElementById('emp-work-email').value = emp.work_email || 'N/A';
          document.getElementById('emp-job-desc').value = emp.job_description || 'N/A';

          const idLinkContainer = document.getElementById('emp-id-link-container');
          if (emp.id_link) {
            idLinkContainer.innerHTML = '';
            const a = document.createElement('a');
            a.href = emp.id_link;
            a.target = '_blank';
            a.style.color = 'var(--cyan-light)';
            a.style.fontWeight = '600';
            a.style.textDecoration = 'none';
            a.textContent = 'View ID Card ↗';
            idLinkContainer.appendChild(a);
          } else {
            idLinkContainer.textContent = 'No ID uploaded';
          }

        } catch (err) {
          console.error(err);
        }
      },

      async loadPendingRequestBanner() {
        const banner = document.getElementById('request-banner');
        try {
          const { data: req, error } = await this.sb
            .from('employee_update_requests')
            .from('employee_update_requests') // Double check table
            .select('*')
            .eq('employee_id', this.currentUser.id)
            .order('created_at', { ascending: false })
            .limit(1)
            .maybeSingle();

          if (!error && req) {
            banner.style.display = 'flex';
            if (req.status === 'pending') {
              banner.className = 'info-banner info-banner-warning';
              banner.innerHTML = `⚠️ <strong>Update Request Pending:</strong> You have submitted a directory update request. It is currently awaiting HR approval.`;
            } else if (req.status === 'rejected') {
              banner.className = 'info-banner info-banner-danger';
              banner.innerHTML = `❌ <strong>Request Rejected:</strong> Your last directory update request was rejected. ${req.rejected_reason ? `Reason: "<em>${req.rejected_reason}</em>"` : ''}`;
            } else {
              banner.style.display = 'none';
            }
          } else {
            banner.style.display = 'none';
          }
        } catch (err) {
          banner.style.display = 'none';
        }
      },

      /* ── Direct updates (no approval needed) ── */
      editStatus() {
        document.getElementById('status-display-wrapper').style.display = 'none';
        const textarea = document.getElementById('status-textarea');
        textarea.value = this.employeeData.status_text || '';
        document.getElementById('status-edit-box').style.display = 'flex';
        textarea.focus();
      },

      cancelStatus() {
        document.getElementById('status-edit-box').style.display = 'none';
        document.getElementById('status-display-wrapper').style.display = 'flex';
      },

      async saveStatus() {
        const newStatus = document.getElementById('status-textarea').value.trim();
        try {
          const { error } = await this.sb
            .from('employees')
            .update({ status_text: newStatus || null })
            .eq('id', this.currentUser.id);

          if (error) throw error;
          showToast('Status message updated.');
          this.employeeData.status_text = newStatus;
          const display = document.getElementById('status-display-box');
          if (newStatus) {
            display.textContent = `"${newStatus}"`;
            display.style.fontStyle = 'normal';
          } else {
            display.textContent = 'Click here to write status message…';
            display.style.fontStyle = 'italic';
          }
          this.cancelStatus();
        } catch (err) {
          showToast('Failed to update status message.', true);
        }
      },

      async uploadAvatar(input) {
        if (!input.files || input.files.length === 0) return;
        const file = input.files[0];
        const fileExt = file.name.split('.').pop();
        const filePath = `avatars/${this.currentUser.id}-${Date.now()}.${fileExt}`;

        try {
          showToast('Uploading profile picture...');
          const { error: uploadError } = await this.sb.storage
            .from('brightkey-assets')
            .upload(filePath, file);

          if (uploadError) throw uploadError;

          const publicUrl = `${this.sb.storage.from('brightkey-assets').getPublicUrl(filePath).data.publicUrl}`;
          
          const { error: dbErr } = await this.sb
            .from('employees')
            .update({ picture_link: publicUrl })
            .eq('id', this.currentUser.id);

          if (dbErr) throw dbErr;

          showToast('Profile picture updated!');
          await this.loadProfile();
        } catch (err) {
          console.error(err);
          showToast('Upload failed: ' + err.message, true);
        }
      },

      async uploadCoverPhoto(input) {
        if (!input.files || input.files.length === 0) return;
        const file = input.files[0];
        const fileExt = file.name.split('.').pop();
        const filePath = `covers/${this.currentUser.id}-${Date.now()}.${fileExt}`;

        try {
          showToast('Uploading cover photo...');
          const { error: uploadError } = await this.sb.storage
            .from('brightkey-assets')
            .upload(filePath, file);

          if (uploadError) throw uploadError;

          const publicUrl = `${this.sb.storage.from('brightkey-assets').getPublicUrl(filePath).data.publicUrl}`;
          
          const { error: dbErr } = await this.sb
            .from('employees')
            .update({ cover_photo_link: publicUrl })
            .eq('id', this.currentUser.id);

          if (dbErr) throw dbErr;

          showToast('Cover photo updated!');
          await this.loadProfile();
        } catch (err) {
          console.error(err);
          showToast('Upload failed: ' + err.message, true);
        }
      },

      async setTextColorPreference(color) {
        try {
          const { error } = await this.sb
            .from('employees')
            .update({ cover_text_color: color })
            .eq('id', this.currentUser.id);

          if (error) throw error;
          this.updateTextColorUI(color);
          showToast('Greeting text color updated.');
        } catch (err) {
          showToast('Failed to update color preference.', true);
        }
      },

      updateTextColorUI(color) {
        const textElements = document.getElementById('cover-text-elements');
        const datetimeWrapper = document.querySelector('.cover-datetime-wrapper');
        const label = document.getElementById('cover-greeting');
        
        if (color === 'black') {
          if (textElements) textElements.style.color = '#09090B';
          if (datetimeWrapper) datetimeWrapper.style.color = '#09090B';
          if (label) label.style.color = '#09090B';
        } else {
          if (textElements) textElements.style.color = '#ffffff';
          if (datetimeWrapper) datetimeWrapper.style.color = '#ffffff';
          if (label) label.style.color = '#ffffff';
        }
        
        document.getElementById('btn-text-white').classList.toggle('active', color === 'white');
        document.getElementById('btn-text-black').classList.toggle('active', color === 'black');
      },

      /* ── Directory Edits (Moderated via HR Approval Requests) ── */
      enableEditMode() {
        this.editMode = true;
        document.getElementById('btn-edit').style.display = 'none';
        document.getElementById('btn-cancel').style.display = 'inline-flex';
        document.getElementById('btn-submit').style.display = 'inline-flex';

        // Toggle disabled states
        const fields = ['inp-firstname', 'inp-lastname', 'inp-contact', 'inp-dob', 'inp-address', 'inp-emergency-num', 'inp-tin', 'inp-sss', 'inp-philhealth', 'inp-pagibig'];
        fields.forEach(f => {
          document.getElementById(f).removeAttribute('disabled');
        });
      },

      disableEditMode() {
        this.editMode = false;
        document.getElementById('btn-edit').style.display = 'inline-flex';
        document.getElementById('btn-cancel').style.display = 'none';
        document.getElementById('btn-submit').style.display = 'none';

        const fields = ['inp-firstname', 'inp-lastname', 'inp-contact', 'inp-dob', 'inp-address', 'inp-emergency-num', 'inp-tin', 'inp-sss', 'inp-philhealth', 'inp-pagibig'];
        fields.forEach(f => {
          document.getElementById(f).setAttribute('disabled', 'true');
        });

        // Reset inputs
        this.loadProfile();
      },

      async submitUpdateRequest(e) {
        e.preventDefault();
        if (!this.employeeData) return;

        const payload = {
          first_name: document.getElementById('inp-firstname').value.trim(),
          last_name: document.getElementById('inp-lastname').value.trim(),
          contact_number: document.getElementById('inp-contact').value.trim(),
          date_of_birth: document.getElementById('inp-dob').value,
          address: document.getElementById('inp-address').value.trim(),
          emergency_contact_number: document.getElementById('inp-emergency-num').value.trim(),
          tin: document.getElementById('inp-tin').value.trim(),
          sss: document.getElementById('inp-sss').value.trim(),
          philhealth: document.getElementById('inp-philhealth').value.trim(),
          pagibig: document.getElementById('inp-pagibig').value.trim()
        };

        // Filter only actual changes to show in the request compare
        const changes = {};
        for (const k in payload) {
          if (payload[k] !== (this.employeeData[k] || '')) {
            changes[k] = payload[k];
          }
        }

        if (Object.keys(changes).length === 0) {
          showToast('No directory values were changed.', true);
          this.disableEditMode();
          return;
        }

        try {
          // Check if there's already a pending request, and cancel it or warn
          const { data: existing } = await this.sb
            .from('employee_update_requests')
            .select('id')
            .eq('employee_id', this.currentUser.id)
            .eq('status', 'pending')
            .limit(1)
            .maybeSingle();

          if (existing) {
            // Delete old pending request
            await this.sb.from('employee_update_requests').delete().eq('id', existing.id);
          }

          const { error } = await this.sb.from('employee_update_requests').insert([{
            employee_id: this.currentUser.id,
            tenant_id: this.tenantId,
            requested_data: changes,
            status: 'pending'
          }]);

          if (error) throw error;

          showToast('Directory update request submitted to HR!');
          this.disableEditMode();
          await this.loadPendingRequestBanner();
        } catch (err) {
          showToast('Submission failed: ' + err.message, true);
        }
      },

      switchTab(tab) {
        this.activeTab = tab;
        
        // Update tab button classes
        document.querySelectorAll('.profile-tab').forEach(btn => {
          btn.classList.remove('active');
        });
        const activeBtn = document.getElementById(`tab-btn-${tab}`);
        if (activeBtn) activeBtn.classList.add('active');

        // Update tab content visibility
        document.querySelectorAll('.tab-content').forEach(content => {
          content.style.display = 'none';
        });
        const activeContent = document.getElementById(`tab-content-${tab}`);
        if (activeContent) activeContent.style.display = 'block';
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      App.init();
    });
  </script>
</body>
</html>
