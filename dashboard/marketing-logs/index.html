<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing Logs Tracker — BrightKey Portal</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg?v=2" />
  <link rel="stylesheet" href="marketing-logs.css">
</head>
<body>

  <div id="toast-container"></div>

  <div class="dash-layout">
    <!-- Sidebar -->
    <aside class="dash-sidebar" id="dash-sidebar"></aside>

    <!-- Main Content -->
    <div class="dash-main">
      <!-- Top Bar -->
      <div class="top-bar">
        <div style="display: flex; align-items: center; gap: 1.5rem;">
          <span class="top-bar-title">Marketing Logs</span>
        </div>
      </div>

      <!-- Main Navigation Tabs -->
      <div class="drawer-tabs">
        <button class="tab-btn active">Tracker</button>
      </div>

      <!-- Content Area -->
      <div class="content-area">
        <main class="main-panel">
          <div class="panel">
            
            <!-- Panel Header: Month Navigator & Add Log Button -->
            <div class="panel-header" style="display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;">
              <div class="month-navigator">
                <button type="button" class="nav-arrow-btn" onclick="navigateMonth(-1)" title="Previous Month">
                  <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <span class="month-display" id="month-year-display">October 2026</span>
                <button type="button" class="nav-arrow-btn" onclick="navigateMonth(1)" title="Next Month">
                  <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
              </div>

              <div>
                <button type="button" class="btn btn-primary" style="height: 36px; padding: 0 1rem; display: flex; align-items: center; gap: 0.5rem;" onclick="addNewLogRow()">
                  <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                  Add Log
                </button>
              </div>
            </div>

            <!-- Table Responsive Wrap -->
            <div class="table-responsive table-scroll">
              <table class="logs-table">
                <thead>
                  <tr>
                    <th style="width: 140px;">Date</th>
                    <th style="width: 150px;">Item</th>
                    <th>Change</th>
                    <th style="width: 60px; text-align: center;">User</th>
                    <th>Reason</th>
                    <th style="width: 250px;">Learning</th>
                    <th style="width: 90px; text-align: center;">Actions</th>
                  </tr>
                </thead>
                <tbody id="logs-tbody">
                  <!-- Skeletal Loading State -->
                  <tr class="loading-row">
                    <td colspan="7">
                      <div class="loading-wrapper">
                        <div class="spinner-cyan"></div>
                        <span>Loading marketing logs...</span>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>

          </div>
        </main>
      </div>

    </div>
  </div>

  <!-- Modal: Delete Confirmation -->
  <div class="modal-overlay" id="delete-confirm-modal" style="background: rgba(0,0,0,0.4); display: none;">
    <div class="modal-card" style="width: 320px; padding: 1.25rem; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 1px solid var(--border); background: var(--bg-surface);">
      <div style="font-weight: 700; font-size: 0.95rem; margin-bottom: 0.75rem;">Delete Log Entry</div>
      <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1.25rem;">Are you sure you want to permanently delete this marketing log? This action cannot be undone.</div>
      <div style="display: flex; justify-content: flex-end; gap: 0.5rem;">
        <button type="button" class="btn btn-outline" style="height: 32px; font-size: 0.75rem;" onclick="closeDeleteModal()">Cancel</button>
        <button type="button" class="btn btn-primary" id="btn-confirm-delete" style="height: 32px; font-size: 0.75rem; background: #ef4444; border-color: #ef4444;" onclick="confirmDeleteLog()">Delete</button>
      </div>
    </div>
  </div>

  <!-- Supabase & Auth JS dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/sidebar.js"></script>
  <script src="../../js/main.js"></script>
  <script src="marketing-logs.js"></script>

</body>
</html>
