<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Special Payout — BrightKey Portal</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/dashboard/payout-tracker/shared.css" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=2" />
</head>
<body>
  <div class="dash-layout">
    <aside class="dash-sidebar" id="dash-sidebar"></aside>
    <div class="dash-main">
      <div class="top-bar">
        <span class="top-bar-title">Payout Tracker</span>
        <div style="flex:1"></div>
      </div>

      <nav class="drawer-tabs" id="payout-nav">
        <a href="../payout/"         class="tab-btn" data-page="payout">Payout</a>
        <a href="../salary/"         class="tab-btn" data-page="salary">Salary</a>
        <a href="../special-payout/" class="tab-btn" data-page="special-payout">Special Payout</a>
        <a href="../adjustments/"    class="tab-btn" data-page="adjustments">Adjustments</a>
        <a href="../commissions/"    class="tab-btn" data-page="commissions">Commission</a>
        <a href="../reimbursements/" class="tab-btn" data-page="reimbursements">Reimbursement</a>
        <a href="../schedules/"      class="tab-btn" data-page="schedules">Schedules</a>
        <a href="../payslip/"        class="tab-btn" data-page="payslip">Payslip</a>
      </nav>

      <main style="overflow-y: auto; flex: 1;">
        <div class="int-wrap">
          <!-- Action bar -->
          <div style="display:flex;align-items:center;justify-content:flex-end;margin-bottom:1.5rem;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:0.75rem 1.25rem;width:100%;box-sizing:border-box;">
            <button class="btn btn-cyan btn-sm" id="btn-add-special">+ Add Special Schedule</button>
          </div>

          <div class="table-card">
            <div class="table-wrap">
              <table class="salary-table" id="special-table">
                <thead>
                  <tr id="special-table-header">
                    <th>Employee Name</th>
                    <th>Label</th>
                    <th>Payout Day</th>
                    <th style="text-align:right;">Amount</th>
                    <th style="width:100px;text-align:center;">Action</th>
                  </tr>
                </thead>
                <tbody id="special-table-body">
                  <tr><td colspan="5" style="text-align:center;padding:3rem;color:var(--text-muted);">Loading special payout data...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Add / Edit Special Schedule Modal -->
  <div class="modal-overlay" id="special-schedule-modal">
    <div class="modal" style="max-width:500px;padding:2rem;">
      <h3 id="special-modal-title" style="font-size:1.1rem;font-weight:700;color:var(--text-primary);margin-bottom:0.5rem;">Create Special Schedule</h3>
      <form id="special-schedule-form" style="padding-top:0.75rem;">
        <div class="form-group" style="margin-bottom:1rem;">
          <label class="form-label" for="spec-employee">Employee</label>
          <select id="spec-employee" class="form-select" required></select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
          <div class="form-group">
            <label class="form-label" for="spec-value">Value (&#8369;)</label>
            <input type="number" id="spec-value" class="form-input" placeholder="e.g. 5000" step="0.01" min="0" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="spec-day">Day of Month</label>
            <select id="spec-day" class="form-select" required></select>
          </div>
        </div>
        <div class="form-group" style="margin-bottom:1.5rem;">
          <label class="form-label" for="spec-label">Label</label>
          <input type="text" id="spec-label" class="form-input" placeholder="e.g. Mid-month Bonus" required />
        </div>
        <div style="display:flex;justify-content:flex-end;gap:0.75rem;">
          <button type="button" class="btn btn-outline btn-sm" id="btn-cancel-special">Cancel</button>
          <button type="submit" id="special-submit-btn" class="btn btn-cyan btn-sm">Add Schedule</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/main.js"></script>
  <script>
    'use strict';

    (function () {
      const parts = window.location.pathname.split('/').filter(Boolean);
      let page = parts[parts.length - 1];
      if (page === 'index.html') page = parts[parts.length - 2];
      document.querySelectorAll('#payout-nav .tab-btn[data-page]').forEach(a => {
        if (a.dataset.page === page) a.classList.add('active');
      });
    })();

    const getSb = () => window.BKAuth.sb;
    const toast = (msg, type = 'success') => {
      const c = document.getElementById('toast-container');
      if (!c) return;
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = msg;
      c.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    };
    const esc = s => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    const php = v => {
      if (v === null || v === undefined || v === '' || Number(v) === 0) return '—';
      return '₱' + Number(v).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    };

    const App = {
      tenantId: null,
      companyId: null,
      employees: [],
      companyStructure: { departments: [] },
      specialSchedules: [],
      editingId: null,

      async init() {
        try {
          const authInfo = await window.BKAuth.checkRoleGate(['HR', 'Finance'], '../../../admin.html');
          if (!authInfo) return;
          this.tenantId = authInfo.tenantId;
          const { data: co } = await getSb().from('companies').select('id').eq('tenant_id', this.tenantId).limit(1).maybeSingle();
          this.companyId = co?.id || null;
          if (!this.companyId) { toast('Failed to resolve company.', 'error'); return; }
          this.populateDaySelectors();
          await this.loadData();
          this.render();
          this.bindEvents();
        } catch (e) {
          console.error(e);
          toast('Initialization failed: ' + e.message, 'error');
        }
      },

      populateDaySelectors() {
        const sel = document.getElementById('spec-day');
        if (!sel) return;
        let html = '';
        for (let i = 1; i <= 31; i++) html += `<option value="${i}">${i}</option>`;
        sel.innerHTML = html;
      },

      async loadData() {
        const sb = getSb();
        try {
          const { data } = await sb.from('global_settings').select('value').eq('key', 'company_structure').eq('company_id', this.companyId).maybeSingle();
          this.companyStructure = data?.value || { departments: [] };
        } catch (_) { this.companyStructure = { departments: [] }; }

        try {
          const { data, error } = await sb.from('employees')
            .select('id, first_name, last_name, employment_status, department')
            .eq('company_id', this.companyId)
            .neq('employment_status', 'Terminated');
          if (error) throw error;
          this.employees = data || [];
        } catch (e) { this.employees = []; console.error(e); }

        try {
          const { data } = await sb.from('global_settings').select('value').eq('key', 'salary_tracker_config').eq('company_id', this.companyId).maybeSingle();
          this.specialSchedules = data?.value?.specialSchedules || [];
        } catch (_) { this.specialSchedules = []; }

        // Populate employee dropdown
        const sorted = [...this.employees].sort((a, b) => [a.first_name, a.last_name].join(' ').localeCompare([b.first_name, b.last_name].join(' ')));
        const sel = document.getElementById('spec-employee');
        if (sel) sel.innerHTML = sorted.map(e => `<option value="${esc(e.id)}">${esc([e.first_name, e.last_name].filter(Boolean).join(' '))}</option>`).join('');
      },

      groupEmployees() {
        const empDeptMap = {};
        const empSubteamsMap = {};
        const deptHeadsSet = new Set();
        (this.companyStructure?.departments || []).forEach(dept => {
          const deptName = dept.name;
          if (dept.managerId) { empDeptMap[dept.managerId] = deptName; deptHeadsSet.add(dept.managerId); }
          (dept.subteams || []).forEach(sub => {
            if (sub.managerId) { empDeptMap[sub.managerId] = deptName; empSubteamsMap[sub.managerId] = empSubteamsMap[sub.managerId] || []; empSubteamsMap[sub.managerId].push(sub.name); }
            (sub.colleagueIds || []).forEach(id => { empDeptMap[id] = deptName; empSubteamsMap[id] = empSubteamsMap[id] || []; empSubteamsMap[id].push(sub.name); });
          });
        });
        const grouped = {};
        const unassigned = [];
        this.employees.forEach(emp => {
          const dept = empDeptMap[emp.id] || emp.department || '';
          if (!dept) { unassigned.push(emp); return; }
          grouped[dept] = grouped[dept] || {};
          if (deptHeadsSet.has(emp.id)) {
            grouped[dept]['Department Head'] = grouped[dept]['Department Head'] || [];
            grouped[dept]['Department Head'].push(emp);
          } else {
            const subs = empSubteamsMap[emp.id] || [];
            if (!subs.length) { grouped[dept]['_unassigned_subteam'] = grouped[dept]['_unassigned_subteam'] || []; grouped[dept]['_unassigned_subteam'].push(emp); }
            else { subs.forEach(sub => { grouped[dept][sub] = grouped[dept][sub] || []; grouped[dept][sub].push(emp); }); }
          }
        });
        return { grouped, unassigned };
      },

      render() {
        const tbody = document.getElementById('special-table-body');
        if (!tbody) return;

        if (this.specialSchedules.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:3rem;color:var(--text-muted);">No special payouts configured. Add one with the button above.</td></tr>`;
          return;
        }

        // Group schedules by employee, preserving dept/team structure
        const { grouped, unassigned } = this.groupEmployees();
        let bodyHtml = '';

        const renderEmpSchedules = (emp) => {
          const empSpecs = this.specialSchedules.filter(s => s.employeeId === emp.id);
          if (empSpecs.length === 0) return '';
          return empSpecs.map(spec => `
            <tr class="employee-row" data-emp-id="${esc(emp.id)}">
              <td class="col-name">${esc([emp.first_name, emp.last_name].filter(Boolean).join(' '))}</td>
              <td>${esc(spec.label)}</td>
              <td style="font-weight:600;">Day ${spec.day}</td>
              <td style="text-align:right;font-weight:700;color:var(--text-primary);font-variant-numeric:tabular-nums;">${esc(php(spec.value))}</td>
              <td style="text-align:center;white-space:nowrap;">
                <button class="btn-danger-link" onclick="App.openEditModal('${esc(spec.id)}')" title="Edit" style="margin-right:0.5rem;color:var(--text-muted);">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"/></svg>
                </button>
                <button class="btn-danger-link" onclick="App.deleteSchedule('${esc(spec.id)}')" title="Delete">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                </button>
              </td>
            </tr>
          `).join('');
        };

        let hasRows = false;

        Object.keys(grouped).sort().forEach(dept => {
          let deptRows = '';
          const teams = Object.keys(grouped[dept]).sort((a, b) => { if (a === 'Department Head') return -1; if (b === 'Department Head') return 1; return a.localeCompare(b); });
          teams.forEach(sub => { grouped[dept][sub].forEach(emp => { deptRows += renderEmpSchedules(emp); }); });
          if (deptRows) { bodyHtml += `<tr class="dept-header-row"><td colspan="5">${esc(dept)} Department</td></tr>` + deptRows; hasRows = true; }
        });

        let unassignedRows = '';
        unassigned.forEach(emp => { unassignedRows += renderEmpSchedules(emp); });
        if (unassignedRows) { bodyHtml += `<tr class="dept-header-row"><td colspan="5">Unassigned Department / Pool</td></tr>` + unassignedRows; hasRows = true; }

        tbody.innerHTML = hasRows ? bodyHtml : `<tr><td colspan="5" style="text-align:center;padding:3rem;color:var(--text-muted);">No special payouts configured.</td></tr>`;
      },

      bindEvents() {
        document.getElementById('btn-add-special').addEventListener('click', () => this.openAddModal());
        document.getElementById('btn-cancel-special').addEventListener('click', () => this.closeModal());
        document.getElementById('special-schedule-form').addEventListener('submit', e => { e.preventDefault(); this.saveSchedule(); });
      },

      openAddModal() {
        this.editingId = null;
        document.getElementById('special-modal-title').textContent = 'Create Special Schedule';
        document.getElementById('special-submit-btn').textContent = 'Add Schedule';
        document.getElementById('spec-value').value = '';
        document.getElementById('spec-label').value = '';
        document.getElementById('spec-day').value = '1';
        const sel = document.getElementById('spec-employee');
        if (sel && sel.options.length > 0) sel.selectedIndex = 0;
        document.getElementById('special-schedule-modal').classList.add('open');
      },

      openEditModal(specId) {
        const spec = this.specialSchedules.find(s => s.id === specId);
        if (!spec) return;
        this.editingId = specId;
        document.getElementById('special-modal-title').textContent = 'Edit Special Schedule';
        document.getElementById('special-submit-btn').textContent = 'Save Changes';
        document.getElementById('spec-employee').value = spec.employeeId;
        document.getElementById('spec-value').value = spec.value;
        document.getElementById('spec-day').value = spec.day;
        document.getElementById('spec-label').value = spec.label;
        document.getElementById('special-schedule-modal').classList.add('open');
      },

      closeModal() {
        document.getElementById('special-schedule-modal').classList.remove('open');
      },

      async saveSchedule() {
        const empId = document.getElementById('spec-employee').value;
        const val   = parseFloat(document.getElementById('spec-value').value);
        const day   = parseInt(document.getElementById('spec-day').value, 10);
        const label = document.getElementById('spec-label').value.trim();
        if (!empId || isNaN(val) || isNaN(day) || !label) return;

        if (this.editingId) {
          const spec = this.specialSchedules.find(s => s.id === this.editingId);
          if (spec) { spec.employeeId = empId; spec.value = val; spec.day = day; spec.label = label; }
          this.editingId = null;
          toast('Special schedule updated.');
        } else {
          this.specialSchedules.push({ id: 'spec_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9), employeeId: empId, value: val, day, label });
          toast('Special schedule added.');
        }

        await this.saveConfig();
        this.closeModal();
        this.render();
      },

      async deleteSchedule(specId) {
        const idx = this.specialSchedules.findIndex(s => s.id === specId);
        if (idx === -1) return;
        this.specialSchedules.splice(idx, 1);
        await this.saveConfig();
        this.render();
        toast('Special schedule removed.', 'info');
      },

      async saveConfig() {
        try {
          // Read current config to preserve other keys
          const { data } = await getSb().from('global_settings').select('value').eq('key', 'salary_tracker_config').eq('company_id', this.companyId).maybeSingle();
          const existing = data?.value || {};
          const { error } = await getSb().from('global_settings').upsert({
            key: 'salary_tracker_config', company_id: this.companyId,
            value: { ...existing, specialSchedules: this.specialSchedules }
          });
          if (error) throw error;
        } catch (e) {
          console.error(e);
          toast('Failed to save config: ' + e.message, 'error');
        }
      },
    };

    document.addEventListener('DOMContentLoaded', () => {
      App.init();
      if (typeof initNav === 'function') initNav();
    });
  </script>
</body>
</html>
