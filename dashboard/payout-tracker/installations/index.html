<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Installation Payouts — BrightKey Portal</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/dashboard/payout-tracker/shared.css" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=2" />
</head>
<body>
  <div class="dash-layout">
    <aside class="dash-sidebar" id="dash-sidebar"></aside>
    <div class="dash-main">
      <div class="top-bar">
        <span class="top-bar-title">Payout Tracker</span>
        <div style="flex:1"></div>
      </div>

      <nav class="drawer-tabs" id="payout-nav">
        <a href="/dashboard/payout-tracker/payout"         class="tab-btn" data-page="payout">Payout</a>
        <a href="/dashboard/payout-tracker/salary"         class="tab-btn" data-page="salary">Salary</a>
        <a href="/dashboard/payout-tracker/special-payout" class="tab-btn" data-page="special-payout">Special Payout</a>
        <a href="/dashboard/payout-tracker/adjustments"    class="tab-btn" data-page="adjustments">Adjustments</a>
        <a href="/dashboard/payout-tracker/commissions"    class="tab-btn" data-page="commissions">Commission</a>
        <a href="/dashboard/payout-tracker/installations"  class="tab-btn" data-page="installations">Installation</a>
        <a href="/dashboard/payout-tracker/reimbursements" class="tab-btn" data-page="reimbursements">Reimbursement</a>
        <a href="/dashboard/payout-tracker/schedules"      class="tab-btn" data-page="schedules">Schedules</a>
        <a href="/dashboard/payout-tracker/payslip"        class="tab-btn" data-page="payslip">Payslip</a>
      </nav>

      <main style="overflow-y: auto; flex: 1; min-width: 0; width: 100%;">
        <div class="int-wrap">
          <!-- Month selector -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:0.75rem 1.25rem;width:100%;box-sizing:border-box;">
            <div style="display:flex;align-items:center;gap:1rem;">
              <button class="btn btn-outline btn-sm" id="btn-prev-month">&lt;</button>
              <span id="installations-month-display" style="font-size:0.88rem;font-weight:700;color:var(--text-primary);min-width:140px;text-align:center;"></span>
              <button class="btn btn-outline btn-sm" id="btn-next-month">&gt;</button>
            </div>
            <div style="font-size: 0.78rem; color: var(--text-muted);" id="threshold-config-label">
              <!-- Threshold config label filled on load -->
            </div>
          </div>

          <div class="table-card">
            <div class="table-wrap">
              <table class="salary-table" id="installations-table">
                <thead>
                  <tr>
                    <th style="padding-left:1.5rem; text-align:left;">Installer Name</th>
                    <th style="text-align:center; width:150px;">Completed Counts</th>
                    <th style="text-align:right; width:180px;">Earnings Past Threshold</th>
                    <th style="text-align:left; padding-left:2.5rem;">Service Job Earnings</th>
                    <th style="text-align:right; padding-right:1.5rem; width:150px;">Total</th>
                  </tr>
                </thead>
                <tbody id="installations-table-body">
                  <tr><td colspan="5" style="text-align:center;padding:3rem;color:var(--text-muted);">Loading installation payouts…</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="toast-container" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/main.js"></script>
  <script>
    'use strict';

    (function () {
      const parts = window.location.pathname.split('/').filter(Boolean);
      let page = parts[parts.length - 1];
      if (page === 'index.html') page = parts[parts.length - 2];
      document.querySelectorAll('#payout-nav .tab-btn[data-page]').forEach(a => {
        if (a.dataset.page === page) a.classList.add('active');
      });
    })();

    const getSb = () => window.BKAuth.sb;
    const toast = (msg, type = 'success') => {
      const c = document.getElementById('toast-container');
      if (!c) return;
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = msg;
      c.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    };
    const esc = s => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    const php = v => {
      if (v === null || v === undefined || v === '' || Number(v) === 0) return '—';
      return '₱' + Number(v).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    };
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    const App = {
      tenantId: null,
      companyId: null,
      employees: [],
      bookingsList: [],
      payoutSettings: {
        installations_before_crediting: 15,
        lead_credit: 1.0,
        assist_credit: 0.5,
        lead_rate: 1000,
        assist_rate: 500,
        extra_services: [
          { sku: 'BASEPLATE-M', rate: 700 },
          { sku: 'BASEPLATE-S', rate: 700 }
        ]
      },
      selectedYear: new Date().getFullYear(),
      selectedMonth: new Date().getMonth(),

      async init() {
        try {
          const authInfo = await window.BKAuth.checkRoleGate(['HR', 'Finance'], '../../../admin.html');
          if (!authInfo) return;
          this.tenantId = authInfo.tenantId;
          const { data: co } = await getSb().from('companies').select('id').eq('tenant_id', this.tenantId).limit(1).maybeSingle();
          this.companyId = co?.id || null;
          if (!this.companyId) { toast('Failed to resolve company.', 'error'); return; }
          this.updateMonthDisplay();
          await this.loadData();
          this.render();
          this.bindEvents();
        } catch (e) {
          console.error(e);
          toast('Initialization failed: ' + e.message, 'error');
        }
      },

      async loadData() {
        const sb = getSb();

        // 1. Employee names
        try {
          const { data, error } = await sb.from('employees')
            .select('id, first_name, last_name, employment_status')
            .eq('company_id', this.companyId)
            .neq('employment_status', 'Terminated');
          if (error) throw error;
          this.employees = data || [];
        } catch (e) { this.employees = []; console.error(e); }

        // 2. Installer Payout settings
        try {
          const { data } = await sb.from('global_settings')
            .select('value')
            .eq('key', 'installer_payout_settings')
            .eq('company_id', this.companyId)
            .maybeSingle();
          if (data && data.value) {
            this.payoutSettings = { ...this.payoutSettings, ...data.value };
          }
        } catch (_) {}

        // 3. Bookings
        try {
          const { data, error } = await sb.from('installation_bookings')
            .select('id, status, scheduled_date, doors, products, product_skus, installers, installer_id, installer_name')
            .eq('company_id', this.companyId);
          if (error) throw error;
          this.bookingsList = data || [];
        } catch (e) { this.bookingsList = []; console.error(e); }
      },

      monthKey() {
        return `${this.selectedYear}-${String(this.selectedMonth + 1).padStart(2, '0')}`;
      },

      updateMonthDisplay() {
        const el = document.getElementById('installations-month-display');
        if (el) el.textContent = `${MONTHS[this.selectedMonth]} ${this.selectedYear}`;
      },

      changeMonth(diff) {
        let m = this.selectedMonth + diff;
        let y = this.selectedYear;
        if (m < 0)  { m = 11; y--; }
        if (m > 11) { m = 0;  y++; }
        this.selectedMonth = m;
        this.selectedYear  = y;
        this.updateMonthDisplay();
        this.render();
      },

      bindEvents() {
        document.getElementById('btn-prev-month').addEventListener('click', () => this.changeMonth(-1));
        document.getElementById('btn-next-month').addEventListener('click', () => this.changeMonth(1));
      },

      getAssignedDoorsForBookingAndEmployee(b, empId) {
        let doorsArr = [];
        if (b.doors) {
          if (typeof b.doors === 'string') {
            try { doorsArr = JSON.parse(b.doors); } catch(_) {}
          } else if (Array.isArray(b.doors)) {
            doorsArr = b.doors;
          }
        }

        let bInsts = [];
        if (b.installers) {
          if (typeof b.installers === 'string') {
            try { bInsts = JSON.parse(b.installers); } catch(_) {}
          } else if (Array.isArray(b.installers)) {
            bInsts = b.installers;
          }
        }

        const isBookingLevelInstaller = bInsts.some(inst => inst && inst.id === empId) || 
                                        (b.installer_id && b.installer_id.split(' | ').includes(empId));

        const bookingHasDoorLevelInstallers = doorsArr.some(d => d && Array.isArray(d.installers) && d.installers.some(inst => inst && (inst.id || inst.name)));

        const assignedDoors = [];

        if (doorsArr.length === 0) {
          if (isBookingLevelInstaller) {
            let roles = [];
            const matchedBInsts = bInsts.filter(inst => inst && inst.id === empId);
            if (matchedBInsts.length > 0) {
              matchedBInsts.forEach(inst => {
                const r = inst.role || 'lead';
                if (!roles.includes(r)) roles.push(r);
              });
            } else if (b.installer_id) {
              const ids = b.installer_id.split(' | ');
              const myIdIdx = ids.indexOf(empId);
              if (myIdIdx !== -1) {
                roles.push(myIdIdx === 0 ? 'lead' : 'assist');
              }
            }
            if (roles.length === 0) roles.push('lead');
            
            let productsArr = [];
            if (b.products) {
              if (typeof b.products === 'string') {
                try { productsArr = JSON.parse(b.products); } catch(_) {}
              } else if (Array.isArray(b.products)) {
                productsArr = b.products;
              }
            }
            const skus = (b.product_skus || '').split(' | ').filter(Boolean);
            const activeSkus = productsArr.length > 0 
              ? productsArr.filter(p => !p.cancelled && p.sku !== 'ADD-ON LABOR').map(p => p.sku)
              : skus;

            assignedDoors.push({
              completed: b.status === 'done' || b.status === 'completed' || b.status === 'finished',
              roles: roles,
              skus: activeSkus
            });
          }
          return assignedDoors;
        }

        let productsArr = [];
        if (b.products) {
          if (typeof b.products === 'string') {
            try { productsArr = JSON.parse(b.products); } catch(_) {}
          } else if (Array.isArray(b.products)) {
            productsArr = b.products;
          }
        }
        const skus = (b.product_skus || '').split(' | ');
        const anyDoorHasAttachedProducts = doorsArr.some(d => d && Array.isArray(d.products) && d.products.length > 0);
        const isSingleDoorGrouping = (doorsArr.length === 1 && productsArr.length > 0);
        const skuOccurrenceCount = new Map();

        doorsArr.forEach((door, index) => {
          let isAssignedToThisDoor = false;
          let roles = [];

          if (door && Array.isArray(door.installers)) {
            const matchedInsts = door.installers.filter(inst => inst && inst.id === empId);
            if (matchedInsts.length > 0) {
              isAssignedToThisDoor = true;
              matchedInsts.forEach(inst => {
                const r = inst.role || 'lead';
                if (!roles.includes(r)) roles.push(r);
              });
            }
          } else if (bookingHasDoorLevelInstallers) {
            isAssignedToThisDoor = false;
          } else {
            isAssignedToThisDoor = isBookingLevelInstaller;
            const matchedBInsts = bInsts.filter(inst => inst && inst.id === empId);
            if (matchedBInsts.length > 0) {
              matchedBInsts.forEach(inst => {
                const r = inst.role || 'lead';
                if (!roles.includes(r)) roles.push(r);
              });
            } else if (b.installer_id) {
              const ids = b.installer_id.split(' | ');
              const myIdIdx = ids.indexOf(empId);
              if (myIdIdx !== -1) {
                roles.push(myIdIdx === 0 ? 'lead' : 'assist');
              }
            }
          }

          if (isAssignedToThisDoor) {
            const doorSkus = [];
            if (anyDoorHasAttachedProducts && door) {
              const attachedSkus = door.products || [];
              attachedSkus.forEach(sku => {
                const matchingProds = productsArr.filter(p => p.sku === sku);
                const occurrenceIndex = skuOccurrenceCount.get(sku) || 0;
                const matchedProd = matchingProds[occurrenceIndex];
                if (matchedProd && !matchedProd.cancelled) {
                  doorSkus.push(matchedProd.sku);
                }
                skuOccurrenceCount.set(sku, occurrenceIndex + 1);
              });
            } else if (isSingleDoorGrouping) {
              productsArr.forEach(p => {
                if (p.sku !== 'ADD-ON LABOR' && !p.cancelled) {
                  doorSkus.push(p.sku);
                }
              });
            } else {
              if (productsArr[index] && !productsArr[index].cancelled) {
                doorSkus.push(productsArr[index].sku);
              } else if (skus[index]) {
                doorSkus.push(skus[index]);
              }
            }

            assignedDoors.push({
              completed: !!door.completed,
              roles: roles,
              skus: doorSkus
            });
          } else {
            if (anyDoorHasAttachedProducts && door) {
              const attachedSkus = door.products || [];
              attachedSkus.forEach(sku => {
                const occurrenceIndex = skuOccurrenceCount.get(sku) || 0;
                skuOccurrenceCount.set(sku, occurrenceIndex + 1);
              });
            }
          }
        });

        return assignedDoors;
      },

      render() {
        const tbody = document.getElementById('installations-table-body');
        const thresholdLabelEl = document.getElementById('threshold-config-label');
        if (!tbody) return;

        const mk = this.monthKey();

        const thresholdVal = this.payoutSettings.installations_before_crediting || 15;
        const leadWeight = this.payoutSettings.lead_credit !== undefined ? this.payoutSettings.lead_credit : 1.0;
        const assistWeight = this.payoutSettings.assist_credit !== undefined ? this.payoutSettings.assist_credit : 0.5;
        const leadRateVal = this.payoutSettings.lead_rate || 1000;
        const assistRateVal = this.payoutSettings.assist_rate || 500;

        if (thresholdLabelEl) {
          thresholdLabelEl.textContent = `Config: Threshold = ${thresholdVal} Counts | Lead = ${leadWeight.toFixed(1)} cr (₱${leadRateVal.toLocaleString()}) | Assist = ${assistWeight.toFixed(1)} cr (₱${assistRateVal.toLocaleString()})`;
        }

        const extraServicesList = (this.payoutSettings.extra_services || []).map(es => {
          let sku = es.sku || es.name || '';
          if (sku === 'Welding Baseplate Metal') sku = 'BASEPLATE-M';
          if (sku === 'Welding Baseplate Stainless') sku = 'BASEPLATE-S';
          return { sku, rate: es.rate };
        });

        // Gather completed bookings for this month
        const monthBookings = this.bookingsList.filter(b => {
          if (!b.scheduled_date) return false;
          if (b.status === 'cancelled') return false;
          const d = new Date(b.scheduled_date);
          const bookingMonthKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
          return bookingMonthKey === mk;
        });

        const activeInstallers = [];

        this.employees.forEach(emp => {
          let leadCount = 0;
          let assistCount = 0;
          let serviceEarnings = 0;
          const serviceCounts = {};

          monthBookings.forEach(b => {
            const assignedDoors = this.getAssignedDoorsForBookingAndEmployee(b, emp.id);
            assignedDoors.forEach(d => {
              if (!d.completed) return;

              if (d.roles.includes('lead')) {
                leadCount++;
              } else if (d.roles.includes('assist')) {
                assistCount++;
              }

              if (d.roles.includes('service')) {
                d.skus.forEach(sku => {
                  const matchedService = extraServicesList.find(es => es.sku === sku);
                  if (matchedService) {
                    serviceCounts[sku] = (serviceCounts[sku] || 0) + 1;
                    serviceEarnings += matchedService.rate;
                  }
                });
              }
            });
          });

          const totalCredit = (leadCount * leadWeight) + (assistCount * assistWeight);
          let thresholdEarnings = 0;
          if (totalCredit > thresholdVal) {
            const extraCredit = totalCredit - thresholdVal;
            thresholdEarnings = extraCredit * leadRateVal;
          }

          const grandTotal = thresholdEarnings + serviceEarnings;

          if (leadCount > 0 || assistCount > 0 || Object.keys(serviceCounts).length > 0) {
            activeInstallers.push({
              emp,
              leadCount,
              assistCount,
              totalCredit,
              thresholdEarnings,
              serviceCounts,
              serviceEarnings,
              grandTotal
            });
          }
        });

        if (activeInstallers.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:3rem;color:var(--text-muted);">No installation payouts calculated for this month.</td></tr>`;
          return;
        }

        // Sort by total payout descending
        activeInstallers.sort((a, b) => b.grandTotal - a.grandTotal);

        let bodyHtml = '';
        activeInstallers.forEach(inst => {
          const fullName = [inst.emp.first_name, inst.emp.last_name].filter(Boolean).join(' ');

          let serviceBreakdown = '';
          if (Object.keys(inst.serviceCounts).length > 0) {
            const parts = [];
            Object.entries(inst.serviceCounts).forEach(([sku, count]) => {
              const matched = extraServicesList.find(es => es.sku === sku);
              const rate = matched ? matched.rate : 0;
              parts.push(`${sku} (${count} x ₱${rate.toLocaleString()})`);
            });
            serviceBreakdown = `
              <div style="font-size:0.85rem; font-weight:700; color:var(--text-primary);">${php(inst.serviceEarnings)}</div>
              <div style="font-size:0.72rem; color:var(--text-muted); margin-top:0.1rem;">${esc(parts.join(', '))}</div>
            `;
          } else {
            serviceBreakdown = `<span style="color:var(--text-muted); font-size:0.82rem;">—</span>`;
          }

          bodyHtml += `
            <tr class="employee-row">
              <td style="padding-left:1.5rem; font-weight:600; color:var(--text-primary);">${esc(fullName)}</td>
              <td style="text-align:center;">
                <div style="font-weight:700; color:var(--text-primary);">${inst.totalCredit.toFixed(1)}</div>
                <div style="font-size:0.72rem; color:var(--text-muted); margin-top:0.1rem;">L: ${inst.leadCount} | A: ${inst.assistCount}</div>
              </td>
              <td style="text-align:right; font-weight:700; font-variant-numeric:tabular-nums; color:var(--text-primary);">${php(inst.thresholdEarnings)}</td>
              <td style="padding-left:2.5rem; text-align:left;">${serviceBreakdown}</td>
              <td style="text-align:right; padding-right:1.5rem; font-weight:800; color:var(--cyan-light); font-variant-numeric:tabular-nums;">${php(inst.grandTotal)}</td>
            </tr>
          `;
        });

        tbody.innerHTML = bodyHtml;
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      App.init();
      if (typeof initNav === 'function') initNav();
    });
  </script>
</body>
</html>
