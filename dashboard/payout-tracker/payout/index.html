<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payout — BrightKey Portal</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/dashboard/payout-tracker/shared.css" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=2" />
  <style>
    /* ── Summary-table sticky columns (only needed on this page) ── */
    #summary-table .col-sticky-1 {
      position: sticky; left: 0; z-index: 10;
      width: 200px; min-width: 200px; max-width: 200px;
      background: var(--bg-surface);
      box-shadow: 2px 0 5px -2px rgba(0,0,0,0.1);
    }
    #summary-table th.col-sticky-1 { background: var(--bg-elevated); z-index: 11; }

    #summary-table .col-sticky-2 {
      position: sticky; left: 200px; z-index: 10;
      width: 140px; min-width: 140px; max-width: 140px;
      background: var(--bg-surface);
      box-shadow: 2px 0 5px -2px rgba(0,0,0,0.1);
    }
    #summary-table th.col-sticky-2 { background: var(--bg-elevated); z-index: 11; }

    #summary-table .col-sticky-3 {
      position: sticky; left: 340px; z-index: 10;
      width: 180px; min-width: 180px; max-width: 180px;
      background: var(--bg-surface);
    }
    #summary-table th.col-sticky-3 { background: var(--bg-elevated); z-index: 11; }
    #summary-table .col-sticky-3::after {
      content: "";
      position: absolute; top: 0; right: -8px; bottom: 0; width: 8px;
      background: linear-gradient(to right, rgba(0,0,0,0.08), rgba(0,0,0,0));
      pointer-events: none;
    }

    #summary-table tr.employee-row:hover td.col-sticky-1,
    #summary-table tr.employee-row:hover td.col-sticky-2,
    #summary-table tr.employee-row:hover td.col-sticky-3 { background: var(--bg-elevated); }

    #summary-table tr.dept-header-row td { background: #f4fcfd !important; }
    #summary-table tr.team-header-row td { background: #f8fafc !important; }

    #summary-table .dept-header-sticky { position: sticky; left: 0; display: inline-block; padding-left: 1.5rem; }
    #summary-table .team-header-sticky { position: sticky; left: 0; display: inline-block; padding-left: 2.25rem; }

    #summary-table-container {
      max-height: calc(100vh - 240px);
      max-height: calc(100dvh - 240px);
      overflow: auto;
    }

    /* ── Sticky Table Headers ── */
    #summary-table thead th {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-elevated, #fafafa);
      box-shadow: 0 1px 0 var(--border);
    }
    /* Sticky header columns need a higher z-index (101) to stay above other sticky components */
    #summary-table th.col-sticky-1 { z-index: 103 !important; }
    #summary-table th.col-sticky-2 { z-index: 102 !important; }
    #summary-table th.col-sticky-3 { z-index: 101 !important; }

    /* Decrease row heights a bit */
    #summary-table td, 
    #summary-table th {
      padding: 0.55rem 0.85rem !important;
    }
    #summary-table tr.dept-header-row td {
      padding-top: 0.7rem !important;
      padding-bottom: 0.7rem !important;
    }
    #summary-table tr.team-header-row td {
      padding-top: 0.5rem !important;
      padding-bottom: 0.5rem !important;
    }
  </style>
</head>
<body>
  <div class="dash-layout">
    <aside class="dash-sidebar" id="dash-sidebar"></aside>
    <div class="dash-main">
      <div class="top-bar">
        <span class="top-bar-title">Payout Tracker</span>
        <div style="flex:1"></div>
        <span id="save-status" style="font-size:0.75rem; color:var(--text-muted);"></span>
      </div>

      <nav class="drawer-tabs" id="payout-nav">
        <a href="/dashboard/payout-tracker/payout"         class="tab-btn" data-page="payout">Payout</a>
        <a href="/dashboard/payout-tracker/salary"         class="tab-btn" data-page="salary">Salary</a>
        <a href="/dashboard/payout-tracker/special-payout" class="tab-btn" data-page="special-payout">Special Payout</a>
        <a href="/dashboard/payout-tracker/adjustments"    class="tab-btn" data-page="adjustments">Adjustments</a>
        <a href="/dashboard/payout-tracker/commissions"    class="tab-btn" data-page="commissions">Commission</a>
        <a href="/dashboard/payout-tracker/installations"  class="tab-btn" data-page="installations">Installation</a>
        <a href="/dashboard/payout-tracker/schedules"      class="tab-btn" data-page="schedules">Schedules</a>
        <a href="/dashboard/payout-tracker/payslip"        class="tab-btn" data-page="payslip">Payslip</a>
      </nav>

      <main style="overflow-y: auto; flex: 1; min-width: 0; width: 100%;">
        <div class="int-wrap">

          <!-- Month selector -->
          <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:0.75rem 1.25rem; width:100%; box-sizing:border-box;">
            <div style="display:flex; align-items:center; gap:1rem;">
              <button class="btn btn-outline btn-sm" id="btn-prev-month">&lt;</button>
              <span id="summary-month-display" style="font-size:0.88rem; font-weight:700; color:var(--text-primary); min-width:140px; text-align:center;"></span>
              <button class="btn btn-outline btn-sm" id="btn-next-month">&gt;</button>
            </div>
            <button class="btn btn-outline btn-sm" id="btn-clear-all" style="color:var(--danger); border-color:var(--danger);">Clear All</button>
          </div>

          <div class="table-card">
            <div class="table-wrap" id="summary-table-container">
              <table class="salary-table" id="summary-table">
                <thead>
                  <tr id="summary-table-header">
                    <th class="col-sticky-1">Employee Name</th>
                    <th class="col-sticky-2">Title / Position</th>
                    <th class="col-sticky-3">Payment Details</th>
                    <th>Salary</th>
                    <th>Commission</th>
                    <th>Reimbursements</th>
                    <th>Adjustments</th>
                    <th style="border-right:2px solid var(--border); width:1px; padding:0;"></th>
                  </tr>
                </thead>
                <tbody id="summary-table-body">
                  <tr><td colspan="10" style="text-align:center; padding:3rem; color:var(--text-muted);">Loading payout summary...</td></tr>
                </tbody>
              </table>
            </div>
          </div>

        </div>
      </main>
    </div>
  </div>

  <!-- Clear All Modal -->
  <div class="modal-overlay" id="clear-all-modal">
    <div class="modal" style="max-width:400px; padding:2rem;">
      <h3 style="font-size:1.1rem; font-weight:700; color:var(--text-primary); margin-bottom:0.5rem;">Confirm Action</h3>
      <p style="font-size:0.88rem; color:var(--text-secondary); margin-bottom:1.5rem; line-height:1.5;">Clear all adjustments, reimbursements, and payout checkboxes?</p>
      <div style="display:flex; justify-content:flex-end; gap:0.75rem;">
        <button class="btn btn-outline btn-sm" id="btn-cancel-clear">No</button>
        <button class="btn btn-sm" id="btn-confirm-clear" style="background:var(--danger); border-color:var(--danger); color:#fff;">Clear</button>
      </div>
    </div>
  </div>

  <div id="toast-container" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/main.js"></script>
  <script>
    'use strict';

    // Active tab highlight
    (function () {
      const parts = window.location.pathname.split('/').filter(Boolean);
      let page = parts[parts.length - 1];
      if (page === 'index.html') page = parts[parts.length - 2];
      document.querySelectorAll('#payout-nav .tab-btn[data-page]').forEach(a => {
        if (a.dataset.page === page) a.classList.add('active');
      });
    })();

    const getSb = () => window.BKAuth.sb;

    const toast = (msg, type = 'success') => {
      const c = document.getElementById('toast-container');
      if (!c) return;
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = msg;
      c.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    };

    const esc = s => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    const php = v => {
      if (v === null || v === undefined || v === '' || Number(v) === 0) return '—';
      return '₱' + Number(v).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    };
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    const App = {
      tenantId: null,
      companyId: null,
      employees: [],
      companyStructure: { departments: [] },
      reportingToMap: {},
      payoutSchedules: [],
      commissionSchedules: [],
      specialSchedules: [],
      regularPayoutState: {},
      specialPayoutState: {},
      commissionPayoutState: {},
      adjustmentsList: [],
      commissionAssignments: [],
      bookingsList: [],

      selectedYear: new Date().getFullYear(),
      selectedMonth: new Date().getMonth(),

      saveTimeout: null,

      async init() {
        try {
          const authInfo = await window.BKAuth.checkRoleGate(['HR', 'Finance'], '../../../admin.html');
          if (!authInfo) return;
          this.tenantId = authInfo.tenantId;
          const { data: co } = await getSb().from('companies').select('id').eq('tenant_id', this.tenantId).limit(1).maybeSingle();
          this.companyId = co?.id || null;
          if (!this.companyId) { toast('Failed to resolve company.', 'error'); return; }

          this.updateMonthDisplay();
          await this.loadData();
          this.render();
          this.bindEvents();
        } catch (e) {
          console.error(e);
          toast('Initialization failed: ' + e.message, 'error');
        }
      },

      async loadData() {
        const sb = getSb();

        // Company structure
        try {
          const { data } = await sb.from('global_settings').select('value').eq('key', 'company_structure').eq('company_id', this.companyId).maybeSingle();
          this.companyStructure = data?.value || { departments: [] };
          this.buildReportingToMap();
        } catch (_) { this.companyStructure = { departments: [] }; }

        // Employees
        try {
          const { data, error } = await sb.from('employees')
            .select('id, first_name, middle_name, last_name, salary, employment_status, department, title, payout_details, payout_details_image, reporting_to')
            .eq('company_id', this.companyId)
            .eq('employment_status', 'Active');
          if (error) throw error;
          this.employees = data || [];
        } catch (e) { this.employees = []; console.error(e); }

        // Tracker config (schedules + special schedules)
        try {
          const { data } = await sb.from('global_settings').select('value').eq('key', 'salary_tracker_config').eq('company_id', this.companyId).maybeSingle();
          const cfg = data?.value || {};
          this.payoutSchedules = cfg.payoutSchedules || [15, 30];
          this.commissionSchedules = cfg.commissionSchedules || [15, 30];
          this.specialSchedules = cfg.specialSchedules || [];
        } catch (_) { this.payoutSchedules = [15, 30]; this.commissionSchedules = [15, 30]; this.specialSchedules = []; }

        // Payout states
        const stateKeys = ['regular_payout_state', 'special_payout_state', 'commission_payout_state'];
        const [regData, specData, commData] = await Promise.all(
          stateKeys.map(key => sb.from('global_settings').select('value').eq('key', key).eq('company_id', this.companyId).maybeSingle().then(r => r.data))
        );
        this.regularPayoutState   = regData?.value  || {};
        this.specialPayoutState   = specData?.value || {};
        this.commissionPayoutState = commData?.value || {};

        // Adjustments (all months — needed for per-schedule partitioning in summary)
        try {
          const { data } = await sb.from('employee_adjustments').select('id, employee_id, amount, date, label, paid').eq('company_id', this.companyId);
          this.adjustmentsList = (data || []).map(a => ({ id: a.id, employeeId: a.employee_id, value: a.amount, date: a.date, label: a.label, paid: a.paid }));
        } catch (e) { this.adjustmentsList = []; console.error(e); }

        // Commission assignments
        try {
          const { data, error } = await sb.from('commission_assignments').select('employee_id, booking_id, product_index, amount, sku, rate_label').eq('company_id', this.companyId);
          if (error) throw error;
          this.commissionAssignments = data || [];
        } catch (e) { this.commissionAssignments = []; console.error(e); }

        // Installation bookings
        try {
          const { data, error } = await sb.from('installation_bookings').select('*').eq('company_id', this.companyId);
          if (error) throw error;
          this.bookingsList = data || [];
        } catch (e) { this.bookingsList = []; console.error(e); }

        // Products & Config
        try {
          const [productsRes, configRes] = await Promise.all([
            sb.from('products').select('sku, business, category, tags'),
            sb.from('global_settings').select('value').eq('key', 'commissions_config').eq('company_id', this.companyId).maybeSingle()
          ]);
          this.dbProducts = productsRes.data || [];
          this.commissionsConfig = configRes.data?.value || { rates: [], eligibility_rules: [] };
        } catch (e) {
          console.error('Error loading config:', e);
          this.dbProducts = [];
          this.commissionsConfig = { rates: [], eligibility_rules: [] };
        }

        // Installer Payout Settings
        try {
          const { data } = await sb.from('global_settings').select('value').eq('key', 'installer_payout_settings').eq('company_id', this.companyId).maybeSingle();
          this.installerPayoutSettings = data?.value || null;
        } catch (_) { this.installerPayoutSettings = null; }

        // General Ledger Accounts Map
        try {
          const { data: glAccounts } = await sb.from('journal_accounts').select('id, name').eq('company_id', this.companyId);
          this.glAccountsMap = {};
          (glAccounts || []).forEach(a => {
            this.glAccountsMap[a.id] = a.name.toLowerCase();
          });
        } catch (e) {
          this.glAccountsMap = {};
          console.error('Error loading journal accounts:', e);
        }

        // Fetch Assign Account config
        try {
          const { data: configData } = await sb.from('global_settings').select('value').eq('key', 'journal_account_employee_assignments').eq('company_id', this.companyId).maybeSingle();
          this.accountAssignments = configData?.value?.assignments || {};
        } catch (e) {
          this.accountAssignments = {};
          console.error('Error loading account assignments:', e);
        }

        // Fetch General Journal entries
        try {
          const { data: journalData, error: journalErr } = await sb
            .from('general_journal')
            .select('id, company_id, date, account, account_id, debit, credit, description_1, description_2')
            .eq('company_id', this.companyId)
            .not('account_id', 'is', null);
          if (journalErr) throw journalErr;
          this.generalJournalEntries = journalData || [];
        } catch (e) {
          this.generalJournalEntries = [];
          console.error('Error loading general journal entries:', e);
        }
      },

      getAssignedDoorsForBookingAndEmployee(b, empId) {
        let doorsArr = [];
        if (b.doors) {
          if (typeof b.doors === 'string') {
            try { doorsArr = JSON.parse(b.doors); } catch(_) {}
          } else if (Array.isArray(b.doors)) {
            doorsArr = b.doors;
          }
        }

        let bInsts = [];
        if (b.installers) {
          if (typeof b.installers === 'string') {
            try { bInsts = JSON.parse(b.installers); } catch(_) {}
          } else if (Array.isArray(b.installers)) {
            bInsts = b.installers;
          }
        }

        const isBookingLevelInstaller = bInsts.some(inst => inst && inst.id === empId) || 
                                        (b.installer_id && b.installer_id.split(' | ').includes(empId));

        const bookingHasDoorLevelInstallers = doorsArr.some(d => d && Array.isArray(d.installers) && d.installers.some(inst => inst && (inst.id || inst.name)));

        const assignedDoors = [];

        if (doorsArr.length === 0) {
          if (isBookingLevelInstaller) {
            let roles = [];
            const matchedBInsts = bInsts.filter(inst => inst && inst.id === empId);
            if (matchedBInsts.length > 0) {
              matchedBInsts.forEach(inst => {
                const r = inst.role || 'lead';
                if (!roles.includes(r)) roles.push(r);
              });
            } else if (b.installer_id) {
              const ids = b.installer_id.split(' | ');
              const myIdIdx = ids.indexOf(empId);
              if (myIdIdx !== -1) {
                roles.push(myIdIdx === 0 ? 'lead' : 'assist');
              }
            }
            if (roles.length === 0) roles.push('lead');
            
            let productsArr = [];
            if (b.products) {
              if (typeof b.products === 'string') {
                try { productsArr = JSON.parse(b.products); } catch(_) {}
              } else if (Array.isArray(b.products)) {
                productsArr = b.products;
              }
            }
            const skus = (b.product_skus || '').split(' | ').filter(Boolean);
            const activeSkus = productsArr.length > 0 
              ? productsArr.filter(p => !p.cancelled && p.sku !== 'ADD-ON LABOR').map(p => p.sku)
              : skus;

            assignedDoors.push({
              completed: b.status === 'done' || b.status === 'completed' || b.status === 'finished',
              roles: roles,
              skus: activeSkus,
              completed_at: b.updated_at || b.created_at || b.scheduled_date,
              scheduled_date: b.scheduled_date
            });
          }
          return assignedDoors;
        }

        let productsArr = [];
        if (b.products) {
          if (typeof b.products === 'string') {
            try { productsArr = JSON.parse(b.products); } catch(_) {}
          } else if (Array.isArray(b.products)) {
            productsArr = b.products;
          }
        }
        const skus = (b.product_skus || '').split(' | ');
        const anyDoorHasAttachedProducts = doorsArr.some(d => d && Array.isArray(d.products) && d.products.length > 0);
        const isSingleDoorGrouping = (doorsArr.length === 1 && productsArr.length > 0);
        const skuOccurrenceCount = new Map();

        doorsArr.forEach((door, index) => {
          let isAssignedToThisDoor = false;
          let roles = [];

          if (door && Array.isArray(door.installers)) {
            const matchedInsts = door.installers.filter(inst => inst && inst.id === empId);
            if (matchedInsts.length > 0) {
              isAssignedToThisDoor = true;
              matchedInsts.forEach(inst => {
                const r = inst.role || 'lead';
                if (!roles.includes(r)) roles.push(r);
              });
            }
          } else if (bookingHasDoorLevelInstallers) {
            isAssignedToThisDoor = false;
          } else {
            isAssignedToThisDoor = isBookingLevelInstaller;
            const matchedBInsts = bInsts.filter(inst => inst && inst.id === empId);
            if (matchedBInsts.length > 0) {
              matchedBInsts.forEach(inst => {
                const r = inst.role || 'lead';
                if (!roles.includes(r)) roles.push(r);
              });
            } else if (b.installer_id) {
              const ids = b.installer_id.split(' | ');
              const myIdIdx = ids.indexOf(empId);
              if (myIdIdx !== -1) {
                roles.push(myIdIdx === 0 ? 'lead' : 'assist');
              }
            }
          }

          if (isAssignedToThisDoor) {
            const doorSkus = [];
            if (anyDoorHasAttachedProducts && door) {
              const attachedSkus = door.products || [];
              attachedSkus.forEach(sku => {
                const matchingProds = productsArr.filter(p => p.sku === sku);
                const occurrenceIndex = skuOccurrenceCount.get(sku) || 0;
                const matchedProd = matchingProds[occurrenceIndex];
                if (matchedProd && !matchedProd.cancelled) {
                  doorSkus.push(matchedProd.sku);
                }
                skuOccurrenceCount.set(sku, occurrenceIndex + 1);
              });
            } else if (isSingleDoorGrouping) {
              productsArr.forEach(p => {
                if (p.sku !== 'ADD-ON LABOR' && !p.cancelled) {
                  doorSkus.push(p.sku);
                }
              });
            } else {
              if (productsArr[index] && !productsArr[index].cancelled) {
                doorSkus.push(productsArr[index].sku);
              } else if (skus[index]) {
                doorSkus.push(skus[index]);
              }
            }

            assignedDoors.push({
              completed: !!door.completed,
              roles: roles,
              skus: doorSkus,
              completed_at: door.completed_at || b.updated_at || b.created_at || b.scheduled_date,
              scheduled_date: b.scheduled_date
            });
          } else {
            if (anyDoorHasAttachedProducts && door) {
              const attachedSkus = door.products || [];
              attachedSkus.forEach(sku => {
                const occurrenceIndex = skuOccurrenceCount.get(sku) || 0;
                skuOccurrenceCount.set(sku, occurrenceIndex + 1);
              });
            }
          }
        });

        return assignedDoors;
      },

      calculateInstallerPayouts(empId, monthKey, sortedScheds = [15, 30]) {
        const payoutSettings = this.installerPayoutSettings || {
          installations_before_crediting: 15,
          lead_credit: 1.0,
          assist_credit: 0.5,
          lead_rate: 1000,
          assist_rate: 500,
          extra_services: [
            { sku: 'BASEPLATE-M', rate: 700 },
            { sku: 'BASEPLATE-S', rate: 700 }
          ]
        };

        const thresholdVal = payoutSettings.installations_before_crediting || 15;
        const leadWeight = payoutSettings.lead_credit !== undefined ? payoutSettings.lead_credit : 1.0;
        const assistWeight = payoutSettings.assist_credit !== undefined ? payoutSettings.assist_credit : 0.5;
        const leadRateVal = payoutSettings.lead_rate || 1000;

        const extraServicesList = (payoutSettings.extra_services || []).map(es => {
          let sku = es.sku || es.name || '';
          if (sku === 'Welding Baseplate Metal') sku = 'BASEPLATE-M';
          if (sku === 'Welding Baseplate Stainless') sku = 'BASEPLATE-S';
          return { sku, rate: es.rate };
        });

        const monthBookings = this.bookingsList.filter(b => {
          if (!b.scheduled_date) return false;
          if (b.status === 'cancelled') return false;
          const d = new Date(b.scheduled_date);
          const bookingMonthKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
          return bookingMonthKey === monthKey;
        });

        const doorJobs = [];
        monthBookings.forEach(b => {
          const assignedDoors = this.getAssignedDoorsForBookingAndEmployee(b, empId);
          assignedDoors.forEach(d => {
            if (d.completed) {
              doorJobs.push(d);
            }
          });
        });

        // Sort doors chronologically by scheduled_date
        doorJobs.sort((a, b) => new Date(a.scheduled_date) - new Date(b.scheduled_date));

        let runningCredit = 0;
        let totalThresholdEarnings = 0;
        let totalServiceEarnings = 0;
        const cutoffPayouts = {};
        const serviceCounts = {};

        sortedScheds.forEach(day => { cutoffPayouts[day] = 0; });

        doorJobs.forEach(job => {
          let weight = 0;
          if (job.roles.includes('lead')) weight = leadWeight;
          else if (job.roles.includes('assist')) weight = assistWeight;

          // 1. Service pay
          let servicePayForJob = 0;
          if (job.roles.includes('service')) {
            job.skus.forEach(sku => {
              const matchedService = extraServicesList.find(es => es.sku === sku);
              if (matchedService) {
                serviceCounts[sku] = (serviceCounts[sku] || 0) + 1;
                servicePayForJob += matchedService.rate;
              }
            });
          }

          // 2. Extra threshold pay
          let thresholdPayForJob = 0;
          const previousCredit = runningCredit;
          const newCredit = previousCredit + weight;
          if (newCredit > thresholdVal) {
            const extraCredit = weight;
            thresholdPayForJob = extraCredit * leadRateVal;
          }
          runningCredit = newCredit;

          totalThresholdEarnings += thresholdPayForJob;
          totalServiceEarnings += servicePayForJob;

          // Determine cutoff day
          const date = new Date(job.scheduled_date);
          const dayVal = date.getUTCDate();
          const cutoffDay = this.getScheduleDayForItemDay(dayVal, sortedScheds);
          
          if (cutoffPayouts[cutoffDay] !== undefined) {
            cutoffPayouts[cutoffDay] += (thresholdPayForJob + servicePayForJob);
          } else {
            cutoffPayouts[sortedScheds[sortedScheds.length - 1]] += (thresholdPayForJob + servicePayForJob);
          }
        });

        let thresholdDescription = '';
        if (totalThresholdEarnings > 0) {
          thresholdDescription = `₱${leadRateVal.toLocaleString()} per extra work`;
        } else {
          thresholdDescription = `Threshold of ${thresholdVal} counts not reached`;
        }

        let serviceDescription = '';
        if (totalServiceEarnings > 0) {
          const parts = [];
          Object.keys(serviceCounts).forEach(sku => {
            const matched = extraServicesList.find(es => es.sku === sku);
            const rate = matched ? matched.rate : 0;
            parts.push(`₱${rate.toLocaleString()} per ${sku}`);
          });
          serviceDescription = parts.join('\n');
        } else {
          serviceDescription = 'No extra paid services recorded';
        }

        return {
          totalCredit: runningCredit,
          thresholdEarnings: totalThresholdEarnings,
          thresholdDescription,
          serviceEarnings: totalServiceEarnings,
          serviceDescription,
          totalInstallationPayout: totalThresholdEarnings + totalServiceEarnings,
          cutoffPayouts
        };
      },

      monthKey() {
        return `${this.selectedYear}-${String(this.selectedMonth + 1).padStart(2, '0')}`;
      },

      updateMonthDisplay() {
        const el = document.getElementById('summary-month-display');
        if (el) el.textContent = `${MONTHS[this.selectedMonth]} ${this.selectedYear}`;
      },

      changeMonth(diff) {
        let m = this.selectedMonth + diff;
        let y = this.selectedYear;
        if (m < 0)  { m = 11; y--; }
        if (m > 11) { m = 0;  y++; }
        this.selectedMonth = m;
        this.selectedYear  = y;
        this.updateMonthDisplay();
        this.render();
      },

      bindEvents() {
        document.getElementById('btn-prev-month').addEventListener('click', () => this.changeMonth(-1));
        document.getElementById('btn-next-month').addEventListener('click', () => this.changeMonth(1));
        document.getElementById('btn-clear-all').addEventListener('click', () => document.getElementById('clear-all-modal').classList.add('open'));
        document.getElementById('btn-cancel-clear').addEventListener('click', () => document.getElementById('clear-all-modal').classList.remove('open'));
        document.getElementById('btn-confirm-clear').addEventListener('click', () => this.clearAllState());
      },

      buildReportingToMap() {
        this.reportingToMap = {};
        (this.companyStructure?.departments || []).forEach(dept => {
          const deptHeadId = dept.managerId;
          (dept.subteams || []).forEach(sub => {
            const subMgrId = sub.managerId;
            if (subMgrId && deptHeadId) this.reportingToMap[subMgrId] = deptHeadId;
            (sub.colleagueIds || []).forEach(id => { this.reportingToMap[id] = subMgrId || deptHeadId; });
          });
        });
      },

      groupEmployees() {
        const empDeptMap = {};
        const empSubteamsMap = {};
        const deptHeadsSet = new Set();
        (this.companyStructure?.departments || []).forEach(dept => {
          const deptName = dept.name;
          if (dept.managerId) { empDeptMap[dept.managerId] = deptName; deptHeadsSet.add(dept.managerId); }
          (dept.subteams || []).forEach(sub => {
            const subName = sub.name;
            if (sub.managerId) {
              empDeptMap[sub.managerId] = deptName;
              empSubteamsMap[sub.managerId] = empSubteamsMap[sub.managerId] || [];
              empSubteamsMap[sub.managerId].push(subName);
            }
            (sub.colleagueIds || []).forEach(id => {
              empDeptMap[id] = deptName;
              empSubteamsMap[id] = empSubteamsMap[id] || [];
              empSubteamsMap[id].push(subName);
            });
          });
        });

        const grouped = {};
        const unassigned = [];
        this.employees.forEach(emp => {
          const dept = empDeptMap[emp.id] || emp.department || '';
          const subs = empSubteamsMap[emp.id] || [];
          if (!dept) { unassigned.push(emp); return; }
          if (!grouped[dept]) grouped[dept] = {};
          if (deptHeadsSet.has(emp.id)) {
            grouped[dept]['Department Head'] = grouped[dept]['Department Head'] || [];
            grouped[dept]['Department Head'].push(emp);
          } else if (subs.length === 0) {
            grouped[dept]['_unassigned_subteam'] = grouped[dept]['_unassigned_subteam'] || [];
            grouped[dept]['_unassigned_subteam'].push(emp);
          } else {
            subs.forEach(sub => {
              grouped[dept][sub] = grouped[dept][sub] || [];
              grouped[dept][sub].push(emp);
            });
          }
        });
        return { grouped, unassigned };
      },

      isPastDay(day) {
        const t = new Date();
        if (this.selectedYear < t.getFullYear()) return true;
        if (this.selectedYear > t.getFullYear()) return false;
        if (this.selectedMonth < t.getMonth()) return true;
        if (this.selectedMonth > t.getMonth()) return false;
        return day < t.getDate();
      },

      getScheduleDayForItemDay(itemDay, sortedScheds) {
        if (!sortedScheds.length) return 30;
        for (const s of sortedScheds) { if (itemDay <= s) return s; }
        return sortedScheds[sortedScheds.length - 1];
      },

      // ── Render ──
      render() {
        const header = document.getElementById('summary-table-header');
        const tbody  = document.getElementById('summary-table-body');
        if (!header || !tbody) return;

        const mk = this.monthKey();
        const specialDays  = [...new Set(this.specialSchedules.map(s => Number(s.day)))].sort((a, b) => a - b);
        const sortedScheds = [...this.payoutSchedules].sort((a, b) => a - b);
        const colspan = 10 + specialDays.length + sortedScheds.length + 2;

        let headerHtml = `
          <th class="col-sticky-1">Employee Name</th>
          <th class="col-sticky-2">Title / Position</th>
          <th class="col-sticky-3">Payment Details</th>
          <th>Salary</th><th>Commission</th><th>Installation</th><th>Adjustments</th><th>GL Reimb</th><th>GL Cash Adv</th>
          <th style="border-right:2px solid var(--border); width:1px; padding:0;"></th>
        `;
        specialDays.forEach(d => { headerHtml += `<th>Special (Day ${d})</th>`; });
        sortedScheds.forEach(d => { headerHtml += `<th>Payout (Day ${d})</th>`; });
        headerHtml += `<th style="background:rgba(161,161,170,0.15);">Grand Total</th>`;
        headerHtml += `<th style="width:100px; text-align:center;">Action</th>`;
        header.innerHTML = headerHtml;

        const { grouped, unassigned } = this.groupEmployees();
        let bodyHtml = '';

        // Aggregators for total row
        let sumBaseSalary = 0;
        let sumComms = 0;
        let sumInstPayouts = 0;
        let sumAdjs = 0;
        let sumGlReimbs = 0;
        let sumGlCashAdv = 0;
        let sumSpecialDays = {};
        let sumPayoutDays = {};
        specialDays.forEach(day => sumSpecialDays[day] = 0);
        sortedScheds.forEach(day => sumPayoutDays[day] = 0);
        let sumGrandTotal = 0;

        const renderEmpRow = (emp) => {
          const baseSalary    = emp.salary || 0;
          const positionText  = emp.title || '';
          const detailsText   = emp.payout_details || '';
          const detailsImage  = emp.payout_details_image || '';

          let detailsHtml = '';
          if (detailsText) {
            const isUrl   = /^(https?:\/\/|\/)/.test(detailsText.trim());
            const isImage = isUrl && /\.(png|jpe?g|gif|webp|bmp|svg)(\?.*)?$/i.test(detailsText.trim());
            detailsHtml = isImage
              ? `<a href="${esc(detailsText.trim())}" target="_blank" style="color:var(--cyan); font-weight:600; text-decoration:underline;">View</a>`
              : `<div style="white-space:pre-wrap; max-width:180px;">${esc(detailsText)}</div>`;
          }
          if (detailsImage) detailsHtml += `${detailsHtml ? ' / ' : ''}<a href="${esc(detailsImage)}" target="_blank" style="color:var(--cyan); font-weight:600; text-decoration:underline;">View</a>`;
          if (!detailsHtml) detailsHtml = '—';

          // Commission for this month
          const empComms = this._commissionForEmpMonth(emp.id, mk);
          // Adjustments for this month
          const empAdjs = this.adjustmentsList.filter(a => a.employeeId === emp.id && a.date?.startsWith(mk.substring(0,7))).reduce((s, a) => s + (Number(a.value) || 0), 0);
          const empGlAdd = this._glAdditionsForEmpMonth(emp.id, mk);
          const empGlDed = this._glDeductionsForEmpMonth(emp.id, mk);

          // Add to aggregators
          sumBaseSalary += baseSalary;
          sumComms += empComms;
          sumAdjs += empAdjs;
          sumGlReimbs += empGlAdd;
          sumGlCashAdv += empGlDed;

          // Special payout cells
          let specialCellsHtml = '';
          let totalSpecials = 0;
          specialDays.forEach(day => {
            const specVal = this.specialSchedules.filter(s => s.employeeId === emp.id && Number(s.day) === day).reduce((s, x) => s + (Number(x.value) || 0), 0);
            totalSpecials += specVal;
            sumSpecialDays[day] += specVal;
            if (specVal > 0) {
              const isPaid = this.specialPayoutState[mk]?.[`${emp.id}_${day}`] || false;
              const isPast = this.isPastDay(day);
              specialCellsHtml += `<td><div class="payout-cell-container" style="display:inline-flex;align-items:center;gap:0.4rem;">
                <input type="checkbox" class="payout-checkbox" ${isPaid ? 'checked' : ''} onchange="App.toggleSpecialPayoutCheck('${emp.id}',${day},this.checked)">
                <span class="payout-val ${isPast && !isPaid ? 'overdue' : ''}" id="val-spec-${emp.id}-${day}" style="${isPaid ? 'text-decoration:line-through;opacity:0.5;' : ''}">${esc(php(specVal))}</span>
              </div></td>`;
            } else {
              specialCellsHtml += `<td style="color:var(--text-muted);">—</td>`;
            }
          });

          // Payout columns
          let payoutCellsHtml = '';
          const numScheds = sortedScheds.length || 1;
          const salaryPortion = baseSalary / numScheds;
          const instPayouts = this.calculateInstallerPayouts(emp.id, mk, sortedScheds);
          sumInstPayouts += instPayouts.totalInstallationPayout;
          
          sortedScheds.forEach((day, sIdx) => {
            const adjsVal  = this._adjsForSchedule(emp.id, day, mk, sortedScheds);
            const commsVal  = this._commsForSchedule(emp.id, day, mk, sortedScheds);
            const instPortion = instPayouts.cutoffPayouts[day] || 0;
            const glAddVal = this._glAdditionsForSchedule(emp.id, day, mk, sortedScheds);
            const glDedVal = this._glDeductionsForSchedule(emp.id, day, mk, sortedScheds);
            
            const totalSchedVal = salaryPortion + adjsVal + commsVal + instPortion + glAddVal - glDedVal;
            sumPayoutDays[day] += totalSchedVal;
            const isPaid = this.regularPayoutState[mk]?.[`${emp.id}_${day}`] || false;
            const isPast = this.isPastDay(day);

            const breakdownItems = [];
            if (salaryPortion > 0) breakdownItems.push(`Sal: ${php(salaryPortion)}`);
            if (commsVal > 0) breakdownItems.push(`Com: ${php(commsVal)}`);
            if (instPortion > 0) breakdownItems.push(`Inst: ${php(instPortion)}`);
            if (adjsVal !== 0) breakdownItems.push(`Adj: ${php(adjsVal)}`);
            if (glAddVal > 0) breakdownItems.push(`Reimb (GL): ${php(glAddVal)}`);
            if (glDedVal > 0) breakdownItems.push(`Cash Adv: -${php(glDedVal)}`);
            
            const breakdownHtml = breakdownItems.length > 0 
              ? `<div class="payout-breakdown" style="font-size:0.68rem; color:var(--text-muted); line-height:1.2; margin-left:1.4rem; text-align:left; font-family:var(--font);">${breakdownItems.join('<br>')}</div>` 
              : '';

            payoutCellsHtml += `<td>
              <div class="payout-cell-container" style="display:flex; flex-direction:column; align-items:flex-start; gap:0.15rem; min-width:90px; padding:0.25rem 0;">
                <div style="display:inline-flex; align-items:center; gap:0.4rem;">
                  <input type="checkbox" class="payout-checkbox" ${isPaid ? 'checked' : ''} onchange="App.togglePayoutCheck('${emp.id}',${day},this.checked)">
                  <span class="payout-val ${isPast && !isPaid ? 'overdue' : ''}" id="val-${emp.id}-${day}" style="${isPaid ? 'text-decoration:line-through;opacity:0.5;' : ''}" title="${esc(breakdownItems.join('\n'))}">${esc(php(totalSchedVal))}</span>
                </div>
                ${breakdownHtml}
              </div>
            </td>`;
          });

          const grandTotal = baseSalary + empComms + empAdjs + totalSpecials + instPayouts.totalInstallationPayout + empGlAdd - empGlDed;
          sumGrandTotal += grandTotal;

          return `<tr class="employee-row" data-emp-id="${esc(emp.id)}">
            <td class="col-name col-sticky-1">${esc([emp.first_name, emp.last_name].filter(Boolean).join(' '))}</td>
            <td class="col-sticky-2"><div style="font-size:0.75rem;color:var(--text-secondary);">${esc(positionText || '—')}</div></td>
            <td class="col-sticky-3"><div style="font-size:0.75rem;color:var(--text-secondary);">${detailsHtml}</div></td>
            <td>${esc(php(baseSalary))}</td>
            <td>${esc(php(empComms))}</td>
            <td>${esc(php(instPayouts.totalInstallationPayout))}</td>
            <td style="color:${empAdjs < 0 ? 'var(--danger)' : 'var(--text-primary)'};">${esc(php(empAdjs))}</td>
            <td>${esc(php(empGlAdd))}</td>
            <td style="color:${empGlDed > 0 ? 'var(--danger)' : 'var(--text-primary)'};">${esc(empGlDed > 0 ? `-${php(empGlDed)}` : php(0))}</td>
            <td style="border-right:2px solid var(--border);padding:0;"></td>
            ${specialCellsHtml}${payoutCellsHtml}
            <td style="font-weight:700;color:var(--text-primary);background:rgba(161,161,170,0.15);">${esc(php(grandTotal))}</td>
            <td style="text-align:center;">
              <button class="btn btn-outline btn-xs" onclick="App.shortcutSavePayslip('${emp.id}')" title="Save Payslip as PDF" style="padding:4px 8px;font-size:0.72rem;display:inline-flex;align-items:center;gap:4px;height:26px;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>PDF
              </button>
            </td>
          </tr>`;
        };

        // Render departments
        Object.keys(grouped).sort().forEach(dept => {
          bodyHtml += `<tr class="dept-header-row"><td colspan="${colspan}"><div class="dept-header-sticky">${esc(dept)} Department</div></td></tr>`;
          const teams = Object.keys(grouped[dept]).sort((a, b) => {
            if (a === 'Department Head') return -1;
            if (b === 'Department Head') return 1;
            return a.localeCompare(b);
          });
          teams.forEach(sub => {
            if (sub !== '_unassigned_subteam') {
              bodyHtml += `<tr class="team-header-row"><td colspan="${colspan}"><div class="team-header-sticky">${esc(sub)}</div></td></tr>`;
            }
            grouped[dept][sub].forEach(emp => { bodyHtml += renderEmpRow(emp); });
          });
        });

        if (unassigned.length > 0) {
          bodyHtml += `<tr class="dept-header-row"><td colspan="${colspan}">Unassigned Department / Pool</td></tr>`;
          unassigned.forEach(emp => { bodyHtml += renderEmpRow(emp); });
        }

        // Append Total Row if employees exist
        if (bodyHtml) {
          let specTotalsHtml = '';
          specialDays.forEach(day => {
            specTotalsHtml += `<td style="font-weight:700;color:var(--text-primary);">${esc(php(sumSpecialDays[day]))}</td>`;
          });
          let payoutTotalsHtml = '';
          sortedScheds.forEach(day => {
            payoutTotalsHtml += `<td style="font-weight:700;color:var(--text-primary);">${esc(php(sumPayoutDays[day]))}</td>`;
          });

          bodyHtml += `
            <tr class="total-row" style="background:var(--bg-base); font-weight:700; border-top: 2px solid var(--border);">
              <td class="col-name col-sticky-1" style="font-weight:700;">TOTAL</td>
              <td class="col-sticky-2"></td>
              <td class="col-sticky-3"></td>
              <td>${esc(php(sumBaseSalary))}</td>
              <td>${esc(php(sumComms))}</td>
              <td>${esc(php(sumInstPayouts))}</td>
              <td style="color:${sumAdjs < 0 ? 'var(--danger)' : 'var(--text-primary)'};">${esc(php(sumAdjs))}</td>
              <td>${esc(php(sumGlReimbs))}</td>
              <td style="color:${sumGlCashAdv > 0 ? 'var(--danger)' : 'var(--text-primary)'};">${esc(sumGlCashAdv > 0 ? `-${php(sumGlCashAdv)}` : php(0))}</td>
              <td style="border-right:2px solid var(--border);padding:0;"></td>
              ${specTotalsHtml}${payoutTotalsHtml}
              <td style="font-weight:700;color:var(--text-primary);background:rgba(161,161,170,0.15);">${esc(php(sumGrandTotal))}</td>
              <td></td>
            </tr>
          `;
        }

        tbody.innerHTML = bodyHtml || `<tr><td colspan="${colspan}" style="text-align:center;padding:3rem;color:var(--text-muted);">No employees found.</td></tr>`;
      },

      // ── Commission helpers ──
      _parseDoors(b) {
        if (!b) return [];
        if (Array.isArray(b.doors)) return b.doors;
        try { return JSON.parse(b.doors); } catch (_) { return []; }
      },

      _getDynamicCommAmount(a, productMap) {
        if (!a) return 0;
        const b = this.bookingsList.find(x => x.id === a.booking_id);
        if (!b) return 0;

        let eligibleCentavos = 0;
        if (a.sku === 'ORDER_TOTAL') {
          const calc = getBookingEligibleCentavos(b, productMap, this.commissionsConfig.eligibility_rules);
          eligibleCentavos = calc.finalEligibleCentavos;
        } else {
          const skus = (b.product_skus || '').split(' | ').map(s => s.trim());
          const qtys = (b.product_qtys || '').split(' | ').map(s => s.trim());
          const unitPrices = (b.product_unit_prices || '').split(' | ').map(s => s.trim());

          const qty = parseInt(qtys[a.product_index]) || 1;
          const unitPriceDec = parseFloat(unitPrices[a.product_index]) || 0;
          const totalCentavos = Math.round(unitPriceDec * qty * 100);

          const product = productMap[a.sku?.toLowerCase()] || { sku: a.sku || '', business: '', category: '', tags: [] };
          const isEligible = checkSkuEligibility(product, this.commissionsConfig.eligibility_rules);
          eligibleCentavos = isEligible ? totalCentavos : 0;
        }

        const rateConfig = (this.commissionsConfig.rates || []).find(r => r.label === a.rate_label);
        const basePercent = rateConfig ? parseFloat(rateConfig.value) || 0 : 0;
        const adjustment = getCommissionAdjustmentForBooking(b, a.rate_label, productMap, this.commissionsConfig.adjustment_rules);
        const percent = basePercent + adjustment;

        const cellAssignments = this.commissionAssignments.filter(x => x.booking_id === a.booking_id && x.sku === a.sku && x.product_index === a.product_index && x.rate_label === a.rate_label);
        const activeAssignees = cellAssignments.filter(x => x.employee_id && x.employee_id !== 'none');
        const divisor = activeAssignees.length || 1;
        const splitPercent = percent / divisor;
        const splitCommAmountCentavos = Math.round(eligibleCentavos * (splitPercent / 100));

        return splitCommAmountCentavos / 100;
      },

      _commissionForEmpMonth(empId, mk, passedProductMap = null) {
        let productMap = passedProductMap;
        if (!productMap) {
          productMap = {};
          (this.dbProducts || []).forEach(p => {
            if (p.sku) productMap[p.sku.toLowerCase()] = p;
          });
        }
        return this.commissionAssignments.filter(a => {
          if (a.employee_id !== empId) return false;
          const b = this.bookingsList.find(x => x.id === a.booking_id);
          if (!b || b.status === 'cancelled') return false;
          const doors = this._parseDoors(b);
          const door  = doors[a.product_index];
          const isDone = (door && door.completed) || ['done', 'completed', 'finished'].includes(b.status);
          if (!isDone) return false;
          const ds = b.scheduled_date;
          if (!ds) return false;
          const d = new Date(ds);
          return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` === mk;
        }).reduce((s, a) => s + this._getDynamicCommAmount(a, productMap), 0);
      },

      _glAdditionsForSchedule(empId, schedDay, mk, sortedScheds) {
        if (!this.generalJournalEntries || !this.accountAssignments) return 0;
        return this.generalJournalEntries.filter(r => {
          const assignedEmpId = this.accountAssignments[r.account_id];
          if (assignedEmpId !== empId) return false;
          const accName = (this.glAccountsMap?.[r.account_id] || '').toLowerCase();
          if (!accName.includes('due to')) return false;
          const d = new Date(r.date);
          const entryMonthKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
          if (entryMonthKey !== mk) return false;
          return this.getScheduleDayForItemDay(d.getUTCDate(), sortedScheds) === schedDay;
        }).reduce((s, r) => {
          const credit = parseFloat(r.credit) || 0;
          const debit = parseFloat(r.debit) || 0;
          return s + (credit - debit);
        }, 0);
      },

      _glDeductionsForSchedule(empId, schedDay, mk, sortedScheds) {
        if (!this.generalJournalEntries || !this.accountAssignments) return 0;
        return this.generalJournalEntries.filter(r => {
          const assignedEmpId = this.accountAssignments[r.account_id];
          if (assignedEmpId !== empId) return false;
          const accName = (this.glAccountsMap?.[r.account_id] || '').toLowerCase();
          if (!accName.includes('due from')) return false;
          const d = new Date(r.date);
          const entryMonthKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
          if (entryMonthKey !== mk) return false;
          return this.getScheduleDayForItemDay(d.getUTCDate(), sortedScheds) === schedDay;
        }).reduce((s, r) => {
          const debit = parseFloat(r.debit) || 0;
          const credit = parseFloat(r.credit) || 0;
          return s + (debit - credit);
        }, 0);
      },

      _glAdditionsForEmpMonth(empId, mk) {
        if (!this.generalJournalEntries || !this.accountAssignments) return 0;
        return this.generalJournalEntries.filter(r => {
          const assignedEmpId = this.accountAssignments[r.account_id];
          if (assignedEmpId !== empId) return false;
          const accName = (this.glAccountsMap?.[r.account_id] || '').toLowerCase();
          if (!accName.includes('due to')) return false;
          const d = new Date(r.date);
          const entryMonthKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
          return entryMonthKey === mk;
        }).reduce((s, r) => {
          const credit = parseFloat(r.credit) || 0;
          const debit = parseFloat(r.debit) || 0;
          return s + (credit - debit);
        }, 0);
      },

      _glDeductionsForEmpMonth(empId, mk) {
        if (!this.generalJournalEntries || !this.accountAssignments) return 0;
        return this.generalJournalEntries.filter(r => {
          const assignedEmpId = this.accountAssignments[r.account_id];
          if (assignedEmpId !== empId) return false;
          const accName = (this.glAccountsMap?.[r.account_id] || '').toLowerCase();
          if (!accName.includes('due from')) return false;
          const d = new Date(r.date);
          const entryMonthKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
          return entryMonthKey === mk;
        }).reduce((s, r) => {
          const debit = parseFloat(r.debit) || 0;
          const credit = parseFloat(r.credit) || 0;
          return s + (debit - credit);
        }, 0);
      },

      _adjsForSchedule(empId, schedDay, mk, sortedScheds) {
        return this.adjustmentsList.filter(a => {
          if (a.employeeId !== empId) return false;
          const d = new Date(a.date);
          if (`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` !== mk) return false;
          return this.getScheduleDayForItemDay(d.getUTCDate(), sortedScheds) === schedDay;
        }).reduce((s, a) => s + (Number(a.value) || 0), 0);
      },



      _commsForSchedule(empId, schedDay, mk, sortedScheds, passedProductMap = null) {
        let productMap = passedProductMap;
        if (!productMap) {
          productMap = {};
          (this.dbProducts || []).forEach(p => {
            if (p.sku) productMap[p.sku.toLowerCase()] = p;
          });
        }
        return this.commissionAssignments.filter(a => {
          if (a.employee_id !== empId) return false;
          const b = this.bookingsList.find(x => x.id === a.booking_id);
          if (!b || b.status === 'cancelled') return false;
          const doors = this._parseDoors(b);
          const door  = doors[a.product_index];
          const isDone = (door && door.completed) || ['done', 'completed', 'finished'].includes(b.status);
          if (!isDone) return false;
          const ds = b.scheduled_date;
          if (!ds) return false;
          const d = new Date(ds);
          if (`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` !== mk) return false;
          return this.getScheduleDayForItemDay(d.getUTCDate(), sortedScheds) === schedDay;
        }).reduce((s, a) => s + this._getDynamicCommAmount(a, productMap), 0);
      },

      // ── Checkbox toggles ──
      togglePayoutCheck(empId, schedDay, checked) {
        const mk = this.monthKey();
        this.regularPayoutState[mk] = this.regularPayoutState[mk] || {};
        this.regularPayoutState[mk][`${empId}_${schedDay}`] = checked;
        const valEl = document.getElementById(`val-${empId}-${schedDay}`);
        if (valEl) {
          if (checked) { valEl.classList.remove('overdue'); valEl.style.textDecoration = 'line-through'; valEl.style.opacity = '0.5'; }
          else { valEl.style.textDecoration = ''; valEl.style.opacity = ''; if (this.isPastDay(schedDay)) valEl.classList.add('overdue'); }
        }
        this.debouncedSave();
        this.syncPayslipRecord(empId);
      },

      toggleSpecialPayoutCheck(empId, day, checked) {
        const mk = this.monthKey();
        this.specialPayoutState[mk] = this.specialPayoutState[mk] || {};
        this.specialPayoutState[mk][`${empId}_${day}`] = checked;
        const valEl = document.getElementById(`val-spec-${empId}-${day}`);
        if (valEl) {
          if (checked) { valEl.classList.remove('overdue'); valEl.style.textDecoration = 'line-through'; valEl.style.opacity = '0.5'; }
          else { valEl.style.textDecoration = ''; valEl.style.opacity = ''; if (this.isPastDay(day)) valEl.classList.add('overdue'); }
        }
        this.debouncedSave();
      },

      // ── Debounced save ──
      debouncedSave() {
        const el = document.getElementById('save-status');
        if (el) el.textContent = 'Saving changes...';
        if (this.saveTimeout) clearTimeout(this.saveTimeout);
        this.saveTimeout = setTimeout(() => this.saveStateSilent(), 1000);
      },

      async saveStateSilent() {
        try {
          const sb = getSb();
          await Promise.all([
            sb.from('global_settings').upsert({ key: 'regular_payout_state', company_id: this.companyId, value: this.regularPayoutState }),
            sb.from('global_settings').upsert({ key: 'special_payout_state', company_id: this.companyId, value: this.specialPayoutState }),
            sb.from('global_settings').upsert({ key: 'commission_payout_state', company_id: this.companyId, value: this.commissionPayoutState }),
          ]);
          const el = document.getElementById('save-status');
          if (el) { el.textContent = 'All changes saved'; setTimeout(() => { if (el.textContent === 'All changes saved') el.textContent = ''; }, 3000); }
        } catch (e) {
          console.error(e);
          const el = document.getElementById('save-status');
          if (el) el.textContent = 'Autosave failed';
        }
      },

      // ── Sync payslip record (snapshot when all salary cutoffs are checked) ──
      async syncPayslipRecord(empId) {
        const emp = this.employees.find(e => e.id === empId);
        if (!emp) return;
        const mk     = this.monthKey();
        const state  = this.regularPayoutState[mk];
        const scheds = this.payoutSchedules.length > 0 ? this.payoutSchedules : [15, 30];
        const allChecked = state && scheds.every(day => state[`${empId}_${day}`] === true);

        if (allChecked) {
          const baseSalary   = emp.salary || 0;
          const empComms     = this._commissionForEmpMonth(empId, mk);
          const empAdjObjs   = this.adjustmentsList.filter(a => { const d = new Date(a.date); return a.employeeId === empId && `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` === mk; });
          const empSpecs     = this.specialSchedules.filter(s => s.employeeId === empId);
          const totalAdjs    = empAdjObjs.reduce((s, a) => s + (Number(a.value) || 0), 0);
          const totalSpecs   = empSpecs.reduce((s, x) => s + (Number(x.value) || 0), 0);

          const instPayouts = this.calculateInstallerPayouts(empId, mk, [...scheds].sort((a, b) => a - b));
          const finalAdjObjs = [...empAdjObjs];
          let finalTotalAdjs = totalAdjs;
          if (instPayouts.thresholdEarnings > 0) {
            finalAdjObjs.push({
              label: 'Earnings Past Threshold',
              value: instPayouts.thresholdEarnings,
              description: instPayouts.thresholdDescription,
              date: new Date().toISOString()
            });
            finalTotalAdjs += instPayouts.thresholdEarnings;
          }
          if (instPayouts.serviceEarnings > 0) {
            finalAdjObjs.push({
              label: 'Service Job Earnings',
              value: instPayouts.serviceEarnings,
              description: instPayouts.serviceDescription,
              date: new Date().toISOString()
            });
            finalTotalAdjs += instPayouts.serviceEarnings;
          }

          const empGlAdd = this._glAdditionsForEmpMonth(empId, mk);
          const empGlDed = this._glDeductionsForEmpMonth(empId, mk);
          if (empGlAdd > 0) {
            finalAdjObjs.push({
              label: 'Reimbursement',
              value: empGlAdd,
              description: 'Reimbursement',
              date: new Date().toISOString()
            });
            finalTotalAdjs += empGlAdd;
          }
          if (empGlDed > 0) {
            finalAdjObjs.push({
              label: 'Cash Advance',
              value: -empGlDed,
              description: 'Cash Advance',
              date: new Date().toISOString()
            });
            finalTotalAdjs -= empGlDed;
          }
 
          const grandTotal   = baseSalary + empComms + finalTotalAdjs + totalSpecs;

          let resolvedDeptName = emp.department || '—';
          const matchedDept = (this.companyStructure?.departments || []).find(d => d.managerId === empId || (d.subteams || []).some(s => s.managerId === empId || (s.colleagueIds || []).includes(empId)));
          if (matchedDept) resolvedDeptName = matchedDept.name;

          const payload = {
            company_id: this.companyId, employee_id: empId, payout_month: mk,
            department: resolvedDeptName, position: emp.title || '—',
            salary: baseSalary, basic_paid: baseSalary,
            commissions: empComms, adjustments: finalTotalAdjs,
            reimbursements: 0, special_payouts: totalSpecs,
            total_payout: grandTotal,
            adjustments_list: finalAdjObjs,
            reimbursements_list: [],
            special_schedules: empSpecs
          };
          try { await getSb().from('payslip_records').upsert(payload, { onConflict: 'employee_id,payout_month' }); } catch (e) { console.error(e); }
        } else {
          try {
            await getSb().from('payslip_records').delete().eq('employee_id', empId).eq('payout_month', mk);
          } catch (e) { console.error(e); }
        }
      },

        const empSpecs   = this.specialSchedules.filter(s => s.employeeId === empId);

        let thresholdEarnings = 0;
        let thresholdDescription = '';
        let serviceEarnings = 0;
        let serviceDescription = '';

        const thresholdAdj = empAdjs.find(a => a.label === 'Earnings Past Threshold');

          thresholdEarnings = Number(thresholdAdj.value || thresholdAdj.amount || 0);
          thresholdDescription = thresholdAdj.description || '';

        }
        const serviceAdj = empAdjs.find(a => a.label === 'Service Job Earnings');

        const sortedScheds = [...this.payoutSchedules].sort((a, b) => a - b) || [30];
        let instPayouts = null;

        if (thresholdEarnings === 0 && serviceEarnings === 0) {
          instPayouts = this.calculateInstallerPayouts(empId, mk, sortedScheds);
          thresholdEarnings = instPayouts.thresholdEarnings;
          thresholdDescription = instPayouts.thresholdDescription;
          serviceEarnings = instPayouts.serviceEarnings;

        } else {
          instPayouts = this.calculateInstallerPayouts(empId, mk, sortedScheds);

        const empGlAdd = this._glAdditionsForEmpMonth(empId, mk);

        const grandTotal  = baseSalary + empComms + totalAdjs + totalSpecs + thresholdEarnings + serviceEarnings + empGlAdd - empGlDed;

        // Fetch payslip config lazily

        let compCfg = {};
        try {
          const [{ data: pc }, { data: cc }] = await Promise.all([
            getSb().from('global_settings').select('value').eq('key', 'payslip_template_config').eq('company_id', this.companyId).maybeSingle(),
            getSb().from('global_settings').select('value').eq('key', 'company_profile_config').eq('company_id', this.companyId).maybeSingle(),
          ]);
          payslipCfg = pc?.value || payslipCfg;

        const logoUrl    = payslipCfg.logoStyle === 'dark' ? compCfg.logoDark : compCfg.logoLight;
        const compName   = compCfg.companyName || 'BrightKey Solutions';
        const compAddr   = [compCfg.companyAddressLine1, compCfg.companyAddressLine2].filter(Boolean).join('<br>') || '';
        const compContact = [compCfg.email, compCfg.phone].filter(Boolean).join('<br>');
        const monthText  = `${MONTHS[this.selectedMonth]} ${this.selectedYear}`;
        const empFullName = [emp.first_name, emp.last_name].filter(Boolean).join(' ');

        let breakdownHtml = `<tr><td style="padding:0.75rem;border-bottom:1px solid #e5e7eb;font-weight:600;">Basic Salary</td><td style="padding:0.75rem;border-bottom:1px solid #e5e7eb;color:#4b5563;">Monthly Basic Salary</td><td style="padding:0.75rem;border-bottom:1px solid #e5e7eb;text-align:right;font-variant-numeric:tabular-nums;">${php(baseSalary)}</td></tr>`;
        if (thresholdEarnings > 0) {
          breakdownHtml += `<tr><td style="padding:0.75rem;border-bottom:1px solid #e5e7eb;font-weight:600;">Earnings Past Threshold</td><td style="padding:0.75rem;border-bottom:1px solid #e5e7eb;color:#4b5563;line-height:1.5;">${esc(thresholdDescription).replace(/\n/g, '<br>')}</td><td style="padding:0.75rem;border-bottom:1px solid #e5e7eb;text-align:right;font-variant-numeric:tabular-nums;">${php(thresholdEarnings)}</td></tr>`;
        }
        if (serviceEarnings > 0) {
          breakdownHtml += `<tr><td style="padding:0.75rem;border-bottom:1px solid #e5e7eb;font-weight:600;">Service Job Earnings</td><td style="padding:0.75rem;border-bottom:1px solid #e5e7eb;color:#4b5563;line-height:1.5;">${esc(serviceDescription).replace(/\n/g, '<br>')}</td><td style="padding:0.75rem;border-bottom:1px solid #e5e7eb;text-align:right;font-variant-numeric:tabular-nums;">${php(serviceEarnings)}</td></tr>`;
        }
        if (empComms > 0) breakdownHtml += `<tr><td style="padding:0.75rem;border-bottom:1px solid #e5e7eb;font-weight:600;">Commissions</td><td style="padding:0.75rem;border-bottom:1px solid #e5e7eb;color:#4b5563;">Sales Commissions</td><td style="padding:0.75rem;border-bottom:1px solid #e5e7eb;text-align:right;font-variant-numeric:tabular-nums;">${php(empComms)}</td></tr>`;
        if (empGlAdd > 0) breakdownHtml += `<tr><td style="padding:0.75rem;border-bottom:1px solid #e5e7eb;font-weight:600;">Reimbursement</td><td style="padding:0.75rem;border-bottom:1px solid #e5e7eb;color:#4b5563;">Reimbursement</td><td style="padding:0.75rem;border-bottom:1px solid #e5e7eb;text-align:right;font-variant-numeric:tabular-nums;">${php(empGlAdd)}</td></tr>`;
        if (empGlDed > 0) breakdownHtml += `<tr><td style="padding:0.75rem;border-bottom:1px solid #e5e7eb;font-weight:600;">Cash Advance</td><td style="padding:0.75rem;border-bottom:1px solid #e5e7eb;color:#4b5563;">Cash Advance</td><td style="padding:0.75rem;border-bottom:1px solid #e5e7eb;text-align:right;font-variant-numeric:tabular-nums;">-${php(empGlDed)}</td></tr>`;

        empSpecs.forEach(spec => {

          }
        });

            breakdownHtml += `<tr><td style="padding:0.75rem;border-bottom:1px solid #e5e7eb;font-weight:600;">Adjustments</td><td style="padding:0.75rem;border-bottom:1px solid #e5e7eb;color:#4b5563;">${esc(adj.label || adj.description || 'Adjustment')}</td><td style="padding:0.75rem;border-bottom:1px solid #e5e7eb;text-align:right;font-variant-numeric:tabular-nums; color:${val < 0 ? 'var(--danger)' : 'inherit'};">${val < 0 ? '-' : ''}${php(Math.abs(val))}</td></tr>`;

        const allocationItems = [];

          const sp = baseSalary / sortedScheds.length;
          const av = empAdjs.filter(a => { const d = new Date(a.date); return this.getScheduleDayForItemDay(d.getUTCDate(), sortedScheds) === day; }).reduce((s, a) => s + (Number(a.value) || 0), 0);
          const cv = this._commsForSchedule(empId, day, mk, sortedScheds);
          const glAddVal = this._glAdditionsForSchedule(empId, day, mk, sortedScheds);
          const glDedVal = this._glDeductionsForSchedule(empId, day, mk, sortedScheds);

            sb.from('global_settings').upsert({ key: 'regular_payout_state',    company_id: this.companyId, value: {} }),
            sb.from('global_settings').upsert({ key: 'special_payout_state',    company_id: this.companyId, value: {} }),
            sb.from('global_settings').upsert({ key: 'commission_payout_state', company_id: this.companyId, value: {} }),
          ]);
          toast('All data cleared.');
          if (el) { el.textContent = 'All changes saved'; setTimeout(() => { if (el.textContent === 'All changes saved') el.textContent = ''; }, 3000); }
          this.render();
        } catch (e) {
          console.error(e);
          toast('Clear failed: ' + e.message, 'error');
          if (el) el.textContent = 'Save failed';
        }
      },
    };

    function checkSkuEligibility(product, eligibilityRules) {
      if (!eligibilityRules || eligibilityRules.length === 0) return false;
      for (const rule of eligibilityRules) {
        if (rule.scope === 'businesses') {
          if (rule.business === 'all') return true;
          if (rule.business === product.business) {
            if (rule.category === 'all') return true;
            if (rule.category === product.category) {
              if (rule.sku === 'all') return true;
              if (rule.sku === product.sku) return true;
            }
          }
        } else if (rule.scope === 'tags') {
          if (product.tags && Array.isArray(product.tags) && product.tags.includes(rule.tag)) {
            return true;
          }
        }
      }
      return false;
    }

    function getBookingEligibleCentavos(b, productMap, eligibilityRules) {
      const skus = (b.product_skus || '').split(' | ').map(s => s.trim());
      const qtys = (b.product_qtys || '').split(' | ').map(s => s.trim());
      const unitPrices = (b.product_unit_prices || '').split(' | ').map(s => s.trim());

      let skuSumCentavos = 0;
      let allSkuSumCentavos = 0;
      const numItems = Math.max(skus.length, qtys.length);
      for (let i = 0; i < numItems; i++) {
        const sku = skus[i] || '';
        if (!sku) continue;
        const qty = parseInt(qtys[i]) || 1;
        const unitPriceDec = parseFloat(unitPrices[i]) || 0;
        const itemCentavos = Math.round(unitPriceDec * qty * 100);
        
        allSkuSumCentavos += itemCentavos;

        const product = productMap[sku.toLowerCase()] || { sku, business: '', category: '', tags: [] };
        const isEligible = checkSkuEligibility(product, eligibilityRules);
        if (isEligible) {
          skuSumCentavos += itemCentavos;
        }
      }

      let depositCentavos = Math.round(Math.abs(parseInt(b.deposit_amount) || 0));
      let discountCentavos = 0;
      let freebiesCentavos = 0;
      let customCentavos = 0;

      if (b.deduction_labels && b.deduction_values) {
        const labels = b.deduction_labels.split('|').map(s => s.trim().toLowerCase());
        const values = b.deduction_values.split('|').map(s => s.trim());
        labels.forEach((label, idx) => {
          const valPHP = parseFloat(values[idx]) || 0;
          const valCentavos = Math.round(Math.abs(valPHP) * 100);
          if (label.includes('discount')) {
            discountCentavos += valCentavos;
          } else if (label.includes('freebie')) {
            freebiesCentavos += valCentavos;
          } else if (label.includes('custom')) {
            customCentavos += valCentavos;
          } else if (label.includes('deposit')) {
            depositCentavos += valCentavos;
          }
        });
      }

      let chargesCentavos = 0;
      if (b.charge_labels && b.charge_values) {
        const labels = b.charge_labels.split('|').map(s => s.trim().toLowerCase());
        const values = b.charge_values.split('|').map(s => s.trim());
        labels.forEach((label, idx) => {
          const valPHP = parseFloat(values[idx]) || 0;
          const valCentavos = Math.round(Math.abs(valPHP) * 100);
          if (!label.includes('credit card fee')) {
            chargesCentavos += valCentavos;
          }
        });
      }

      const finalEligibleCentavos = Math.max(0, skuSumCentavos - discountCentavos);
      const grandTotal = parseInt(b.grand_total) || 0;
      const balanceDue = parseInt(b.balance_due) || 0;
      const orderGrandTotal = grandTotal > 0 ? grandTotal : (balanceDue + depositCentavos);
      const totalPriceCentavos = orderGrandTotal + depositCentavos;

      return {
        skuSumCentavos,
        finalEligibleCentavos,
        totalPriceCentavos
      };
    }

    function getCommissionAdjustmentForBooking(b, rateLabel, productMap, adjustmentRules) {
      if (!adjustmentRules || adjustmentRules.length === 0) return 0;
      const bDate = b.scheduled_date ? b.scheduled_date.slice(0, 10) : '';
      if (!bDate) return 0;

      const bookingSkus = (b.product_skus || '').split(' | ').map(s => s.trim().toLowerCase());
      let totalAdjustment = 0;

      adjustmentRules.forEach(r => {
        const rStart = r.start_date || '1970-01-01';
        const rEnd = r.end_date || '9999-12-31';
        if (bDate < rStart || bDate > rEnd) return;
        if (!r.label || r.label.trim().toLowerCase() !== rateLabel.trim().toLowerCase()) return;

        let isMatch = false;
        if (r.scope === 'businesses') {
          const skuMatch = !r.sku || r.sku === 'all' || bookingSkus.includes(r.sku.toLowerCase());
          const catMatch = !r.category || r.category === 'all' || bookingSkus.some(sku => {
            const p = productMap[sku] || {};
            return p.category && p.category.toLowerCase() === r.category.toLowerCase();
          });
          const bizMatch = !r.business || r.business === 'all' || bookingSkus.some(sku => {
            const p = productMap[sku] || {};
            return p.business && p.business.toLowerCase() === r.business.toLowerCase();
          });
          if (skuMatch && catMatch && bizMatch) isMatch = true;
        } else if (r.scope === 'tags') {
          const tagMatch = bookingSkus.some(sku => {
            const p = productMap[sku] || {};
            return p.tags && Array.isArray(p.tags) && p.tags.map(t => t.toLowerCase()).includes(r.tag.toLowerCase());
          });
          if (tagMatch) isMatch = true;
        }

        if (isMatch) {
          let val = parseFloat(r.value) || 0;
          if (r.operator === 'minus') {
            val = -Math.abs(val);
          } else {
            val = Math.abs(val);
          }
          totalAdjustment += val;
        }
      });

      return totalAdjustment;
    }

    document.addEventListener('DOMContentLoaded', () => {
      App.init();
      if (typeof initNav === 'function') initNav();
    });
  </script>

    <div id="payslip-a4-sheet"></div>
  </div>
