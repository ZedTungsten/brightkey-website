<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adjustments — BrightKey Portal</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/dashboard/payout-tracker/shared.css" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=2" />
  <style>
    /* ── Tighter table styling override ── */
    #adjustments-table th {
      padding: 0.45rem 0.75rem;
      font-size: 0.64rem;
    }
    #adjustments-table td {
      padding: 0.45rem 0.75rem;
      font-size: 0.78rem;
    }
  </style>
</head>
<body>
  <div class="dash-layout">
    <aside class="dash-sidebar" id="dash-sidebar"></aside>
    <div class="dash-main">
      <div class="top-bar">
        <span class="top-bar-title">Payout Tracker</span>
        <div style="flex:1"></div>
      </div>

      <nav class="drawer-tabs" id="payout-nav">
        <a href="/dashboard/payout-tracker/payout"         class="tab-btn" data-page="payout">Payout</a>
        <a href="/dashboard/payout-tracker/salary"         class="tab-btn" data-page="salary">Salary</a>
        <a href="/dashboard/payout-tracker/special-payout" class="tab-btn" data-page="special-payout">Special Payout</a>
        <a href="/dashboard/payout-tracker/adjustments"    class="tab-btn" data-page="adjustments">Adjustments</a>
        <a href="/dashboard/payout-tracker/commissions"    class="tab-btn" data-page="commissions">Commission</a>
        <a href="/dashboard/payout-tracker/installations"  class="tab-btn" data-page="installations">Installation</a>
        <a href="/dashboard/payout-tracker/reimbursements" class="tab-btn" data-page="reimbursements">Reimbursement</a>
        <a href="/dashboard/payout-tracker/schedules"      class="tab-btn" data-page="schedules">Schedules</a>
        <a href="/dashboard/payout-tracker/payslip"        class="tab-btn" data-page="payslip">Payslip</a>
      </nav>

      <main style="overflow-y: auto; flex: 1; min-width: 0; width: 100%;">
        <div class="int-wrap">
          <!-- Month selector + Create button -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:0.75rem 1.25rem;width:100%;box-sizing:border-box;">
            <div style="display:flex;align-items:center;gap:1rem;">
              <button class="btn btn-outline btn-sm" id="btn-prev-month">&lt;</button>
              <span id="adj-month-display" style="font-size:0.88rem;font-weight:700;color:var(--text-primary);min-width:140px;text-align:center;"></span>
              <button class="btn btn-outline btn-sm" id="btn-next-month">&gt;</button>
            </div>
            <button class="btn btn-cyan btn-sm" id="btn-create-adj">+ Create Adjustment</button>
          </div>

          <div class="table-card">
            <div class="table-wrap">
              <table class="salary-table" id="adjustments-table">
                <thead>
                  <tr>
                    <th style="padding-left:1.5rem;">Date</th>
                    <th>Employee Name</th>
                    <th>Label</th>
                    <th>Value</th>
                    <th style="width:100px;">Action</th>
                  </tr>
                </thead>
                <tbody id="adjustments-table-body">
                  <tr><td colspan="5" style="text-align:center;padding:3rem;color:var(--text-muted);">Loading adjustments...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Create / Edit Adjustment Modal -->
  <div class="modal-overlay" id="create-adjustment-modal">
    <div class="modal" style="max-width:500px;padding:2rem;">
      <h3 id="adjustment-modal-title" style="font-size:1.1rem;font-weight:700;color:var(--text-primary);margin-bottom:0.5rem;">Create Adjustment</h3>
      <form id="create-adjustment-form" style="padding-top:0.75rem;">
        <div class="form-group" style="margin-bottom:1rem;">
          <label class="form-label" for="adj-employee">Employee</label>
          <select id="adj-employee" class="form-select" required></select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
          <div class="form-group">
            <label class="form-label" for="adj-value">Adjustment Value (&#8369;)</label>
            <input type="number" id="adj-value" class="form-input" placeholder="0.00" step="0.01" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="adj-date">Date</label>
            <input type="date" id="adj-date" class="form-input" required />
          </div>
        </div>
        <div class="form-group" style="margin-bottom:1.5rem;">
          <label class="form-label" for="adj-label">Adjustment Label</label>
          <input type="text" id="adj-label" class="form-input" placeholder="e.g. Performance Bonus" required />
        </div>
        <div style="display:flex;justify-content:flex-end;gap:0.75rem;">
          <button type="button" class="btn btn-outline btn-sm" id="btn-cancel-adj">Cancel</button>
          <button type="submit" id="adj-submit-btn" class="btn btn-cyan btn-sm">Create</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/main.js"></script>
  <script>
    'use strict';

    (function () {
      const parts = window.location.pathname.split('/').filter(Boolean);
      let page = parts[parts.length - 1];
      if (page === 'index.html') page = parts[parts.length - 2];
      document.querySelectorAll('#payout-nav .tab-btn[data-page]').forEach(a => {
        if (a.dataset.page === page) a.classList.add('active');
      });
    })();

    const getSb = () => window.BKAuth.sb;
    const toast = (msg, type = 'success') => {
      const c = document.getElementById('toast-container');
      if (!c) return;
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = msg;
      c.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    };
    const esc = s => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    const php = v => {
      if (v === null || v === undefined || v === '' || Number(v) === 0) return '—';
      return '₱' + Number(v).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    };
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    const App = {
      tenantId: null,
      companyId: null,
      employees: [],
      adjustmentsList: [],
      selectedYear: new Date().getFullYear(),
      selectedMonth: new Date().getMonth(),
      editingId: null,

      async init() {
        try {
          const authInfo = await window.BKAuth.checkRoleGate(['HR', 'Finance'], '../../../admin.html');
          if (!authInfo) return;
          this.tenantId = authInfo.tenantId;
          const { data: co } = await getSb().from('companies').select('id').eq('tenant_id', this.tenantId).limit(1).maybeSingle();
          this.companyId = co?.id || null;
          if (!this.companyId) { toast('Failed to resolve company.', 'error'); return; }
          this.updateMonthDisplay();
          await this.loadEmployees();
          await this.loadAdjustments();
          this.render();
          this.bindEvents();
        } catch (e) {
          console.error(e);
          toast('Initialization failed: ' + e.message, 'error');
        }
      },

      async loadEmployees() {
        try {
          const { data, error } = await getSb().from('employees')
            .select('id, first_name, last_name, employment_status')
            .eq('company_id', this.companyId)
            .eq('employment_status', 'Active');
          if (error) throw error;
          this.employees = data || [];
          const sorted = [...this.employees].sort((a, b) => [a.first_name, a.last_name].join(' ').localeCompare([b.first_name, b.last_name].join(' ')));
          const sel = document.getElementById('adj-employee');
          if (sel) sel.innerHTML = sorted.map(e => `<option value="${esc(e.id)}">${esc([e.first_name, e.last_name].filter(Boolean).join(' '))}</option>`).join('');
        } catch (e) { this.employees = []; console.error(e); }
      },

      async loadAdjustments() {
        // Only fetch for the currently selected month (optimized query)
        const start = `${this.selectedYear}-${String(this.selectedMonth + 1).padStart(2, '0')}-01`;
        const nextM = this.selectedMonth + 1 > 11 ? 0 : this.selectedMonth + 1;
        const nextY = this.selectedMonth + 1 > 11 ? this.selectedYear + 1 : this.selectedYear;
        const end   = `${nextY}-${String(nextM + 1).padStart(2, '0')}-01`;
        try {
          const { data, error } = await getSb().from('employee_adjustments')
            .select('id, employee_id, amount, date, label, paid')
            .eq('company_id', this.companyId)
            .gte('date', start)
            .lt('date', end)
            .order('date', { ascending: false });
          if (error) throw error;
          this.adjustmentsList = (data || []).map(a => ({ id: a.id, employeeId: a.employee_id, value: a.amount, date: a.date, label: a.label, paid: a.paid }));
        } catch (e) { this.adjustmentsList = []; console.error(e); }
      },

      monthKey() {
        return `${this.selectedYear}-${String(this.selectedMonth + 1).padStart(2, '0')}`;
      },

      updateMonthDisplay() {
        const el = document.getElementById('adj-month-display');
        if (el) el.textContent = `${MONTHS[this.selectedMonth]} ${this.selectedYear}`;
      },

      changeMonth(diff) {
        let m = this.selectedMonth + diff;
        let y = this.selectedYear;
        if (m < 0)  { m = 11; y--; }
        if (m > 11) { m = 0;  y++; }
        this.selectedMonth = m;
        this.selectedYear  = y;
        this.updateMonthDisplay();
        this.loadAdjustments().then(() => this.render());
      },

      bindEvents() {
        document.getElementById('btn-prev-month').addEventListener('click', () => this.changeMonth(-1));
        document.getElementById('btn-next-month').addEventListener('click', () => this.changeMonth(1));
        document.getElementById('btn-create-adj').addEventListener('click', () => this.openAddModal());
        document.getElementById('btn-cancel-adj').addEventListener('click', () => this.closeModal());
        document.getElementById('create-adjustment-form').addEventListener('submit', e => { e.preventDefault(); this.saveAdjustment(); });
      },

      render() {
        const tbody = document.getElementById('adjustments-table-body');
        if (!tbody) return;
        if (this.adjustmentsList.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:3rem;color:var(--text-muted);">No adjustments for this month.</td></tr>`;
          return;
        }
        tbody.innerHTML = this.adjustmentsList.map(adj => {
          const emp  = this.employees.find(e => e.id === adj.employeeId);
          const name = emp ? [emp.first_name, emp.last_name].filter(Boolean).join(' ') : 'Unknown Employee';
          const fmtDate = new Date(adj.date).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
          return `<tr>
            <td style="padding-left:1.5rem;font-weight:600;color:var(--text-primary);">${esc(fmtDate)}</td>
            <td>${esc(name)}</td>
            <td>${esc(adj.label)}</td>
            <td style="font-weight:700;color:${Number(adj.value) < 0 ? 'var(--danger)' : 'var(--text-primary)'};font-variant-numeric:tabular-nums;">${esc(php(adj.value))}</td>
            <td style="text-align:center;white-space:nowrap;">
              <button class="btn-danger-link" onclick="App.openEditModal('${adj.id}')" title="Edit" style="margin-right:0.5rem;color:var(--text-muted);">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"/></svg>
              </button>
              <button class="btn-danger-link" onclick="App.deleteAdjustment('${adj.id}')" title="Delete">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
              </button>
            </td>
          </tr>`;
        }).join('');
      },

      openAddModal() {
        this.editingId = null;
        document.getElementById('adjustment-modal-title').textContent = 'Create Adjustment';
        document.getElementById('adj-submit-btn').textContent = 'Create';
        document.getElementById('adj-value').value = '';
        document.getElementById('adj-label').value = '';
        const today = new Date();
        const dateInput = document.getElementById('adj-date');
        if (dateInput) {
          if (today.getFullYear() === this.selectedYear && today.getMonth() === this.selectedMonth) {
            dateInput.value = today.toISOString().split('T')[0];
          } else {
            dateInput.value = `${this.selectedYear}-${String(this.selectedMonth + 1).padStart(2, '0')}-01`;
          }
        }
        document.getElementById('create-adjustment-modal').classList.add('open');
      },

      openEditModal(adjId) {
        const adj = this.adjustmentsList.find(a => a.id === adjId);
        if (!adj) return;
        this.editingId = adjId;
        document.getElementById('adjustment-modal-title').textContent = 'Edit Adjustment';
        document.getElementById('adj-submit-btn').textContent = 'Save Changes';
        document.getElementById('adj-employee').value = adj.employeeId;
        document.getElementById('adj-value').value = adj.value;
        document.getElementById('adj-date').value = adj.date;
        document.getElementById('adj-label').value = adj.label;
        document.getElementById('create-adjustment-modal').classList.add('open');
      },

      closeModal() {
        document.getElementById('create-adjustment-modal').classList.remove('open');
      },

      async saveAdjustment() {
        const empId = document.getElementById('adj-employee').value;
        const val   = parseFloat(document.getElementById('adj-value').value);
        const date  = document.getElementById('adj-date').value;
        const label = document.getElementById('adj-label').value.trim();
        if (!empId || isNaN(val) || !date || !label) return;

        try {
          if (this.editingId) {
            const { data, error } = await getSb().from('employee_adjustments')
              .update({ employee_id: empId, amount: val, date, label })
              .eq('id', this.editingId)
              .select().single();
            if (error) throw error;
            const adj = this.adjustmentsList.find(a => a.id === this.editingId);
            if (adj) { adj.employeeId = data.employee_id; adj.value = data.amount; adj.date = data.date; adj.label = data.label; }
            this.editingId = null;
            toast('Adjustment updated.');
          } else {
            const { data, error } = await getSb().from('employee_adjustments')
              .insert({ company_id: this.companyId, employee_id: empId, amount: val, date, label, paid: false })
              .select().single();
            if (error) throw error;
            this.adjustmentsList.unshift({ id: data.id, employeeId: data.employee_id, value: data.amount, date: data.date, label: data.label, paid: false });
            toast('Adjustment created.');
          }
          document.getElementById('adj-value').value = '';
          document.getElementById('adj-label').value = '';
          this.closeModal();
          this.render();
        } catch (err) {
          console.error(err);
          toast('Failed to save adjustment: ' + err.message, 'error');
        }
      },

      async deleteAdjustment(adjId) {
        try {
          const { error } = await getSb().from('employee_adjustments').delete().eq('id', adjId);
          if (error) throw error;
          this.adjustmentsList = this.adjustmentsList.filter(a => a.id !== adjId);
          this.render();
          toast('Adjustment deleted.', 'info');
        } catch (err) {
          console.error(err);
          toast('Failed to delete adjustment: ' + err.message, 'error');
        }
      },
    };

    document.addEventListener('DOMContentLoaded', () => {
      App.init();
      if (typeof initNav === 'function') initNav();
    });
  </script>
</body>
</html>
