<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support Inbox — BrightKey Admin</title>
  
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  
  <style>
    body { background-color: var(--bg-elevated); padding-top: 0; }
    
    .admin-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: 100dvh;
      overflow: hidden;
    }

    .inbox-list {
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .inbox-list-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg-surface);
      z-index: 10;
    }
    
    .ticket-item {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }
    .ticket-item:hover { background: var(--bg-elevated); }
    .ticket-item.active { background: var(--cyan-dim); border-left: 3px solid var(--cyan); }
    
    .ticket-view {
      display: flex;
      flex-direction: column;
      background: var(--bg-base);
    }
    .ticket-header {
      padding: 1.5rem 2rem;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .ticket-messages {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    
    .msg-bubble {
      max-width: 80%;
      padding: 1.25rem;
      border-radius: var(--radius-md);
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .msg-bubble.customer {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .msg-bubble.admin {
      background: var(--cyan-dim);
      border: 1px solid var(--cyan-border);
      color: var(--text-primary);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    
    .msg-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .media-grid {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }
    .media-item {
      width: 140px;
      height: 140px;
      object-fit: cover;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: #000;
      cursor: pointer;
    }
    .video-overlay {
      position: relative;
      display: inline-block;
    }
    .video-overlay::after {
      content: '▶';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 2rem;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      pointer-events: none;
    }
    
    .ticket-reply {
      padding: 1.5rem 2rem;
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  
  <div class="dash-layout">
    <!-- Sidebar -->
    <aside class="dash-sidebar" id="dash-sidebar"></aside>

    <!-- Main Content -->
    <div class="dash-main">
      <!-- Top Bar -->
      <div class="top-bar">
        <div class="top-bar-title">Support Inbox</div>
      </div>

      <div class="admin-layout" style="height: calc(100vh - 56px); display: flex; align-items: center; justify-content: center; background: var(--bg-base);">
        <div style="text-align: center; max-width: 400px; padding: 2rem;">
          <div style="width: 64px; height: 64px; border-radius: 50%; background: var(--blue-dim, rgba(37,99,235,0.08)); border: 1px dashed var(--blue, #2563EB); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--blue, #2563EB)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 28px; height: 28px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>
          <h3 style="font-size: 1.1rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.5rem;">Support Inbox</h3>
          <p style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5;">No active support tickets. Customer inquiries and tickets will show up here once the channels are configured.</p>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      if (window.BKAuth) {
        const authInfo = await window.BKAuth.checkRoleGate(['owner', 'admin', 'customer_service', 'hr'], '../admin.html');
        if (!authInfo) return;
      }
    });
  </script>
</body>
</html>
