<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — BrightKey Admin</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg?v=2" />

  <style>
    :root {
      --bg-base: #FAFAFA; --bg-surface: #FFFFFF; --bg-elevated: #F4F4F5;
      --border: #E4E4E7; --border-hover: #D4D4D8;
      --text-primary: #09090B; --text-secondary: #52525B; --text-muted: #A1A1AA;
      --cyan: #06B6D4; --cyan-light: #0891B2; --cyan-dim: rgba(6,182,212,0.12);
      --success: #16A34A; --danger: #DC2626; --warning: #D97706;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-base); color: var(--text-secondary); font-family: 'Commissioner', sans-serif; font-size: 0.9rem; }

    .content-area { display: flex; flex: 1; overflow: hidden; }
    .main-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .scroll-area { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }

    /* Tabs */
    .tabs-nav { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: var(--bg-surface); padding: 0 1.5rem; }
    .tab-btn {
      background: none; border: none; border-bottom: 2px solid transparent;
      padding: 0.85rem 1rem; font-size: 0.85rem; font-weight: 600;
      color: var(--text-secondary); cursor: pointer; outline: none; white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active { color: var(--text-primary); border-bottom-color: var(--cyan); }
    .tab-btn:hover:not(.active) { color: var(--text-primary); }
    .tab-panel { display: none; }
    .tab-panel.active { display: flex; flex-direction: column; gap: 1.5rem; }

    /* Cards */
    .settings-card {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
    }
    .settings-card-header {
      padding: 1rem 1.25rem; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      background: var(--bg-elevated);
    }
    .settings-card-title { font-size: 0.88rem; font-weight: 700; color: var(--text-primary); }
    .settings-card-body { padding: 1.25rem; }

    /* Table */
    .assign-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    .assign-table th {
      text-align: left; padding: 0.6rem 0.75rem; font-size: 0.7rem;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--text-muted); border-bottom: 1px solid var(--border);
      background: var(--bg-elevated);
    }
    .assign-table td { padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .assign-table tr:last-child td { border-bottom: none; }

    /* Visibility pills */
    .vis-group { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .vis-label {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.3rem 0.6rem; border-radius: 9999px; border: 1px solid var(--border);
      font-size: 0.75rem; font-weight: 600; cursor: pointer; user-select: none;
      color: var(--text-secondary); background: var(--bg-base); transition: all 0.15s;
    }
    .vis-label input[type="checkbox"] { accent-color: var(--cyan); cursor: pointer; }
    .vis-label:has(input:checked) {
      background: var(--cyan-dim); border-color: var(--cyan-light); color: var(--cyan-light);
    }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.45rem 0.85rem; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; font-family: inherit; }
    .btn-cyan { background: var(--cyan); color: #fff; border-color: var(--cyan); }
    .btn-cyan:hover { background: var(--cyan-light); }
    .btn-outline { background: var(--bg-surface); color: var(--text-secondary); border-color: var(--border); }
    .btn-outline:hover { border-color: var(--border-hover); color: var(--text-primary); }
    .btn-danger { background: transparent; color: var(--danger); border-color: var(--border); }
    .btn-danger:hover { background: rgba(220,38,38,0.06); border-color: var(--danger); }
    .btn-sm { padding: 0.3rem 0.55rem; font-size: 0.75rem; }

    .form-input { width: 100%; padding: 0.45rem 0.65rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.83rem; background: var(--bg-base); color: var(--text-primary); outline: none; font-family: inherit; }
    .form-input:focus { border-color: var(--cyan); }

    /* Toast */
    #toast-container { position: fixed; top: 1.25rem; right: 1.25rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.4rem; }
    .toast { padding: 0.65rem 1rem; border-radius: 6px; font-size: 0.82rem; font-weight: 600; color: #fff; min-width: 220px; animation: toastIn 0.2s ease-out; }
    .toast-success { background: var(--success); }
    .toast-error { background: var(--danger); }
    @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .empty-state { color: var(--text-muted); font-size: 0.82rem; padding: 1.5rem; text-align: center; }
  </style>
</head>
<body>
<div id="toast-container"></div>

<div class="dash-layout">
  <aside class="dash-sidebar" id="dash-sidebar"></aside>
  <div class="dash-main">
    <div class="top-bar">
      <span class="top-bar-title">Settings</span>
    </div>

    <div class="content-area">
      <main class="main-panel">

        <!-- Tab navigation -->
        <div class="tabs-nav">
          <button class="tab-btn active" id="tab-employees" onclick="switchTab('employees')">Employees</button>
        </div>

        <div class="scroll-area">

          <!-- ── Employees Tab ── -->
          <div class="tab-panel active" id="panel-employees">

            <!-- Assignments -->
            <div class="settings-card">
              <div class="settings-card-header">
                <span class="settings-card-title">Assignments</span>
                <button class="btn btn-cyan btn-sm" onclick="addAssignment()">+ Add Assignment</button>
              </div>
              <div class="settings-card-body" style="padding: 0;">
                <table class="assign-table">
                  <thead>
                    <tr>
                      <th style="width: 220px;">Assignment Name</th>
                      <th>Visibility</th>
                      <th style="width: 60px;"></th>
                    </tr>
                  </thead>
                  <tbody id="assignments-tbody">
                    <tr><td colspan="3" class="empty-state">Loading…</td></tr>
                  </tbody>
                </table>
              </div>
              <div style="padding: 0.85rem 1.25rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end;">
                <button class="btn btn-cyan" onclick="saveAssignments()">Save Assignments</button>
              </div>
            </div>

          </div><!-- /panel-employees -->

        </div><!-- /scroll-area -->
      </main>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/main.js"></script>
<script>
'use strict';

const VISIBILITY_OPTIONS = [
  { key: 'booking.door_specifications', label: 'Booking › Door Specifications' }
];

let sb, currentCompanyId;
let assignments = []; // [{ id, name, visibility: string[] }]

document.addEventListener('DOMContentLoaded', async () => {
  if (!window.BKAuth) { showToast('Auth module missing.', true); return; }
  const authInfo = await window.BKAuth.checkRoleGate(['owner', 'admin', 'operations'], '../admin.html');
  if (!authInfo) return;
  sb = window.BKAuth.sb;

  const { data: co } = await sb.from('companies').select('id').eq('tenant_id', authInfo.tenantId).limit(1).maybeSingle();
  currentCompanyId = co?.id || null;

  await loadAssignments();
});

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

async function loadAssignments() {
  const tbody = document.getElementById('assignments-tbody');
  tbody.innerHTML = '<tr><td colspan="3" class="empty-state">Loading…</td></tr>';
  try {
    const { data, error } = await sb
      .from('employee_assignments')
      .select('*')
      .eq('company_id', currentCompanyId)
      .order('created_at', { ascending: true });
    if (error) throw error;
    assignments = (data || []).map(r => ({
      id: r.id,
      name: r.name,
      visibility: Array.isArray(r.visibility) ? r.visibility : []
    }));
    renderAssignments();
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="3" class="empty-state" style="color:var(--danger);">Failed to load: ${e.message}</td></tr>`;
  }
}

function renderAssignments() {
  const tbody = document.getElementById('assignments-tbody');
  if (assignments.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3" class="empty-state">No assignments yet. Click "+ Add Assignment" to create one.</td></tr>';
    return;
  }
  tbody.innerHTML = assignments.map((a, idx) => `
    <tr>
      <td>
        <input type="text" class="form-input" value="${escHtml(a.name)}"
          oninput="assignments[${idx}].name = this.value"
          placeholder="e.g. Installer" style="max-width: 200px;" />
      </td>
      <td>
        <div class="vis-group">
          ${VISIBILITY_OPTIONS.map(opt => `
            <label class="vis-label">
              <input type="checkbox" value="${opt.key}"
                ${a.visibility.includes(opt.key) ? 'checked' : ''}
                onchange="toggleVisibility(${idx}, '${opt.key}', this.checked)" />
              ${opt.label}
            </label>
          `).join('')}
        </div>
      </td>
      <td>
        <button class="btn btn-danger btn-sm" onclick="deleteAssignment(${idx}, '${a.id || ''}')"
          title="Delete assignment">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        </button>
      </td>
    </tr>
  `).join('');
}

function addAssignment() {
  assignments.push({ id: null, name: '', visibility: [] });
  renderAssignments();
  // Focus the last name input
  const inputs = document.querySelectorAll('#assignments-tbody input[type="text"]');
  if (inputs.length) inputs[inputs.length - 1].focus();
}

function toggleVisibility(idx, key, checked) {
  const vis = assignments[idx].visibility;
  if (checked && !vis.includes(key)) vis.push(key);
  if (!checked) assignments[idx].visibility = vis.filter(v => v !== key);
}

async function deleteAssignment(idx, id) {
  const a = assignments[idx];
  if (id) {
    try {
      const { error } = await sb.from('employee_assignments').delete().eq('id', id);
      if (error) throw error;
    } catch (e) {
      showToast('Delete failed: ' + e.message, true);
      return;
    }
  }
  assignments.splice(idx, 1);
  renderAssignments();
  showToast('Assignment removed.');
}

async function saveAssignments() {
  for (const a of assignments) {
    if (!a.name.trim()) { showToast('Assignment name cannot be empty.', true); return; }
  }
  try {
    for (const a of assignments) {
      if (a.id) {
        // Update existing
        const { error } = await sb.from('employee_assignments')
          .update({ name: a.name.trim(), visibility: a.visibility })
          .eq('id', a.id);
        if (error) throw error;
      } else {
        // Insert new
        const { data, error } = await sb.from('employee_assignments')
          .insert([{ company_id: currentCompanyId, name: a.name.trim(), visibility: a.visibility }])
          .select().single();
        if (error) throw error;
        a.id = data.id;
      }
    }
    showToast('Assignments saved.');
    renderAssignments();
  } catch (e) {
    showToast('Save failed: ' + e.message, true);
  }
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, isError = false) {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast toast-' + (isError ? 'error' : 'success');
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
</script>
</body>
</html>
