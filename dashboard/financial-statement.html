<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Statements — Brightkey Internal</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg?v=2" />
  <style>
    .int-wrap { max-width: 1200px; margin: 0 auto; padding: 2rem 2rem 5rem; }

    .int-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem;
    }
    .int-title {
      font-size: 1.55rem; font-weight: 800; color: var(--text-primary);
      letter-spacing: -0.04em; line-height: 1.1; margin-top: 0.4rem;
    }

    /* ── Tabs ── */
    .drawer-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      background: var(--bg-surface);
    }
    .tab-btn {
      padding: 0.9rem 1.25rem;
      font-size: 0.82rem; font-weight: 600;
      color: var(--text-muted);
      border: none; background: none; cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap; transition: all 0.15s;
      font-family: var(--font-sans);
    }
    .tab-btn.active { color: var(--cyan-light); border-bottom-color: var(--cyan); }
    .tab-btn:hover:not(.active) { color: var(--text-secondary); }

    .fs-panel { display: none; }
    .fs-panel.active { display: block; }

    /* ── Placeholder state ── */
    .fs-placeholder {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1rem; padding: 5rem 2rem;
      border: 1px dashed var(--border); border-radius: var(--radius-md);
      background: var(--bg-elevated); color: var(--text-muted); text-align: center;
    }
    .fs-placeholder svg { opacity: 0.3; }
    .fs-placeholder__title { font-size: 1rem; font-weight: 700; color: var(--text-secondary); }
    .fs-placeholder__sub { font-size: 0.83rem; max-width: 340px; }
  </style>
</head>
<body>

  <div class="dash-layout">
    <aside class="dash-sidebar" id="dash-sidebar"></aside>

    <div class="dash-main">

      <div class="top-bar">
        <div class="top-bar-title">Financial Statements</div>
      </div>

      <!-- Tab bar -->
      <div class="drawer-tabs" role="tablist">
        <button class="tab-btn active" role="tab" data-tab="income">Income Statement</button>
        <button class="tab-btn" role="tab" data-tab="cashflow">Cashflow</button>
        <button class="tab-btn" role="tab" data-tab="balance">Balance Sheet</button>
      </div>

      <div class="int-wrap">

        <!-- Income Statement -->
        <div class="fs-panel active" id="panel-income">
          <div class="fs-placeholder">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
            </svg>
            <div class="fs-placeholder__title">Income Statement</div>
            <div class="fs-placeholder__sub">Monthly revenue and expense summaries will appear here.</div>
          </div>
        </div>

        <!-- Cashflow -->
        <div class="fs-panel" id="panel-cashflow">
          <div class="fs-placeholder">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
            </svg>
            <div class="fs-placeholder__title">Cashflow Statement</div>
            <div class="fs-placeholder__sub">Monthly cash inflows and outflows will appear here.</div>
          </div>
        </div>

        <!-- Balance Sheet -->
        <div class="fs-panel" id="panel-balance">
          <div class="fs-placeholder">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
            <div class="fs-placeholder__title">Balance Sheet</div>
            <div class="fs-placeholder__sub">Assets, liabilities, and equity snapshot will appear here.</div>
          </div>
        </div>

      </div><!-- /int-wrap -->
    </div><!-- /dash-main -->
  </div><!-- /dash-layout -->

  <script src="../js/auth.js" defer></script>
  <script src="../js/sidebar.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (window.BKAuth) {
        await window.BKAuth.checkRoleGate(['Finance'], '../admin.html');
      }

      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.fs-panel').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
        });
      });
    });
  </script>

</body>
</html>
