<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ledgers Settings — BrightKey Portal</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/dashboard/payout-tracker/shared.css" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=2" />
  <style>
    .int-wrap { max-width: 800px; margin: 0 auto; padding: 2rem 2rem 5rem; }

    .drawer-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      background: var(--bg-surface);
    }
    .tab-btn {
      padding: 0.9rem 1.25rem;
      font-size: 0.82rem; font-weight: 600;
      color: var(--text-muted);
      border: none; background: none; cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap; transition: all 0.15s;
      font-family: var(--font-sans);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      line-height: 1;
    }
    .tab-btn.active { color: var(--cyan-light); border-bottom-color: var(--cyan); }
    .tab-btn:hover:not(.active) { color: var(--text-secondary); }

    /* ── Modal overlay (Pattern A) ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open {
      display: flex;
    }
    .modal-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      width: 440px;
      max-width: 90%;
      padding: 1.75rem;
      box-shadow: var(--shadow-lg);
      animation: modalSlide 0.2s forwards;
    }
    @keyframes modalSlide {
      from { transform: translateY(15px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-header {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.75rem;
    }
    .modal-body {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .input-row {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .input-row label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
    }
  </style>
</head>
<body>

  <div class="dash-layout">
    <aside class="dash-sidebar" id="dash-sidebar"></aside>

    <div class="dash-main">
      <div class="top-bar">
        <div class="top-bar-title">Ledgers</div>
      </div>

      <!-- Tab bar -->
      <nav class="drawer-tabs">
        <a href="/dashboard/ledgers/cash-ledgers" class="tab-btn">Cash Ledgers</a>
        <a href="/dashboard/ledgers/equity" class="tab-btn">Equity Ledgers</a>
        <a href="/dashboard/ledgers/settings" class="tab-btn active">Settings</a>
      </nav>

      <main style="overflow-y: auto; flex: 1; min-width: 0; width: 100%;">
        <div class="int-wrap">
          
          <!-- Profit Allocation main header row -->
          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1rem 1.5rem; box-shadow: var(--shadow-sm);">
            <div>
              <h2 style="font-size: 1.1rem; font-weight: 800; color: var(--text-primary); margin: 0;">Profit Allocation</h2>
              <div style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.15rem;">Summing equity and liability allocation (must equal 100%)</div>
            </div>
            <div style="display: flex; align-items: center; gap: 1.5rem;">
              <div id="overall-total-display" style="font-size: 1.25rem; font-weight: 800; color: var(--cyan-light);">100.00%</div>
              <button class="btn btn-cyan btn-sm" id="btn-save-settings" onclick="EquitySettingsApp.saveSettings()">Save Settings</button>
            </div>
          </div>

          <!-- Equity Allocation container -->
          <div class="j-card" style="margin-bottom: 1.5rem;">
            <div style="border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; margin-bottom: 1.5rem;">
              <div class="j-card-title" style="margin: 0;">Equity Allocation</div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
              <div class="form-group">
                <label class="form-label" for="retained-earnings">Retained Earnings (%)</label>
                <input type="number" id="retained-earnings" class="form-input" min="0" max="100" step="0.01" value="100.00" oninput="EquitySettingsApp.validateTotal()" />
              </div>
              <div class="form-group">
                <label class="form-label" for="capital-buffer">Capital Buffer (%)</label>
                <input type="number" id="capital-buffer" class="form-input" min="0" max="100" step="0.01" value="0.00" oninput="EquitySettingsApp.validateTotal()" />
              </div>
              <div class="form-group">
                <label class="form-label" for="distribution-pct">Distribution (%)</label>
                <input type="number" id="distribution-pct" class="form-input" min="0" max="100" step="0.01" value="0.00" oninput="EquitySettingsApp.validateTotal()" />
              </div>
            </div>

            <div style="border-top: 1px solid var(--border); padding-top: 1.5rem;">
              <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
                <div>
                  <span style="font-size: 0.82rem; font-weight: 700; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.05em;">Distribution Allocations</span>
                  <div style="font-size: 0.72rem; color: var(--text-muted); margin-top: 0.15rem;" id="dist-subtotal-text">Employee shares total: 0.00% (must equal 100%)</div>
                </div>
                <button class="btn btn-outline btn-sm" onclick="EquitySettingsApp.openAddEmpModal()">+ Add Employee</button>
              </div>

              <!-- List of assigned employees -->
              <div id="distributions-list" style="display: flex; flex-direction: column; gap: 0.75rem;">
                <!-- Rendered dynamically -->
              </div>
            </div>
          </div>

          <!-- Liability Allocation container -->
          <div class="j-card" style="margin-bottom: 1.5rem;">
            <div style="border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; margin-bottom: 1.5rem;">
              <div class="j-card-title" style="margin: 0;">Liability Allocation</div>
            </div>
            
            <div class="form-group" style="max-width: 50%;">
              <label class="form-label" for="loan-payment">Loan Payment (%)</label>
              <input type="number" id="loan-payment" class="form-input" min="0" max="100" step="0.01" value="0.00" oninput="EquitySettingsApp.validateTotal()" />
            </div>
          </div>

        </div>
      </main>
    </div>
  </div>

  <!-- Modal: Add Distribution Employee -->
  <div class="modal-overlay" id="add-employee-modal">
    <div class="modal-card">
      <div class="modal-header">Add Distribution Employee</div>
      <div class="modal-body">
        <div class="input-row">
          <label for="modal-emp-select">Select Employee</label>
          <select id="modal-emp-select" class="form-select" style="background: var(--bg-surface); color: var(--text-primary); border: 1px solid var(--border); border-radius: 4px; padding: 0.5rem; outline: none; width: 100%;"></select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline btn-sm" onclick="EquitySettingsApp.closeAddEmpModal()">Cancel</button>
        <button class="btn btn-cyan btn-sm" onclick="EquitySettingsApp.addEmpFromModal()">Add</button>
      </div>
    </div>
  </div>

  <div id="toast-container" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/main.js"></script>

  <script>
    'use strict';

    const getSb = () => window.BKAuth.sb;
    
    const toast = (msg, type = 'success') => {
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = msg;
      let container = document.getElementById('toast-container');
      if (!container) {
        container = document.createElement('div');
        container.id = 'toast-container';
        document.body.appendChild(container);
      }
      container.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    };

    const escapeHtml = (str) => {
      if (!str) return '';
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    };

    window.EquitySettingsApp = {
      tenantId: null,
      companyId: null,
      distributionEmployees: [], 
      versions: [], 
      activeConfig: {
        retained_earnings_pct: 100,
        capital_buffer_pct: 0,
        distribution_pct: 0,
        loan_payment_pct: 0,
        distributions: {}
      },

      async init() {
        try {
          const authInfo = await window.BKAuth.checkRoleGate(
            ['owner', 'admin', 'hr', 'finance'],
            '../admin.html'
          );
          if (!authInfo) return;
          this.tenantId = authInfo.tenantId;

          const { data: co } = await getSb().from('companies').select('id').eq('tenant_id', this.tenantId).limit(1).maybeSingle();
          this.companyId = co?.id || null;
          if (!this.companyId) {
            toast('Failed to resolve company.', 'error');
            return;
          }

          await this.loadEmployees();
          await this.loadGlobalSettings();
          this.renderEditor();
        } catch (e) {
          console.error(e);
          toast('Initialization failed: ' + e.message, 'error');
        }
      },

      async loadEmployees() {
        try {
          const [empRes, assignRes] = await Promise.all([
            getSb()
              .from('employees')
              .select('id, first_name, last_name, assignment')
              .eq('company_id', this.companyId)
              .eq('employment_status', 'Active'),
            getSb()
              .from('employee_assignments')
              .select('name, visibility')
              .eq('company_id', this.companyId)
          ]);
          
          if (empRes.error) throw empRes.error;
          if (assignRes.error) throw assignRes.error;

          const distAssignmentNames = (assignRes.data || [])
            .filter(a => Array.isArray(a.visibility) && a.visibility.includes('distribution'))
            .map(a => a.name.toLowerCase().trim());
          
          this.distributionEmployees = (empRes.data || []).filter(e => {
            const empAssigns = (e.assignment || '').split(',').map(s => s.trim().toLowerCase());
            return empAssigns.some(name => distAssignmentNames.includes(name));
          });
        } catch (e) {
          console.error('Error loading employees:', e);
          toast('Error loading employees: ' + e.message, 'error');
        }
      },

      async loadGlobalSettings() {
        try {
          const { data, error } = await getSb()
            .from('global_settings')
            .select('value')
            .eq('key', 'equity_settings')
            .eq('company_id', this.companyId)
            .maybeSingle();
          
          if (error) throw error;
          
          const raw = data?.value;
          if (Array.isArray(raw)) {
            this.versions = raw;
          } else if (raw && typeof raw === 'object' && !Array.isArray(raw)) {
            this.versions = Object.entries(raw).map(([key, val]) => ({
              effective_date: `${key}-01`,
              retained_earnings_pct: Number(val.retained_earnings_pct ?? 100),
              capital_buffer_pct: Number(val.capital_buffer_pct ?? 0),
              distribution_pct: Number(val.distribution_pct ?? 0),
              loan_payment_pct: Number(val.loan_payment_pct ?? 0),
              distributions: val.distributions || {}
            }));
          } else {
            this.versions = [];
          }

          this.sortVersions();

          if (this.versions.length > 0) {
            const latest = this.versions[0];
            this.activeConfig = {
              retained_earnings_pct: Number(latest.retained_earnings_pct ?? 100),
              capital_buffer_pct: Number(latest.capital_buffer_pct ?? 0),
              distribution_pct: Number(latest.distribution_pct ?? 0),
              loan_payment_pct: Number(latest.loan_payment_pct ?? 0),
              distributions: { ...latest.distributions }
            };
          } else {
            this.activeConfig = {
              retained_earnings_pct: 100,
              capital_buffer_pct: 0,
              distribution_pct: 0,
              loan_payment_pct: 0,
              distributions: {}
            };
          }
        } catch (e) {
          console.error('Error loading settings:', e);
          toast('Error loading settings: ' + e.message, 'error');
        }
      },

      sortVersions() {
        this.versions.sort((a, b) => new Date(b.effective_date) - new Date(a.effective_date));
      },

      renderEditor() {
        document.getElementById('retained-earnings').value = this.activeConfig.retained_earnings_pct;
        document.getElementById('capital-buffer').value = this.activeConfig.capital_buffer_pct;
        document.getElementById('distribution-pct').value = this.activeConfig.distribution_pct;
        document.getElementById('loan-payment').value = this.activeConfig.loan_payment_pct;

        const listContainer = document.getElementById('distributions-list');
        if (!listContainer) return;

        const distEntries = Object.entries(this.activeConfig.distributions || {});
        if (distEntries.length === 0) {
          listContainer.innerHTML = `<div style="text-align:center; padding:1.5rem; color:var(--text-muted); font-size:0.82rem; border:1px dashed var(--border); border-radius:6px;">No distribution employees assigned.</div>`;
          this.validateTotal();
          return;
        }

        listContainer.innerHTML = distEntries.map(([empId, pct]) => {
          const emp = this.distributionEmployees.find(e => e.id === empId);
          const fullName = emp ? `${emp.first_name} ${emp.last_name}` : 'Unknown Employee';
          return `
            <div style="display:flex; align-items:center; justify-content:space-between; background:var(--bg-elevated); padding:0.6rem 1rem; border-radius:6px; border:1px solid var(--border);">
              <span style="font-size:0.88rem; font-weight:600; color:var(--text-primary);">${escapeHtml(fullName)}</span>
              <div style="display:flex; align-items:center; gap:0.75rem;">
                <div style="display:flex; align-items:center; gap:0.25rem;">
                  <input type="number" class="form-input dist-pct-input" data-emp-id="${escapeHtml(empId)}" min="0" max="100" step="0.01" value="${pct}" oninput="EquitySettingsApp.validateTotal()" style="width:90px; padding:0.35rem 0.5rem; font-size:0.85rem;" />
                  <span style="font-size:0.85rem; color:var(--text-secondary);">%</span>
                </div>
                <button class="btn btn-outline btn-sm" onclick="EquitySettingsApp.removeEmployee('${escapeHtml(empId)}')" style="padding:0.25rem 0.5rem; color:var(--danger); border-color:var(--border);">&times;</button>
              </div>
            </div>
          `;
        }).join('');

        this.validateTotal();
      },

      validateTotal() {
        const retained = parseFloat(document.getElementById('retained-earnings').value) || 0;
        const buffer = parseFloat(document.getElementById('capital-buffer').value) || 0;
        const distPct = parseFloat(document.getElementById('distribution-pct').value) || 0;
        const loan = parseFloat(document.getElementById('loan-payment').value) || 0;
        
        let distSum = 0;
        const distInputs = document.querySelectorAll('.dist-pct-input');
        distInputs.forEach(inp => {
          distSum += parseFloat(inp.value) || 0;
        });

        const total = retained + buffer + distPct + loan;
        const overallDisplay = document.getElementById('overall-total-display');
        const distSubtotalText = document.getElementById('dist-subtotal-text');

        if (overallDisplay) overallDisplay.textContent = `${total.toFixed(2)}%`;
        if (distSubtotalText) {
          distSubtotalText.textContent = `Employee shares total: ${distSum.toFixed(2)}% (must equal 100%)`;
        }

        let isValid = true;

        if (Math.abs(total - 100) < 0.001) {
          if (overallDisplay) overallDisplay.style.color = 'var(--cyan-light)';
        } else {
          if (overallDisplay) overallDisplay.style.color = 'var(--danger)';
          isValid = false;
        }

        // If distribution is allocated (>0) or if there are assigned employees, they must sum to exactly 100%
        if (distPct > 0 || distInputs.length > 0) {
          if (Math.abs(distSum - 100) < 0.001) {
            if (distSubtotalText) distSubtotalText.style.color = 'var(--text-muted)';
          } else {
            if (distSubtotalText) distSubtotalText.style.color = 'var(--danger)';
            isValid = false;
          }
        } else {
          if (distSubtotalText) distSubtotalText.style.color = 'var(--text-muted)';
        }

        return isValid;
      },

      openAddEmpModal() {
        const selectEl = document.getElementById('modal-emp-select');
        if (!selectEl) return;

        const assignedIds = Object.keys(this.activeConfig.distributions || {});
        const availableEmps = this.distributionEmployees.filter(e => !assignedIds.includes(e.id));

        if (availableEmps.length === 0) {
          toast('No additional employees with "Distribution" assignment found.', 'info');
          return;
        }

        selectEl.innerHTML = availableEmps.map(e => `
          <option value="${escapeHtml(e.id)}">${escapeHtml(`${e.first_name} ${e.last_name}`)}</option>
        `).join('');

        document.getElementById('add-employee-modal').classList.add('open');
      },

      closeAddEmpModal() {
        document.getElementById('add-employee-modal').classList.remove('open');
      },

      addEmpFromModal() {
        const selectEl = document.getElementById('modal-emp-select');
        if (!selectEl || !selectEl.value) return;

        const empId = selectEl.value;
        this.syncInputsToMemory();

        this.activeConfig.distributions[empId] = 0;
        this.closeAddEmpModal();
        this.renderEditor();
      },

      removeEmployee(empId) {
        this.syncInputsToMemory();
        delete this.activeConfig.distributions[empId];
        this.renderEditor();
      },

      syncInputsToMemory() {
        this.activeConfig.retained_earnings_pct = parseFloat(document.getElementById('retained-earnings').value) || 0;
        this.activeConfig.capital_buffer_pct = parseFloat(document.getElementById('capital-buffer').value) || 0;
        this.activeConfig.distribution_pct = parseFloat(document.getElementById('distribution-pct').value) || 0;
        this.activeConfig.loan_payment_pct = parseFloat(document.getElementById('loan-payment').value) || 0;

        const distInputs = document.querySelectorAll('.dist-pct-input');
        distInputs.forEach(inp => {
          const empId = inp.dataset.empId;
          this.activeConfig.distributions[empId] = parseFloat(inp.value) || 0;
        });
      },

      async saveSettings() {
        this.syncInputsToMemory();
        
        if (!this.validateTotal()) {
          const distPct = parseFloat(document.getElementById('distribution-pct').value) || 0;
          let distSum = 0;
          document.querySelectorAll('.dist-pct-input').forEach(inp => { distSum += parseFloat(inp.value) || 0; });
          
          if (Math.abs(distPct + parseFloat(document.getElementById('retained-earnings').value) + parseFloat(document.getElementById('capital-buffer').value) + parseFloat(document.getElementById('loan-payment').value) - 100) > 0.001) {
            toast('Failed to save: Total profit allocation must equal 100%.', 'error');
          } else {
            toast('Failed to save: Employee distribution shares must sum to 100%.', 'error');
          }
          return;
        }

        const todayStr = new Date().toISOString().split('T')[0];
        const existingIdx = this.versions.findIndex(v => v.effective_date === todayStr);

        const newVersion = {
          effective_date: todayStr,
          retained_earnings_pct: this.activeConfig.retained_earnings_pct,
          capital_buffer_pct: this.activeConfig.capital_buffer_pct,
          distribution_pct: this.activeConfig.distribution_pct,
          loan_payment_pct: this.activeConfig.loan_payment_pct,
          distributions: { ...this.activeConfig.distributions }
        };

        if (existingIdx !== -1) {
          this.versions[existingIdx] = newVersion;
        } else {
          this.versions.push(newVersion);
        }

        this.sortVersions();

        const btn = document.getElementById('btn-save-settings');
        btn.disabled = true;
        const origText = btn.textContent;
        btn.textContent = 'Saving...';

        try {
          const { error } = await getSb()
            .from('global_settings')
            .upsert({
              key: 'equity_settings',
              company_id: this.companyId,
              value: this.versions
            });

          if (error) throw error;
          toast('Settings saved successfully.', 'success');
        } catch (e) {
          console.error('Error saving settings:', e);
          toast('Save failed: ' + e.message, 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = origText;
        }
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      EquitySettingsApp.init();
    });
  </script>
</body>
</html>
