<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equity Settings — BrightKey Portal</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/dashboard/payout-tracker/shared.css" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=2" />
  <style>
    .int-wrap { max-width: 1100px; margin: 0 auto; padding: 2rem 2rem 5rem; }

    .drawer-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      background: var(--bg-surface);
    }
    .tab-btn {
      padding: 0.9rem 1.25rem;
      font-size: 0.82rem; font-weight: 600;
      color: var(--text-muted);
      border: none; background: none; cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap; transition: all 0.15s;
      font-family: var(--font-sans);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      line-height: 1;
    }
    .tab-btn.active { color: var(--cyan-light); border-bottom-color: var(--cyan); }
    .tab-btn:hover:not(.active) { color: var(--text-secondary); }

    /* ── Version Item Styling ── */
    .version-item {
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-surface);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      transition: all 0.15s;
    }
    .version-item:hover {
      border-color: var(--cyan-border);
      background: var(--bg-elevated);
    }
    .version-item.active {
      border-color: var(--cyan);
      background: rgba(6, 182, 212, 0.05);
    }
    .version-item__date {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .version-item__meta {
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    /* ── Modal overlay (Pattern A) ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open {
      display: flex;
    }
    .modal-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      width: 440px;
      max-width: 90%;
      padding: 1.75rem;
      box-shadow: var(--shadow-lg);
      animation: modalSlide 0.2s forwards;
    }
    @keyframes modalSlide {
      from { transform: translateY(15px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-header {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.75rem;
    }
    .modal-body {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .input-row {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .input-row label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
    }
  </style>
</head>
<body>

  <div class="dash-layout">
    <aside class="dash-sidebar" id="dash-sidebar"></aside>

    <div class="dash-main">
      <div class="top-bar">
        <div class="top-bar-title">Ledgers</div>
      </div>

      <!-- Tab bar -->
      <nav class="drawer-tabs">
        <a href="/dashboard/ledgers/cash-ledgers" class="tab-btn">Cash Ledgers</a>
        <a href="/dashboard/ledgers/equity" class="tab-btn active">Equity Ledgers</a>
      </nav>

      <!-- Subtab bar -->
      <div class="drawer-tabs" style="background: var(--bg-surface); padding-left: 2rem; border-bottom: 1px solid var(--border);">
        <a href="/dashboard/ledgers/equity/" class="tab-btn" style="font-size: 0.78rem; padding: 0.6rem 1rem;">Summary</a>
        <a href="/dashboard/ledgers/equity/settings/" class="tab-btn active" style="font-size: 0.78rem; padding: 0.6rem 1rem;">Settings</a>
      </div>

      <main style="overflow-y: auto; flex: 1; min-width: 0; width: 100%;">
        <div class="int-wrap">
          <div style="display: flex; gap: 2rem; align-items: flex-start;">
            
            <!-- Left Panel: History Timeline -->
            <div style="width: 280px; flex-shrink: 0; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1.25rem; box-shadow: var(--shadow-sm);">
              <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
                <span style="font-size: 0.82rem; font-weight: 700; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.05em;">Timeline</span>
                <button class="btn btn-outline btn-sm" onclick="EquitySettingsApp.createNewVersion()" style="padding: 0.25rem 0.5rem; font-size: 0.72rem; line-height: 1;">+ New</button>
              </div>
              <div id="versions-list" style="display: flex; flex-direction: column; gap: 0.5rem; max-height: 500px; overflow-y: auto; scrollbar-width: thin;">
                <!-- Populate dynamically -->
              </div>
            </div>

            <!-- Right Panel: Config Editor -->
            <div class="j-card" style="flex: 1; margin-bottom: 0;" id="editor-card">
              <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem;">
                <div class="j-card-title" style="margin: 0;" id="editor-title">Configuration Details</div>
                <div style="display: flex; gap: 0.5rem;">
                  <button class="btn btn-outline btn-sm" id="btn-delete-version" onclick="EquitySettingsApp.deleteCurrentVersion()" style="color: var(--danger); border-color: var(--border);">Delete</button>
                  <button class="btn btn-cyan btn-sm" id="btn-save-settings" onclick="EquitySettingsApp.saveSettings()">Save Version</button>
                </div>
              </div>
              
              <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                <div class="form-group">
                  <label class="form-label" for="effective-date">Effective Date</label>
                  <input type="date" id="effective-date" class="form-input" onchange="EquitySettingsApp.handleEffectiveDateChange()" />
                </div>
                <div class="form-group">
                  <label class="form-label" for="retained-earnings">Retained Earnings (%)</label>
                  <input type="number" id="retained-earnings" class="form-input" min="0" max="100" step="0.01" value="100.00" oninput="EquitySettingsApp.validateTotal()" />
                </div>
                <div class="form-group">
                  <label class="form-label" for="capital-buffer">Capital Buffer (%)</label>
                  <input type="number" id="capital-buffer" class="form-input" min="0" max="100" step="0.01" value="0.00" oninput="EquitySettingsApp.validateTotal()" />
                </div>
              </div>

              <div style="border-top: 1px solid var(--border); padding-top: 1.5rem; margin-bottom: 1.5rem;">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
                  <span style="font-size: 0.82rem; font-weight: 700; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.05em;">Distribution Allocations</span>
                  <button class="btn btn-outline btn-sm" onclick="EquitySettingsApp.openAddEmpModal()">+ Add Employee</button>
                </div>

                <!-- List of assigned employees -->
                <div id="distributions-list" style="display: flex; flex-direction: column; gap: 0.75rem;">
                  <!-- Rendered dynamically -->
                </div>
              </div>

              <!-- Live Sum Validation Indicator -->
              <div id="validation-bar" style="display: flex; align-items: center; justify-content: space-between; padding: 1rem; border-radius: var(--radius-md); border: 1px solid var(--border); font-size: 0.88rem; font-weight: 600; background: var(--bg-elevated);">
                <span id="validation-total-text">Total Allocation: 100.00%</span>
                <span id="validation-status-text" style="color: var(--cyan-light);">Ready to save</span>
              </div>
            </div>

          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Modal: Add Distribution Employee -->
  <div class="modal-overlay" id="add-employee-modal">
    <div class="modal-card">
      <div class="modal-header">Add Distribution Employee</div>
      <div class="modal-body">
        <div class="input-row">
          <label for="modal-emp-select">Select Employee</label>
          <select id="modal-emp-select" class="form-select" style="background: var(--bg-surface); color: var(--text-primary); border: 1px solid var(--border); border-radius: 4px; padding: 0.5rem; outline: none; width: 100%;"></select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline btn-sm" onclick="EquitySettingsApp.closeAddEmpModal()">Cancel</button>
        <button class="btn btn-cyan btn-sm" onclick="EquitySettingsApp.addEmpFromModal()">Add</button>
      </div>
    </div>
  </div>

  <div id="toast-container" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/main.js"></script>

  <script>
    'use strict';

    const getSb = () => window.BKAuth.sb;
    
    const toast = (msg, type = 'success') => {
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = msg;
      let container = document.getElementById('toast-container');
      if (!container) {
        container = document.createElement('div');
        container.id = 'toast-container';
        document.body.appendChild(container);
      }
      container.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    };

    const escapeHtml = (str) => {
      if (!str) return '';
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    };

    window.EquitySettingsApp = {
      tenantId: null,
      companyId: null,
      distributionEmployees: [], 
      versions: [], // Array of configurations ordered by date descending
      selectedIndex: 0,
      isNewVersion: false,
      newVersionTemp: null,

      async init() {
        try {
          const authInfo = await window.BKAuth.checkRoleGate(
            ['owner', 'admin', 'hr', 'finance'],
            '../admin.html'
          );
          if (!authInfo) return;
          this.tenantId = authInfo.tenantId;

          const { data: co } = await getSb().from('companies').select('id').eq('tenant_id', this.tenantId).limit(1).maybeSingle();
          this.companyId = co?.id || null;
          if (!this.companyId) {
            toast('Failed to resolve company.', 'error');
            return;
          }

          await this.loadEmployees();
          await this.loadGlobalSettings();
          this.renderTimeline();
          this.renderEditor();
        } catch (e) {
          console.error(e);
          toast('Initialization failed: ' + e.message, 'error');
        }
      },

      async loadEmployees() {
        try {
          const { data, error } = await getSb()
            .from('employees')
            .select('id, first_name, last_name, assignment')
            .eq('company_id', this.companyId)
            .eq('employment_status', 'Active');
          
          if (error) throw error;
          
          this.distributionEmployees = (data || []).filter(e => {
            const assigns = (e.assignment || '').split(',').map(s => s.trim().toLowerCase());
            return assigns.includes('distribution');
          });
        } catch (e) {
          console.error('Error loading employees:', e);
          toast('Error loading employees: ' + e.message, 'error');
        }
      },

      async loadGlobalSettings() {
        try {
          const { data, error } = await getSb()
            .from('global_settings')
            .select('value')
            .eq('key', 'equity_settings')
            .eq('company_id', this.companyId)
            .maybeSingle();
          
          if (error) throw error;
          
          // Parse value as an array of historical configs
          const raw = data?.value;
          if (Array.isArray(raw)) {
            this.versions = raw;
          } else if (raw && typeof raw === 'object' && !Array.isArray(raw)) {
            // Convert old YYYY-MM based object structure to array if needed
            this.versions = Object.entries(raw).map(([key, val]) => ({
              effective_date: `${key}-01`,
              retained_earnings_pct: Number(val.retained_earnings_pct ?? 100),
              capital_buffer_pct: Number(val.capital_buffer_pct ?? 0),
              distributions: val.distributions || {}
            }));
          } else {
            this.versions = [];
          }

          // Sort descending by effective date
          this.sortVersions();

          if (this.versions.length === 0) {
            // Default first version
            this.versions.push({
              effective_date: new Date().toISOString().split('T')[0],
              retained_earnings_pct: 100,
              capital_buffer_pct: 0,
              distributions: {}
            });
          }
          this.selectedIndex = 0;
          this.isNewVersion = false;
        } catch (e) {
          console.error('Error loading settings:', e);
          toast('Error loading settings: ' + e.message, 'error');
        }
      },

      sortVersions() {
        this.versions.sort((a, b) => new Date(b.effective_date) - new Date(a.effective_date));
      },

      renderTimeline() {
        const container = document.getElementById('versions-list');
        if (!container) return;

        if (this.versions.length === 0) {
          container.innerHTML = `<div style="text-align:center; padding:1rem; font-size:0.75rem; color:var(--text-muted);">No versions configured.</div>`;
          return;
        }

        container.innerHTML = this.versions.map((ver, idx) => {
          const isActive = !this.isNewVersion && idx === this.selectedIndex;
          const fmtDate = new Date(ver.effective_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
          const distCount = Object.keys(ver.distributions || {}).length;
          
          return `
            <div class="version-item ${isActive ? 'active' : ''}" onclick="EquitySettingsApp.selectVersion(${idx})">
              <span class="version-item__date">${escapeHtml(fmtDate)}</span>
              <span class="version-item__meta">Retained: ${ver.retained_earnings_pct}%, Buffer: ${ver.capital_buffer_pct}%, Dist: ${distCount} emps</span>
            </div>
          `;
        }).join('');

        if (this.isNewVersion) {
          const fmtDate = this.newVersionTemp.effective_date 
            ? new Date(this.newVersionTemp.effective_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
            : 'Draft Date';
          container.insertAdjacentHTML('afterbegin', `
            <div class="version-item active" style="border-color:var(--cyan); background:rgba(6,182,212,0.08);">
              <span class="version-item__date" style="color:var(--cyan-light);">${escapeHtml(fmtDate)} (Draft)</span>
              <span class="version-item__meta">Draft New Version</span>
            </div>
          `);
        }
      },

      selectVersion(idx) {
        this.isNewVersion = false;
        this.newVersionTemp = null;
        this.selectedIndex = idx;
        this.renderTimeline();
        this.renderEditor();
      },

      createNewVersion() {
        // Copy currently selected version as template
        const template = this.versions[this.selectedIndex] || {
          retained_earnings_pct: 100,
          capital_buffer_pct: 0,
          distributions: {}
        };

        this.newVersionTemp = {
          effective_date: new Date().toISOString().split('T')[0],
          retained_earnings_pct: template.retained_earnings_pct,
          capital_buffer_pct: template.capital_buffer_pct,
          distributions: { ...template.distributions }
        };

        this.isNewVersion = true;
        this.renderTimeline();
        this.renderEditor();
      },

      getCurrentConfig() {
        return this.isNewVersion ? this.newVersionTemp : this.versions[this.selectedIndex];
      },

      renderEditor() {
        const config = this.getCurrentConfig();
        if (!config) return;

        document.getElementById('editor-title').textContent = this.isNewVersion ? 'Create New Version' : 'Configuration Details';
        document.getElementById('effective-date').value = config.effective_date;
        document.getElementById('retained-earnings').value = config.retained_earnings_pct;
        document.getElementById('capital-buffer').value = config.capital_buffer_pct;

        // Delete button is disabled if there is only 1 configuration and it's not a new draft
        const btnDelete = document.getElementById('btn-delete-version');
        if (btnDelete) {
          if (this.isNewVersion) {
            btnDelete.textContent = 'Cancel';
            btnDelete.style.display = 'inline-block';
          } else {
            btnDelete.textContent = 'Delete';
            btnDelete.style.display = this.versions.length > 1 ? 'inline-block' : 'none';
          }
        }

        const listContainer = document.getElementById('distributions-list');
        if (!listContainer) return;

        const distEntries = Object.entries(config.distributions || {});
        if (distEntries.length === 0) {
          listContainer.innerHTML = `<div style="text-align:center; padding:1.5rem; color:var(--text-muted); font-size:0.82rem; border:1px dashed var(--border); border-radius:6px;">No distribution employees assigned for this version.</div>`;
          this.validateTotal();
          return;
        }

        listContainer.innerHTML = distEntries.map(([empId, pct]) => {
          const emp = this.distributionEmployees.find(e => e.id === empId);
          const fullName = emp ? `${emp.first_name} ${emp.last_name}` : 'Unknown Employee';
          return `
            <div style="display:flex; align-items:center; justify-content:space-between; background:var(--bg-elevated); padding:0.6rem 1rem; border-radius:6px; border:1px solid var(--border);">
              <span style="font-size:0.88rem; font-weight:600; color:var(--text-primary);">${escapeHtml(fullName)}</span>
              <div style="display:flex; align-items:center; gap:0.75rem;">
                <div style="display:flex; align-items:center; gap:0.25rem;">
                  <input type="number" class="form-input dist-pct-input" data-emp-id="${escapeHtml(empId)}" min="0" max="100" step="0.01" value="${pct}" oninput="EquitySettingsApp.validateTotal()" style="width:90px; padding:0.35rem 0.5rem; font-size:0.85rem;" />
                  <span style="font-size:0.85rem; color:var(--text-secondary);">%</span>
                </div>
                <button class="btn btn-outline btn-sm" onclick="EquitySettingsApp.removeEmployee('${escapeHtml(empId)}')" style="padding:0.25rem 0.5rem; color:var(--danger); border-color:var(--border);">&times;</button>
              </div>
            </div>
          `;
        }).join('');

        this.validateTotal();
      },

      validateTotal() {
        const retained = parseFloat(document.getElementById('retained-earnings').value) || 0;
        const buffer = parseFloat(document.getElementById('capital-buffer').value) || 0;
        
        let distSum = 0;
        const distInputs = document.querySelectorAll('.dist-pct-input');
        distInputs.forEach(inp => {
          distSum += parseFloat(inp.value) || 0;
        });

        const total = retained + buffer + distSum;
        const totalTextEl = document.getElementById('validation-total-text');
        const statusTextEl = document.getElementById('validation-status-text');
        const validationBarEl = document.getElementById('validation-bar');

        if (totalTextEl) totalTextEl.textContent = `Total Allocation: ${total.toFixed(2)}%`;

        if (Math.abs(total - 100) < 0.001) {
          if (statusTextEl) {
            statusTextEl.textContent = 'Ready to save';
            statusTextEl.style.color = 'var(--cyan-light)';
          }
          if (validationBarEl) {
            validationBarEl.style.borderColor = 'var(--border)';
            validationBarEl.style.background = 'var(--bg-elevated)';
          }
          return true;
        } else {
          if (statusTextEl) {
            statusTextEl.textContent = `Warning: Total allocation must equal 100%`;
            statusTextEl.style.color = 'var(--danger)';
          }
          if (validationBarEl) {
            validationBarEl.style.borderColor = 'var(--danger)';
            validationBarEl.style.background = 'rgba(239, 68, 68, 0.05)';
          }
          return false;
        }
      },

      handleEffectiveDateChange() {
        const dateVal = document.getElementById('effective-date').value;
        const config = this.getCurrentConfig();
        if (config && dateVal) {
          config.effective_date = dateVal;
          this.renderTimeline();
        }
      },

      openAddEmpModal() {
        const config = this.getCurrentConfig();
        if (!config) return;

        const selectEl = document.getElementById('modal-emp-select');
        if (!selectEl) return;

        const assignedIds = Object.keys(config.distributions || {});
        const availableEmps = this.distributionEmployees.filter(e => !assignedIds.includes(e.id));

        if (availableEmps.length === 0) {
          toast('No additional employees with "Distribution" assignment found.', 'info');
          return;
        }

        selectEl.innerHTML = availableEmps.map(e => `
          <option value="${escapeHtml(e.id)}">${escapeHtml(`${e.first_name} ${e.last_name}`)}</option>
        `).join('');

        document.getElementById('add-employee-modal').classList.add('open');
      },

      closeAddEmpModal() {
        document.getElementById('add-employee-modal').classList.remove('open');
      },

      addEmpFromModal() {
        const selectEl = document.getElementById('modal-emp-select');
        if (!selectEl || !selectEl.value) return;

        const empId = selectEl.value;
        this.syncInputsToMemory();

        const config = this.getCurrentConfig();
        if (config) {
          config.distributions[empId] = 0;
        }
        this.closeAddEmpModal();
        this.renderEditor();
      },

      removeEmployee(empId) {
        this.syncInputsToMemory();
        const config = this.getCurrentConfig();
        if (config && config.distributions) {
          delete config.distributions[empId];
        }
        this.renderEditor();
      },

      syncInputsToMemory() {
        const config = this.getCurrentConfig();
        if (!config) return;

        config.retained_earnings_pct = parseFloat(document.getElementById('retained-earnings').value) || 0;
        config.capital_buffer_pct = parseFloat(document.getElementById('capital-buffer').value) || 0;
        config.effective_date = document.getElementById('effective-date').value;

        const distInputs = document.querySelectorAll('.dist-pct-input');
        distInputs.forEach(inp => {
          const empId = inp.dataset.empId;
          config.distributions[empId] = parseFloat(inp.value) || 0;
        });
      },

      deleteCurrentVersion() {
        if (this.isNewVersion) {
          // Cancel draft
          this.isNewVersion = false;
          this.newVersionTemp = null;
          this.renderTimeline();
          this.renderEditor();
          toast('Draft cancelled.', 'info');
          return;
        }

        if (this.versions.length <= 1) return;

        const btn = document.getElementById('btn-delete-version');
        if (!btn.dataset.confirming) {
          btn.dataset.confirming = 'true';
          btn.textContent = 'Confirm Delete?';
          btn.style.backgroundColor = 'var(--danger)';
          btn.style.color = '#fff';
          btn.style.borderColor = 'var(--danger)';
          this.deleteTimeout = setTimeout(() => {
            btn.removeAttribute('data-confirming');
            btn.textContent = 'Delete';
            btn.style.backgroundColor = '';
            btn.style.color = 'var(--danger)';
            btn.style.borderColor = 'var(--border)';
          }, 3000);
          return;
        }

        clearTimeout(this.deleteTimeout);
        btn.removeAttribute('data-confirming');
        btn.textContent = 'Delete';
        btn.style.backgroundColor = '';
        btn.style.color = 'var(--danger)';
        btn.style.borderColor = 'var(--border)';

        this.versions.splice(this.selectedIndex, 1);
        this.selectedIndex = 0;
        this.saveGlobalSettingsToServer('Version deleted.');
      },

      async saveSettings() {
        this.syncInputsToMemory();
        
        if (!this.validateTotal()) {
          toast('Failed to save: Total allocation must equal 100%.', 'error');
          return;
        }

        const config = this.getCurrentConfig();
        if (!config.effective_date) {
          toast('Failed to save: Effective date is required.', 'error');
          return;
        }

        // Check if there is already a version with this date
        const dateMatchIdx = this.versions.findIndex(v => v.effective_date === config.effective_date);
        
        if (this.isNewVersion) {
          if (dateMatchIdx !== -1) {
            toast('A configuration version with this effective date already exists.', 'error');
            return;
          }
          this.versions.push(config);
          this.isNewVersion = false;
          this.newVersionTemp = null;
        } else {
          // Editing existing version
          if (dateMatchIdx !== -1 && dateMatchIdx !== this.selectedIndex) {
            toast('Another version with this effective date already exists.', 'error');
            return;
          }
          this.versions[this.selectedIndex] = config;
        }

        this.sortVersions();
        
        // Relocate selectedIndex to match the saved version's new position
        this.selectedIndex = this.versions.findIndex(v => v.effective_date === config.effective_date);

        await this.saveGlobalSettingsToServer('Settings saved successfully.');
      },

      async saveGlobalSettingsToServer(successMessage) {
        const btn = document.getElementById('btn-save-settings');
        btn.disabled = true;
        const origText = btn.textContent;
        btn.textContent = 'Saving...';

        try {
          const { error } = await getSb()
            .from('global_settings')
            .upsert({
              key: 'equity_settings',
              company_id: this.companyId,
              value: this.versions
            });

          if (error) throw error;
          toast(successMessage, 'success');
          this.renderTimeline();
          this.renderEditor();
        } catch (e) {
          console.error('Error saving settings:', e);
          toast('Save failed: ' + e.message, 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = origText;
        }
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      EquitySettingsApp.init();
    });
  </script>
</body>
</html>
