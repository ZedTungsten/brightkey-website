<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Summary — Pricing Strategy — Brightkey</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=2" />
  <style>
    /* ── Tab Layout & Styling (AGENTS.md Rule 8) ── */
    .drawer-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      background: var(--bg-surface);
    }
    .tab-btn {
      padding: 0.9rem 1.25rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.15s;
      text-decoration: none;
    }
    .tab-btn.active {
      color: var(--cyan-light);
      border-bottom-color: var(--cyan);
    }
    .tab-btn:hover:not(.active) {
      color: var(--text-secondary);
    }

    /* ── Business Selector Dropdown ── */
    .business-select-container {
      position: relative;
      min-width: 200px;
    }
    .business-select {
      width: 100%;
      height: 36px;
      padding: 0 2rem 0 0.75rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
      color: var(--text-primary);
      outline: none;
      cursor: pointer;
      appearance: none;
    }
  </style>
</head>
<body>

  <div class="toast-container" id="toast-container"></div>

  <div class="dash-layout">
    <!-- Sidebar -->
    <aside class="dash-sidebar" id="dash-sidebar"></aside>

    <!-- Main Content -->
    <div class="dash-main">
      <!-- Top Bar -->
      <div class="top-bar">
        <span class="top-bar-title">Pricing Strategy</span>
        <div style="flex:1;"></div>
        
        <!-- Business Selector (Top Right) -->
        <div class="business-select-container">
          <select id="business-select" class="business-select" onchange="onBusinessChange()">
            <option value="">All Businesses</option>
          </select>
          <div style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text-secondary);">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>

        <!-- Save Status Indicator -->
        <span id="save-status" style="font-size: 0.82rem; color: var(--text-secondary); margin-left: 1.25rem; font-weight: 500; display: inline-flex; align-items: center; gap: 0.4rem; min-width: 140px; transition: opacity 0.2s;">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="var(--cyan)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><polyline points="20 6 9 17 4 12"/></svg>
          <span id="save-status-text">All changes saved</span>
        </span>
      </div>

      <!-- Drawer Tabs Navigation (Directly below header) -->
      <div class="drawer-tabs">
        <a href="/dashboard/pricing-strategy/calculator" class="tab-btn active">Calculator</a>
        <a href="/dashboard/pricing-strategy/expenses" class="tab-btn">Expenses</a>
        <a href="/dashboard/pricing-strategy/competitors" class="tab-btn">Competitors</a>
        <a href="/dashboard/pricing-strategy/dealer" class="tab-btn">Dealer</a>
      </div>

      <div class="content-area">
        <main class="main-panel" style="padding: 1.5rem;">
          <!-- Summary Panel -->
          <div class="card" style="padding: 2.5rem; text-align: center; border-radius: 8px;">
            <div style="color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; max-width: 500px; margin: 0 auto;">
              <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem; opacity: 0.6;"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
              <h3 style="font-size: 1.1rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.5rem;">Pricing Calculator</h3>
              Pricing calculator and strategy reports will be displayed here in a future release. Please navigate to the other subpages to view and manage active records.
            </div>
          </div>
        </main>
      </div>
    </div>
  </div>

  <!-- Framework Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/main.js"></script>
  <script>
    let sb = null;
    let companyId = null;
    let businessList = [];
    let selectedBusiness = "";

    function showToast(message, isError = false) {
      if (window.Toast) {
        window.Toast.show(message, isError ? 'error' : 'success');
      } else {
        console.log((isError ? 'ERROR: ' : 'INFO: ') + message);
      }
    }

    function setSaveStatus(status) {
      const statusText = document.getElementById('save-status-text');
      const statusIcon = document.querySelector('#save-status svg');
      const statusWrapper = document.getElementById('save-status');
      if (!statusText || !statusIcon || !statusWrapper) return;

      if (status === 'saving') {
        statusWrapper.style.opacity = '0.6';
        statusText.textContent = 'Saving...';
        statusIcon.style.stroke = 'var(--text-muted)';
        statusIcon.style.display = 'none';
      } else if (status === 'saved') {
        statusWrapper.style.opacity = '1';
        statusText.textContent = 'All changes saved';
        statusIcon.style.stroke = 'var(--cyan)';
        statusIcon.style.display = 'inline-block';
      } else if (status === 'error') {
        statusWrapper.style.opacity = '1';
        statusText.textContent = 'Save failed';
        statusIcon.style.stroke = 'var(--danger)';
        statusIcon.style.display = 'inline-block';
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      // Role gate checking the Business module permission
      const authInfo = await window.BKAuth.checkRoleGate(['Business'], '/admin');
      sb = window.BKAuth.sb;

      // Get Company ID
      const { data: co } = await sb.from('companies').select('id').eq('tenant_id', authInfo.tenantId).limit(1).maybeSingle();
      companyId = co?.id || null;
      if (!companyId) {
        showToast('Company ID not found.', true);
        return;
      }

      // Load business list
      const { data: bizData } = await sb.from('tenant_businesses').select('id, name').eq('company_id', companyId).order('name', { ascending: true });
      businessList = bizData || [];

      // Restore settings from global_settings (cross-device database store)
      let savedSettings = { selected_business: "", checked_months: [] };
      try {
        const { data: globalSet } = await sb.from('global_settings')
          .select('value')
          .eq('key', 'pricing_strategy_settings')
          .eq('company_id', companyId)
          .maybeSingle();
        if (globalSet?.value) {
          savedSettings = globalSet.value;
        }
      } catch (err) {
        console.warn('Failed to load pricing strategy settings from global_settings:', err);
      }

      selectedBusiness = savedSettings.selected_business || "";

      const bizSelect = document.getElementById('business-select');
      businessList.forEach(biz => {
        const opt = document.createElement('option');
        opt.value = biz.name;
        opt.textContent = biz.name;
        if (biz.name === selectedBusiness) opt.selected = true;
        bizSelect.appendChild(opt);
      });
    });

    async function saveSettingsToDb() {
      setSaveStatus('saving');
      try {
        let latestValue = {};
        const { data: globalSet } = await sb.from('global_settings')
          .select('value')
          .eq('key', 'pricing_strategy_settings')
          .eq('company_id', companyId)
          .maybeSingle();
        if (globalSet?.value) {
          latestValue = globalSet.value;
        }

        latestValue.selected_business = selectedBusiness;

        await sb.from('global_settings').upsert({
          company_id: companyId,
          key: 'pricing_strategy_settings',
          value: latestValue
        }, { onConflict: 'company_id,key' });
        setSaveStatus('saved');
      } catch (err) {
        console.error('Failed to save settings:', err);
        setSaveStatus('error');
      }
    }

    async function onBusinessChange() {
      selectedBusiness = document.getElementById('business-select').value;
      await saveSettingsToDb();
    }
  </script>
</body>
</html>
