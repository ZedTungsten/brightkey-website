<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Competitors — Pricing Strategy — BrightKey</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=2" />
  <style>
    /* ── Tab Layout & Styling (AGENTS.md Rule 8) ── */
    .drawer-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      background: var(--bg-surface);
    }
    .tab-btn {
      padding: 0.9rem 1.25rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.15s;
      text-decoration: none;
    }
    .tab-btn.active {
      color: var(--cyan-light);
      border-bottom-color: var(--cyan);
    }
    .tab-btn:hover:not(.active) {
      color: var(--text-secondary);
    }

    /* ── Business Selector Dropdown ── */
    .business-select-container {
      position: relative;
      min-width: 200px;
    }
    .business-select {
      width: 100%;
      height: 36px;
      padding: 0 2rem 0 0.75rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
      color: var(--text-primary);
      outline: none;
      cursor: pointer;
      appearance: none;
    }

    /* ── Excel-like Competitors Table ── */
    .logs-table {
      table-layout: fixed;
    }
    .logs-table th,
    .logs-table td {
      border: 1px solid var(--border);
      padding: 0;
      vertical-align: middle;
      white-space: pre-wrap !important;
      word-wrap: break-word;
      line-height: 0.3 !important;
    }
    .logs-table tbody tr {
      height: 1px;
    }
    .logs-table th {
      background: var(--bg-elevated);
      color: var(--text-secondary);
      font-weight: 700;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0 0.5rem;
      height: 28px;
    }
    .cell-textarea,
    .cell-input,
    .cell-select {
      width: 100%;
      height: 26px;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: 0.8rem;
      line-height: 0.3 !important;
      color: inherit;
      padding: 0 8px;
      margin: 0;
      box-sizing: border-box;
      transition: background 0.15s;
      overflow: hidden;
      display: block;
      vertical-align: middle !important;
    }
    .cell-select {
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }
    .cell-textarea:focus,
    .cell-input:focus,
    .cell-select:focus {
      background: transparent !important;
      box-shadow: none !important;
      outline: none !important;
      }
    .competitor-row-active td {
      background: rgba(6, 182, 212, 0.04) !important;
    }
  </style>
</head>
<body>

  <div class="toast-container" id="toast-container"></div>

  <div class="dash-layout">
    <!-- Sidebar -->
    <aside class="dash-sidebar" id="dash-sidebar"></aside>

    <!-- Main Content -->
    <div class="dash-main">
      <!-- Top Bar -->
      <div class="top-bar">
        <span class="top-bar-title">Pricing Strategy</span>
        <div style="flex:1;"></div>
        
        <!-- Business Selector (Top Right) -->
        <div class="business-select-container">
          <select id="business-select" class="business-select" onchange="onBusinessChange()">
            <option value="">All Businesses</option>
          </select>
          <div style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text-secondary);">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>

        <!-- Save Status Indicator -->
        <span id="save-status" style="font-size: 0.82rem; color: var(--text-secondary); margin-left: 1.25rem; font-weight: 500; display: inline-flex; align-items: center; gap: 0.4rem; min-width: 140px; transition: opacity 0.2s;">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="var(--cyan)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><polyline points="20 6 9 17 4 12"/></svg>
          <span id="save-status-text">All changes saved</span>
        </span>
      </div>

      <!-- Drawer Tabs Navigation (Directly below header) -->
      <div class="drawer-tabs">
        <a href="/dashboard/pricing-strategy/calculator" class="tab-btn">Calculator</a>
        <a href="/dashboard/pricing-strategy/expenses" class="tab-btn">Expenses</a>
        <a href="/dashboard/pricing-strategy/competitors" class="tab-btn active">Competitors</a>
        <a href="/dashboard/pricing-strategy/dealer" class="tab-btn">Dealer</a>
      </div>

      <div class="content-area">
        <main class="main-panel" style="padding: 1.5rem;">
          <!-- Competitors Panel Header -->
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h2 style="font-size: 1.1rem; font-weight: 700; color: var(--text-primary); margin: 0;">Competitor Price Matrix</h2>
            <span id="competitors-last-updated" style="font-size: 0.82rem; color: var(--text-secondary); font-weight: 500;">Last updated: —</span>
          </div>

          <!-- Competitors Cards Container -->
          <div id="competitors-container">
            <!-- Populated dynamically with separate cards/containers -->
          </div>

          <!-- Add Competitor Button (Center Aligned at bottom, outside all containers) -->
          <div style="text-align: center; margin-top: 2rem; margin-bottom: 2rem;">
            <button class="btn btn-primary" onclick="addNewCompetitor()" style="height: 32px; padding: 0 1.25rem; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 0.5rem; font-weight: 600; margin: 0 auto; box-shadow: var(--shadow-sm);">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              Add Competitor
            </button>
          </div>
        </main>
      </div>
    </div>
  </div>

  <!-- Framework Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/main.js"></script>
  <script>
    let sb = null;
    let companyId = null;
    let businessList = [];
    let selectedBusiness = "";

    function showToast(message, isError = false) {
      if (window.Toast) {
        window.Toast.show(message, isError ? 'error' : 'success');
      } else {
        console.log((isError ? 'ERROR: ' : 'INFO: ') + message);
      }
    }

    function setSaveStatus(status) {
      const statusText = document.getElementById('save-status-text');
      const statusIcon = document.querySelector('#save-status svg');
      const statusWrapper = document.getElementById('save-status');
      if (!statusText || !statusIcon || !statusWrapper) return;

      if (status === 'saving') {
        statusWrapper.style.opacity = '0.6';
        statusText.textContent = 'Saving...';
        statusIcon.style.stroke = 'var(--text-muted)';
        statusIcon.style.display = 'none';
      } else if (status === 'saved') {
        statusWrapper.style.opacity = '1';
        statusText.textContent = 'All changes saved';
        statusIcon.style.stroke = 'var(--cyan)';
        statusIcon.style.display = 'inline-block';
      } else if (status === 'error') {
        statusWrapper.style.opacity = '1';
        statusText.textContent = 'Save failed';
        statusIcon.style.stroke = 'var(--danger)';
        statusIcon.style.display = 'inline-block';
      }
    }

    let allProducts = [];
    let competitorList = [];
    let competitorProducts = [];
    let selectedCompetitorId = null;

    document.addEventListener('DOMContentLoaded', async () => {
      // Role gate checking the Business module permission
      const authInfo = await window.BKAuth.checkRoleGate(['Business'], '/admin');
      sb = window.BKAuth.sb;

      // Get Company ID
      const { data: co } = await sb.from('companies').select('id').eq('tenant_id', authInfo.tenantId).limit(1).maybeSingle();
      companyId = co?.id || null;
      if (!companyId) {
        showToast('Company ID not found.', true);
        return;
      }

      // Load business list
      const { data: bizData } = await sb.from('tenant_businesses').select('id, name').eq('company_id', companyId).order('name', { ascending: true });
      businessList = bizData || [];

      // Restore settings from global_settings (cross-device database store)
      let savedSettings = { selected_business: "", checked_months: [] };
      try {
        const { data: globalSet } = await sb.from('global_settings')
          .select('value')
          .eq('key', 'pricing_strategy_settings')
          .eq('company_id', companyId)
          .maybeSingle();
        if (globalSet?.value) {
          savedSettings = globalSet.value;
        }
      } catch (err) {
        console.warn('Failed to load pricing strategy settings from global_settings:', err);
      }

      selectedBusiness = savedSettings.selected_business || "";

      const bizSelect = document.getElementById('business-select');
      businessList.forEach(biz => {
        const opt = document.createElement('option');
        opt.value = biz.name;
        opt.textContent = biz.name;
        if (biz.name === selectedBusiness) opt.selected = true;
        bizSelect.appendChild(opt);
      });

      // Load products for dynamic COGS classification
      const { data: prodData } = await sb.from('products').select('sku, business, dealer_price').order('sku', { ascending: true });
      allProducts = prodData || [];

      await loadCompetitors(true);
    });

    async function loadCompetitors(isInitial = false) {
      if (!companyId) return;

      const container = document.getElementById('competitors-container');
      if (isInitial || container.children.length === 0) {
        container.innerHTML = `<div style="text-align: center; color: var(--text-muted); padding: 3rem;">Loading competitor pricing...</div>`;
      }

      try {
        const bizName = selectedBusiness || 'All';

        // 1. Fetch competitors
        const { data: comps, error: compErr } = await sb.from('competitors')
          .select('*')
          .eq('company_id', companyId)
          .eq('business_name', bizName)
          .order('created_at', { ascending: true });

        if (compErr) throw compErr;
        competitorList = comps || [];

        // 2. Fetch products
        let prods = [];
        if (competitorList.length > 0) {
          const compIds = competitorList.map(c => c.id);
          const { data: prodData, error: prodErr } = await sb.from('competitor_products')
            .select('*')
            .in('competitor_id', compIds)
            .order('created_at', { ascending: true });
          if (prodErr) throw prodErr;
          prods = prodData || [];
        }
        competitorProducts = prods;

        // 3. Fallback: If no records exist, show exactly 1 empty row of competitor
        if (competitorList.length === 0) {
          const { data: newComp, error: newCompErr } = await sb.from('competitors')
            .insert({
              company_id: companyId,
              business_name: bizName,
              name: 'New Competitor'
            })
            .select()
            .single();

          if (newCompErr) throw newCompErr;

          const { data: newProd, error: newProdErr } = await sb.from('competitor_products')
            .insert({
              competitor_id: newComp.id,
              product_name: '',
              base_price: ''
            })
            .select()
            .single();

          if (newProdErr) throw newProdErr;

          competitorList = [newComp];
          competitorProducts = [newProd];
        }

        renderCompetitors();
      } catch (err) {
        console.error('Error loading competitors:', err);
        container.innerHTML = `<div style="text-align: center; color: var(--danger); padding: 3rem;">Failed to load competitor pricing: ${err.message}</div>`;
      }
    }

    function renderCompetitors() {
      const container = document.getElementById('competitors-container');
      container.innerHTML = '';

      let maxUpdated = null;

      competitorList.forEach(comp => {
        if (comp.updated_at) {
          const d = new Date(comp.updated_at);
          if (!maxUpdated || d > maxUpdated) maxUpdated = d;
        }

        const prods = competitorProducts.filter(p => p.competitor_id === comp.id);
        prods.sort((a, b) => {
          const nameA = (a.product_name || '').toUpperCase();
          const nameB = (b.product_name || '').toUpperCase();
          if (nameA === '' && nameB !== '') return 1;
          if (nameB === '' && nameA !== '') return -1;
          return nameA.localeCompare(nameB);
        });

        const card = document.createElement('div');
        card.className = 'card';
        card.style.padding = '1.25rem';
        card.style.marginBottom = '1.5rem';
        card.setAttribute('data-comp-id', comp.id);

        const competitorNameVal = comp.name === 'New Competitor' ? '' : comp.name;

        // Card Header
        const headerDiv = document.createElement('div');
        headerDiv.style.display = 'flex';
        headerDiv.style.justifyContent = 'space-between';
        headerDiv.style.alignItems = 'center';
        headerDiv.style.marginBottom = '1rem';
        headerDiv.style.borderBottom = '1px solid var(--border)';
        headerDiv.style.paddingBottom = '0.5rem';

        headerDiv.innerHTML = `
          <input type="text" class="cell-input" style="font-weight: 700; font-size: 0.95rem; background: transparent; border: none; padding: 0; flex-grow: 1; color: var(--text-primary) !important;" value="${escapeHtml(competitorNameVal)}" placeholder="New Competitor" onblur="saveCompetitorName('${comp.id}', this.value)" />
          <button class="btn-icon danger" onclick="deleteCompetitor('${comp.id}', '${escapeHtml(comp.name)}')" title="Delete Competitor" style="border: none; background: transparent; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; height: 26px; width: 26px; color: var(--danger) !important;">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        `;
        card.appendChild(headerDiv);

        // Table
        const tableWrapper = document.createElement('div');
        tableWrapper.style.overflowX = 'auto';

        const table = document.createElement('table');
        table.className = 'logs-table';
        table.style.width = '100%';
        table.style.borderCollapse = 'collapse';
        table.innerHTML = `
          <colgroup>
            <col style="width: 65%;" />
            <col style="width: 25%;" />
            <col style="width: 10%;" />
          </colgroup>
          <thead>
            <tr>
              <th style="width: 65%; text-align: left; height: 28px; padding-left: 0.5rem;">Product SKU</th>
              <th style="width: 25%; text-align: right; padding-right: 0.8rem; height: 28px;">Base Price</th>
              <th style="width: 10%; text-align: center; height: 28px;"></th>
            </tr>
          </thead>
        `;

        const tbody = document.createElement('tbody');
        const productsList = prods.length > 0 ? prods : [{ id: null, product_name: '', base_price: '' }];

        productsList.forEach(prod => {
          if (prod.updated_at) {
            const d = new Date(prod.updated_at);
            if (!maxUpdated || d > maxUpdated) maxUpdated = d;
          }

          const tr = document.createElement('tr');
          tr.style.height = '28px';

          // SKU Dropdown Options
          let skuOptions = `<option value="">Select SKU...</option>`;
          allProducts.forEach(ap => {
            const isSelected = (prod.product_name || '') === ap.sku;
            skuOptions += `<option value="${escapeHtml(ap.sku)}" ${isSelected ? 'selected' : ''}>${escapeHtml(ap.sku)}</option>`;
          });

          tr.innerHTML = `
            <td style="width: 65%; border-right: 1px solid var(--border); vertical-align: middle;">
              <select class="cell-select" style="color: var(--text-primary);" onchange="saveCompetitorProduct('${prod.id}', 'product_name', this.value)">
                ${skuOptions}
              </select>
            </td>
            <td style="width: 25%; border-right: 1px solid var(--border); vertical-align: middle;">
              <input type="text" class="cell-input" style="text-align: right; font-weight: 500; color: var(--text-primary);" value="${escapeHtml(prod.base_price || '')}" placeholder="0" onblur="saveCompetitorProduct('${prod.id}', 'base_price', this.value)" />
            </td>
            <td style="width: 10%; text-align: center; vertical-align: middle;">
              ${prod.id ? `
              <button class="btn-icon danger" onclick="deleteProductRow('${prod.id}')" title="Delete Product" style="border: none; background: transparent; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; height: 26px; width: 26px; color: var(--danger) !important; margin: 0 auto;">
                <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
              </button>
              ` : ''}
            </td>
          `;
          tbody.appendChild(tr);
        });

        table.appendChild(tbody);
        tableWrapper.appendChild(table);
        card.appendChild(tableWrapper);

        // Center-aligned Add Product Button
        const addProdDiv = document.createElement('div');
        addProdDiv.style.textAlign = 'center';
        addProdDiv.style.marginTop = '1rem';
        addProdDiv.innerHTML = `
          <button class="btn btn-outline" onclick="addNewProductTo('${comp.id}')" style="height: 28px; padding: 0 0.75rem; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 0.4rem; font-weight: 600; margin: 0 auto;">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Add Product
          </button>
        `;
        card.appendChild(addProdDiv);

        container.appendChild(card);
      });

      if (maxUpdated) {
        const options = { month: 'short', day: '2-digit', year: 'numeric' };
        document.getElementById('competitors-last-updated').textContent = `Last updated: ${maxUpdated.toLocaleDateString('en-US', options)}`;
      } else {
        document.getElementById('competitors-last-updated').textContent = `Last updated: —`;
      }
    }

    async function deleteCompetitor(id, name) {
      if (!companyId) return;

      const confirmBox = document.getElementById('confirm-modal');
      const confirmTitle = document.getElementById('confirm-title');
      const confirmBody = document.getElementById('confirm-body');

      confirmTitle.textContent = 'Delete Competitor?';
      confirmBody.textContent = `Are you sure you want to delete competitor "${name}" and all their pricing data?`;

      document.getElementById('confirm-ok').onclick = async () => {
        confirmBox.classList.remove('open');
        setSaveStatus('saving');
        try {
          const { error } = await sb.from('competitors').delete().eq('id', id);
          if (error) throw error;
          showToast('Competitor deleted successfully.');
          await loadCompetitors();
          setSaveStatus('saved');
        } catch (err) {
          console.error(err);
          setSaveStatus('error');
          showToast('Failed to delete competitor: ' + err.message, true);
        }
      };

      confirmBox.classList.add('open');
    }

    async function deleteProductRow(prodId) {
      setSaveStatus('saving');
      try {
        const { error } = await sb.from('competitor_products').delete().eq('id', prodId);
        if (error) throw error;
        showToast('Product removed.');
        await loadCompetitors();
        setSaveStatus('saved');
      } catch (err) {
        console.error(err);
        setSaveStatus('error');
        showToast('Failed to remove product: ' + err.message, true);
      }
    }

    async function saveCompetitorName(id, val) {
      const comp = competitorList.find(c => c.id === id);
      if (!comp) return;

      let finalVal = val.trim();
      if (finalVal === "") {
        finalVal = "New Competitor";
      }

      if (comp.name === finalVal) return;

      setSaveStatus('saving');
      try {
        const nowStr = new Date().toISOString();
        const { error } = await sb.from('competitors')
          .update({ name: finalVal, updated_at: nowStr })
          .eq('id', id);

        if (error) throw error;

        comp.name = finalVal;
        comp.updated_at = nowStr;

        const options = { month: 'short', day: '2-digit', year: 'numeric' };
        document.getElementById('competitors-last-updated').textContent = `Last updated: ${new Date(nowStr).toLocaleDateString('en-US', options)}`;
        setSaveStatus('saved');
      } catch (err) {
        console.error(err);
        setSaveStatus('error');
        showToast('Save failed: ' + err.message, true);
      }
    }

    async function saveCompetitorProduct(prodId, field, val) {
      if (!prodId || prodId === 'null') return;
      const prod = competitorProducts.find(p => p.id === prodId);
      if (!prod || prod[field] === val.trim()) return;

      if (field === 'product_name' && val.trim() !== '') {
        const hasDuplicate = competitorProducts.some(p => {
          return p.competitor_id === prod.competitor_id &&
                 p.id !== prodId &&
                 (p.product_name || '').trim() === val.trim();
        });
        if (hasDuplicate) {
          showToast('Duplicate SKU: This competitor already has this product.', true);
          await loadCompetitors();
          return;
        }
      }

      setSaveStatus('saving');
      try {
        const nowStr = new Date().toISOString();
        const { error } = await sb.from('competitor_products')
          .update({ [field]: val.trim(), updated_at: nowStr })
          .eq('id', prodId);

        if (error) throw error;

        prod[field] = val.trim();
        prod.updated_at = nowStr;

        const options = { month: 'short', day: '2-digit', year: 'numeric' };
        document.getElementById('competitors-last-updated').textContent = `Last updated: ${new Date(nowStr).toLocaleDateString('en-US', options)}`;
        setSaveStatus('saved');
      } catch (err) {
        console.error(err);
        setSaveStatus('error');
        showToast('Save failed: ' + err.message, true);
      }
    }

    async function addNewCompetitor() {
      const bizName = selectedBusiness || 'All';
      setSaveStatus('saving');
      try {
        const { data: newComp, error: compErr } = await sb.from('competitors')
          .insert({
            company_id: companyId,
            business_name: bizName,
            name: 'New Competitor'
          })
          .select()
          .single();

        if (compErr) throw compErr;

        const { error: prodErr } = await sb.from('competitor_products')
          .insert({
            competitor_id: newComp.id,
            product_name: '',
            base_price: ''
          });

        if (prodErr) throw prodErr;

        await loadCompetitors();
        setSaveStatus('saved');
      } catch (err) {
        console.error(err);
        setSaveStatus('error');
        showToast('Failed to add competitor: ' + err.message, true);
      }
    }

    async function addNewProductTo(compId) {
      setSaveStatus('saving');
      try {
        const { error } = await sb.from('competitor_products')
          .insert({
            competitor_id: compId,
            product_name: '',
            base_price: ''
          });

        if (error) throw error;
        await loadCompetitors();
        setSaveStatus('saved');
      } catch (err) {
        console.error(err);
        setSaveStatus('error');
        showToast('Failed to add product: ' + err.message, true);
      }
    }

    async function saveSettingsToDb() {
      setSaveStatus('saving');
      try {
        let latestValue = {};
        const { data: globalSet } = await sb.from('global_settings')
          .select('value')
          .eq('key', 'pricing_strategy_settings')
          .eq('company_id', companyId)
          .maybeSingle();
        if (globalSet?.value) {
          latestValue = globalSet.value;
        }

        latestValue.selected_business = selectedBusiness;

        await sb.from('global_settings').upsert({
          company_id: companyId,
          key: 'pricing_strategy_settings',
          value: latestValue
        }, { onConflict: 'company_id,key' });
        setSaveStatus('saved');
      } catch (err) {
        console.error('Failed to save settings:', err);
        setSaveStatus('error');
      }
    }

    async function onBusinessChange() {
      selectedBusiness = document.getElementById('business-select').value;
      await saveSettingsToDb();
      await loadCompetitors(true);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    // Bind confirm modal actions
    document.getElementById('confirm-cancel').onclick = () => {
      document.getElementById('confirm-modal').classList.remove('open');
    };
  </script>

  <!-- Confirm Delete Modal (Pattern A compliant) -->
  <div class="modal-overlay" id="confirm-modal" style="display: none; position: fixed; inset: 0; z-index: 1000; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.4);">
    <div class="modal-box" style="background: var(--bg-surface); animation: modalSlide 0.2s forwards; padding: 1.5rem; border-radius: 8px; max-width: 400px; width: 90%; box-shadow: var(--shadow-lg); border: 1px solid var(--border);">
      <div class="modal-title" id="confirm-title" style="font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-primary);">Delete Competitor?</div>
      <div class="modal-body" id="confirm-body" style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1.5rem;">This will permanently delete this competitor.</div>
      <div class="modal-actions" style="display: flex; justify-content: flex-end; gap: 0.75rem;">
        <button class="btn btn-outline" id="confirm-cancel-modal" onclick="document.getElementById('confirm-modal').classList.remove('open')" style="height: 32px; padding: 0 1rem; font-size: 0.8rem; font-weight: 600;">Cancel</button>
        <button class="btn btn-danger" id="confirm-ok" style="height: 32px; padding: 0 1rem; font-size: 0.8rem; font-weight: 600; background: var(--danger); color: #fff; border: none; border-radius: 6px; cursor: pointer;">Delete</button>
      </div>
    </div>
  </div>

  <style>
  @keyframes modalSlide {
    from { transform: translateY(15px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-overlay.open { display: flex !important; }
  </style>
</body>
</html>
