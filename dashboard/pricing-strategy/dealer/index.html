<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dealer Pricing — Pricing Strategy — BrightKey</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=2" />
  <style>
    /* ── Tab Layout & Styling (AGENTS.md Rule 8) ── */
    .drawer-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      background: var(--bg-surface);
    }
    .tab-btn {
      padding: 0.9rem 1.25rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.15s;
      text-decoration: none;
    }
    .tab-btn.active {
      color: var(--cyan-light);
      border-bottom-color: var(--cyan);
    }
    .tab-btn:hover:not(.active) {
      color: var(--text-secondary);
    }

    /* ── Business Selector Dropdown ── */
    .business-select-container {
      position: relative;
      min-width: 200px;
    }
    .business-select {
      width: 100%;
      height: 36px;
      padding: 0 2rem 0 0.75rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
      color: var(--text-primary);
      outline: none;
      cursor: pointer;
      appearance: none;
    }

    /* ── Dropdown Checklist Filter ── */
    .dropdown-check-container {
      position: relative;
      display: inline-block;
      min-width: 200px;
    }
    .dropdown-check-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      height: 36px;
      padding: 0 0.75rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
      color: var(--text-primary);
      cursor: pointer;
      user-select: none;
    }
    .dropdown-check-menu {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      z-index: 100;
      display: none;
      flex-direction: column;
      width: 100%;
      max-height: 240px;
      overflow-y: auto;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: var(--shadow-md);
      padding: 0.5rem 0;
    }
    .dropdown-check-menu.open {
      display: flex;
    }
    .dropdown-check-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.75rem;
      font-size: 0.85rem;
      color: var(--text-primary);
      cursor: pointer;
      transition: background 0.15s;
    }
    .dropdown-check-item:hover {
      background: var(--bg-elevated);
    }
    .dropdown-check-item input {
      cursor: pointer;
    }

    /* ── Excel-like Pricing Table ── */
    .logs-table {
      table-layout: fixed;
    }
    .logs-table th,
    .logs-table td {
      border: 1px solid var(--border);
      padding: 0;
      vertical-align: middle;
      white-space: pre-wrap !important;
      word-wrap: break-word;
      line-height: 0.3 !important;
    }
    .logs-table tbody tr {
      height: 1px;
    }
    .logs-table th {
      background: var(--bg-elevated);
      color: var(--text-secondary);
      font-weight: 700;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0 0.5rem;
      height: 28px;
    }
    .cell-input {
      width: 100%;
      height: 26px;
      background: transparent;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 0.8rem;
      line-height: 0.3 !important;
      color: inherit;
      padding: 0 8px;
      margin: 0;
      box-sizing: border-box;
      transition: background 0.15s;
      overflow: hidden;
      display: block;
      vertical-align: middle !important;
    }
    .cell-input:focus {
      background: transparent !important;
      box-shadow: none !important;
      outline: none !important;
    }
    .static-cell {
      padding: 0 8px;
      font-size: 0.8rem;
      color: var(--text-primary);
      vertical-align: middle;
    }
    .avg-row td {
      background: var(--bg-elevated) !important;
      font-weight: 700;
      height: 28px;
      border-top: 2px solid var(--border);
    }
  </style>
</head>
<body>

  <div class="toast-container" id="toast-container"></div>

  <div class="dash-layout">
    <!-- Sidebar -->
    <aside class="dash-sidebar" id="dash-sidebar"></aside>

    <!-- Main Content -->
    <div class="dash-main">
      <!-- Top Bar -->
      <div class="top-bar">
        <span class="top-bar-title">Pricing Strategy</span>
        <div style="flex:1;"></div>
        
        <!-- Business Selector (Top Right) -->
        <div class="business-select-container">
          <select id="business-select" class="business-select" onchange="onBusinessChange()">
            <option value="">All Businesses</option>
          </select>
          <div style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text-secondary);">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>

        <!-- Save Status Indicator -->
        <span id="save-status" style="font-size: 0.82rem; color: var(--text-secondary); margin-left: 1.25rem; font-weight: 500; display: inline-flex; align-items: center; gap: 0.4rem; min-width: 140px; transition: opacity 0.2s;">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="var(--cyan)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><polyline points="20 6 9 17 4 12"/></svg>
          <span id="save-status-text">All changes saved</span>
        </span>
      </div>

      <!-- Drawer Tabs Navigation (Directly below header) -->
      <div class="drawer-tabs">
        <a href="/dashboard/pricing-strategy/calculator" class="tab-btn">Calculator</a>
        <a href="/dashboard/pricing-strategy/expenses" class="tab-btn">Expenses</a>
        <a href="/dashboard/pricing-strategy/competitors" class="tab-btn">Competitors</a>
        <a href="/dashboard/pricing-strategy/dealer" class="tab-btn active">Dealer</a>
      </div>

      <div class="content-area">
        <main class="main-panel" style="padding: 1.5rem;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h2 style="font-size: 1.1rem; font-weight: 700; color: var(--text-primary); margin: 0;">Dealer & Installation Pricing</h2>
            
            <div class="dropdown-check-container" id="category-dropdown-container">
              <div class="dropdown-check-trigger" onclick="toggleCategoryDropdown(event)">
                <span id="dropdown-trigger-label">All Categories</span>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 0.5rem;"><polyline points="6 9 12 15 18 9"/></svg>
              </div>
              <div class="dropdown-check-menu" id="category-dropdown-menu">
                <!-- Populated dynamically -->
              </div>
            </div>
          </div>

          <div class="card" style="padding: 1.25rem; margin-bottom: 1.5rem;">
            <div style="overflow-x: auto;">
              <table class="logs-table" style="width: 100%; border-collapse: collapse;">
                <colgroup>
                  <col style="width: 15%;" />
                  <col style="width: 33%;" />
                  <col style="width: 13%;" />
                  <col style="width: 13%;" />
                  <col style="width: 13%;" />
                  <col style="width: 13%;" />
                </colgroup>
                <thead>
                  <tr>
                    <th style="text-align: left;">SKU</th>
                    <th style="text-align: left;">Product Name</th>
                    <th style="text-align: right; padding-right: 0.8rem;">Dealer Price</th>
                    <th style="text-align: right; padding-right: 0.8rem;">Install Price</th>
                    <th style="text-align: right; padding-right: 0.8rem;">Product Profit</th>
                    <th style="text-align: right; padding-right: 0.8rem;">Profit Margin</th>
                  </tr>
                </thead>
                <tbody id="dealer-tbody">
                  <!-- Populated dynamically -->
                </tbody>
              </table>
            </div>
          </div>
        </main>
      </div>
    </div>
  </div>

  <!-- Framework Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/main.js"></script>
  <script>
    let sb = null;
    let companyId = null;
    let businessList = [];
    let selectedBusiness = "";
    let productList = [];
    let uniqueCategories = [];
    let checkedCategories = [];

    function showToast(message, isError = false) {
      if (window.Toast) {
        window.Toast.show(message, isError ? 'error' : 'success');
      } else {
        console.log((isError ? 'ERROR: ' : 'INFO: ') + message);
      }
    }

    function setSaveStatus(status) {
      const statusText = document.getElementById('save-status-text');
      const statusIcon = document.querySelector('#save-status svg');
      const statusWrapper = document.getElementById('save-status');
      if (!statusText || !statusIcon || !statusWrapper) return;

      if (status === 'saving') {
        statusWrapper.style.opacity = '0.6';
        statusText.textContent = 'Saving...';
        statusIcon.style.stroke = 'var(--text-muted)';
        statusIcon.style.display = 'none';
      } else if (status === 'saved') {
        statusWrapper.style.opacity = '1';
        statusText.textContent = 'All changes saved';
        statusIcon.style.stroke = 'var(--cyan)';
        statusIcon.style.display = 'inline-block';
      } else if (status === 'error') {
        statusWrapper.style.opacity = '1';
        statusText.textContent = 'Save failed';
        statusIcon.style.stroke = 'var(--danger)';
        statusIcon.style.display = 'inline-block';
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      // Role gate checking the Business module permission
      const authInfo = await window.BKAuth.checkRoleGate(['Business'], '/admin');
      sb = window.BKAuth.sb;

      // Get Company ID
      const { data: co } = await sb.from('companies').select('id').eq('tenant_id', authInfo.tenantId).limit(1).maybeSingle();
      companyId = co?.id || null;
      if (!companyId) {
        showToast('Company ID not found.', true);
        return;
      }

      // Load business list
      const { data: bizData } = await sb.from('tenant_businesses').select('id, name').eq('company_id', companyId).order('name', { ascending: true });
      businessList = bizData || [];

      // Restore settings from global_settings (cross-device database store)
      let savedSettings = { selected_business: "", checked_categories: [] };
      try {
        const { data: globalSet } = await sb.from('global_settings')
          .select('value')
          .eq('key', 'pricing_strategy_settings')
          .eq('company_id', companyId)
          .maybeSingle();
        if (globalSet?.value) {
          savedSettings = globalSet.value;
        }
      } catch (err) {
        console.warn('Failed to load pricing strategy settings from global_settings:', err);
      }

      selectedBusiness = savedSettings.selected_business || "";
      checkedCategories = savedSettings.checked_categories || [];

      const bizSelect = document.getElementById('business-select');
      businessList.forEach(biz => {
        const opt = document.createElement('option');
        opt.value = biz.name;
        opt.textContent = biz.name;
        if (biz.name === selectedBusiness) opt.selected = true;
        bizSelect.appendChild(opt);
      });

      await loadProducts();
    });

    async function loadProducts() {
      if (!companyId) return;

      const tbody = document.getElementById('dealer-tbody');
      tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--text-muted); padding: 2rem;">Loading products...</td></tr>`;

      try {
        // Fetch products ordered by SKU alphabetically
        const { data: prods, error } = await sb.from('products')
          .select('id, sku, title, dealer_price, installation_price, business, category')
          .order('sku', { ascending: true });

        if (error) throw error;
        productList = prods || [];
        uniqueCategories = [...new Set(productList.map(p => p.category).filter(Boolean))].sort();
        renderCategoryDropdown();
        updateDropdownTriggerLabel();
        renderTable();
      } catch (err) {
        console.error('Error loading products:', err);
        tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--danger); padding: 2rem;">Failed to load products: ${err.message}</td></tr>`;
      }
    }

    function renderTable() {
      const tbody = document.getElementById('dealer-tbody');
      tbody.innerHTML = '';

      // Normalize selectedBusiness value for filtering
      let filterBiz = "";
      if (selectedBusiness === "Smart Lock") filterBiz = "smart_lock";
      else if (selectedBusiness === "Solar Power") filterBiz = "solar_power";
      else if (selectedBusiness === "CCTV") filterBiz = "cctv";
      else if (selectedBusiness === "Fire Extinguisher") filterBiz = "fire_extinguisher";

      const filtered = productList.filter(p => {
        const matchesBiz = !filterBiz || p.business === filterBiz;
        const matchesCat = checkedCategories.length === 0 || checkedCategories.includes(p.category);
        return matchesBiz && matchesCat;
      });

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--text-muted); padding: 2rem;">No products found for this query.</td></tr>`;
        return;
      }

      let sumDealer = 0;
      let sumInstall = 0;
      let sumProfit = 0;
      let sumMargin = 0;
      let countValidMargin = 0;

      filtered.forEach(p => {
        const dealer = (p.dealer_price || 0) / 100;
        const install = (p.installation_price || 0) / 100;
        const profit = install - dealer;
        const margin = install > 0 ? (profit / install) : 0;

        sumDealer += dealer;
        sumInstall += install;
        sumProfit += profit;
        if (install > 0) {
          sumMargin += margin;
          countValidMargin++;
        }

        const tr = document.createElement('tr');
        tr.style.height = '28px';
        tr.innerHTML = `
          <td style="width: 15%; vertical-align: middle;"><div class="static-cell" style="font-weight: 600;">${escapeHtml(p.sku)}</div></td>
          <td style="width: 33%; vertical-align: middle;"><div class="static-cell">${escapeHtml(p.title)}</div></td>
          <td style="width: 13%; vertical-align: middle;">
            <input type="text" class="cell-input" style="text-align: right;" value="${dealer > 0 ? dealer.toFixed(2) : ''}" placeholder="0.00" onblur="saveProductPrice('${p.id}', 'dealer_price', this.value)" />
          </td>
          <td style="width: 13%; vertical-align: middle;">
            <input type="text" class="cell-input" style="text-align: right;" value="${install > 0 ? install.toFixed(2) : ''}" placeholder="0.00" onblur="saveProductPrice('${p.id}', 'installation_price', this.value)" />
          </td>
          <td style="width: 13%; vertical-align: middle; text-align: right; padding-right: 8px;"><div class="static-cell" style="text-align: right; font-weight: 500;">${formatCurrency(profit)}</div></td>
          <td style="width: 13%; vertical-align: middle; text-align: right; padding-right: 8px;"><div class="static-cell" style="text-align: right; font-weight: 500; color: ${margin >= 0.3 ? 'var(--cyan-light)' : 'inherit'};">${(margin * 100).toFixed(2)}%</div></td>
        `;
        tbody.appendChild(tr);
      });

      // Compute averages
      const avgDealer = sumDealer / filtered.length;
      const avgInstall = sumInstall / filtered.length;
      const avgProfit = sumProfit / filtered.length;
      const avgMargin = countValidMargin > 0 ? (sumMargin / countValidMargin) : 0;

      // Bottom Row Row Average
      const trAvg = document.createElement('tr');
      trAvg.className = 'avg-row';
      trAvg.innerHTML = `
        <td colspan="2" style="vertical-align: middle;"><div class="static-cell">Average</div></td>
        <td style="vertical-align: middle; text-align: right; padding-right: 8px;"><div class="static-cell" style="text-align: right;">${formatCurrency(avgDealer)}</div></td>
        <td style="vertical-align: middle; text-align: right; padding-right: 8px;"><div class="static-cell" style="text-align: right;">${formatCurrency(avgInstall)}</div></td>
        <td style="vertical-align: middle; text-align: right; padding-right: 8px;"><div class="static-cell" style="text-align: right;">${formatCurrency(avgProfit)}</div></td>
        <td style="vertical-align: middle; text-align: right; padding-right: 8px;"><div class="static-cell" style="text-align: right;">${(avgMargin * 100).toFixed(2)}%</div></td>
      `;
      tbody.appendChild(trAvg);
    }

    async function saveProductPrice(prodId, field, value) {
      const prod = productList.find(p => p.id === prodId);
      if (!prod) return;

      const numVal = parseFloat(value.trim()) || 0;
      const centavos = Math.round(numVal * 100);

      if (prod[field] === centavos) return;

      setSaveStatus('saving');
      try {
        const { error } = await sb.from('products')
          .update({ [field]: centavos })
          .eq('id', prodId);

        if (error) throw error;

        // Update local memory state
        prod[field] = centavos;
        renderTable();
        setSaveStatus('saved');
      } catch (err) {
        console.error(err);
        setSaveStatus('error');
        showToast('Save failed: ' + err.message, true);
      }
    }

    async function saveSettingsToDb() {
      setSaveStatus('saving');
      try {
        await sb.from('global_settings').upsert({
          company_id: companyId,
          key: 'pricing_strategy_settings',
          value: {
            selected_business: selectedBusiness,
            checked_categories: checkedCategories
          }
        }, { onConflict: 'company_id,key' });
        setSaveStatus('saved');
      } catch (err) {
        console.error('Failed to save settings:', err);
        setSaveStatus('error');
      }
    }

    async function onBusinessChange() {
      selectedBusiness = document.getElementById('business-select').value;
      await saveSettingsToDb();
      renderTable();
    }

    function renderCategoryDropdown() {
      const menu = document.getElementById('category-dropdown-menu');
      menu.innerHTML = '';
      if (uniqueCategories.length === 0) {
        menu.innerHTML = `<div style="padding: 0.5rem 0.75rem; font-size: 0.85rem; color: var(--text-muted);">No categories resolved.</div>`;
        return;
      }
      uniqueCategories.forEach(cat => {
        const isChecked = checkedCategories.includes(cat);
        const item = document.createElement('label');
        item.className = 'dropdown-check-item';
        item.innerHTML = `
          <input type="checkbox" value="${escapeHtml(cat)}" onchange="onCategorySelectChange(this)" ${isChecked ? 'checked' : ''} />
          <span>${escapeHtml(cat)}</span>
        `;
        menu.appendChild(item);
      });
    }

    function updateDropdownTriggerLabel() {
      const labelEl = document.getElementById('dropdown-trigger-label');
      if (!labelEl) return;
      if (checkedCategories.length === 0) {
        labelEl.textContent = 'All Categories';
      } else if (checkedCategories.length === 1) {
        labelEl.textContent = checkedCategories[0];
      } else {
        labelEl.textContent = `${checkedCategories.length} categories selected`;
      }
    }

    async function onCategorySelectChange(checkbox) {
      if (checkbox.checked) {
        if (!checkedCategories.includes(checkbox.value)) {
          checkedCategories.push(checkbox.value);
        }
      } else {
        checkedCategories = checkedCategories.filter(c => c !== checkbox.value);
      }
      updateDropdownTriggerLabel();
      renderTable();
      await saveSettingsToDb();
    }

    window.toggleCategoryDropdown = function(e) {
      e.stopPropagation();
      const menu = document.getElementById('category-dropdown-menu');
      menu.classList.toggle('open');
    };

    document.addEventListener('click', (e) => {
      const container = document.getElementById('category-dropdown-container');
      if (container && !container.contains(e.target)) {
        document.getElementById('category-dropdown-menu').classList.remove('open');
      }
    });

    function formatCurrency(val) {
      return '₱' + val.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
