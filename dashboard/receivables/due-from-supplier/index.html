<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Due from Supplier — BrightKey Finance</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg?v=2" />
  <style>
    .int-wrap { max-width: 1200px; margin: 0 auto; padding: 2rem 2rem 5rem; }

    .drawer-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      background: var(--bg-surface);
    }
    .tab-btn {
      display: inline-block;
      text-decoration: none;
      padding: 0.9rem 1.25rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .tab-btn.active { color: var(--cyan-light); border-bottom-color: var(--cyan); }
    .tab-btn:hover:not(.active) { color: var(--text-secondary); }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .month-nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-surface);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .month-nav-btn:hover { background: var(--bg-elevated); color: var(--text-primary); border-color: var(--cyan); }
    .month-nav-label {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-primary);
      min-width: 9rem;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .account-section { margin-bottom: 2.5rem; }
    .account-section-header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .account-section-header h2 { font-size: 1rem; font-weight: 800; color: var(--text-primary); margin: 0; }

    .excel-container {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      border-radius: var(--radius-md);
      overflow-x: auto;
      box-shadow: var(--shadow-sm);
    }
    .excel-table { width: 100%; border-collapse: collapse; font-size: 9.5pt; color: var(--text-primary); font-family: var(--font-sans), Arial, sans-serif; }
    .excel-table th, .excel-table td { border: 1px solid var(--border); padding: 0.7rem 0.9rem; }
    .excel-table th {
      background: var(--bg-elevated);
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-size: 8pt;
      letter-spacing: 0.05em;
      text-align: left;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: inset 0 -1px 0 var(--border);
    }
    .excel-table .num-col { text-align: right; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body class="bg-base text-primary">

  <div class="dash-layout">
    <aside class="dash-sidebar" id="dash-sidebar"></aside>

    <div class="dash-main">
      <div class="top-bar">
        <div class="top-bar-title">Receivables (Due from Supplier)</div>
      </div>

      <div class="drawer-tabs">
        <a class="tab-btn" href="/dashboard/receivables/customers">Customers</a>
        <a class="tab-btn" href="/dashboard/receivables/due-from-owner">Due from Owner</a>
        <a class="tab-btn" href="/dashboard/receivables/due-from-staff">Due from Staff</a>
        <a class="tab-btn active" href="/dashboard/receivables/due-from-supplier">Due from Supplier</a>
      </div>

      <main style="overflow-y: auto; flex: 1; min-width: 0; width: 100%;">
        <div class="int-wrap">

          <div class="month-nav">
            <button class="month-nav-btn" id="prev-month-btn" title="Previous month">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div class="month-nav-label" id="month-nav-label">July 2026</div>
            <button class="month-nav-btn" id="next-month-btn" title="Next month">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>

          <div id="sections-container"></div>

        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/main.js"></script>

  <script>
    'use strict';

    const getSb = () => window.BKAuth.sb;
    const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    function fmtEntry(n) {
      n = parseInt(n, 10);
      if (isNaN(n)) return '—';
      if (n < 0) return `BK-SS${Math.abs(n)}`;
      let li, num;
      if (n <= 9999) { li = 0; num = n; }
      else { const off = n - 10000; li = 1 + Math.floor(off / 10000); num = off % 10000; }
      const c1 = String.fromCharCode(65 + Math.floor(li / 26));
      const c2 = String.fromCharCode(65 + (li % 26));
      return `BK-${c1}${c2}${String(num).padStart(4, '0')}`;
    }

    const esc = (v) => {
      if (v === null || v === undefined) return '';
      return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    };

    const fmt = (val) => {
      if (val === null || val === undefined) return '—';
      const neg = val < 0;
      return `${neg ? '(' : ''}₱${Math.abs(val).toLocaleString(undefined, { minimumFractionDigits:2, maximumFractionDigits:2 })}${neg ? ')' : ''}`;
    };

    window.App = {
      tenantId: null,
      companyId: null,
      currentYear: new Date().getFullYear(),
      currentMonth: new Date().getMonth(),

      async init() {
        try {
          const authInfo = await window.BKAuth.checkRoleGate(['Owner','Admin','HR','Finance'], '../../admin.html');
          if (!authInfo) return;
          this.tenantId = authInfo.tenantId;

          const { data: co } = await getSb().from('companies').select('id').eq('tenant_id', this.tenantId).limit(1).maybeSingle();
          this.companyId = co?.id || null;
          if (!this.companyId) return;

          document.getElementById('prev-month-btn').addEventListener('click', () => {
            this.currentMonth--;
            if (this.currentMonth < 0) { this.currentMonth = 11; this.currentYear--; }
            this.loadData();
          });
          document.getElementById('next-month-btn').addEventListener('click', () => {
            this.currentMonth++;
            if (this.currentMonth > 11) { this.currentMonth = 0; this.currentYear++; }
            this.loadData();
          });

          await this.loadData();
        } catch (e) { console.error(e); }
      },

      async loadData() {
        document.getElementById('month-nav-label').textContent = `${MONTH_NAMES[this.currentMonth]} ${this.currentYear}`;
        const container = document.getElementById('sections-container');
        container.innerHTML = '<p style="color:var(--text-muted);font-style:italic;padding:2rem 0;">Loading...</p>';

        const startDate = `${this.currentYear}-${String(this.currentMonth + 1).padStart(2,'0')}-01`;
        const lastDay = new Date(this.currentYear, this.currentMonth + 1, 0).getDate();
        const endDate = `${this.currentYear}-${String(this.currentMonth + 1).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;

        try {
          const { data: entries, error } = await getSb()
            .from('general_journal').select('*')
            .eq('company_id', this.companyId)
            .ilike('account', '%due from supplier%')
            .gte('date', startDate).lte('date', endDate)
            .order('date', { ascending: true })
            .order('entry_number', { ascending: true })
            .order('id', { ascending: true });

          if (error) throw error;
          this.renderSections(entries || [], container);
        } catch (err) {
          console.error(err);
          container.innerHTML = `<p style="color:var(--danger);">Failed to load: ${esc(err.message)}</p>`;
        }
      },

      renderSections(entries, container) {
        if (!entries.length) {
          container.innerHTML = '<p style="color:var(--text-muted);font-style:italic;padding:2rem 0;">No transactions for this month.</p>';
          return;
        }

        const groups = {};
        const groupOrder = [];
        entries.forEach(e => {
          const key = (e.account || '').trim();
          if (!groups[key]) { groups[key] = []; groupOrder.push(key); }
          groups[key].push(e);
        });

        let html = '';
        groupOrder.forEach(accountName => {
          const rows = groups[accountName];
          let totalDebit = 0, totalCredit = 0;

          const rowsHtml = rows.map((e, idx) => {
            const deb = parseFloat(e.debit) || 0;
            const cred = parseFloat(e.credit) || 0;
            totalDebit += deb;
            totalCredit += cred;
            return `<tr>
              <td style="text-align:center;color:var(--text-muted);font-size:8pt;width:3rem;">${idx + 1}</td>
              <td style="font-family:var(--font-mono);font-weight:600;white-space:nowrap;">${esc(fmtEntry(e.entry_number))}</td>
              <td>${esc(e.description_1 || '—')}</td>
              <td>${esc(e.description_2 || '—')}</td>
              <td class="num-col">${fmt(deb)}</td>
              <td class="num-col">${fmt(cred)}</td>
            </tr>`;
          }).join('');

          const totalHtml = `<tr style="font-weight:800;background:var(--bg-elevated);border-top:2px solid var(--border);">
            <td colspan="4">TOTAL</td>
            <td class="num-col">${fmt(totalDebit)}</td>
            <td class="num-col">${fmt(totalCredit)}</td>
          </tr>`;

          html += `
            <div class="account-section">
              <div class="account-section-header">
                <h2>${esc(accountName)}</h2>
              </div>
              <div class="excel-container">
                <table class="excel-table">
                  <thead>
                    <tr>
                      <th style="width:3rem;text-align:center;">#</th>
                      <th>Entry #</th>
                      <th>Description 1</th>
                      <th>Description 2</th>
                      <th class="num-col">Debit</th>
                      <th class="num-col">Credit</th>
                    </tr>
                  </thead>
                  <tbody>${rowsHtml}${totalHtml}</tbody>
                </table>
              </div>
            </div>`;
        });

        container.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', () => App.init());
  </script>
</body>
</html>
