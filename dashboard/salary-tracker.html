<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salary Tracker — BrightKey Portal</title>
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link href="https://fonts.bunny.net/css?family=commissioner:400,500,600,700,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg?v=2" />
  <style>
    .int-wrap { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }
    
    /* ── Tab Layout (BrightKey Standard) ── */
    .drawer-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      background: var(--bg-surface);
    }

    .tab-btn {
      padding: 0.9rem 1.25rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .tab-btn.active {
      color: var(--cyan-light);
      border-bottom-color: var(--cyan);
    }

    .tab-btn:hover:not(.active) {
      color: var(--text-secondary);
    }

    .tab-panel {
      display: none;
      margin-top: 1.5rem;
    }

    .tab-panel.active {
      display: block;
    }

    /* ── Card/Section Layout ── */
    .j-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1.75rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow-sm);
    }

    .j-card-title {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .j-card-title::before {
      content: '';
      width: 3px;
      height: 16px;
      background: var(--cyan);
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Form Layouts ── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: 1rem;
    }

    .form-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
    }

    .form-input, .form-select {
      background: #FFFFFF;
      border: 1px solid #D4D4D8;
      border-radius: var(--radius-sm);
      padding: 0.55rem 0.75rem;
      font-size: 0.88rem;
      color: #09090B;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-input:focus, .form-select:focus {
      border-color: var(--cyan);
    }

    /* ── Salary Tracker Grid Table ── */
    .table-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      width: 100%;
      margin-bottom: 2rem;
    }

    .table-wrap {
      overflow-x: auto;
      width: 100%;
    }

    .salary-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .salary-table th {
      padding: 0.75rem 1rem;
      text-align: left;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
      border-right: 1px solid rgba(228, 228, 231, 0.6);
    }

    .salary-table th:last-child {
      border-right: none;
    }

    .salary-table td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid rgba(228, 228, 231, 0.6);
      color: var(--text-secondary);
      vertical-align: middle;
    }

    .salary-table td:last-child {
      border-right: none;
    }

    /* Hierarchy visual headers */
    .salary-table tr.dept-header-row td {
      background: rgba(6, 182, 212, 0.04);
      font-weight: 800;
      color: var(--text-primary);
      font-size: 0.88rem;
      padding-top: 0.9rem;
      padding-bottom: 0.9rem;
      border-bottom: 1.5px solid var(--border);
      border-right: none;
    }

    .salary-table tr.team-header-row td {
      background: var(--bg-base);
      font-weight: 700;
      color: var(--text-secondary);
      font-size: 0.8rem;
      padding-left: 1.75rem;
      padding-top: 0.6rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
      border-right: none;
    }

    .salary-table tr.employee-row td.col-name {
      padding-left: 2.75rem;
      font-weight: 400; /* Regular weight */
      color: var(--text-primary);
    }

    .salary-table tr.employee-row:hover td {
      background: rgba(6, 182, 212, 0.01);
    }

    /* Payout Cell Components Layout */
    .payout-cell-container {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
    }

    .payout-adj-input {
      width: 75px;
      padding: 0.3rem 0.5rem;
      font-size: 0.78rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      text-align: right;
      outline: none;
      background: var(--bg-surface);
      color: var(--text-primary);
      transition: border-color 0.15s;
    }

    .payout-adj-input:focus {
      border-color: var(--cyan);
    }

    .payout-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 600;
      min-width: 32px;
    }

    .payout-val {
      font-weight: 700;
      color: var(--text-primary);
      min-width: 85px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* Checkbox / Gray-out style */
    .payout-checkbox {
      width: 15px;
      height: 15px;
      cursor: pointer;
      accent-color: var(--cyan);
    }

    .payout-cell-container.grayed-out {
      opacity: 0.4;
    }

    .payout-cell-container.grayed-out .payout-val {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .payout-cell-container.grayed-out .payout-adj-input {
      pointer-events: none;
      background: var(--bg-elevated);
    }

    /* ── Schedule Management List ── */
    .schedule-item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-surface);
      margin-bottom: 0.5rem;
    }

    .schedule-item-row__text {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* ── Special Schedules grid table ── */
    .special-grid-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    .special-grid-table th {
      padding: 0.65rem 0.85rem;
      text-align: left;
      background: var(--bg-elevated);
      color: var(--text-muted);
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    .special-grid-table td {
      padding: 0.65rem 0.85rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .special-grid-table tr:hover td {
      background: var(--bg-elevated);
    }

    /* Button Utilities */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
    }

    .btn-sm {
      padding: 0.35rem 0.65rem;
      font-size: 0.72rem;
    }

    .btn-cyan {
      background: var(--cyan);
      color: #FFFFFF;
      border-color: var(--cyan);
    }

    .btn-cyan:hover {
      background: var(--cyan-light);
      border-color: var(--cyan-light);
    }

    .btn-outline {
      background: var(--bg-surface);
      color: var(--text-secondary);
      border-color: var(--border);
    }

    .btn-outline:hover {
      border-color: var(--border-hover);
      color: var(--text-primary);
    }

    .btn-danger-link {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: all 0.12s;
    }

    .btn-danger-link:hover {
      color: var(--danger);
      background: rgba(220, 38, 38, 0.05);
    }

    /* Toast Container styling */
    #toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .toast {
      padding: 0.75rem 1.1rem;
      border-radius: var(--radius-sm);
      font-size: 0.82rem;
      font-weight: 600;
      box-shadow: var(--shadow-lg);
      min-width: 240px;
      animation: slide-in-toast 0.25s cubic-bezier(0.16, 1, 0.3, 1) both;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #fff;
    }

    @keyframes slide-in-toast {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .toast-success { background: var(--success); }
    .toast-error { background: var(--danger); }
    .toast-info { background: var(--cyan); }
  </style>
</head>
<body>

  <div class="dash-layout">
    <!-- Sidebar -->
    <aside class="dash-sidebar" id="dash-sidebar"></aside>

    <!-- Main Content Panel -->
    <div class="dash-main">
      <!-- Top Bar -->
      <div class="top-bar">
        <span class="top-bar-title">Salary Tracker</span>
      </div>

      <!-- BrightKey Dashboard Tabs -->
      <div class="drawer-tabs">
        <button class="tab-btn active" id="tab-btn-tracker" onclick="SalaryApp.switchTab('tracker')">Tracker</button>
        <button class="tab-btn" id="tab-btn-schedules" onclick="SalaryApp.switchTab('schedules')">Schedules</button>
      </div>

      <main style="overflow-y: auto; flex: 1;">
        <div class="int-wrap">

          <!-- ── TRACTER TAB PANEL ── -->
          <div class="tab-panel active" id="panel-tracker">
            <div class="table-card">
              <div class="table-wrap">
                <table class="salary-table" id="tracker-table">
                  <thead>
                    <tr id="tracker-table-header">
                      <th>Employee Name</th>
                      <th>Payment Details</th>
                      <th>Base Monthly Salary</th>
                      <!-- Flexible payout columns injected here -->
                    </tr>
                  </thead>
                  <tbody id="tracker-table-body">
                    <tr>
                      <td colspan="4" style="text-align:center; padding:3rem; color:var(--text-muted);">Loading tracker data...</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
            <div style="display:flex; justify-content:flex-end;">
              <button class="btn btn-cyan" id="btn-save-tracker" onclick="SalaryApp.saveTrackerState()">Save Tracker State</button>
            </div>
          </div>

          <!-- ── SCHEDULES TAB PANEL ── -->
          <div class="tab-panel" id="panel-schedules">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:2rem;">
              
              <!-- Left side: Payout Schedules -->
              <div>
                <div class="j-card">
                  <div class="j-card-title">Payout Schedules</div>
                  
                  <div>
                    <h4 class="form-label" style="margin-bottom: 0.75rem;">Add Payout Schedule</h4>
                    <div style="display:flex; gap:0.75rem; align-items:center;">
                      <div style="display:flex; align-items:center; gap:0.4rem; flex:1;">
                        <span style="font-size:0.85rem; color:var(--text-secondary);">Every</span>
                        <select id="new-schedule-day" class="form-select" style="max-width: 100px;">
                          <!-- Days 1 to 31 -->
                        </select>
                        <span style="font-size:0.85rem; color:var(--text-secondary);">of month</span>
                      </div>
                      <button class="btn btn-cyan btn-sm" onclick="SalaryApp.addSchedule()">+ Add Schedule</button>
                    </div>
                  </div>
                </div>
              </div>

              <!-- Right side: Special Schedules -->
              <div>
                <div class="j-card">
                  <div class="j-card-title">Special Schedules</div>
                  
                  <div style="margin-bottom:1.5rem; max-height: 250px; overflow-y:auto; border:1px solid var(--border); border-radius:var(--radius-sm);">
                    <table class="special-grid-table">
                      <thead>
                        <tr>
                          <th>Employee</th>
                          <th>Payout value</th>
                          <th>Label</th>
                          <th>Day of Month</th>
                          <th style="width:50px; text-align:center;">Action</th>
                        </tr>
                      </thead>
                      <tbody id="special-schedules-body">
                        <tr>
                          <td colspan="5" style="text-align:center; padding:1.5rem; color:var(--text-muted);">No special schedules configured.</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>

                  <form id="special-schedule-form" onsubmit="SalaryApp.addSpecialSchedule(event)" style="border-top: 1px solid var(--border); padding-top:1.25rem;">
                    <h4 class="form-label" style="margin-bottom: 0.75rem;">Create Special Schedule</h4>
                    
                    <div class="form-group">
                      <label class="form-label" for="spec-employee">Employee</label>
                      <select id="spec-employee" class="form-select" required>
                        <!-- Populated dynamically -->
                      </select>
                    </div>

                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                      <div class="form-group">
                        <label class="form-label" for="spec-value">Value (₱)</label>
                        <input type="number" id="spec-value" class="form-input" placeholder="e.g. 5000" step="0.01" min="0" required />
                      </div>
                      <div class="form-group">
                        <label class="form-label" for="spec-day">Day of Month</label>
                        <select id="spec-day" class="form-select" required>
                          <!-- Days 1 to 31 -->
                        </select>
                      </div>
                    </div>

                    <div class="form-group">
                      <label class="form-label" for="spec-label">Label</label>
                      <input type="text" id="spec-label" class="form-input" placeholder="e.g. Mid-month Bonus, Commission" required />
                    </div>

                    <div style="display:flex; justify-content:flex-end;">
                      <button type="submit" class="btn btn-cyan btn-sm">+ Add Special Schedule</button>
                    </div>
                  </form>
                </div>
              </div>

            </div>
          </div>

        </div>
      </main>
    </div>
  </div>

  <div id="toast-container" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/main.js"></script>
  <script>
    'use strict';

    const getSb = () => window.BKAuth.sb;

    // Toast utility
    const toast = (msg, type = 'success') => {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = msg;
      container.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    };

    // Escapers & formatters
    const esc = (s) => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    const php = (v) => {
      if (v === null || v === undefined || v === '') return '₱0.00';
      return '₱' + Number(v).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    };

    // Core state
    const SalaryApp = {
      tenantId: null,
      companyId: null,
      employees: [],
      companyStructure: { departments: [] },
      payoutSchedules: [], // array of numbers representing days
      specialSchedules: [], // array of { id, employeeId, value, label, day }
      trackerState: {}, // employeeId -> payoutColumnIndex -> { adjustment: number, label: string, checked: boolean }

      async init() {
        try {
          const authInfo = await window.BKAuth.checkRoleGate(['HR'], '../admin.html');
          if (!authInfo) return;
          this.tenantId = authInfo.tenantId;

          // Fetch company details
          const { data: co } = await getSb().from('companies').select('id').eq('tenant_id', authInfo.tenantId).limit(1).maybeSingle();
          this.companyId = co?.id || null;

          if (!this.companyId) {
            toast('Failed to resolve company details.', 'error');
            return;
          }

          // Populate day selectors
          this.populateDaySelectors();

          // Fetch structure, employees and saved settings
          await this.loadData();
          
          this.renderAll();
        } catch (e) {
          console.error(e);
          toast('Initialization failed: ' + e.message, 'error');
        }
      },

      populateDaySelectors() {
        const schedSel = document.getElementById('new-schedule-day');
        const specDaySel = document.getElementById('spec-day');
        let html = '';
        for (let i = 1; i <= 31; i++) {
          html += `<option value="${i}">${i}</option>`;
        }
        if (schedSel) schedSel.innerHTML = html;
        if (specDaySel) specDaySel.innerHTML = html;
      },

      async loadData() {
        // 1. Fetch Company Structure
        try {
          const { data: settings } = await getSb()
            .from('global_settings')
            .select('value')
            .eq('key', 'company_structure')
            .eq('company_id', this.companyId)
            .maybeSingle();
          this.companyStructure = settings?.value || { departments: [] };
        } catch (e) {
          this.companyStructure = { departments: [] };
        }

        // 2. Fetch all Active/Inactive Employees
        try {
          const { data: emps, error } = await getSb()
            .from('employees')
            .select('id, first_name, middle_name, last_name, salary, employment_status, department')
            .eq('company_id', this.companyId)
            .neq('employment_status', 'Terminated');
          
          if (error) throw error;
          this.employees = emps || [];
        } catch (e) {
          this.employees = [];
          console.error(e);
        }

        // 3. Fetch Saved Payout Schedules & Special Schedules from global_settings
        try {
          const { data: salarySettings } = await getSb()
            .from('global_settings')
            .select('value')
            .eq('key', 'salary_tracker_config')
            .eq('company_id', this.companyId)
            .maybeSingle();
          
          const config = salarySettings?.value || {};
          this.payoutSchedules = config.payoutSchedules || [15, 30]; // default semi-monthly
          this.specialSchedules = config.specialSchedules || [];
        } catch (e) {
          this.payoutSchedules = [15, 30];
          this.specialSchedules = [];
        }

        // 4. Fetch Saved Tracker State (adjustments, checked states)
        try {
          const { data: trackerData } = await getSb()
            .from('global_settings')
            .select('value')
            .eq('key', 'salary_tracker_state')
            .eq('company_id', this.companyId)
            .maybeSingle();
          this.trackerState = trackerData?.value || {};
        } catch (e) {
          this.trackerState = {};
        }

        // Populate special schedules employee dropdown
        const empSel = document.getElementById('spec-employee');
        if (empSel) {
          empSel.innerHTML = this.employees.map(emp => {
            const fullName = [emp.first_name, emp.middle_name, emp.last_name].filter(Boolean).join(' ');
            return `<option value="${emp.id}">${esc(fullName)}</option>`;
          }).join('');
        }
      },

      switchTab(tab) {
        document.getElementById('tab-btn-tracker').classList.toggle('active', tab === 'tracker');
        document.getElementById('tab-btn-schedules').classList.toggle('active', tab === 'schedules');
        
        document.getElementById('panel-tracker').classList.toggle('active', tab === 'tracker');
        document.getElementById('panel-schedules').classList.toggle('active', tab === 'schedules');
      },

      renderAll() {
        this.renderTracker();
        this.renderSchedules();
        this.renderSpecialSchedules();
      },

      renderSchedules() {
        // Sort schedules numerically for header calculations
        this.payoutSchedules.sort((a, b) => a - b);
      },

      async addSchedule() {
        const dayVal = parseInt(document.getElementById('new-schedule-day').value, 10);
        if (isNaN(dayVal)) return;

        if (this.payoutSchedules.includes(dayVal)) {
          toast('This schedule day already exists.', 'error');
          return;
        }

        this.payoutSchedules.push(dayVal);
        await this.saveConfig();
        this.renderAll();
        toast('Payout schedule added.');
      },

      async deleteSchedule(idx) {
        this.payoutSchedules.splice(idx, 1);
        await this.saveConfig();
        this.renderAll();
        toast('Payout schedule removed.', 'info');
      },

      renderSpecialSchedules() {
        const tbody = document.getElementById('special-schedules-body');
        if (!tbody) return;

        if (this.specialSchedules.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:1.5rem; color:var(--text-muted);">No special schedules configured.</td></tr>`;
          return;
        }

        tbody.innerHTML = this.specialSchedules.map((spec, idx) => {
          const emp = this.employees.find(e => e.id === spec.employeeId);
          const name = emp ? [emp.first_name, emp.last_name].filter(Boolean).join(' ') : 'Unknown Employee';
          return `
            <tr>
              <td style="font-weight:600; color:var(--text-primary);">${esc(name)}</td>
              <td style="font-weight:700; color:var(--text-primary);">${esc(php(spec.value))}</td>
              <td>${esc(spec.label)}</td>
              <td style="font-weight:600;">Day ${spec.day}</td>
              <td style="text-align:center;">
                <button class="btn-danger-link" onclick="SalaryApp.deleteSpecialSchedule(${idx})" title="Remove Special Schedule">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  </svg>
                </button>
              </td>
            </tr>
          `;
        }).join('');
      },

      async addSpecialSchedule(e) {
        e.preventDefault();
        const empId = document.getElementById('spec-employee').value;
        const val = parseFloat(document.getElementById('spec-value').value);
        const day = parseInt(document.getElementById('spec-day').value, 10);
        const label = document.getElementById('spec-label').value.trim();

        if (!empId || isNaN(val) || isNaN(day) || !label) return;

        const spec = {
          id: 'spec_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
          employeeId: empId,
          value: val,
          day,
          label
        };

        this.specialSchedules.push(spec);
        await this.saveConfig();
        
        // Reset form
        document.getElementById('spec-value').value = '';
        document.getElementById('spec-label').value = '';

        this.renderAll();
        toast('Special schedule added.');
      },

      async deleteSpecialSchedule(idx) {
        this.specialSchedules.splice(idx, 1);
        await this.saveConfig();
        this.renderAll();
        toast('Special schedule removed.', 'info');
      },

      async saveConfig() {
        try {
          const { error } = await getSb()
            .from('global_settings')
            .upsert({
              key: 'salary_tracker_config',
              company_id: this.companyId,
              value: {
                payoutSchedules: this.payoutSchedules,
                specialSchedules: this.specialSchedules
              }
            });
          if (error) throw error;
        } catch (e) {
          console.error(e);
          toast('Failed to save config: ' + e.message, 'error');
        }
      },

      // ── RENDER TRACKER TAB TABLE ──
      renderTracker() {
        const header = document.getElementById('tracker-table-header');
        const tbody = document.getElementById('tracker-table-body');
        if (!header || !tbody) return;

        // Sort schedules
        this.payoutSchedules.sort((a, b) => a - b);

        // 1. Build Header
        let headerHtml = `
          <th>Employee Name</th>
          <th>Payment Details</th>
          <th>Base Monthly Salary</th>
        `;

        // Normal schedules
        this.payoutSchedules.forEach(day => {
          headerHtml += `<th style="text-align:center;">Payout (Day ${day})</th>`;
        });

        // Special schedules (grouped by day of month)
        const activeSpecDays = [...new Set(this.specialSchedules.map(s => s.day))].sort((a, b) => a - b);
        activeSpecDays.forEach(day => {
          headerHtml += `<th style="text-align:center; background: rgba(6,182,212,0.06);">Special (Day ${day})</th>`;
        });

        header.innerHTML = headerHtml;

        // 2. Map Employees to Org Map Structure
        // Build subteam mapping
        const empDeptMap = {};
        const empSubteamsMap = {};
        const deptHeadsSet = new Set();
        const struct = this.companyStructure || { departments: [] };
        
        struct.departments.forEach(dept => {
          const deptName = dept.name;
          if (dept.managerId) {
            empDeptMap[dept.managerId] = deptName;
            deptHeadsSet.add(dept.managerId);
          }
          if (dept.subteams) {
            dept.subteams.forEach(sub => {
              const subteamName = sub.name;
              if (sub.managerId) {
                empDeptMap[sub.managerId] = deptName;
                if (!empSubteamsMap[sub.managerId]) empSubteamsMap[sub.managerId] = [];
                empSubteamsMap[sub.managerId].push(subteamName);
              }
              if (sub.colleagueIds) {
                sub.colleagueIds.forEach(id => {
                  empDeptMap[id] = deptName;
                  if (!empSubteamsMap[id]) empSubteamsMap[id] = [];
                  empSubteamsMap[id].push(subteamName);
                });
              }
            });
          }
        });

        // Sort employees by Department -> Subteam
        const grouped = {}; // Dept -> Subteam -> [Employees]
        const unassigned = [];

        this.employees.forEach(emp => {
          const dept = empDeptMap[emp.id] || emp.department || '';
          const subteams = empSubteamsMap[emp.id] || [];

          if (!dept) {
            unassigned.push(emp);
            return;
          }

          if (!grouped[dept]) grouped[dept] = {};
          
          if (deptHeadsSet.has(emp.id)) {
            // Is a Department Head
            if (!grouped[dept]['Department Head']) grouped[dept]['Department Head'] = [];
            grouped[dept]['Department Head'].push(emp);
          } else if (subteams.length === 0) {
            if (!grouped[dept]['_unassigned_subteam']) grouped[dept]['_unassigned_subteam'] = [];
            grouped[dept]['_unassigned_subteam'].push(emp);
          } else {
            subteams.forEach(sub => {
              if (!grouped[dept][sub]) grouped[dept][sub] = [];
              grouped[dept][sub].push(emp);
            });
          }
        });

        // 3. Render rows
        let bodyHtml = '';
        const colspan = 3 + this.payoutSchedules.length + activeSpecDays.length;

        // Render Grouped
        Object.keys(grouped).sort().forEach(dept => {
          bodyHtml += `
            <tr class="dept-header-row">
              <td colspan="${colspan}">${esc(dept)} Department</td>
            </tr>
          `;
          
          // Sort teams, putting 'Department Head' first if it exists
          const teams = Object.keys(grouped[dept]).sort((a, b) => {
            if (a === 'Department Head') return -1;
            if (b === 'Department Head') return 1;
            return a.localeCompare(b);
          });

          teams.forEach(sub => {
            if (sub !== '_unassigned_subteam') {
              bodyHtml += `
                <tr class="team-header-row">
                  <td colspan="${colspan}">${esc(sub)}</td>
                </tr>
              `;
            }
            
            grouped[dept][sub].forEach(emp => {
              bodyHtml += this.renderEmployeeRow(emp, activeSpecDays);
            });
          });
        });

        // Render Unassigned
        if (unassigned.length > 0) {
          bodyHtml += `
            <tr class="dept-header-row">
              <td colspan="${colspan}">Unassigned Department / Pool</td>
            </tr>
          `;
          unassigned.forEach(emp => {
            bodyHtml += this.renderEmployeeRow(emp, activeSpecDays);
          });
        }

        tbody.innerHTML = bodyHtml;
      },

      renderEmployeeRow(emp, activeSpecDays) {
        const id = emp.id;
        const baseSalary = emp.salary || 0;
        
        let html = `
          <tr class="employee-row" data-emp-id="${esc(id)}">
            <td class="col-name">${esc([emp.first_name, emp.last_name].filter(Boolean).join(' '))}</td>
            <td><span style="font-size:0.75rem; color:var(--text-muted); font-style:italic;">—</span></td>
            <td style="font-weight:600; font-variant-numeric:tabular-nums;">${esc(php(baseSalary))}</td>
        `;

        const numNormalScheds = this.payoutSchedules.length || 1;
        const rawNormalPayout = baseSalary / numNormalScheds;

        // Helper to render a payout input component
        const renderPayoutCell = (colIdx, baseVal, type = 'normal') => {
          const cellState = (this.trackerState[id] && this.trackerState[id][colIdx]) || { adjustment: 0, label: '', checked: false };
          const displayVal = baseVal + (cellState.adjustment || 0);
          const checkedAttr = cellState.checked ? 'checked' : '';
          const grayClass = cellState.checked ? 'grayed-out' : '';
          const bgStyle = type === 'special' ? 'background: rgba(6,182,212,0.02);' : '';

          return `
            <td style="text-align:center; ${bgStyle}">
              <div class="payout-cell-container ${grayClass}" data-col-idx="${colIdx}">
                <input type="text" class="payout-adj-input" value="${cellState.adjustment !== 0 ? cellState.adjustment : ''}" placeholder="Adj" oninput="SalaryApp.updatePayoutCell('${esc(id)}', '${colIdx}', ${baseVal}, this.value, 'adjustment')">
                <input type="text" class="payout-adj-input" value="${esc(cellState.label)}" placeholder="Label" style="width:70px; text-align:left;" oninput="SalaryApp.updatePayoutCell('${esc(id)}', '${colIdx}', ${baseVal}, this.value, 'label')">
                <span class="payout-val">${esc(php(displayVal))}</span>
                <input type="checkbox" class="payout-checkbox" ${checkedAttr} onchange="SalaryApp.updatePayoutCell('${esc(id)}', '${colIdx}', ${baseVal}, this.checked, 'checked')">
              </div>
            </td>
          `;
        };

        // Render Normal Columns
        this.payoutSchedules.forEach((day, idx) => {
          const colKey = `sched_${day}`;
          html += renderPayoutCell(colKey, rawNormalPayout, 'normal');
        });

        // Render Special Columns
        activeSpecDays.forEach(day => {
          const matchingSpec = this.specialSchedules.find(s => s.employeeId === id && s.day === day);
          const specVal = matchingSpec ? matchingSpec.value : 0;
          const colKey = `spec_${day}`;
          html += renderPayoutCell(colKey, specVal, 'special');
        });

        html += '</tr>';
        return html;
      },

      updatePayoutCell(empId, colIdx, baseVal, value, type) {
        if (!this.trackerState[empId]) this.trackerState[empId] = {};
        if (!this.trackerState[empId][colIdx]) {
          this.trackerState[empId][colIdx] = { adjustment: 0, label: '', checked: false };
        }

        const cell = this.trackerState[empId][colIdx];
        const container = document.querySelector(`tr[data-emp-id="${empId}"] .payout-cell-container[data-col-idx="${colIdx}"]`);

        if (type === 'adjustment') {
          let num = parseFloat(value);
          if (isNaN(num)) num = 0;
          cell.adjustment = num;
        } else if (type === 'label') {
          cell.label = value.trim();
        } else if (type === 'checked') {
          cell.checked = !!value;
          if (container) {
            container.classList.toggle('grayed-out', cell.checked);
          }
        }

        // Live update value text
        if (container) {
          const valText = container.querySelector('.payout-val');
          if (valText) {
            const displayVal = baseVal + (cell.adjustment || 0);
            valText.textContent = php(displayVal);
          }
        }
      },

      async saveTrackerState() {
        const btn = document.getElementById('btn-save-tracker');
        btn.disabled = true;
        btn.textContent = 'Saving Tracker...';

        try {
          const { error } = await getSb()
            .from('global_settings')
            .upsert({
              key: 'salary_tracker_state',
              company_id: this.companyId,
              value: this.trackerState
            });
          if (error) throw error;
          toast('Salary tracker state saved successfully.');
        } catch (e) {
          toast('Save failed: ' + e.message, 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = 'Save Tracker State';
        }
      }
    };

    // Boot
    document.addEventListener('DOMContentLoaded', () => {
      SalaryApp.init();
      if (typeof initNav === 'function') initNav();
    });
  </script>
</body>
</html>
